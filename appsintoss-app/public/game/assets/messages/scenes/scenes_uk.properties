scenes.welcomescene.update_intro=Sacred Pixel Dungeon оновлено!
scenes.welcomescene.update_msg=Версія 3.3 включає тестову зону для майбутнього оновлення міських завдань, нові предмети та низку дрібних виправлень і поліпшень.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon пропатчено!
scenes.welcomescene.patch_bugfixes=Цей патч включає в себе виправлення помилок.
scenes.welcomescene.patch_translations=Цей патч включає в себе покращення перекладу.
scenes.welcomescene.patch_balance=Цей патч містить зміни ігрового балансу.
scenes.welcomescene.patch_msg=Цей патч також містить деякі невеликі зміни та покращення продуктивності.
scenes.welcomescene.what_msg=Схоже, що ваші файли збереження із майбутньої версії Sacred Pixel Dungeon!\n\nПопередження! Ваші збереження можуть містити речі,яких немає у цій версії Sacred Pixel Dungeon ,що може викликати дивні помилки та інші проблеми.
scenes.welcomescene.lang_warning_title=Незавершений переклад
scenes.welcomescene.lang_warning_msg=Деякий новий контент із цього оновлення ще не перекладено.\n\nДеякі фрази можуть бути написані англійською.\n\nКоманда перекладу працює над вирішенням цього, повний переклад буде готовий незабаром.\n\nДякуємо за ваше терпіння.
scenes.welcomescene.continue=Продовжити
scenes.welcomescene.changelist=Список змін
scenes.welcomescene.save_warning=Процес Sacred Pixel Dungeon було перервано під час нещодавньої спроби зберегти ваші дані гри. Sacred має вбудований захист від цього, тому ваші ігрові дані, ймовірно, в порядку.\n\nЗазвичай це трапляється, коли ваш пристрій раптово втрачає живлення або якщо він завершує роботу Sacred, не закриваючи його належним чином. Функції економії заряду акумулятора часто можуть викликати це на мобільних пристроях. Перезавантаження вашого пристрою також може допомогти, якщо ви часто зтикаєтеся з цією помилкою.
scenes.welcomescene.controller_title=Введення контролером
scenes.welcomescene.controller_body=Граєте на контролері? Використовуйте правий джойстик для керування екранним курсором.\n\nНатисніть RT/R2 або правий джойстик, щоб обрати курсором.
