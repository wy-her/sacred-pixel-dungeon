scenes.welcomescene.update_intro=Sacred Pixel Dungeon telah di-update!
scenes.welcomescene.update_msg=v3.3 menyertakan area pengujian untuk perombakan mendatang pada misi kota, item baru, dan sejumlah penyesuaian serta peningkatan kecil lainnya.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon telah di-patch!
scenes.welcomescene.patch_bugfixes=Patch ini berisi bugfix.
scenes.welcomescene.patch_translations=Patch ini berisi update terjemahan.
scenes.welcomescene.patch_balance=Patch ini berisi perubahan untuk keseimbangan game.
scenes.welcomescene.patch_msg=Patch ini juga mengandung sedikit perubahan kecil dan peningkatan performa.
scenes.welcomescene.what_msg=Sepertinya simpanan game-mu sekarang berasal dari versi terbaru Sacred Pixel Dungeon.\n\nPerhatian! Simpananmu mungkin berisi hal yang tidak ada di versi ini, ini dapat menyebabkan beberapa eror yang aneh terjadi.
scenes.welcomescene.lang_warning_title=Terjemahan Belum Lengkap
scenes.welcomescene.lang_warning_msg=Beberapa konten dari update ini belum diterjemahkan.\n\nBeberapa frasa mungkin masih tertulis dalam bahasa Inggris.\n\nTim penerjemah masih bekerja untuk menerjemahkan itu dan terjemahan penuhnya akan di-update pada patch berikutnya.\n\nTerima kasih atas kesabarannya.
scenes.welcomescene.continue=Lanjutkan
scenes.welcomescene.changelist=Daftar Perubahan
scenes.welcomescene.save_warning=Sacred Pixel Dungeon telah terganggu saat mencoba menyimpan data game-mu baru-baru ini. memiliki perlindungan bawaan terhadap ini, jadi data game Anda akan baik-baik saja.\n\nIni biasanya terjadi ketika perangkat Anda tiba-tiba kehilangan daya, atau jika Sacred terputus tanpa menutupnya dengan benar. Fitur penghemat baterai sering kali dapat menyebabkan hal ini pada perangkat seluler. Memulai ulang perangkatmu juga dapat membantu jika kau sering melihat kesalahan ini.
scenes.welcomescene.controller_title=Masukan Controller
scenes.welcomescene.controller_body=Bermain di controller? Gunakan stik kanan untuk mengontrol kursor di layar.\n\nTekan RT/R2 atau stik kanan untuk memilih dengan kursor.
