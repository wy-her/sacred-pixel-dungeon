windows.wndtutorial.journal_title=日志按钮
windows.wndtutorial.journal_msg=点击右上角闪烁的日志按钮，或按快捷键（%s）。
windows.wndtutorial.hero_info_title=英雄信息
windows.wndtutorial.hero_info_msg=点击左上角闪烁的英雄头像，或按快捷键（%s）。
windows.wndtutorial.examine_title=调查模式
windows.wndtutorial.examine_msg=点击底部闪烁的放大镜按钮，或按快捷键（%s）。然后点击一个格子来调查它。
windows.wndtutorial.combat_title=战斗
windows.wndtutorial.combat_msg=一只老鼠出现了！点击敌人，或点击底部出现的攻击按钮，或按快捷键（%s）。
windows.wndtutorial.scroll_title=使用卷轴
windows.wndtutorial.scroll_msg=你发现了一张未知的卷轴！捡起它并在物品栏中点击它来阅读。\n\n卷轴以未鉴定状态出现。使用卷轴会鉴定它的类型。
windows.wndtutorial.potion_title=使用药水
windows.wndtutorial.potion_msg=你发现了一瓶未知的药水！捡起它并在物品栏中点击它来喝下或投掷。\n\n药水以未鉴定状态出现。使用药水会鉴定它的类型。
windows.wndtutorial.search_title=发现秘密
windows.wndtutorial.search_msg=搜索隐藏的门并进入。点击放大镜按钮两次，或按快捷键（%s）两次，来搜索相邻格子的秘密。
windows.wndtutorial.wait_title=等待敌人
windows.wndtutorial.wait_msg=一条蛇出现了！按闪烁的等待按钮，或按快捷键（%s），等待它穿过门。
windows.wndtutorial.surprise_attack_title=突袭！
windows.wndtutorial.surprise_attack_msg=蛇从门里进来了！现在攻击可以保证命中！攻击敌人。
windows.wndtutorial.liquid_flame_title=使用药水
windows.wndtutorial.liquid_flame_msg=你发现了一瓶药水！药水可以投掷或饮用。试着把它扔向前方的木栅栏。\n\n药水以未鉴定状态出现。使用药水会鉴定它的类型。
windows.wndtutorial.frost_title=使用药水
windows.wndtutorial.frost_msg=你又发现了一瓶药水！试着把它扔向挡住去路的火焰。\n\n药水以未鉴定状态出现。使用药水会鉴定它的类型。
windows.wndtutorial.complete_title=教程完成
windows.wndtutorial.complete_msg=恭喜！你已完成教程。现在你已准备好开始真正的冒险！
windows.wndtutorial.reward_granted=\u6559\u7a0b\u5956\u52b1\u5df2\u53d1\u653e\uff01
