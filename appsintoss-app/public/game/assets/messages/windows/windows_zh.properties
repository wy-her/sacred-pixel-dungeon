windows.wndvictorycongrats.title=获胜！
windows.wndvictorycongrats.start_text=恭喜您征服了这座地牢！新的游戏选项已经解锁，你可以在选择英雄时查看并设置：
windows.wndvictorycongrats.challenges=您现在可以开启_挑战_功能了！挑战是一类通过各种方式为游戏增添难度的设置选项。
windows.wndvictorycongrats.custom_seeds=您现在可以使用_自定义种子_进行游戏了！在版本不变的情况下，使用同一个种子将总是生成相同的地牢。
windows.wndvictorycongrats.dailies=您现在可以参与_每日挑战_了！每天都有一场新游戏，对每个人都是一样的！
windows.wndvictorycongrats.thank_you=万分感谢您能游玩神圣像素地牢！
windows.wndvictorycongrats.support_prompt=_请考虑赞助这款游戏_，如果您还没有的话。忠实玩家的支持能让开发者不断对游戏进行打磨！
windows.wndvictorycongrats.support=赞助
windows.wndvictorycongrats.close=关闭
windows.wndwandmaker.dust=哦，我注意到你已经获得了尸尘！别担心那些怨灵，我能解决它们。就像我承诺的，你可以选择我制作的一根高品质法杖。
windows.wndwandmaker.ember=哦，我注意到你已经获得了余烬！希望那个火焰元素没有造成太多麻烦。就像我承诺的，你可以选择我制作的一根高品质法杖。
windows.wndwandmaker.berry=哦，我注意到你已经获得了腐莓！希望那株植物没有对你造成太多困扰。就像我承诺的，你可以选择我制作的一根高品质法杖。
windows.wndwandmaker.farewell=祝你在试炼中好运，%s！
windows.wndimpreward.cashout=_兑现：_ 将所有剩余好感转换为金币。1好感 = 1金币。
windows.wndimpreward.cashout_done=你获得了%d金币！
windows.wndimpreward.cashout_verify=将全部%d好感转换为金币？
windows.wndimpreward.no=否
windows.wndimpreward.prompt=干得好！以下是我能提供的。\n\n_当前好感：%d_
windows.wndimpreward.ring1=_+1戒指（%d好感）：_ 我会给你一枚已鉴定的精良+1附魔戒指。
windows.wndimpreward.ring1_verify=你想要+1戒指？很划算！
windows.wndimpreward.ring2=_+2戒指（%d好感）：_ 我会给你一枚已鉴定的强力+2附魔戒指。
windows.wndimpreward.ring2_verify=你想要+2戒指？这可是特别的！
windows.wndimpreward.yes=是
windows.wndranking$statstab.replay=重玩
windows.wndranking$statstab.replay_desc=你将使用相同的种子和相同的英雄重玩。\n重玩的游戏无法获得徽章，不会记录在游戏进度中，并且会显示在排行榜底部。\n\n请注意，如果游戏版本发生变化，相同的种子可能会生成不同的地牢。
