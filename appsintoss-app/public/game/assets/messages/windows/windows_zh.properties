windows.wndsadghost.rat=谢谢你，那个可怕的老鼠被杀，我也终于可以安息了...不知道究竟是什么样畸形的魔法才能创造这样一个肮脏的生物...
windows.wndsadghost.gnoll=谢谢你，那个诡计多端的豺狼人被杀，我也终于可以安息了...不知道究竟是什么样畸形的魔法使它如此诡诈...
windows.wndsadghost.crab=谢谢你，那只巨蟹被杀，我也终于可以安息了...不知道究竟是什么样畸形的魔法能让它活得那么长久...
windows.wndsadghost.give_item=挑一个你喜欢的拿走吧，我再也用不着它们了...希望它们能帮助你继续走下去...\n\n还有...我在这地牢里弄丢了一件心爱之物...如果你能...找到那...玫瑰...
