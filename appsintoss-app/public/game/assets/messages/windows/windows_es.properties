windows.wndtutorial.hero_info_title=Información del Héroe
windows.wndtutorial.hero_info_msg=Toca el retrato del héroe parpadeante en la esquina superior izquierda, o pulsa la tecla (%s).
windows.wndtutorial.examine_title=Modo Examinar
windows.wndtutorial.examine_msg=Toca el botón de la lupa parpadeante en la parte inferior, o pulsa la tecla (%s). Luego toca una casilla para examinarla.
windows.wndtutorial.combat_title=Combate
windows.wndtutorial.combat_msg=¡Ha aparecido una rata! Toca al enemigo, o toca el botón de ataque que apareció abajo, o pulsa la tecla (%s).
windows.wndtutorial.scroll_title=Usar Pergaminos
windows.wndtutorial.scroll_msg=¡Has encontrado un pergamino desconocido! Recógelo y tócalo en tu inventario para leerlo.\n\nLos pergaminos aparecen sin identificar. Usar un pergamino identifica su tipo.
windows.wndtutorial.potion_title=Usar Pociones
windows.wndtutorial.potion_msg=¡Has encontrado una poción desconocida! Recógela y tócala en tu inventario para beberla o lanzarla.\n\nLas pociones aparecen sin identificar. Usar una poción identifica su tipo.
windows.wndtutorial.search_title=Encontrar Secretos
windows.wndtutorial.search_msg=Busca una puerta oculta y entra por ella. Toca el botón de la lupa dos veces, o pulsa la tecla (%s) dos veces, para buscar secretos en las casillas adyacentes.
windows.wndtutorial.wait_title=Espera al Enemigo
windows.wndtutorial.wait_msg=¡Ha aparecido una serpiente! Pulsa el botón de espera parpadeante, o pulsa la tecla (%s), para esperar a que pase por la puerta.
windows.wndtutorial.surprise_attack_title=¡Ataque Sorpresa!
windows.wndtutorial.surprise_attack_msg=¡La serpiente entró por la puerta! ¡Ataca ahora para un golpe garantizado! Ataca al enemigo.
windows.wndtutorial.complete_title=Tutorial Completado
windows.wndtutorial.complete_msg=¡Felicidades! Has completado el tutorial. ¡Ahora estás listo para la aventura real!
windows.wndtutorial.liquid_flame_title=Usar Pociones
windows.wndtutorial.liquid_flame_msg=¡Has encontrado una poción! Las pociones pueden lanzarse o beberse. Intenta lanzarla contra la barricada de madera que tienes delante.\n\nLas pociones aparecen sin identificar. Usar una poción identifica su tipo.
windows.wndtutorial.frost_title=Usar Pociones
windows.wndtutorial.frost_msg=¡Has encontrado otra poción! Intenta lanzarla contra las llamas que bloquean tu camino.\n\nLas pociones aparecen sin identificar. Usar una poción identifica su tipo.
windows.wndtutorial.reward_granted=\u00a1Recompensa del tutorial obtenida!
