windows.wndranking$statstab.replay=Repetir
windows.wndranking$statstab.replay_desc=Jugarás con la misma semilla y el mismo héroe.\nLas partidas repetidas no otorgan insignias, no se registran en el progreso del juego y se muestran al final del ranking.\n\nTen en cuenta que si la versión del juego cambia, la misma semilla puede generar una mazmorra diferente.
