windows.wndblacksmith.prompt=Bien, un trato es un trato. Esto es lo que puedo hacer por ti. Solo trabajo con ítems identificados y no maldecidos.\n\n_Favor actual: %d_
windows.wndblacksmith.pickaxe=_Pico (%d favor):_ Supongo que puedo entregarte el pico si quieres. Tengo picos de sobra.
windows.wndblacksmith.pickaxe_verify=¿Estás seguro que quieres este viejo pico? La roca de por aquí no es tan blanda como en la mina, así que no podrás excavar nada con él.
windows.wndblacksmith.pickaxe_free=Eh, has hecho un gran trabajo, te lo daré gratis.
windows.wndblacksmith.pickaxe_yes=Sí, lo quiero.
windows.wndblacksmith.pickaxe_no=Olvídalo.
windows.wndblacksmith.reforge=_Forjar (%d favor):_ Puedo forjar dos ítems del mismo tipo en uno de mayor calidad.
windows.wndblacksmith.harden=_Fortalecer (%d favor):_ Puedo fortalecer un arma o armadura para que le sea más fácil mantener su encantamiento o glifo.
windows.wndblacksmith.upgrade=_Mejorar (%d favor):_ Si tienes un ítem por debajo de +2 puedo mejorarlo por ti.
windows.wndblacksmith.smith=_Fabricar (%d favor):_ Puedo intentar forjarte un arma o una armadura desde cero. Será de mayor tier y probablemente mejorada, y tendrás alguna elección sobre lo que obtendrás.
windows.wndblacksmith.smith_verify=De acuerdo, encenderé la forja así puedes elegir lo que quieres.
windows.wndblacksmith.smith_yes=Muy bien, házlo.
windows.wndblacksmith.smith_no=Olvídalo.
windows.wndblacksmith.cashout=_Efectivo (favor actual):_ Puedo darte algo de oro que tengo por ahí.
