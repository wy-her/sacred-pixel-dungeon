windows.wndvictorycongrats.title=¡Victoria!
windows.wndvictorycongrats.start_text=¡Enhorabuena por conquistar la mazmorra! Has desbloqueado algunas nuevas características que están disponibles al elegir un héroe:
windows.wndvictorycongrats.challenges=¡Ya puedes activar los _desafíos!_ Estos son modificadores opcionales para hacer el juego más difícil de varias maneras.
windows.wndvictorycongrats.custom_seeds=¡Ahora puedes introducir _semillas personalizadas_! La misma semilla y versión de juego siempre genera la misma mazmorra.
windows.wndvictorycongrats.dailies=¡Ahora puedes participar en las _partidas diarias_! ¡Cada día hay una partida que es igual para todos los jugadores!
windows.wndvictorycongrats.thank_you=¡Muchas gracias por jugar Sacred Pixel Dungeon!
windows.wndvictorycongrats.support_prompt=Si no lo has hecho aún, _por favor considera apoyar el juego._ ¡El apoyo de los jugadores permite al desarrollador continuar mejorando el juego!
windows.wndvictorycongrats.support=Apoyar
windows.wndvictorycongrats.close=Cerrar
windows.wndwandmaker.dust=¡Oh, veo que tienes el polvo! No te preocupes por los espectros, puedo ocuparme de ellos. Como te prometí, puedes elegir una de mis varitas de gran calidad.
windows.wndwandmaker.ember=¡Oh, veo que tienes las ascuas! Espero que el Elemental de Fuego no haya sido mucho problema. Como te prometí, puedes elegir una de mis varitas de gran calidad.
windows.wndwandmaker.berry=¡Oh, veo que tienes la baya! Espero que la Putrebaya no te haya dado muchos problemas. Como te prometí, puedes elegir una de mis varitas de gran calidad.
windows.wndwandmaker.farewell=¡Buena suerte en tu aventura, %s!
windows.wndimpreward.cashout=_Cobrar:_ Convierte todo el favor restante en oro. 1 favor = 1 oro.
