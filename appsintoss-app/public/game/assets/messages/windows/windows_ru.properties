windows.wndupgrade.unided=Вы не знаете свойств этого предмета, здесь показано его состояние без улучшений.
windows.wndupgrade.unknown_ring=Вы не знаете, каков эффект у этого кольца, и поэтому понятия не имеете, к чему приведет его улучшение.
