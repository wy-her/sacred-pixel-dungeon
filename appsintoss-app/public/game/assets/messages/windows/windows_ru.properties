windows.wndranking$statstab.no_slot=Нет свободного слота сохранения. Удалите игру, чтобы играть снова.

windows.wndresurrect.title=Воскрешение
windows.wndresurrect.message=Когда вы погибаете, вы чувствуете, как ваш анх направляет ваш дух обратно в этот мир. Это дает вам еще один шанс покорить подземелье!\n\nВы можете взять с собой два предмета, но остальные останутся там, где вы погибли. Какие предметы вы выберете?
windows.wndresurrect.prompt=Выберите предмет
windows.wndresurrect.confirm=Сохранить эти предметы
windows.wndresurrect.warn_title=Отсутствуют предметы
windows.wndresurrect.warn_body=Вы не выбрали два предмета. Вы уверены, что хотите воскреснуть без двух предметов?
windows.wndresurrect.warn_yes=Да, я уверен
windows.wndresurrect.warn_no=Нет, дай подумаю

windows.wndsadghost.rat_title=ВОНЮЧАЯ КРЫСА УБИТА
windows.wndsadghost.gnoll_title=ГНОЛЛ-ТРИКСТЕР УБИТ
windows.wndsadghost.crab_title=ДРЕВНИЙ КРАБ УБИТ
windows.wndsadghost.rat=Спасибо, теперь, когда эта жуткая крыса убита, я могу отдохнуть... Даже не знаю, что за кошмарная магия создала столь ужасное существо...
windows.wndsadghost.gnoll=Спасибо, теперь, когда этот проклятый гнолл убит, я могу отдохнуть... Даже не знаю, что за кошмарная магия наделила его таким умом...
windows.wndsadghost.crab=Спасибо, теперь, когда этот древний краб убит, я могу отдохнуть... Даже не знаю, что за кошмарная магия позволяла ему жить так долго...
windows.wndsadghost.give_item=Пожалуйста, возьми один из этих предметов, мне они не понадобятся... Может, они пригодятся тебе в твоём путешествии...\n\nАх, да... В этом подземелье потеряна одна дорогая мне вещь... Может, ты... найдешь мою... розу...
windows.wndsadghost.confirm=Принять
windows.wndsadghost.cancel=Отменить
windows.wndsadghost.farewell=Прощай, путешественник!

windows.wndscorebreakdown.title=Распределение очков
windows.wndscorebreakdown.progress_title=Прогресс
windows.wndscorebreakdown.progress_desc=Даются за максимальную глубину и уровень героя.
windows.wndscorebreakdown.progress_brief=макс. глубина и уровень
windows.wndscorebreakdown.treasure_title=Сокровища
windows.wndscorebreakdown.treasure_desc=Даются за собранное золото и общую цену предметов в инвентаре.
windows.wndscorebreakdown.treasure_desc_old=Даются за собранное золото.
windows.wndscorebreakdown.treasure_brief=золото и предметы
windows.wndscorebreakdown.explore_title=Исследование
windows.wndscorebreakdown.explore_desc=Даются за исследованные этажи. Уменьшаются за пропущенные предметы, скрытые двери или неразгаданные загадки.
windows.wndscorebreakdown.explore_brief=предметы, двери, загадки
windows.wndscorebreakdown.bosses_title=Боссы
windows.wndscorebreakdown.bosses_desc=Даются за побежденных боссов. Уменьшаются за то, что вы стоите в атаках, которых можно избежать во время боев с боссами.
windows.wndscorebreakdown.bosses_brief=побеждённые боссы
windows.wndscorebreakdown.quests_title=Задания
windows.wndscorebreakdown.quests_desc=Даются за выполненные задания у NPC. Уменьшаются за то, что вы стоите в атаках, которые можно избежать, или за недостающие очки задания.
windows.wndscorebreakdown.quests_brief=выполненные задания
windows.wndscorebreakdown.win_multiplier=Бонус победы
windows.wndscorebreakdown.challenge_multiplier=Бонус испытаний
windows.wndscorebreakdown.total=Всего очков
windows.wndscorebreakdown.old_score_desc=Прохождения, начатые до версии v1.3, имеют меньше категорий на очки, но прогресс примерно на ~50% больше, а лимит сокровищ выше.

