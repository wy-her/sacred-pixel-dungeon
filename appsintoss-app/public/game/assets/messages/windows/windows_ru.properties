windows.wndtutorial.journal_msg=Нажмите на мигающую кнопку журнала в правом верхнем углу или нажмите клавишу (%s).
windows.wndtutorial.hero_info_title=Информация о герое
windows.wndtutorial.hero_info_msg=Нажмите на мигающий портрет героя в левом верхнем углу или нажмите клавишу (%s).
windows.wndtutorial.examine_title=Режим осмотра
windows.wndtutorial.examine_msg=Нажмите на мигающую лупу внизу или нажмите клавишу (%s). Затем нажмите на клетку, чтобы осмотреть её.
windows.wndtutorial.combat_title=Бой
windows.wndtutorial.combat_msg=Появилась крыса! Нажмите на врага, на кнопку атаки внизу или нажмите клавишу (%s).
windows.wndtutorial.scroll_title=Использование свитков
windows.wndtutorial.scroll_msg=Вы нашли неизвестный свиток! Подберите его и нажмите на него в инвентаре, чтобы прочитать.\n\nСвитки появляются неопознанными. Использование свитка определяет его тип.
windows.wndtutorial.potion_title=Использование зелий
windows.wndtutorial.potion_msg=Вы нашли неизвестное зелье! Подберите его и нажмите на него в инвентаре, чтобы выпить или бросить.\n\nЗелья появляются неопознанными. Использование зелья определяет его тип.
windows.wndtutorial.search_title=Поиск секретов
windows.wndtutorial.search_msg=Найдите скрытую дверь и войдите в неё. Нажмите на лупу дважды или нажмите клавишу (%s) дважды, чтобы искать секреты на соседних клетках.
windows.wndtutorial.wait_title=Ждите врага
windows.wndtutorial.wait_msg=Появилась змея! Нажмите мигающую кнопку ожидания или нажмите клавишу (%s), чтобы подождать, пока она пройдёт через дверь.
windows.wndtutorial.surprise_attack_title=Внезапная атака!
windows.wndtutorial.surprise_attack_msg=Змея вошла через дверь! Атакуйте сейчас для гарантированного попадания! Атакуйте врага.
windows.wndtutorial.complete_title=Обучение завершено
windows.wndtutorial.complete_msg=Поздравляем! Вы завершили обучение. Теперь вы готовы к настоящему приключению!
