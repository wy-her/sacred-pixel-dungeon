windows.wndranking$statstab.copy_seed_desc=Желаете ли вы использовать сид подземелья из списка рекордов в качестве пользовательского сида для новой игры? _Обратите внимание, что игры с пользовательским сидом не приносят медали, не засчитываются как пройденные игры и отображаются внизу страницы рекордов._\n\nТакже имейте в виду, что если рекорд от старого прохождения, то разные версии Sacred Pixel Dungeon могут создавать разные подземелья, даже если сид одинаковый.
