windows.wndupgrade.curse_infusion=Калі праклён будзе зняты, прадмет больш не будзе карыстацца перавагамі насычэння праклёнам!
windows.wndupgrade.enchant=Паляпшэнне гэтага прадмета таксама мае %d%% шанец знішчыць яго зачараванне!
