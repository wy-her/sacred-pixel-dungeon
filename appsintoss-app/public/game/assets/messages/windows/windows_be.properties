windows.wndtutorial.journal_title=Кнопка часопіса
windows.wndtutorial.journal_msg=Націсніце на міргаючую кнопку часопіса ў правым верхнім куце або націсніце клавішу (%s).
windows.wndtutorial.hero_info_title=Інфармацыя пра героя
windows.wndtutorial.hero_info_msg=Націсніце на міргаючы партрэт героя ў левым верхнім куце або націсніце клавішу (%s).
windows.wndtutorial.examine_title=Рэжым агляду
windows.wndtutorial.examine_msg=Націсніце на міргаючую лупу ўнізе або націсніце клавішу (%s). Затым націсніце на клетку, каб аглядзець яе.
windows.wndtutorial.combat_title=Бой
windows.wndtutorial.combat_msg=З'явіўся пацук! Націсніце на ворага, на кнопку атакі ўнізе або націсніце клавішу (%s).
windows.wndtutorial.liquid_flame_title=Выкарыстанне зелляў
windows.wndtutorial.liquid_flame_msg=Вы знайшлі зелле! Зеллі можна кідаць або піць. Паспрабуйце кінуць яго на драўляную барыкаду наперадзе.\n\nЗеллі з'яўляюцца неапазнанымі. Выкарыстанне зелля вызначае яго тып.
windows.wndtutorial.frost_title=Выкарыстанне зелляў
windows.wndtutorial.frost_msg=Вы знайшлі яшчэ адно зелле! Паспрабуйце кінуць яго на полымя, якое перашкаджае вам.\n\nЗеллі з'яўляюцца неапазнанымі. Выкарыстанне зелля вызначае яго тып.
windows.wndtutorial.scroll_title=Выкарыстанне сувояў
windows.wndtutorial.scroll_msg=Вы знайшлі сувой! Падбярыце яго і прачытайце з інвентара, каб даведацца пра яго эфект.\n\nСувоі з'яўляюцца неапазнанымі. Выкарыстанне сувою вызначае яго тып.
windows.wndtutorial.potion_title=Выкарыстанне зелляў
windows.wndtutorial.potion_msg=Вы знайшлі невядомае зелле! Падбярыце яго і націсніце на яго ў інвентары, каб выпіць або кінуць.\n\nЗеллі з'яўляюцца неапазнанымі. Выкарыстанне зелля вызначае яго тып.
windows.wndtutorial.search_title=Пошук сакрэтаў
windows.wndtutorial.search_msg=Знайдзіце схаваныя дзверы і ўвайдзіце ў іх. Націсніце на лупу двойчы або націсніце клавішу (%s) двойчы, каб шукаць сакрэты на суседніх клетках.
windows.wndtutorial.wait_title=Чакайце ворага
windows.wndtutorial.wait_msg=З'явілася змяя! Націсніце міргаючую кнопку чакання або націсніце клавішу (%s), каб пачакаць, пакуль яна пройдзе праз дзверы.
windows.wndtutorial.surprise_attack_title=Раптоўная атака!
windows.wndtutorial.surprise_attack_msg=Змяя ўвайшла праз дзверы! Атакуйце зараз для гарантаванага трапляння! Атакуйце ворага.
windows.wndtutorial.complete_title=Навучанне завершана
windows.wndtutorial.complete_msg=Віншуем! Вы завяршылі навучанне. Цяпер вы гатовыя да сапраўднай прыгоды!
windows.wndtutorial.reward_granted=\u041d\u0430\u0433\u0430\u0440\u043e\u0434\u0430 \u0437\u0430 \u043d\u0430\u0432\u0443\u0447\u0430\u043d\u043d\u0435 \u0430\u0442\u0440\u044b\u043c\u0430\u043d\u0430!
