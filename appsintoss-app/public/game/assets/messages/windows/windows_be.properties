windows.wndupgrade.unided=Вы не ведаеце ўласцівасцей гэтага прадмета, тут паказаны яго непалепшаны стан.
windows.wndupgrade.unknown_ring=Вы не ведаеце, які эфект мае гэты пярсцёнак, і таму не ўяўляеце, што дасць яго паляпшэнне.
