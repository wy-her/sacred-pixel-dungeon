windows.wndranking$statstab.replay=Паўтарыць
windows.wndranking$statstab.replay_desc=Вы будзеце іграць з тым жа зернем і тым жа героем.\nПаўторныя гульні не прыносяць значкоў, не ўлічваюцца ў прагрэсе гульні і паказваюцца ўнізе рэйтынгу.\n\nЗвярніце ўвагу, што пры змене версіі гульні тое ж зерне можа стварыць іншае падзямелле.
