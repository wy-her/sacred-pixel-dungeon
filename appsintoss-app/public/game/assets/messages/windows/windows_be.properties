windows.wndvictorycongrats.title=Перамога!
windows.wndvictorycongrats.start_text=Віншуем з заваяваннем падзямелля! Вы адамкнулі новыя магчымасці, даступныя пры выбары героя:
windows.wndvictorycongrats.challenges=Цяпер вы можаце ўключаць _выклікі!_ Гэта неабавязковыя мадыфікатары, якія ўскладняюць гульню рознымі спосабамі.
windows.wndvictorycongrats.custom_seeds=Цяпер вы можаце ўводзіць _уласныя зерні!_ Аднолькавае зерне і версія гульні заўсёды ствараюць аднолькавае падзямелле.
windows.wndvictorycongrats.dailies=Цяпер вы можаце ўдзельнічаць у _штодзённых забегах!_ Кожны дзень ёсць новы штодзённы забег, аднолькавы для кожнага гульца!
windows.wndvictorycongrats.thank_you=Дзякуй вам вялікі за тое, што гуляеце ў Sacred Pixel Dungeon!
windows.wndvictorycongrats.support_prompt=Калі вы яшчэ гэтага не зрабілі, _калі ласка, падтрымайце гульню._ Падтрымка ад адданых гульцоў дазваляе распрацоўніку працягваць удасканальваць гульню!
windows.wndvictorycongrats.support=Падтрымаць
windows.wndvictorycongrats.close=Зачынiць
windows.wndwandmaker.dust=Я бачу, у цябе ёсць пыл! Не турбуйся пра зданяў, я магу з імі справіцца. Як і абяцаў, ты можаш выбраць адну з маіх высакаякасных палачак.
windows.wndwandmaker.ember=Я бачу, у цябе ёсць жарынкi! Я сапраўды спадзяюся, што элементаль агню не даставіў занадта шмат клопатаў. Як і абяцаў, ты можаш выбраць адну з маіх высакаякасных палачак.
windows.wndwandmaker.berry=Я бачу, у цябе ёсць ягада! Я вельмі спадзяюся, што гнілая ягадная расліна не занадта табе занепакоіла. Як і абяцаў, можаш выбраць адну з маіх высакаякасных палачак.
windows.wndwandmaker.farewell=Поспехаў у тваiх прыгодах, %s!
windows.wndimpreward.cashout=_Забраць наяўнасцю:_ Абмяняйце ўсю прыхільнасць на золата. 1 прыхільнасць = 1 золата.
windows.wndimpreward.cashout_done=Вы атрымалі %d золата!
windows.wndimpreward.cashout_verify=Абмяняць усю прыхільнасць (%d) на золата?
windows.wndimpreward.no=Не
windows.wndimpreward.prompt=Добрая праца! Вось што я магу прапанаваць.\n\n_Бягучая прыхільнасць: %d_
windows.wndimpreward.ring1=_Пярсцёнак +1 (%d прыхільнасці):_ Я дам табе добры апазнаны пярсцёнак з зачараваннем +1.
windows.wndimpreward.ring1_verify=Хочаш пярсцёнак +1? Выгадная здзелка!
windows.wndimpreward.ring2=_Пярсцёнак +2 (%d прыхільнасці):_ Я дам табе магутны апазнаны пярсцёнак з зачараваннем +2.
windows.wndimpreward.ring2_verify=Хочаш пярсцёнак +2? Гэты асаблівы!
