windows.wndvictorycongrats.title=Vitória!
windows.wndvictorycongrats.start_text=Parabéns por conquistar a masmorra! Você desbloqueou alguns recursos novos que estão disponíveis ao escolher um herói:
windows.wndvictorycongrats.challenges=Agora você pode habilitar _desafios!_ São modificadores opcionais para tornar o jogo mais difícil de várias maneiras.
windows.wndvictorycongrats.custom_seeds=Agora você pode inserir _seeds personalizadas!_ A mesma seed e versão de jogo sempre produzem a mesma masmorra.
windows.wndvictorycongrats.dailies=Agora você pode participar de _partidas diárias!_ Todo dia há uma nova partida diária que é igual para todos os jogadores!
windows.wndvictorycongrats.thank_you=Muito obrigado por jogar Sacred Pixel Dungeon!
windows.wndvictorycongrats.support_prompt=Se você ainda não o fez, _por favor, considere apoiar o jogo._ O apoio de jogadores dedicados permite que o desenvolvedor continue melhorando o jogo!
windows.wndvictorycongrats.support=Apoiar
windows.wndvictorycongrats.close=Fechar
windows.wndwandmaker.dust=Ah, vejo que trouxe o pó! Não se preocupe com os espectros, eu cuido deles. Como eu prometi, você pode escolher uma de minhas melhores varinhas.
windows.wndwandmaker.ember=Ah, vejo que trouxe as cinzas! Eu espero que o elemental de fogo não tenha dado muito problema. Como prometido, você pode escolher dentre uma de minhas melhores varinhas.
windows.wndwandmaker.berry=Ah, vejo que trouxe a semente! Eu espero que a putrifruta não tenha lhe dado muito trabalho. Como prometido, você pode escolher uma de minhas melhores varinhas.
windows.wndwandmaker.farewell=Boa sorte em sua missão, %s!
