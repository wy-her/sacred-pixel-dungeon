windows.wndtutorial.hero_info_title=Informação do Herói
windows.wndtutorial.hero_info_msg=Toque no retrato do herói piscando no canto superior esquerdo, ou pressione a tecla (%s).
windows.wndtutorial.examine_title=Modo Examinar
windows.wndtutorial.examine_msg=Toque no botão da lupa piscando na parte inferior, ou pressione a tecla (%s). Depois toque em um ladrilho para examiná-lo.
windows.wndtutorial.combat_title=Combate
windows.wndtutorial.combat_msg=Um rato apareceu! Toque no inimigo, ou toque no botão de ataque que apareceu na parte inferior, ou pressione a tecla (%s).
windows.wndtutorial.scroll_title=Usando Pergaminhos
windows.wndtutorial.scroll_msg=Você encontrou um pergaminho desconhecido! Pegue-o e toque nele no seu inventário para lê-lo.\n\nPergaminhos aparecem não identificados. Usar um pergaminho identifica seu tipo.
windows.wndtutorial.potion_title=Usando Poções
windows.wndtutorial.potion_msg=Você encontrou uma poção desconhecida! Pegue-a e toque nela no seu inventário para bebê-la ou arremessá-la.\n\nPoções aparecem não identificadas. Usar uma poção identifica seu tipo.
windows.wndtutorial.search_title=Encontrando Segredos
windows.wndtutorial.search_msg=Procure uma porta escondida e entre nela. Toque no botão da lupa duas vezes, ou pressione a tecla (%s) duas vezes, para procurar segredos nos ladrilhos adjacentes.
windows.wndtutorial.wait_title=Espere pelo Inimigo
windows.wndtutorial.wait_msg=Uma cobra apareceu! Pressione o botão de espera piscando, ou pressione a tecla (%s), para esperar que ela passe pela porta.
windows.wndtutorial.surprise_attack_title=Ataque Surpresa!
windows.wndtutorial.surprise_attack_msg=A cobra entrou pela porta! Ataque agora para um golpe garantido! Ataque o inimigo.
windows.wndtutorial.complete_title=Tutorial Completo
windows.wndtutorial.complete_msg=Parabéns! Você completou o tutorial. Agora você está pronto para a aventura real!
windows.wndtutorial.liquid_flame_title=Usando Poções
windows.wndtutorial.liquid_flame_msg=Você encontrou uma poção! Poções podem ser arremessadas ou bebidas. Tente arremessá-la na barricada de madeira à frente.\n\nPoções aparecem não identificadas. Usar uma poção identifica seu tipo.
windows.wndtutorial.frost_title=Usando Poções
windows.wndtutorial.frost_msg=Você encontrou outra poção! Tente arremessá-la nas chamas que bloqueiam seu caminho.\n\nPoções aparecem não identificadas. Usar uma poção identifica seu tipo.
windows.wndtutorial.reward_granted=Recompensa do tutorial recebida!
