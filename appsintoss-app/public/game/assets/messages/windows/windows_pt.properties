windows.wndblacksmith.prompt=Certo, trato é trato. Eis o que posso fazer por você. Eu só trabalho com itens identificados e não amaldiçoados.\n\n_Favor atual: %d_
windows.wndblacksmith.pickaxe=_Picareta (%d favor):_ Acho que posso te dar a picareta se quiser. Eu tenho várias.
windows.wndblacksmith.pickaxe_verify=Tem certeza de que quer essa coisa velha? As rochas por aqui não são macias como na mina, então você não será capaz de escavá-las.
windows.wndblacksmith.pickaxe_free=É, você fez um ótimo trabalho, eu vou te dar esta picareta de graça.
windows.wndblacksmith.pickaxe_yes=Sim, eu quero.
windows.wndblacksmith.pickaxe_no=Não, obrigado.
windows.wndblacksmith.reforge=_Reforjar (%d favor):_ Eu posso reforjar dois itens do mesmo tipo em um de melhor qualidade.
windows.wndblacksmith.harden=_Endurecer (%d favor):_ Eu posso endurecer uma arma ou armadura, assim será mais fácil manter um encantamento ou um glifo nela.
windows.wndblacksmith.upgrade=_Aprimorar (%d favor):_ Se tiver um item inferior a +2, eu posso aprimorá-lo pra você.
windows.wndblacksmith.smith=_Forjar (%d favor):_ Eu posso tentar forjar uma arma ou armadura do zero. Ela será de tier alto e provavelmente aprimorada, e você poderá escolher o que vai receber.
windows.wndblacksmith.smith_verify=Está bem, eu vou aquecer a forja e então você pode escolher o que vai querer.
windows.wndblacksmith.smith_yes=Está certo, aqueça a forja.
windows.wndblacksmith.smith_no=Não, obrigado.
windows.wndblacksmith.cashout=_Retirar ouro (todo o favor):_ Eu posso te dar um pouco de ouro normal que eu consegui por aí. 1 por cada ponto de favor.
windows.wndblacksmith.cashout_verify=Certo, isso dá %d de ouro. Mas eu não vou mais fazer nenhum trabalho pra você depois disso!
windows.wndblacksmith.cashout_yes=Me dê o ouro.
windows.wndblacksmith.cashout_no=Não, obrigado.
windows.wndblacksmith$wndreforge.message=Certo, eu posso reforjar dois itens identificados de mesmo tipo. O equipamento mais fraco será destruído e dará ao mais forte um aprimoramento. Se eles estiverem no mesmo nível, eu manterei o que estiver na esquerda.
