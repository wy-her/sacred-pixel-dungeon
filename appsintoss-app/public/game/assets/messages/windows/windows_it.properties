windows.wndimpreward.prompt=Buon lavoro! Ecco cosa posso offrirti.\n\n_Favore attuale: %d_
windows.wndimpreward.ring1=_Anello +1 (%d favore):_ Ti darò un buon anello identificato con incantesimo +1.
windows.wndimpreward.ring1_verify=Vuoi un anello +1? È un buon affare!
windows.wndimpreward.ring2=_Anello +2 (%d favore):_ Ti darò un potente anello identificato con incantesimo +2.
windows.wndimpreward.ring2_verify=Vuoi un anello +2? Questo è speciale!
windows.wndimpreward.yes=Sì
windows.wndranking$statstab.replay=Rigioca
windows.wndranking$statstab.replay_desc=Rigiocherai con lo stesso seme e lo stesso eroe.\nLe partite rigiocate non ottengono distintivi, non vengono registrate nei progressi di gioco e vengono mostrate in fondo alla classifica.\n\nTieni presente che se la versione del gioco cambia, lo stesso seme potrebbe generare un dungeon diverso.
windows.wndranking$statstab.replay_yes=Rigioca
windows.wndranking$statstab.replay_no=Annulla
windows.wndranking$statstab.replay_full=Il numero massimo di partite simultanee è 6 e ci sono già 6 partite in corso. Per ripetere, elimina almeno una partita in corso.

