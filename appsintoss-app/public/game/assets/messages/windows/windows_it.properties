windows.wndtutorial.ok=OK
windows.wndtutorial.journal_title=Pulsante Diario
windows.wndtutorial.journal_msg=Tocca il pulsante del diario lampeggiante nell'angolo in alto a destra, oppure premi il tasto (%s).
windows.wndtutorial.hero_info_title=Informazioni Eroe
windows.wndtutorial.hero_info_msg=Tocca il ritratto dell'eroe lampeggiante nell'angolo in alto a sinistra, oppure premi il tasto (%s).
windows.wndtutorial.examine_title=Modalità Esamina
windows.wndtutorial.examine_msg=Tocca il pulsante della lente lampeggiante in basso, oppure premi il tasto (%s). Poi tocca una casella per esaminarla.
windows.wndtutorial.combat_title=Combattimento
windows.wndtutorial.combat_msg=È apparso un topo! Tocca il nemico, o tocca il pulsante attacco apparso in basso, oppure premi il tasto (%s).
windows.wndtutorial.scroll_title=Usare Pergamene
windows.wndtutorial.scroll_msg=Hai trovato una pergamena sconosciuta! Raccoglila e toccala nell'inventario per leggerla.\n\nLe pergamene appaiono non identificate. Usare una pergamena ne identifica il tipo.
windows.wndtutorial.potion_title=Usare Pozioni
windows.wndtutorial.potion_msg=Hai trovato una pozione sconosciuta! Raccoglila e toccala nell'inventario per berla o lanciarla.\n\nLe pozioni appaiono non identificate. Usare una pozione ne identifica il tipo.
windows.wndtutorial.search_title=Trovare Segreti
windows.wndtutorial.search_msg=Cerca una porta nascosta ed entra. Tocca il pulsante della lente due volte, oppure premi il tasto (%s) due volte, per cercare segreti nelle caselle adiacenti.
windows.wndtutorial.wait_title=Aspetta il Nemico
windows.wndtutorial.wait_msg=È apparso un serpente! Premi il pulsante attendi lampeggiante, oppure premi il tasto (%s), per aspettare che passi attraverso la porta.
windows.wndtutorial.surprise_attack_title=Attacco a Sorpresa!
windows.wndtutorial.surprise_attack_msg=Il serpente è entrato dalla porta! Attacca ora per un colpo garantito! Attacca il nemico.
windows.wndtutorial.complete_title=Tutorial Completato
windows.wndtutorial.complete_msg=Congratulazioni! Hai completato il tutorial. Ora sei pronto per la vera avventura!
