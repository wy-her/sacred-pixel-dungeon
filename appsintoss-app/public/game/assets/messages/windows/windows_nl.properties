windows.wndblacksmith.prompt=Oké, afspraak is afspraak. Dit is wat ik voor je kan doen. Ik werk alleen met geïdentificeerde en niet-vervloekte items.\n\n_Huidige gunst: %d_
windows.wndblacksmith.pickaxe=_Houweel ( %d voorkeur):_ Ik denk dat ik je de houweel wel terug kan geven als je wilt. Ik heb er nog veel meer.
windows.wndblacksmith.pickaxe_verify=Weet je zeker dat je dit oude ding wilt? Het gesteente hier in de buurt is niet zo zacht als in de mijn, dus je kunt er niet meer mee graven.
windows.wndblacksmith.pickaxe_free=Eh, je hebt het behoorlijk goed gedaan, ik geef het je gratis.
windows.wndblacksmith.pickaxe_yes=Ja, ik wil het
windows.wndblacksmith.pickaxe_no=Laat maar zitten.
windows.wndblacksmith.reforge=_Hersmeden (%d gunstpunten):_ Ik kan twee items van hetzelfde type hersmeden tot een item van hogere kwaliteit.
windows.wndblacksmith.harden=_Verharden (%d gunstpunten):_ Ik kan een wapen of pantser verharden, zodat het gemakkelijker is om een betovering of symbool te behouden.
windows.wndblacksmith.upgrade=_Verbeteren (%d gunstpunten):_ Als je een item onder +2 hebt, kan ik het voor je verbeteren.
windows.wndblacksmith.smith=_Smid (%d gunstpunten):_ Ik kan proberen een wapen of pantser helemaal opnieuw voor je te smeden. Het is van een hoger niveau en waarschijnlijk opgewaardeerd, en je krijgt keuze uit wat je krijgt.
windows.wndblacksmith.smith_verify=Oké, ik zal de smederij opwarmen en dan kun je kiezen wat je wilt.
windows.wndblacksmith.smith_yes=Oké, warm de smederij op.
windows.wndblacksmith.smith_no=Laat maar zitten.
windows.wndblacksmith.cashout=_Uitbetalen (alle gunsten):_ Ik kan je gewoon wat gewoon goud geven dat ik heb liggen. 1 voor elk gunstpunt.
windows.wndblacksmith.cashout_verify=Oké, dus dat is %d goud. Maar daarna doe ik geen werk meer voor je!
windows.wndblacksmith.cashout_yes=Geef me het goud
windows.wndblacksmith.cashout_no=Laat maar zitten.
