windows.wndtutorial.search_title=Geheimen vinden
windows.wndtutorial.search_msg=Zoek naar een verborgen deur en ga erdoor. Tik twee keer op de vergrootglasknop, of druk twee keer op de toets (%s), om geheimen in aangrenzende tegels te zoeken.
windows.wndtutorial.wait_title=Wacht op de vijand
