windows.wndimpreward.cashout_verify=Alle gunst (%d) omzetten in goud?
windows.wndimpreward.no=Nee
windows.wndimpreward.prompt=Goed gedaan! Dit kan ik je aanbieden.\n\n_Huidige gunst: %d_
windows.wndimpreward.ring1=_+1 Ring (%d gunst):_ Ik geef je een mooie geïdentificeerde ring met een +1 betovering.
windows.wndimpreward.ring1_verify=Wil je een +1 ring? Goede deal!
windows.wndimpreward.ring2=_+2 Ring (%d gunst):_ Ik geef je een krachtige geïdentificeerde ring met een +2 betovering.
windows.wndimpreward.ring2_verify=Wil je een +2 ring? Deze is bijzonder!
windows.wndimpreward.yes=Ja
windows.wndranking$statstab.replay=Opnieuw spelen
windows.wndranking$statstab.replay_desc=Je speelt opnieuw met dezelfde seed en dezelfde held.\nHerhaalde spellen kunnen geen badges verdienen, worden niet opgenomen in de spelvoortgang en worden onderaan de ranglijst getoond.\n\nHoud er rekening mee dat als de spelversie verandert, dezelfde seed een andere kerker kan genereren.
