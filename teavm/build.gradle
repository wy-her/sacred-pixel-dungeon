// Build for Appsintoss (with font subsetting) - outputs to build/dist/appsintoss/webapp/
tasks.register('buildAppsintoss', JavaExec) {
    dependsOn classes
    description = 'Build for Appsintoss with subset fonts (100MB limit)'
    mainClass = project.mainClassName
    classpath = sourceSets.main.runtimeClasspath
    args = ['--output-dir', 'build/dist/appsintoss']
    jvmArgs = ['-Xmx2G']
    doLast {
        def webappDir = "${layout.buildDirectory.get().asFile}/dist/appsintoss/webapp"
        // Copy webapp files (same as buildRelease, but fonts handled separately)
        copy {
            from 'webapp/index.html'
            into webappDir
        }
        copy {
            from 'webapp/styles.css'
            into webappDir
        }
        copy {
            from 'webapp/banner.png'
            into webappDir
        }
        copy {
            from 'webapp/scripts/pako.min.js'
            into "${webappDir}/scripts"
        }

        // Run font subsetting script (outputs directly to build/dist/appsintoss/webapp/fonts/)
        def pythonCmd = System.getProperty('os.name').toLowerCase().contains('windows') ? 'python' : 'python3'
        def fontsOutputDir = "${webappDir}/fonts"
        println "Running font subsetting script..."
        def process = new ProcessBuilder(pythonCmd, 'scripts/subset_fonts.py', '--output-dir', fontsOutputDir)
            .directory(projectDir)
            .redirectErrorStream(true)
            .start()
        process.inputStream.eachLine { println it }
        def exitCode = process.waitFor()
        if (exitCode != 0) {
            throw new GradleException("Font subsetting failed with exit code ${exitCode}")
        }

        // Disable preloading for music files
        def preloadFile = file("${webappDir}/assets/preload.txt")
        if (preloadFile.exists()) {
            def content = preloadFile.text
            content = content.replaceAll('(i:b:/music/[^:]+:[^:]+):1', '$1:0')
            content = content.replaceAll('(?m)^i:b:/fonts/[^:]+\\.woff2:[^:]+:[01]\\r?\\n', '')
            content = content.replaceAll('(?m)^i:b:/fonts/OFL\\.txt:[^:]+:[01]\\r?\\n', '')
            preloadFile.text = content
            println "Disabled preloading for music files and removed woff2 font entries from preload.txt"
        }
        // Remove duplicate woff2 fonts from assets/fonts/
        def assetsFontsDir = file("${webappDir}/assets/fonts")
        if (assetsFontsDir.exists()) {
            assetsFontsDir.listFiles().each { f ->
                if (f.name.endsWith('.woff2') || f.name == 'OFL.txt') {
                    f.delete()
                    println "Removed duplicate font: assets/fonts/${f.name}"
                }
            }
        }
        // fonts/original/ is already excluded from copy
        println "Appsintoss build complete with subset fonts!"
    }
}

