apply plugin: 'java'

[compileJava, compileTestJava]*.options*.encoding = 'UTF-8'
java.sourceCompatibility = java.targetCompatibility = appJavaCompatibility

def gdxTeaVMVersion = '1.5.4'

sourceSets.main.resources.srcDirs += ["${project(':core').projectDir}/src/main/assets"]

project.ext.mainClassName = "com.sacredpixel.sacredpixeldungeon.teavm.TeaVMBuilder"

dependencies {
    implementation project(':core')
    implementation project(':SPD-classes')
    implementation project(':services')
    implementation project(':services:updates:debugUpdates')
    implementation project(':services:news:debugNews')

    // LibGDX core
    implementation "com.badlogicgames.gdx:gdx:$gdxVersion"

    // gdx-teavm web backend (replaces gdx-backend-gwt)
    implementation "com.github.xpenatan.gdx-teavm:backend-web:$gdxTeaVMVersion"

    // FreeType (compile-only; our stub replaces it at runtime)
    compileOnly "com.badlogicgames.gdx:gdx-freetype:$gdxVersion"

    // org.json (compile-only; our emulation replaces it)
    compileOnly "org.json:json:20170516"
}

sourceSets.main.java {
    srcDirs = [
        'src/main/java',
    ]
}

// Build release (TeaVM compilation) - outputs to build/dist/cloudflare/webapp/
tasks.register('buildRelease', JavaExec) {
    dependsOn classes
    mainClass = project.mainClassName
    classpath = sourceSets.main.runtimeClasspath
    args = ['--output-dir', 'build/dist/cloudflare']
    jvmArgs = ['-Xmx2G']
    // After TeaVM build, copy custom webapp files and optimize preloading
    doLast {
        def webappDir = "${layout.buildDirectory.get().asFile}/dist/cloudflare/webapp"
        // Copy custom index.html over generated one
        copy {
            from 'webapp/index.html'
            into webappDir
        }
        // Copy styles.css
        copy {
            from 'webapp/styles.css'
            into webappDir
        }
        // Copy fonts
        copy {
            from 'webapp/fonts'
            into "${webappDir}/fonts"
        }
        // Copy banner
        copy {
            from 'webapp/banner.png'
            into webappDir
        }
        // Copy pako.min.js for DEFLATE compression (data sync feature)
        copy {
            from 'webapp/scripts/pako.min.js'
            into "${webappDir}/scripts"
        }
        // Disable preloading for music files (48MB total).
        // Music is loaded on-demand when each track is played.
        // This reduces initial download from ~74MB to ~26MB.
        def preloadFile = file("${webappDir}/assets/preload.txt")
        if (preloadFile.exists()) {
            def content = preloadFile.text
            // Change music files from preload=1 to preload=0
            content = content.replaceAll('(i:b:/music/[^:]+:[^:]+):1', '$1:0')
            // Remove woff2 font entries completely (fonts are loaded via CSS @font-face, not asset preloader)
            content = content.replaceAll('(?m)^i:b:/fonts/[^:]+\\.woff2:[^:]+:[01]\\r?\\n', '')
            // Remove OFL.txt entry
            content = content.replaceAll('(?m)^i:b:/fonts/OFL\\.txt:[^:]+:[01]\\r?\\n', '')
            preloadFile.text = content
            println "Disabled preloading for music files and removed woff2 font entries from preload.txt"
        }
        // Remove duplicate woff2 fonts from assets/fonts/ (saves 28MB)
        // These fonts are already in webapp/fonts/ and loaded via CSS @font-face.
        // Only pixel_font.png and pixel_font.ttf are needed in assets/fonts/.
        def assetsFontsDir = file("${webappDir}/assets/fonts")
        if (assetsFontsDir.exists()) {
            assetsFontsDir.listFiles().each { f ->
                if (f.name.endsWith('.woff2') || f.name == 'OFL.txt') {
                    f.delete()
                    println "Removed duplicate font: assets/fonts/${f.name}"
                }
            }
        }
        // Remove fonts/original/ folder (backup of pre-subset fonts, not needed in deployment)
        def originalFontsDir = file("${webappDir}/fonts/original")
        if (originalFontsDir.exists()) {
            originalFontsDir.deleteDir()
            println "Removed fonts/original/ folder (saves 28MB)"
        }
    }
}

