windows.wndimp.message_1=Just _one_ token? Well, a deal is a deal... Here's a basic ring from my collection. It's a bit _cursed_, but hey, it's still a ring!
windows.wndimp.message_2=_Two_ tokens! Not bad. Here's a _+1 ring_ for you. It's a bit _cursed_, but that can be fixed, right?
windows.wndimp.message_3=_Three_ tokens! Now we're talking. Here's a _+2 ring_ for you. Still _cursed_ though, sorry about that.
windows.wndimp.message_4=_Four_ tokens! Impressive work! Here's a _+3 ring_ for you. It's _cursed_, but such power doesn't come clean!
windows.wndimp.message_5=All _five_ tokens! You're amazing! Here's my finest _+3 ring_, and I even cleaned the _curse_ off it for you!
windows.wndimp.reward=Take the ring

windows.wndimpreward.prompt=Good job! Here's what I can offer you.\n\n_Current Favor: %d_
windows.wndimpreward.ring1=_+1 Ring (%d favor):_ I'll give you a fine identified ring with a +1 enchantment.
windows.wndimpreward.ring2=_+2 Ring (%d favor):_ I'll give you a powerful identified ring with a +2 enchantment.
windows.wndimpreward.ring1_verify=You want a +1 ring? It's a good deal!
windows.wndimpreward.ring2_verify=You want a +2 ring? This one's special!
