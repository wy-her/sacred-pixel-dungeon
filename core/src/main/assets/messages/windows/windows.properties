windows.wndwandmaker.dust=Oh, I see you have the dust! Don't worry about the wraiths, I can deal with them. As I promised, you can choose one of my high quality wands.
windows.wndwandmaker.ember=Oh, I see you have the embers! I do hope the fire elemental wasn't too much trouble. As I promised, you can choose one of my high quality wands.
windows.wndwandmaker.berry=Oh, I see you have the berry! I do hope the rotberry plant didn't trouble you too much. As I promised, you can choose one of my high quality wands.
windows.wndwandmaker.farewell=Good luck in your quest, %s!

windows.wndtutorial.ok=OK
windows.wndtutorial.journal_title=Journal Button
windows.wndtutorial.journal_msg=Tap the flashing journal button in the top-right corner, or press the shortcut key (%s).
windows.wndtutorial.hero_info_title=Hero Information
windows.wndtutorial.hero_info_msg=Tap the flashing hero portrait in the top-left corner, or press the shortcut key (%s).
windows.wndtutorial.examine_title=Examine Mode
windows.wndtutorial.examine_msg=Tap the flashing magnifying glass button at the bottom, or press the shortcut key (%s). Then tap a tile to examine it.
windows.wndtutorial.combat_title=Combat
windows.wndtutorial.combat_msg=A rat appeared! Tap the enemy, or tap the attack button that appeared at the bottom, or press the shortcut key (%s).
windows.wndtutorial.liquid_flame_title=Using Potions
windows.wndtutorial.liquid_flame_msg=You found a potion! Potions can be thrown or drunk. Try throwing it at the wooden barricade ahead.\n\nPotions appear unidentified. Using a potion identifies its type.
windows.wndtutorial.frost_title=Using Potions
windows.wndtutorial.frost_msg=You found another potion! Try throwing it at the flames blocking your path.\n\nPotions appear unidentified. Using a potion identifies its type.
windows.wndtutorial.scroll_title=Using Scrolls
windows.wndtutorial.scroll_msg=You found a scroll! Pick it up and read it from your inventory to discover its effect.\n\nScrolls appear unidentified. Using a scroll identifies its type.
windows.wndtutorial.search_title=Finding Secrets
windows.wndtutorial.search_msg=Search for a hidden door and enter it. Tap the magnifying glass button twice, or press the shortcut key (%s) twice, to search adjacent tiles for secrets.
windows.wndtutorial.wait_title=Wait for the Enemy
windows.wndtutorial.wait_msg=A snake appeared! Press the flashing wait button, or press the shortcut key (%s), to wait for it to come through the door.
windows.wndtutorial.surprise_attack_title=Surprise Attack!
windows.wndtutorial.surprise_attack_msg=The snake entered through the door! Attack now for a guaranteed hit! Attack the enemy.
windows.wndtutorial.complete_title=Tutorial Complete
windows.wndtutorial.complete_msg=Congratulations! You've completed the tutorial. Now you're ready for the real adventure!
windows.wndtutorial.reward_granted=Tutorial reward granted!
