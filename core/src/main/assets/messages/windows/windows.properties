windows.wndvictorycongrats.title=Victory!
windows.wndvictorycongrats.start_text=Congratulations on conquering the dungeon! You've unlocked some new features that are available when choosing a hero:
windows.wndvictorycongrats.challenges=You can now enable _challenges!_ These are optional modifiers to make the game more difficult in a variety of ways.
windows.wndvictorycongrats.custom_seeds=You can now enter _custom seeds!_ The same seed and game version always produce the same dungeon.
windows.wndvictorycongrats.dailies=You can now participate in _daily runs!_ Every day there's a new daily run that's the same for every player!
windows.wndvictorycongrats.thank_you=Thank you so much for playing Sacred Pixel Dungeon!
windows.wndvictorycongrats.support_prompt=If you haven't already, _please consider supporting the game._ Support from dedicated players lets the developer continue improving the game!
windows.wndvictorycongrats.support=Support
windows.wndvictorycongrats.close=Close

