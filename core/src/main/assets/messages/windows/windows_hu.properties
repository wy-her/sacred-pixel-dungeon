windows.wndranking$statstab.copy_seed_desc=Szeretnéd az eredménylistán szereplő kazamata futamkódját használni egy új választott futamkódú játékhoz? _Ne feledd, hogy a választott futamkódú játékokban nem szerezhetsz medálokat, nem számítanak bele a lejátszott játékokba, és az eredménylista alján jelennek meg._\n\nHa ez az eredménylista egy régi futamhoz készült, ne feledd azt sem, hogy a Sacred Pixel Dungeon különböző verziói eltérő kazamatákat hozhatnak létre, hiába ugyanaz a futamkód.
