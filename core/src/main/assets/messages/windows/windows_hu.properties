windows.wndresurrect.title=Feltámadás
windows.wndresurrect.message=Ahogy elpusztulsz, érzed, hogy az ankh visszavezeti a szellemedet e világ felé. Újabb esélyt ad neked, hogy meghódítsd a kazamatát!\n\nKét tárgyadat magaddal viheted, de a többi ott marad, ahol elpusztultál. Melyik tárgyakat választod?
