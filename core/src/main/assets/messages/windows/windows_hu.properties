windows.wndsadghost.rat=Köszönöm, hogy megölted ezt a szörnyű patkányt, és végre nyugalomra térhetek... Kíváncsi lennék, miféle gonosz varázserő hívott életre egy ilyen mocskot...
windows.wndsadghost.gnoll=Köszönöm, hogy megölted ezt az ravasz gnollt, és végre nyugalomra térhetek... Kíváncsi lennék, miféle gonosz varázserő tette ilyen agyafúrttá...
windows.wndsadghost.crab=Köszönöm, hogy megölted az óriásrákot, és végre nyugalomra térhetek... Kíváncsi lennék, miféle gonosz varázserő tette ilyen hosszú életűvé...
windows.wndsadghost.give_item=Kérlek, fogadd el az egyik tárgyat, nekem már úgysincs szükségem rájuk... Talán segíthetnek az utad során...\n\nMég valami... Elveszett ebben a börtönben valami, ami nagyon kedves nekem... Ha egyszer... megtalálnád a... rózsámat......
