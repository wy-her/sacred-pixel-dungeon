windows.wndtutorial.liquid_flame_msg=Bájitalt találtál! A bájitalokat meg lehet inni vagy el lehet dobni. Próbáld meg eldobni az előtted lévő fa torlaszra.\n\nA bájitalok azonosítatlanul jelennek meg. A bájital használata azonosítja a típusát.
