windows.wndblacksmith.prompt=Oké, az alku az alku. Megmondom, mit tehetek érted. Csak azonosított és átok nélküli tárgyakkal dolgozom.\n\n_Jelenlegi szívesség: %d_
windows.wndblacksmith.pickaxe=_Csákány (%d szívesség):_ Azt hiszem, visszaadhatom a csákányt, ha akarod. Nekem van még bőven.
windows.wndblacksmith.pickaxe_verify=Biztos, hogy ezt a régi vackot akarod? A kőzet itt nem olyan puha, mint a bányában, így nem tudsz majd ásni vele ettől kezdve.
windows.wndblacksmith.pickaxe_free=Csudába is, elég jó munkát végeztél, ingyen odaadom neked.
windows.wndblacksmith.pickaxe_yes=Igen, akarom.
windows.wndblacksmith.pickaxe_no=Nem érdekel.
windows.wndblacksmith.reforge=_Újrakovácsolás (%d szívesség):_ Két azonos típusú azonosított tárgyat tudok újrakovácsolni egy magasabb minőségűvé.
windows.wndblacksmith.harden=_Keményítés (%d szívesség):_ Egy azonosított fegyvert vagy páncélt meg tudok keményíteni, így könnyebben megtartja a bűvöletet vagy varázsjelet.
windows.wndblacksmith.upgrade=_Fejlesztés (%d szívesség):_ Ha van egy +2 szint alatti tárgyad, akkor fel tudom fejleszteni neked.
windows.wndblacksmith.smith=_Kovácsolás (%d szívesség):_ Megpróbálhatok neked teljesen új fegyvert, vagy páncélt kovácsolni. Magasabb szintű lesz, és valószínűleg fejlesztett, és lesz némi beleszólásod, hogy milyen legyen.
windows.wndblacksmith.smith_verify=Rendben, bemelegítem a kovácsműhelyt, aztán kiválaszthatod, amit akarsz.
windows.wndblacksmith.smith_yes=Oké, melegítsd fel a kovácsműhelyt.
windows.wndblacksmith.smith_no=Nem érdekel.
windows.wndblacksmith.cashout=_Készpénz (minden szívesség):_ Adhatok neked rendes aranyat is abbó', ami van itt nekem. 1-et minden egyes szívességpontért.
windows.wndblacksmith.cashout_verify=Oké, ez %d aranyat ér. De ezutá' nem csinálok több munkát neked!
windows.wndblacksmith.cashout_yes=Add ide az aranyat.
windows.wndblacksmith.cashout_no=Nem érdekel.
