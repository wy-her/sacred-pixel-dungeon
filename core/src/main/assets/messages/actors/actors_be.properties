###blobs
actors.blobs.blizzard.name=віхор
actors.blobs.blizzard.desc=Тут кружыцца ледзяны буран.

actors.blobs.confusiongas.name=газ дэзарыентацыі
actors.blobs.confusiongas.desc=Тут клубіцца газ дэзарыентацыі.

actors.blobs.electricity.name=электрычнасць
actors.blobs.electricity.desc=Тут зіхацяць электрычныя разрады.
actors.blobs.electricity.rankings_desc=Электрашок
actors.blobs.electricity.ondeath=Вы памерлі ад шоку...

actors.blobs.fire.name=агонь
actors.blobs.fire.desc=Тут бушуе полымя.

actors.blobs.foliage.name=лістота
actors.blobs.foliage.desc=Патокі святла пранізваюць змрок падземнага саду.

actors.blobs.freezing.name=халоднае паветра
actors.blobs.freezing.desc=Паветра тут ненатуральна халоднае.

actors.blobs.goowarn.name=цёмная энергія
actors.blobs.goowarn.desc=Тут кружацца часціцы цёмнай энергіі!

actors.blobs.inferno.name=inferno
actors.blobs.inferno.desc=Тут бушуе пякельнае полымя.

actors.blobs.paralyticgas.name=паралітычны газ
actors.blobs.paralyticgas.desc=Тут клубіцца газ параліча.

actors.blobs.regrowth.name=адраджэнне

actors.blobs.sacrificialfire.name=ахвярны агонь
actors.blobs.sacrificialfire.desc=Тут стаіць алтар, на якім гарыць ахвярны агонь. Любая істота, забітая на ім, будзе паглынута ў якасці дара духам падзямелля.\n\nМожа быць, пасля дастатковай колькасці ахвярапрынашэнняў з'явіцца ўзнагарода?
actors.blobs.sacrificialfire.worthy=Агонь паглынае вашыя дары і становіцца мацней.
actors.blobs.sacrificialfire.unworthy=Агонь паглынае вашыя дары, але не змяняецца.
actors.blobs.sacrificialfire.reward=Агонь успыхвае, а затым рассейваецца, пакідаючы пасля сябе ўзнагароду!

actors.blobs.smokescreen.name=дымавая завеса
actors.blobs.smokescreen.desc=Тут клубіцца густы чорны дым.

actors.blobs.stenchgas.name=смуродны газ
actors.blobs.stenchgas.desc=Тут клубіцца воблака жудаснага смуроду.

actors.blobs.stormcloud.name=навальнічныя хмары
actors.blobs.stormcloud.desc=Тут клубяцца аблокі вадзянога пару.

actors.blobs.toxicgas.name=атрутны газ
actors.blobs.toxicgas.desc=Тут клубіцца зялёны атрутны газ.
actors.blobs.toxicgas.rankings_desc=Задыхнуўся
actors.blobs.toxicgas.ondeath=Вы памерлі ад атрутнага газу...

actors.blobs.corrosivegas.name=едкі газ
actors.blobs.corrosivegas.desc=Тут клубіцца воблака, якое раз'ядае скуру.

actors.blobs.waterofawareness.name=вада ўсведамлення
actors.blobs.waterofawareness.procced=Як толькі вы робіце глыток, вы адчуваеце, як веды напаўняюць ваш розум.
actors.blobs.waterofawareness.desc=Энергія ў гэтым калодзежы выпраменьвае сілу ведаў. Глыток вады апазнае экіпіяваныя рэчы, знайдзе праклёны на прадметаў ва ў інвентары, а таксама раскрые ўсе прадметы на бягучым паверсе.

actors.blobs.waterofhealth.name=вада здароўя
actors.blobs.waterofhealth.procced=Ледзь вы зрабілі глыток, вашы раны цалкам зацягнуліся.
actors.blobs.waterofhealth.desc=Вада ў гэтай крыніцы выпраменьвае здароўе. Зрабіце глыток, каб вылечыць раны,  здаволіць голад і зняць праклёны са зношаных прадметаў.

actors.blobs.web.name=павуцінне
actors.blobs.web.desc=Тут усё пакрыта тоўстым павуціннем. Усё, што закране павуцінне або будзе кінута туды, зломіць павуцінне, але таксама застанецца на гэтым месцы.



###buffs
actors.buffs.adrenaline.name=адрэналін
actors.buffs.adrenaline.desc=Выкід адрэналіну павялічвае вашы фізічныя магчымасці, што паскарае вашы атакі і хуткасць рухання.\n\nАдрэналін павялічвае хуткасць бегу ў два разы, а хуткасць атакі - у паўтара.\n\nХадоў засталося: %s.

actors.buffs.adrenalinesurge.name=павелічэнне сілы
actors.buffs.adrenalinesurge.desc=Вы адчуваеце значны прыліў сіл. На жаль, гэта толькі часовы эфект.\n\nБонус да сілы: +%d.\nХадоў да паслаблення эфекту: %s.

actors.buffs.amok.name=буянства
actors.buffs.amok.desc=Буянства - гэта стан лютай нянавісці і дэзарыентацыі.\n\nКалі істота знаходзіцца ў гэтым стане, яна атакуе любога, хто апынецца побач з ёй, будзь то сябар ці вораг.\n\nХадоў з буянствам засталося: %s.

actors.buffs.arcanearmor.name=магічны даспех
actors.buffs.arcanearmor.desc=Вас акружае ледзь прыкметны шчыт, які памяншае страты ад магічных атак.\n\nВаша магічная абарона павялічана на: 0-%d.\n\nХадоў да паслаблення абароны: %s.

actors.buffs.artifactrecharge.name=перазарадка артэфакта
actors.buffs.artifactrecharge.desc=Энергія цячэ ўнутры і зараджае надзетыя артэфакты.\n\nЭфект ўплывае на кожны артэфакт па-свойму, але яны будуць зараджацца значна хутчэй чым звычайна.\n\nХадоў засталося: %s.

actors.buffs.ascensionchallenge.name=праклён кудменя
actors.buffs.ascensionchallenge.desc=Нейкім чынам Ёг-Джава аказвае ўплыў на гэты свет праз Кудмень і спрабуе спыніць ваша ўзыходжанне!\n\nСіла Ёга робіць падзямелле больш небяспечным праз павялічванне колькасці і моцы ворагаў! Гэтая сіла будзе працягваць расці, калі яе не спыніць. Яе можна аслабіць, калі перамагчы ворагаў, якія узмоцнены сілай Ёга.
actors.buffs.ascensionchallenge.desc_clear=Цёмная энергія, якая зыходзіць ад Кудменя, цяпер аслаблена настолькі, наколькі гэта магчыма.
actors.buffs.ascensionchallenge.desc_beckon=Кудмень зараз _звяртаецца да аддаленых ворагаў_ і папярэджвае іх аб вашым месцазнаходжанні.
actors.buffs.ascensionchallenge.desc_haste=Кудмень зараз _паскарае далёкіх ворагаў_, што дазваляе ім хутчэй дабрацца да вас!
actors.buffs.ascensionchallenge.desc_slow=Кудмень зараз _замядляе вас_ і адмаўляе эфекты, якія павялічваюць хуткасць!
actors.buffs.ascensionchallenge.desc_damage=Энергія з Кудменя апынулася настолькі моцнай, што яна _наўпрост шкодзіць вам!_
actors.buffs.ascensionchallenge.beckon=Кудмень пачынае заклікаць ворагаў здалёк.
actors.buffs.ascensionchallenge.haste=Кудмень пачынае паскараць воргаў удалечыні!
actors.buffs.ascensionchallenge.slow=Кудмень стаў важыць як камень ў вашым інвентары!
actors.buffs.ascensionchallenge.damage=Кудмень пачаў выпускаць цёмную энергію. Горача!
actors.buffs.ascensionchallenge.weaken_info=Праклён амулета можа быць аслаблены, калі перамагчы больш ворагаў.
actors.buffs.ascensionchallenge.weaken_info_no_kills=Калі вы пераможаце ворагаў, праклён амулета аслабее!
actors.buffs.ascensionchallenge.weaken=Вы адчуваеце, што праклён кудменя стаў слабець.
actors.buffs.ascensionchallenge.break=Вы знаходзіце час перавесці дыханне, і адчуваеце, як вашыя раны пачынаюць гаіцца!
actors.buffs.ascensionchallenge.almost=Хватка Ёга за Кудмень пачынае слабець, вы амаль дабраліся.
actors.buffs.ascensionchallenge.on_kill=Змрочная энергія паглынула вас...

actors.buffs.barkskin.name=дубовая скура
actors.buffs.barkskin.desc=Ваша скура зацвярдзела і стала грубай і цвёрдай, як кара дрэва.\n\nГэты эфект павялічвае вашу бягучую браню і абарону ад фізічных нападаў.\n\nБягучы бонус да брані: 0-%d.\nХадоў да паслаблення эфекту: %s.\n\nКалі вы атрымалі дубовую скуру з некалькіх крыніц, то толькі самы моцны будзе прыменены.

actors.buffs.barrier.name=бар'ер
actors.buffs.barrier.desc=Празрыстае сілавое поле блакуе ўвесь ўрон.\n\nБар'ер будзе атрымліваць страты замест таго, каго ён абараняе, пакуль застаецца. Абарона з часам таксама будзе павольна разбурацца.\n\nХадоў да поўнага рассейвання: %d.

actors.buffs.berserk.angered=раззлаваны
actors.buffs.berserk.berserk=у апантанасці
actors.buffs.berserk.exhausted=знясілены
actors.buffs.berserk.recovering=аднаўленне
actors.buffs.berserk.angered_desc=Цяжкасць ран Берсерка ўзмацняе яго ўдары. Па меры атрымання фізічнай шкоды, яго лютасць нарастае, даючы яму бонусную шкоду. Шкода, заблакаваная бранёй, таксама ўлічваецца для нарастання лютасці.\n\nЛютасць з часам згасае. Чым менш здароўя ў берсерка, тым даўжэй яна працягнецца.\n\nПры 100%% лютасці Берсерк можа ўвайсці ў стан берсерка, атрымліваючы шчыт у залежнасці ад узроўню яго бароні і страчанага здароўя. У стане берсерка яго шчыт паступова знікае, і калі ён скончыцца, яму трэба будзе адпачыць перад тым, як зноў набіраць лютасць.\n\nБягучая лютасць: _%1$.0f%%_\nБонус шкоды: _+%2$.0f%%_\nШчыт берсерка: _%3$d_
actors.buffs.berserk.berserk_desc=Страх і няўпэўненасць знікаюць, пакідаючы толькі гнеў. У гэтым стане Берсерк надзвычай магутны, _наносіць +50%% шкоды і атрымлівае бонусны шчыт,_ але таксама губляе шчыт кожны ход.\n\nКалі ўвесь яго шчыт зменшыцца да 0, стан берсерка скончыцца.\n\nПасля шаленства Берсерку трэба будзе аднавіцца, перш чым зноў набіраць лютасць.\n\nЗасталося шчыта: %d
actors.buffs.berserk.recovering_desc=Ва ўнутранай моцы ёсць свае межы. Берсерку трэба перадыхнуць, перш чым зноў выкарыстоўваць лютасць.\n\nПакуль Берсерк аднаўляецца, ад атрымання страт яго лютасць не назапашваецца.
actors.buffs.berserk.recovering_desc_turns=Хадоў да аднаўлення: _%d_
actors.buffs.berserk.recovering_desc_levels=Узроўняў да аднаўлення:_%.2f_
actors.buffs.berserk.rankings_desc=Памёр ад апантанасці
actors.buffs.berserk.action_name=Апантаны
actors.buffs.berserk.no_seal=Табе патрэбна твая зломленая пячатка для апантанасці!

actors.buffs.bleeding.name=крывацёк
actors.buffs.bleeding.ondeath=Вы памерлі ад страты крыві...
actors.buffs.bleeding.heromsg=У вас крывацёк!
actors.buffs.bleeding.rankings_desc=Памёр ад страты крыві
actors.buffs.bleeding.desc=Гэтая рана нешта занадта моцна сыходзіць крывёй...\n\nКрывацёк наносіць страты кожны ход. З кожным ходам страты памяншаюцца на выпадковую велічыню, пакуль цалкам не вычарпаюцца.\n\nБягучыя страты ад крывацёку: %d.

actors.buffs.bless.name=натхнёны
actors.buffs.bless.desc=Вялікі ўсплёск засяроджанасці, некаторыя нават кажуць, што гэта натхненне багоў.\n\nДабраславенне павялічвае дакладнасць і ўхіленне на 25%% і, такім чынам, значна павышае эфектыўнасць байца.\n\nХадоў засталося: %s.

actors.buffs.blindness.name=аслеплены
actors.buffs.blindness.heromsg=Вас аслепілі
actors.buffs.blindness.desc=Асляпленне ператварае навакольны свет у цёмную імглу.\n\nПакуль персанаж асляплены, яго дальнасць бачання зніжаецца да адной клеткі, робячы далёкія атакі бескарыснымі і вельмі лёгка страціць след далёкіх ворагаў. Акрамя таго, асляплены герой не можа чытаць сувоі ці кнігі.\n\nЗасталося хадоў асляплення: %s.

actors.buffs.buff.heromsg=

actors.buffs.burning.name=гарыць
actors.buffs.burning.heromsg=Вы гарыце!
actors.buffs.burning.burnsup=%s згарае!
actors.buffs.burning.ondeath=Вы згарэлі жыўцом...
actors.buffs.burning.rankings_desc=Згарэў да попелу
actors.buffs.burning.desc=Мала што горш, чым быць ахопленым полымем.\n\nАгонь наносіць шкоду кожны ход, пакуль яго не патушыць вадой або ён не згасне. Агонь можна патушыць, ступіўшы ў ваду, або ад пырскаў разбітага зелля.\n\nАкрамя таго, агонь можа падпаліць гаручую мясцовасць ці прадметы, з якімі ён сутыкаецца.\n\nЗасталося хадоў гарэння: %s.

actors.buffs.championenemy.warn=Вы адчуваеце наяўнасць смяротнай небяспекі.
actors.buffs.championenemy$blazing.name=Чэмпіён полымя
actors.buffs.championenemy$blazing.desc=Чэмпіёны полымі наносяць на 25% больш страт, падпальваюць пры атацы, непаражальныя да агню і падпальваюць мясцовасць вакол сябе пасля смерці. Але, відавочна, яны не могуць падпаліць вадкасці.
actors.buffs.championenemy$projecting.name=Чэмпіён праэкцыі
actors.buffs.championenemy$projecting.desc=Чэмпіёны праэкцыі наносяць на 25% больш страт і маюць павялічаную на 3 клеткі адлегласць атакі.
actors.buffs.championenemy$antimagic.name=Чэмпіён-анцімаг
actors.buffs.championenemy$antimagic.desc=Чэмпіёны-анцімагі атрымліваюць на 50% менш страт і цалкам непаражальныя да магіі.
actors.buffs.championenemy$giant.name=Чэмпіён-волат
actors.buffs.championenemy$giant.desc=Чэмпіёны-волаты атрымліваюць на 80% менш страт і маюць павялічаную на 1 аделгласць атакі, але не могуць рухацца праз вузкую прастору.
actors.buffs.championenemy$blessed.name=Натхнёны чэмпіён
actors.buffs.championenemy$blessed.desc=Натхнёныя чэмпіёны маюць павялічаныя ў 4 разы дакладнасць і ўхіленне.
actors.buffs.championenemy$growing.name=Растучы чэмпіён
actors.buffs.championenemy$growing.desc=Растучыя чэмпіёны атрымліваюць стабільна ўзрастаючы бонус да дакладнасці, ўвароту, фізічнай шкоды і зніжэнне атрыманай шкоды.\n\nБягучы бонус дакл./ўвар./шкод.: %1$d%%\nБягучае зніжэнне шкоды: %2$d%%

actors.buffs.charm.name=заварожаны
actors.buffs.charm.heromsg=Вы заварожаны!
actors.buffs.charm.cant_attack=Вы ачараваныя гэтым ворагам і не можаце яго атакаваць.
actors.buffs.charm.desc=Заваражэнне - гэта магія кантроля, якая часова робіць неймавернай адкрытую агрэсію супраць таго, хто стварыў гэтыя чары.\n\nГэты эфект забараняе прамую атаку на таго, хто яго ўжыў. Любыя іншыя цэлі ўсё яшчэ могуць быць атакаваныя. Боль ад атрымання страт скарачвае час дзеяння заклінання.\n\nХадоў засталося: %s.

actors.buffs.chill.name=адубеў
actors.buffs.chill.freezes=%s змерзла!
actors.buffs.chill.desc=Вам вельмі холадна, але вы пакуль яшчэ можаце рухацца.\n\nАдубеўшая істота робіць ўсе свае дзеянні павольней звычайнага, у залежнасці ад таго, колькі засталося часу дзеяння эфекту. У горшым выпадку - гэта эквівалентна запаволенню.\n\nХадоў засталося: %1$s. \nЗніжэнне хуткасці: %2$s%%

actors.buffs.combo.name=комба
actors.buffs.combo.action_name=комба-атака
actors.buffs.combo.combo=Комба з %d удараў!
actors.buffs.combo.bad_target=Цэль павінна быць у радыусе атакі.
actors.buffs.combo.prompt=Выберыце цэль для атакі.
actors.buffs.combo.desc=Гладыятар ланцугуе свае ўдары ў дэвастуючыя камбінацыі. Кожны наступны ўдар мечам дадае да комба-ліку. Занадта вялікая затрымка паміж ударамі скіне комба-лік да 0. Пакуль у гладыятара ёсць комба, шчыт ад яго зломленай пячаткі не пачне знікаць.\n\nПры накапленні комба адкрываюцца спецыяльныя комба-атакі, якія не могуць прамахнуцца! Розныя атакі адкрываюцца пры 2, 4, 6, 8 і 10 комба. Некаторыя прыёмы скідаюць комба, а некаторыя не, але кожны прыём можна выкарыстаць толькі адзін раз за сесію комба.\n\nБягучы комба-лік: %1$d.\n\nХадоў да страты комба: %2$s.
actors.buffs.combo$combomove.clobber.name=таран
actors.buffs.combo$combomove.clobber.desc=Адкідвае ворагаў на дзве клеткі назад, але не наносіць ім страт і не можа скінуць іх у прорву. Павялічвае комба на 1.
actors.buffs.combo$combomove.clobber.empower_desc=Адкідвае ворага на _3 пліткі, выклікае галавакружэнне і можа збіць з ног,_ але не нанясе страт. Павялічвае комба на 1.
actors.buffs.combo$combomove.slam.name=націск
actors.buffs.combo$combomove.slam.desc=Наносіць %d%% (комба*20%%) ад абароны вашай брані ў якасці бонусных страт. Скідае комба пры выкарыстанні.
actors.buffs.combo$combomove.slam.empower_desc=_Павялічвае колькасць плітак скока да %1$d_ і наносіць %2$d%% (комба*20%%) страт у якасці дадатковага ўрону, які залежыць ад вашай здольнасці блакіраваць страты. Скідае комба пры выкарыстанні.
actors.buffs.combo$combomove.parry.name=парыраванне
actors.buffs.combo$combomove.parry.desc=Блакуе наступную атаку на працягу 1 ходу і імгненна атакуе. Скідае комба, калі ніякая атака не была блакавана.
actors.buffs.combo$combomove.parry.empower_desc=Пры актывацыі блакуе _ўсе атакі_ на працягу 1 ходу і імгненна наносіць зваротны ўдар. Скідае комба, калі нічога не парыруецца.
actors.buffs.combo$combomove.crush.name=забурэнне
actors.buffs.combo$combomove.crush.desc=Наносіць %d%% (комба*25%%) вашых страт галоўнай цэлі і палову гэтага ўрону ўсім ворагам у раёне 7x7 клетак. Скідае комба пры выкарыстанні.
actors.buffs.combo$combomove.crush.empower_desc=_Павялічвае колькасць плітак скока да %1$d_ і наносіць %2$d%% (комба*25%%) страт галоўнай мэце, а таксама астатнім ворагам у раёне 7х7 клетак. Скідае комба пры выкарыстанні.
actors.buffs.combo$combomove.fury.name=шаленства
actors.buffs.combo$combomove.fury.desc=Б'е ворага адзін раз за кожнае наяўнае ў вас комба. Кожны ўдар наносіць 60% ад вашых страт і можа актываваць зачараванні. Скідае комба пры выкарыстанні.
actors.buffs.combo$combomove.fury.empower_desc=_Павялічвае колькасць плітак скока да %d_ і наносіць столькі удараў, сколькі ў вас зарадаў комба. Кожнае трапленне наносіць 60%% страт і можа выкарыстоўваць зачараванні. Скідае комба пры выкарыстанні.

actors.buffs.corruption.name=пракляты
actors.buffs.corruption.desc=Псута пранікае ў саму сутнасць істот, перакручваючы іх сапраўдную прыроду.\n\nІстоты пад уздзеяннем псуты будуць атакаваць сваіх былых саюзнікаў, ігнаруючы сапраўднага ворага. Да таго ж, псаванне наносіць страты і набліжае смерць ахвяры.\n\nПсуту немагчыма зняць, толькі смерць спыніць яе.

actors.buffs.cripple.name=пакалечаны
actors.buffs.cripple.heromsg=Вы пакалечаны!
actors.buffs.cripple.desc=Вы амаль упэўнены, што ногі не павінны так хіліцца.\n\nКульгавасць удвая зніжае хуткасць перамяшчэння, таму рух на адну клетку звычайна займае два хода, замест аднаго.\n\nХадоў засталося: %s.

actors.buffs.daze.name=ашаломлены
actors.buffs.daze.heromsg=Вы ашаломлены!
actors.buffs.daze.desc=Звон у вушах і заслона перад вачыма перашкаджаюць вам змагацца.\n\nПакуль вы ашаломлены, дакладнасць і ўхіленне зніжаны на 50%%, што значна ўскладняе трапленне па суперніку і ухіленне ад нападаў.\n\nХадоў засталося: %s.

actors.buffs.degrade.name=пашарпан
actors.buffs.degrade.heromsg=Ваш рыштунак выглядае пашарпаным!
actors.buffs.degrade.desc=Магутная, цёмная магія высмоктвае сілу, якой скруткі паляпшэння надзялілі вашу экіпіроўку!\n\nПадчас, пакуль ваша экіпіроўка пашарпана, яе фактычны ўзровень ніжэй сапраўднага. _Любое паляпшэнне пасля + 3 становіцца парадкам слабей папярэдняга._ Апісанне вашых прадметаў будзе змяняцца з улікам іх зніжаных ўзроўняў сілы.\n\nДэградацыя не ўплывае на патрабаванні сілы, зарады палачак, трываласць кідальнай зброі або на артэфакты.\n\nЗасталося хадоў з дэградацыяй: %s. Выкарыстанне скрутка паляпшэння або рассейвання неадкладна здыме эфект дэградацыі.

actors.buffs.doom.name=асуджаны
actors.buffs.doom.desc=Цяжка рухацца наперад, калі здаецца, што ўвесь Сусвет жадае вам смерці.\n\nУвесь ўрон, які атрымліваецца асуджаным на гібель персанажам, павялічваецца на 67%\n\nДадзены эфект доўжыцца да самай смерці.

actors.buffs.dread.name=напужаны
actors.buffs.dread.desc=Жах настолькі моцны, што напужаны ўцячэ з падзямелля назаўжды.\n\nЗдзіўленыя жахам будуць уцякаць ад праціўніка ва ўвесь дух, і цалкам знікнуць, як толькі схаваюцца з-пад увагі. Такое збавенне, вядома, не дасць вам рэчаў монстра і ўзнагародзіць толькі паловай вопыту. Боль скарачае працягласць эфекту.\n\nХадоў да заканчэння эфекту: %d.

actors.buffs.drowsy.name=санлівы
actors.buffs.drowsy.desc=Магічная сонлівасць ахінае гэтага персанажа...\n\nПасля таго як сонлівасць мінае, персанаж заснуць, калі не атрымае шкоды. Сон аднаўляе здароўе хутчэй, чым звычайна, але персанаж не прачнецца сам, пакуль не атрымае шкоду або не будзе поўнасцю здаровы.\n\nЗасталося хадоў сонлівасці: %s.

actors.buffs.earthimbue.name=прасякнуты зямлёй
actors.buffs.earthimbue.desc=Вы прасякнуты сілай Зямлі! \n\nУсе фізічныя атакі скалынаюць зямлю пад нагамі ворагаў і калечаць іх на невялікі час. \n\nХадоў засталося: %s.

actors.buffs.enhancedrings.name=палепшаныя напёрсткі
actors.buffs.enhancedrings.desc=Нядаўна выкарыстаны Разбойнікам артэфакт ўзмацняе напёрсткі, паляпшая іх на +1 узровень. \n\nХадоў засталося: %s.

actors.buffs.fireimbue.name=прасякнуты агнём
actors.buffs.fireimbue.desc=Вы прасякнуты сілай агню!\n\nУсе вашыя фізічныя атакі маюць шанец падпаліць цэль. Да таго ж, вы абсалютна неўспрымальныя да агню.\n\nХадоў засталося: %s.

actors.buffs.foresight.name=прадбачанне
actors.buffs.foresight.desc=Вашы пачуцці абвостраны і дазваляюць маментальна выявіць любыя дзівацтвы.\n\nПадчас дзеяння эфекту прадбачання любы сакрэт, які знаходзіцца ў вашым радыусе пошуку, будзе неадкладна раскрыты.\n\nХадоў засталося: %s.

actors.buffs.frost.name=замарожаны
actors.buffs.frost.freezes=%s змерзла!
actors.buffs.frost.desc=Гэта не поўная замарозка цела, а хутчэй проста пласт лёду, які робіць любыя рухі немагчымымі.\n\nЗамарозка дзейнічае як параліч і не дазваляе ахвяры дзейнічаць. У адрозненні ад паралічу, замарозка будзе знята адразу ж пры атрыманні страт, так як лёд расколецца.\n\nХадоў засталося: %s.

actors.buffs.frostimbue.name=прасякнуты холадам
actors.buffs.frostimbue.desc=Вы надзелены сілай лёду!\n\nУсе вашы фізічныя атакі накладваюць эфект адубення на ворагаў. Да таго ж, гэты эфект забяспечвае абсалютную неўспрымальнасць да холаду.\n\nХадоў засталося: %s.

actors.buffs.fury.name=разлютаваны
actors.buffs.fury.heromsg=Вы разлютаваны!
actors.buffs.fury.desc=Вы злуецеся, і вашым ворагам не спадабаецца, калі вы злуецеся.\n\nДзікая лютасць пылае ўнутры вас і павялічвае страты, якія вы наносіце, на 50%%.\n\nВы будзеце ў лютасьці, пакуль узровень здароўя перавышае 50%%.

actors.buffs.blobimmunity.name=бар'ер ачышчэння
actors.buffs.blobimmunity.desc=Нейкая міфічная сіла акружае вас тонкім ахоўным бар'ерам і агароджве ад любых шкодных выпарэнняў.\n\nПадчас дзеяння гэтага бар'ера вы непаражальны для любых эфектаў, якія дзейнічаюць па плошчы.\n\nХадоў засталося: %s.

actors.buffs.gravitychaostracker.name=гравітацыйны хаос
actors.buffs.gravitychaostracker.desc_intro=Кожныя некалькі хадоў усе персанажы на бягучым узроўні падзямелля будуць перамешчаны ў выпадковым кірунку.
actors.buffs.gravitychaostracker.desc_positive=Пачуццё лёгкасці і свабоды. Гравітацыйная анамалія дазваляе вам рухацца хутчэй, чым звычайна.
actors.buffs.gravitychaostracker.desc_duration=Незразумела, колькі будзе працягвацца эфект, але ён не можа доўжыцца вечна.

actors.buffs.greaterhaste.name=вялікае паскарэнне
actors.buffs.greaterhaste.desc=Неверагодны ўсплёск хуткасці, на момант здаецца, што ўсё вакол застыла.\n\nПад уплывам вялікага паспеху перамяшчэнне не займае часу ўвогу|е, але іншыя дзеянні ўсё яшчэ выконваюцца са звычайнай хуткасцю. Кожны крок руху спажывае адзін ход вялікага паспеху.\n\nХадоў вялікага паспеху засталося: %d.

actors.buffs.haste.name=паспех
actors.buffs.haste.desc=Энергія пранізвае вашыя мышцы і дазваляе вам перасоўвацца з неверагоднай хуткасцю!\n\nПад дзеяннем паскарэння вы будзеце рухацца ўтрая хутчэй, але на хуткасць выканання іншых дзеянняў гэты эфект не ўплывае.\n\nХадоў засталося: %s.

actors.buffs.healing.name=лекаванне
actors.buffs.healing.desc=Магія лекавання аднаўляе плоць і спыняе боль у вашым целе.\n\nКожны ход дадзены эфект будзе вяртаць частку страчанага здароўя. Сіла лячэння можа зніжацца з часам.\n\nСіла эфекту: %d.\n\nЗасталося лекавання: %d.

actors.buffs.herodisguise.name=маскіроўка
actors.buffs.herodisguise.desc=Ілюзорная магія змяніла ваш знешні выгляд! Эфект чыста касметычны, але, нягледзячы на гэта, адчуванні вельмі дзіўныя.\n\nХадоў засталося: %s.

actors.buffs.hex.name=засурочаны
actors.buffs.hex.heromsg=Вас засурочылі!
actors.buffs.hex.desc=З-за ўздзеяння цёмнай магіі дэзынтэграцыі засяродзіцца на цэлі і ўхіляцца значна складаней.\n\nСурока зніжае трапнасць і ўхіленне на 20%%, і, такім чынам, зніжае эфектыўнасць цэлі ў баі.\n\nЗасталося хадоў з сурокам: %s.

actors.buffs.holdfast.name=ахоўная стойка
actors.buffs.holdfast.desc=Воін трымае сваю пазіцыю, павялічваючы сваю браню на %1$d-%2$d і запавольваючы хуткасць знікнення некаторых бафаў на %3$d%%. Гэта будзе працягвацца, пакуль ён не зрушыцца.

actors.buffs.hunger.hungry=галодны
actors.buffs.hunger.starving=знясілены
actors.buffs.hunger.onhungry=Вы злёгку галодны.
actors.buffs.hunger.onstarving=Вы вельмі галодны!
actors.buffs.hunger.ondeath=Вы загінулі ад голада...
actors.buffs.hunger.cursedhorn=Пракляты рог крадзе частку энергіі ў ежы, якую вы ясце.
actors.buffs.hunger.rankings_desc=Загінуў ад Голада
actors.buffs.hunger.desc_intro_hungry=Вы чуеце, як ад голаду бурчыць жывот, але пакуль не моцна.
actors.buffs.hunger.desc_intro_starving=Вы галодныя настолькі, што гэта прычыняе вам боль.
actors.buffs.hunger.desc=\n\nГолад паступова ўзмацняецца, пакуль вы знаходзіцеся ў падзямелле, з часам вы пачнеце моцна галадаць. У гэтым стане вы пачнеце губляць здароўе, а не аднаўляць яго.\n\nПравільнае харчаванне-гэта важна! Калі ёсць лішняе здароўе, то можна трохі пагаладаць, каб захаваць ежу. Правільнае харчаванне дазволіць захаваць ежу на большы тэрмін.

actors.buffs.invisibility.name=нябачны
actors.buffs.invisibility.desc=Вы цалкам зліваецеся з асяроддзем - вас немагчыма заўважыць.\n\nПакуль вы знаходзіцеся ў гэтым стане, ворагі не атакуюць і не пераследуюць вас. Атака або выкарыстанне магіі (напрыклад, скрутка або палачкі) неадкладна рассее нябачнасць.\n\nХадоў засталося: %s.

actors.buffs.invulnerability.name=непаражальны
actors.buffs.invulnerability.desc=Гэты персанаж надзелены велізарнай ахоўнай сілай, якая дае яму непрацяглы перыяд непаражальнасці!\n\nХадоў засталося: %s.

actors.buffs.levitation.name=лунае
actors.buffs.levitation.desc=Гэты персанаж ляціць над зямлёй!\n\nЛевітацыя дазваляе бяспечна перасякаць пасткі, ваду, лаву і прорвы. Аднак персанаж усё роўна бачны і ўразлівы для атак.\n\nЗасталося хадоў левітацыі: %s.

actors.buffs.lifelink.name=жыццёвая сувязь
actors.buffs.lifelink.ondeath=Дэсмос жыцця парываецца, калі звязаны саюзнік гіне!
actors.buffs.lifelink.desc=Жыццёвая сіла гэтага персанажа звязана з іншым, якія знаходзяцца недалёка персанажам. Любы ўрон падзяляецца паміж імі.\n\nКалі гэтаму персанажу наносіцца ўрон, палова дастаецца звязанаму з ім вузамі жыцця.\n\nЗасталося хадоў з вузамі жыцця: %s.

actors.buffs.light.name=асветлены
actors.buffs.light.desc=Як святло набірае сілу, так мацнее адвагу ў душах і становяцца яснымі маючыя адбыцца мэты. Нават у глыбіні найцямнейшага падзямелля крыніца святла здольна усяліць упэўненасць у ваша сэрца.\n\nСвятло разганяе цемру і дазваляе бачыць досыць далёка, нягледзячы на навакольны вас змрок.\n\nХадоў засталося: %s.

actors.buffs.lockedfloor.name=узровень зачынены
actors.buffs.lockedfloor.desc=Бягучы ўзровень зачынены, вы не зможаце пакінуць яго!\n\nПакуль узровень зачынены, голад не ўзмацняецца і вы не атрымліваеце страт ад голада. Калі вы не спрабуеце перамагчы боса, пасіўная рэгенерацыя таксама перастае дзейнічаць.\n\nУ дадатак, калі вы ўваскрэснеце з выкарыстаннем неасвячонага анха, узровень адновіцца.\n\nЗабіце боса, каб прайсці далей.

actors.buffs.lostinventory.name=страчаныярэчы
actors.buffs.lostinventory.desc=Ваш інвентар быў страчаны дзесьці ў падзямелле! Вы не зможаце падабраць або выкарыстоўваць большасць прадметаў, пакуль не аднавіце яго.

actors.buffs.magicalsight.name=магічны позірк
actors.buffs.magicalsight.desc=Нейкім чынам вы бачыце розумам, а не вачыма.\n\nПакуль чароўнs зрок актыўны, на вас не дзейнічаюць мясцовасць і эфекты, якія блакуюць поле зроку, а адлегласць агляду павялічваецца да 12 клетак.\n\nХадоў засталося: %s.

actors.buffs.magicalsleep.name=чароўны сон
actors.buffs.magicalsleep.toohealthy=Вы занадта здаровыя і змаглі выстаяць перад жаданнем заснуць.
actors.buffs.magicalsleep.fallasleep=Вы падаеце ў глыбокі магічны сон.
actors.buffs.magicalsleep.wakeup=Вы прачынаецеся бадзёрым і здаровым.
actors.buffs.magicalsleep.desc=Гэты персанаж апынуўся ў глыбокім магічным сне і не можа прачнуцца сам.\n\nМагічны сон падобны на звычайны, аднак толькі атрыманне страт здольна абудзіць заснулага.\n\nМагічны сон героя і яго саюзнікаў валодае гаючымі ўласцівасцямі, дазваляючы ім хутка аднаўляцца.

actors.buffs.magicimmune.name=імунітэт да магіі
actors.buffs.magicimmune.desc=Любыя чары страцілі над вамі ўсякую ўладу, Вы зусім не паражальныя для магіі.\n\nДадзены эфект душыць дзеянне любых шкодных або карысных магічных эфектаў, уключаючы праклёны, заварожанні, палачкі, скруткі, пярсцёнкі, артэфакты і г. д. Здольнасці гераічнага даспеха дастаткова моцныя, каб працаваць, нягледзячы на эфект анцімагіі.\n\nХадоў засталося: %s.

actors.buffs.mindvision.name=ментальны зрок
actors.buffs.mindvision.desc=Нейкім чынам вы здольны адчуваць прысутнасць чужой свядомасці скрозь сцены. Гэта вельмі дзіўнае адчуванне.\n\nПадчас дзеяння ментальнага гледжання вы бачыце ўсіх істот на дадзеным паверсе. Вельмі карысна ў спалучэнні з тымі магічнымі эфектамі, якія ўздзейнічаюць на ўсіх ворагаў у полі зроку.\n\nХадоў засталося: %s.

actors.buffs.momentum.momentum=назапашванне імпульсу
actors.buffs.momentum.running=бег
actors.buffs.momentum.resting=аднаўленне
actors.buffs.momentum.action_name=бег
actors.buffs.momentum.momentum_desc=Пры руху Валацуга назапашвае імпульс, які можа марнаваць для бегу.\n\nКожны зарад імпульсу дае два ходу бегу, і Валацуга можа назапасіць да 10 зарадаў. Імпульс хутка губляецца, калі Валацуга стаіць на месцы.\n\nБягучы зарад імпульсу: %d.
actors.buffs.momentum.running_desc=Калі Валацуга рухаецца, ён назапашвае інэрцыю, якую ён можа выкарыстоўваць, каб пачаць бегчы.\n\nПакуль Валацуга бяжыць, ён рухаецца з падвоенай хуткасцю і атрымлівае бонус да ўхілення, які разлічваецца на яго ўзроўні.\n\nХадоў засталося: %d.
actors.buffs.momentum.resting_desc=Калі Валацуга рухаецца, ён назапашвае інэрцыю, якую можна выкарыстоўваць для бега.\n\nВалацуге патрэбны час, каб аднавіць цягавітасць, перш чым зноў пачаць збіраць інэрцыю.\n\nХадоў засталося: %d.

actors.buffs.monkenergy.name=энергія
actors.buffs.monkenergy.action=Здольнасці Асвечанай:
actors.buffs.monkenergy.desc=Калі Асвечаная перамагае ворагаў, яна атрымлівае энергію. Яе можна выкарыстоўваць для актывацыі розных здольнасцяў. Большасць з ворагаў даюць 1 адзінку энергіі пры паразе. \n\nЗарадаў энергіі: %1$d/%2$d.
actors.buffs.monkenergy.desc_cooldown=Асвечаная нядаўна выкарыстоўвала здольнасць і трэба пачакаць перад тым, як ужыць яшчэ адну.\n\nХадоў перазарадкі: %d.
actors.buffs.monkenergy$monkability$flurry.name=шквал удараў
actors.buffs.monkenergy$monkability$flurry.desc=Асвечаная робіць два імгненных ўдара, якія наносяць %1$d-%2$d страт і ігнаруюць браню. Гэтая здольнасць не можа быць адразу выкарыстана паўторна.
actors.buffs.monkenergy$monkability$flurry.empower_desc=Два імгненныя ўдары, якія наносяць %1$d-%2$d страт, ігнаруюць браню _і выкарыстоўваюць зачараванні вашай зброі_. Гэтая здольнасць не можа быць адразу выкарыстана паўторна.
actors.buffs.monkenergy$monkability$focus.name=факусіроўка
actors.buffs.monkenergy$monkability$focus.desc=Асвечаная марнуе ход, каб сфакусавацца. Гэта дазваляе ёй парыраваць наступную фізічную атаку.
actors.buffs.monkenergy$monkability$focus.empower_desc=Асвечаная _факусіруецца_, гатовая парыраваць наступную фізічную атаку.
actors.buffs.monkenergy$monkability$focus$focusbuff.name=сфакусавана
actors.buffs.monkenergy$monkability$focus$focusbuff.desc=Асвечаная сканцэнтравалася на сваім асяроддзі, чакаючы наступнай фізічнай атакі. Пакуль асвечаная сканцэнтравана, яна гарантавана парыруе наступную фізічную атаку.
actors.buffs.monkenergy$monkability$dash.name=рывок
actors.buffs.monkenergy$monkability$dash.prompt=Выберыце месца
actors.buffs.monkenergy$monkability$dash.desc=Імгненны скачок на адлегласць да 4 клетак. Гэтая здольнасць дазваляе вам праляцець над небяспечнымі клеткамі, але не праз ворагаў і сцены.
actors.buffs.monkenergy$monkability$dash.empower_desc=Імгненны скачок на адлегласць да _8 клетак_. Гэтая здольнасць дазваляе вам праляцець над небяспечнымі клеткамі, але не праз ворагаў і сцены.
actors.buffs.monkenergy$monkability$dragonkick.name=удар цмока
actors.buffs.monkenergy$monkability$dragonkick.desc=Асвечаная здзяйсняе зруйнавальны ўдар, які наносіць %1$d-%2$d страт і ігнаруе браню. Удар адкідвае цэль і паралізуе яе. Працягласць эфекту залежыць ад адлегласці.
actors.buffs.monkenergy$monkability$dragonkick.empower_desc=Асвечаная наносіць зруйнавальны ўдар, які наносіць _%1$d-%2$d страт_ і ігнаруе браню. Удар адкідвае _ўсе суседнія мэты_ і паралізуе іх на колькасць хадоў, якая роўная кожнай пройдзенай пры гэтым клетцы.
actors.buffs.monkenergy$monkability$meditate.name=медытацыя
actors.buffs.monkenergy$monkability$meditate.desc=Манах канцэнтруе энергію ў сваім целе на працягу 5 хадоў. Па завяршэнні яна чысціцца ад большасці негатыўных эфектаў і павялічвае хуткасць перазарадкі артэфактаў і палачак на 8 хадоў.
actors.buffs.monkenergy$monkability$meditate.empower_desc=Асвечаная канцэнтруе энергію ў сваім целе на 5 хадоў. Гэта здымае большасць негатыўных эфектаў і дае эфект перазарадкі на 8 хадоў. Акрамя таго, _падчас медытацыі яна атрымлівае 80% супраціву да страт і павольна аднаўляе 20% сваіх АЗ._

actors.buffs.ooze.name=з'едлівая слізь
actors.buffs.ooze.heromsg=Атрутная слізь раз'ядае вашу плоць. Трэба яе змыць!
actors.buffs.ooze.ondeath=Вы расталі...
actors.buffs.ooze.rankings_desc=Растварыўся
actors.buffs.ooze.desc=Гэта ліпкая атрута ўядаецца ў скуру, павольна раствараючы яе.\n\nСлізь наносіць пастаянныя страты кожны ход, але яе лёгка можна змыць вадой.\n\nХадоў засталося: %s.

actors.buffs.paralysis.name=паралізаваны
actors.buffs.paralysis.heromsg=Вы паралізаваны!
actors.buffs.paralysis.out=вырываецца з паралічу
actors.buffs.paralysis.desc=Часцяком, самае горшае - гэта страціць кантроль над сітуацыяй.\n\nПараліч змушае цэль чакаць заканчэння эфекту. Боль ад атрымання страт можа прымусіць персанажаў супраціўляцца паралічу, выводзячы іх з-пад дзеяння эфекту.\n\nХадоў засталося: %s.

actors.buffs.physicalempower.name=фізічна ўзмацнёны
actors.buffs.physicalempower.desc=Вашы ўдары былі ўзмоцнены, павялічваючы колькасць шкоды, якую вы можаце нанесці пры трапленні па ворагах фізічнымі атакамі.\n\nБонусная шкода: %1$d.\nЗасталося трапленняў: %2$d.

actors.buffs.pincushion.name=мішэнь
actors.buffs.pincushion.desc=Зброя, кінутая ў гэтага персанажа, затрымалася ў ім і выпадзе толькі пасля таго, як ён будзе забіты.\n\nУ цяперашні час у ім ўваткнуты наступныя прадметы:

actors.buffs.poison.name=атручаны
actors.buffs.poison.heromsg=Вы атручаны!
actors.buffs.poison.ondeath=Вы загінулі ад атруты...
actors.buffs.poison.rankings_desc=Загінуў ад атруты
actors.buffs.poison.desc=Атрута пранікае ў вашу кроў, павольна забіваючы вас знутры.\n\nАтручванне наносіць страты ў залежнасці ад таго, хто застаўся часу дзеяння.\n\nХадоў засталося: %s.

actors.buffs.preparation.name=вераломства
actors.buffs.preparation.action_name=падрыхтаваны ўдар
actors.buffs.preparation.desc=Забойца затаіўся, прадумваючы сваю наступную атаку.
actors.buffs.preparation.desc_dmg=Яго наступная атака нанясе _ %1$d%% дадатковага урону_, і знішчыць звычайных ворагаў, здароўе якіх ніжэй за _%2$d%%_, або босаў са здароўем ніжэй за _%3$d%%_.
actors.buffs.preparation.desc_dmg_likely=Таксама страты ад дадзенай атакі будуць бліжэй да максімальнага магчымага значэння.
actors.buffs.preparation.desc_blink=Ён здольны перанесціся да сваёй цэлі перад ударам. Максімальная дыстанцыя - _%d_ клетак.
actors.buffs.preparation.desc_invis_time=Хадоў у стане нябачнасці: _%d._
actors.buffs.preparation.desc_invis_next=Хадоў да ўзмацнення атакі: _%d._
actors.buffs.preparation.prompt=Выберыце цэль для атакі!\nМакс. дыстанцыя: %d
actors.buffs.preparation.no_target=Тут няма чаго атакаць.
actors.buffs.preparation.out_of_reach=Цэль недасягальна.
actors.buffs.preparation.assassinated=забіт

actors.buffs.prismaticguard.name=вясёлкавы вартавы
actors.buffs.prismaticguard.desc=Вас ахоўвае вясёлкавая копія. У дадзены момант яна знаходзіцца ў пасіўным рэжыме, але пры сустрэчы з ворагамі яна вернецца да жыцця, каб абараніць вас!\n\nВясёлкавая копія паступова аднаўляе сваё здароўе, пакуль бяздзейнічае.\n\nБягучае здароўе: %d/%d.
actors.buffs.prismaticguard.desc_many=Прызматычныя вобразы абараняюць вас! Калі вы атрымліваеце шкоду, адзін з іх прыме ўдар на сябе. Новыя вобразы ствараюцца з часам, пакуль эфект актыўны.\n\nБягучая колькасць вобразаў: %d.

actors.buffs.recharging.name=перазарадка
actors.buffs.recharging.desc=Энергія цячэ скрозь вас, павялічваючы хуткасць перазарадкі палачак і посахаў.\n\nЗ кожным ходам бягучы зарад будзе павялічвацца на чвэрць, у дадатак да звычайнага аднаўлення.\n\nХадоў засталося: %s.

actors.buffs.revealedarea.name=раскрытая вобласць
actors.buffs.revealedarea.desc=Вобласць падзямелля была часова адкрыта герою, ён убачыць яе незалежна ад таго, дзе ён знаходзіцца.\n\nХадоў засталося: %s.

actors.buffs.revealedchar.name=выяўлены
actors.buffs.revealedchar.desc=Гэты персанаж адкрыт герою, і ён будзе бачны, дзе б ні знаходзіўся.\n\nХадоў засталося: %s.

actors.buffs.roots.name=укаранён
actors.buffs.roots.heromsg=Вы не можаце рухацца!
actors.buffs.roots.desc=Карані (магічныя або натуральныя) аплятаюць вашы ногі, прыкоўваючы іх да зямлі.\n\nАпляценне не дазваляе перасоўвацца, робячы хаду і іншыя ператасоўванні немагчымымі. Усе астатнія дзеянні ўсё яшчэ застаюцца даступнымі, у тым ліку тэлепартацыю.\n\nХадоў засталося: %s.

actors.buffs.scrollempower.name=узмацненне скрутка
actors.buffs.scrollempower.desc=Энергія скрутка, які Чараўнік нядаўна прачытаў, ўзмацняе яго палачкі!\n\nПавышэнне ўзроўню: +%1$d.\nСтрэлаў засталося: %2$d.

actors.buffs.shadows.name=в цені
actors.buffs.shadows.desc=Вы растварыліся ў ценях. Вас не відаць, а ваш метабалізм запаволены.\n\nУ гэтым стане ворагі не атакуюць і не пераследуюць вас. Атака або выкарыстанне магіі (напрыклад, скрутка або палачкі) неадкладна развее нябачнасць. У дадатак, вы можаце даўжэй абыходзіцца без ежы.\n\nВы застанецеся ў ценях, пакуль не пакінеце іх ці вораг не натыкнецца на вас.

actors.buffs.slow.name=запаволены
actors.buffs.slow.desc=Магія запавольвання ўплывае на ўспрыманне часу. Для цэлі магіі ўсё адбываецца вельмі хутка.\n\nЗапаволены персанаж дзейнічае ўдвая павольней, чым звычайна.\n\nХадоў засталося: %s.

actors.buffs.snipersmark.name=пазнака снайпэра
actors.buffs.snipersmark.action_name_snapshot=імгненны стрэл
actors.buffs.snipersmark.action_name_volley=залп
actors.buffs.snipersmark.action_name_sniper=снайпэрскі стрэл
actors.buffs.snipersmark.desc=Снайперка прыцэлілася на мэту, якую яна апошняй атакавала. Яна можа выканаць спецыяльную атаку сваім лукам, якая будзе залежаць ад таго, як лук узмоцнены.\n\nНеўзмоцнены лук выпусціць _імгненны стрэл_, які наносіць меншую шкоду, але не займае часу.\n\nЛук, узмоцнены на хуткасць, выпусціць _залп_ з трох стрэл. Кожная стрэла нанясе меншую шкоду, але ўсё яшчэ можа актываваць зачараванне. Гэты залп займае 1 ход.\n\nЛук, узмоцнены на шкоду, выпусціць _снайперскі стрэл_. Гэты стрэл гарантавана трапляе, наносіць бонусную шкоду ў залежнасці ад адлегласці да мэты і займае 2 хады.\n\nЗасталося хадоў: %s.

actors.buffs.soulmark.name=душа адзначана
actors.buffs.soulmark.desc=Чарнакніжнік завалодаў душой гэтай істоты, што дазваляе яму вылечваць сябе, калі яно атрымлівае фізічныя страты.\n\nХадоў засталося: %s.

actors.buffs.stamina.name=цягавітасць
actors.buffs.stamina.desc=Ваша цягавітасць не ведае межаў, дазваляючы рухацца хутчэй!\n\nДадзены эфект павялічвае вашу хуткасць перамяшчэння на +50%%.\n\nХадоў засталося: %s.

actors.buffs.vulnerable.name=уразлівы
actors.buffs.vulnerable.heromsg=Вы адчуваеце сябе далікатным!
actors.buffs.vulnerable.desc=Магія ўразлівасці павышае фізічны ўрон, які прычыняецца персанажу. Усе ўваходзячыя фізічныя страты, якія засталіся пасля блакавання даспехам, павялічаны на 33%%. \n\nЗасталося хадоў з уразлівасцю: %s.

actors.buffs.terror.name=у жаху
actors.buffs.terror.desc=Жах - магія маніпуляцыі, якая кідае цэль ў некантраляваную паніку.\n\nПерапалоханыя персанажы вымушаны ўцякаць ад свайго суперніка, імкнучыся пакінуць паміж сабой як мага больш дзвярэй і сцен. Аднак шок ад болю здольны аслабіць гэты эфект.\n\nХадоў засталося: %s.

actors.buffs.toxicimbue.name=прасякнуты таксічнасцю
actors.buffs.toxicimbue.desc=Вы надзелены сілай атруты!\n\nПадчас руху вы распаўсюджваеце атрутны газ, які наносіць страты вашым ворагам. Падчас дзеяння эфекту і некалькі імгненняў пасля вы неўспрымальныя да атручвання і атрутнага газу.\n\nХадоў засталося: %s.

actors.buffs.corrosion.name=карозія
actors.buffs.corrosion.heromsg=Вы таеце!
actors.buffs.corrosion.ondeath=Вы расталі...
actors.buffs.corrosion.rankings_desc=Растварыўся
actors.buffs.corrosion.desc=Моцная кіслата раз'ядае плоць, метал і косці з жахлівай хуткасцю.\n\nСтраты ад карозіі павялічваюцца, пакуль кіслата працягвае раз'ядаць цэль.\n\nХадоў засталося: %1$s.\n\nБягучы страты: %2$d.

actors.buffs.vertigo.name=галавакружэнне
actors.buffs.vertigo.desc=Складана ісці ў правільным кірунку, калі ўвесь свет круціцца перад вачыма.\n\nУ гэтым стане персанаж пры хадзе будзе перамяшчацца ў выпадковым кірунку.\n\nХадоў засталося: %s.

actors.buffs.wandempower.name=узмацнённыя палачкі
actors.buffs.wandempower.desc=Вашы баявыя палачкі былі ўзмоцнены, што павялічыла страты, якія наносяцца імі, на некалькі трапленняў.\n\nБонусныя страты: %1$d.\nТрапленняў засталося: %2$d.

actors.buffs.weakness.name=аслаблены
actors.buffs.weakness.heromsg=Вы аслаблены!
actors.buffs.weakness.desc=Усё раптам здаецца нашмат цяжэй.\n\nМагія паслаблення зніжае фізічную сілу персанажа і прыводзіць да таго, што ён наносіць на 33%% менш страт.\n\nХадоў засталося: %s.

actors.buffs.wellfed.name=сытасць
actors.buffs.wellfed.desc=Вы наеліся да адвалу і цалкам задаволены жыццём.\n\nПадчас дзеяння дадзенага эфекту здароўе будзе паступова аднаўляцца. Акрамя таго, голад не будзе павялічвацца.\n\nХадоў засталося: %d.



###hero

##abilities
actors.hero.abilities.armorability.self_target=Нельга выбраць сябе ў якасці цэлі!
actors.hero.abilities.armorability.no_target=Тут няма на што цэліцца!
actors.hero.abilities.armorability.prompt=Выберыце месца цэлі
actors.hero.abilities.armorability.cost=Кошт зараду: _%d_

actors.hero.abilities.warrior.heroicleap.name=гераічны скачок
actors.hero.abilities.warrior.heroicleap.prompt=Выберыце месца для скачка
actors.hero.abilities.warrior.heroicleap.short_desc=Ваяр здзяйсняе _гераічны скачок_ да абранага месца, пераскокваючы ворагаў і небяспекі.
actors.hero.abilities.warrior.heroicleap.desc=Ваяр здзяйсняе скачок у абранае месца, пераскокваючы любых ворагаў або небяспекі на шляху. Аднак, ён не можа пераскочыць праз сцены або іншую цвёрдую мясцовасць.
actors.hero.abilities.warrior.shockwave.name=ўдарная хваля
actors.hero.abilities.warrior.shockwave.short_desc=Ваяр пляскае зброяй па зямлi i выпускае конусападобную _ўдарную хвалю_. Ворагі, якія трапілі ў зону дасягнення, атрымліваюць пашкоджанні і кульгавасць.
actors.hero.abilities.warrior.shockwave.desc=Ваяр ўдарае па зямлі, ствараючы ўдарную хвалю, якая распаўсюджваецца да 5 клетак у межах 60 градуснага конусу.\n\nВорагі, якія трапілі ў гэтую ўдарную хвалю, атрымліваюць эфект кульгавасці на 5 хадоў. Таксама яны атрымліваюць 5-10 страт плюс дадатковыя 1-2 страт за кожнае ачко сілы Ваяра вышэй 10.
actors.hero.abilities.warrior.endure.name=трываць
actors.hero.abilities.warrior.endure$enduretracker.name=вытрымка
actors.hero.abilities.warrior.endure$enduretracker.desc=Ваяр наносіць бонусныя страты, заснаваныя на пашкоджанні, якія ён перанёс.\n\nБонусныя страты: %1$d\nУдараў засталося: %2$d
actors.hero.abilities.warrior.endure.short_desc=Ваяр _чакае_, прапускаючы некалькі хадоў, але атрымлівае высокую ўстойлівасць да страт. Затым ён наносіць бонусны ўрон, заснаваны на тым, што ён вытрымаў.
actors.hero.abilities.warrior.endure.desc=Ваяр чакае 3 хода, атрымліваючы палову страт з усіх крыніц. Гэта зніжэнне спрацоўвае перад эфектамі супраціву страт, як даспехі.\n\nПасля чакання наступныя 10 хадоў удары Ваяра будуць наносіць дадатковы ўрон. Гэты ўрон будзе роўны палове ўсіх страт, якія былі нанесены яму падчас чакання да любых эфектаў памяншэння страт!\n\nКалі Ваяр у працэсе комба, выкарыстанне гэтай здольнасці павялічыць іх працягласць на 3 ходу.

actors.hero.abilities.mage.elementalblast.name=выбух стыхіі
actors.hero.abilities.mage.elementalblast.no_staff=Вы не можаце выкарыстоўваць гэтую здольнасць без свайго посаха.
actors.hero.abilities.mage.elementalblast.short_desc=Маг выпускае _выбух стыхіі_ са свайго посаха, пакрываючы вялікую плошчу вакол сябе з эфектам, які залежыць ад прыроды палачкі ў яго пасаху.
actors.hero.abilities.mage.elementalblast.desc=Маг выпускае выбух магіі, які пакрывае круглую вобласць на адлегласці да 4 клетак і наносіць да 15-25 страт. Эфект выбуха стыхіі будзе залежаць ад палачкі, улітай ў посах.
actors.hero.abilities.mage.elementalblast.generic_desc=Эфект выбуху стыхіі будзе падобны да эфекта палачкі пры выкарыстанні на ворага або саюзніка.
actors.hero.abilities.mage.wildmagic.name=дзікая магія
actors.hero.abilities.mage.wildmagic.no_wands=У табе няма палачак, каб стрэліць імі!
actors.hero.abilities.mage.wildmagic.short_desc=Маг вызваляе _дзікую магію_, якая змяшчаецца ў яго палачках, і бязладна страляе імі некалькі разоў у выбраную цэль за адзін ход.
actors.hero.abilities.mage.wildmagic.desc=Маг вызваляе сілу сваіх палачак, выпадковым чынам страляючы імі да 4 раз за адзін ход. Посах мага пры гэтым не ўлічваецца.\n\nУзровень кожнай палачкі ўзмоцняецца на 2, максімум да +3. Гэтая здольнасць расходвае палову аднаго зарада палачак, пры гэтым ні адна палачка не можа быць выкарыстана больш 2 раз.
actors.hero.abilities.mage.warpbeacon.name=варп-маяк
actors.hero.abilities.mage.warpbeacon.depths=Вы не можаце перамяшчацца паміж прорвамі!
actors.hero.abilities.mage.warpbeacon.locked_floor=Вы не можаце пакінуць закрыты паверх!
actors.hero.abilities.mage.warpbeacon.too_far=Гэта месца занадта далёка!
actors.hero.abilities.mage.warpbeacon.invalid_beacon=Вы не можаце размясціць маяк тут!
actors.hero.abilities.mage.warpbeacon.window_desc=Ваш маяк размешчаны на %d паверсе.
actors.hero.abilities.mage.warpbeacon.window_tele=тэлепартавацца да маяка
actors.hero.abilities.mage.warpbeacon.window_clear=скінуць маяк
actors.hero.abilities.mage.warpbeacon.window_cancel=адмяніць
actors.hero.abilities.mage.warpbeacon.short_desc=Маг размяшчае _варп-маяк_ ў сваё бягучае месцазнаходжанне, куды ён можа імгненна тэлепартавацца назад.
actors.hero.abilities.mage.warpbeacon.desc=Маг размяшчае маяк, які затым можа быць прыбраны па жаданні. Устаноўка маяка займае 1 ход, але перасоўванне да яго адбываецца імгненна.\n\nМаг не можа перамяшчацца паміж паверхамі або выкарыстоўваць маяк для дасягнення недаступных месцаў, як зачыненыя пакоі. Маг можа тэлепартавацца на клетку з ворагамі, тым самым адштурхнуўшы іх.

actors.hero.abilities.rogue.smokebomb.name=дымавая бомба
actors.hero.abilities.rogue.smokebomb.fov=Вы можаце скакнуць толькі на пустое месца ў вашым полі зроку.
actors.hero.abilities.rogue.smokebomb.prompt=Выберыце клетку для скачка
actors.hero.abilities.rogue.smokebomb$ninjalog.name=драўляная прынада
actors.hero.abilities.rogue.smokebomb$ninjalog.desc=Нейкім чынам ворагі лёгка пераконваюцца, што гэтая драўляная прынада - сапраўдны Разбойнік!
actors.hero.abilities.rogue.smokebomb$ninjalog.discover_hint=Вы можаце знайсці гэтага персанажа з дапамогай пэўнай здольнасці гераічнай брані.
actors.hero.abilities.rogue.smokebomb.short_desc=Разбойнік кідае _дымавую бомбу_ і здзяйсняе скачок. Ён становіцца часова нябачным і асляпляе ворагаў побач са сваім старым месцазнаходжаннем.
actors.hero.abilities.rogue.smokebomb.desc=Разбойнік кідае дымавую шашку і здзяйсняе скачок на адлегласць да 6 клетак. Ён можа пераскокваць праз пасткі і ворагаў, але не праз цвёрдую мясцовасць, напрыклад, сцены.\n\nВорагі, якія знаходзяцца побач са старой пазіцыяй разбойніка, будуць аслеплены на 5 хадоў.
actors.hero.abilities.rogue.deathmark.name=пазнака смерці
actors.hero.abilities.rogue.deathmark.ally_target=Вы можаце адзначаць толькі ворагаў
actors.hero.abilities.rogue.deathmark.short_desc=Разбойнік ставіць _Пазнаку Смерці_ на абранага ворага. Адзначаныя ворагі атрымліваюць дадатковыя страты, але не могуць памерці, пакуль пазнака не знікне.
actors.hero.abilities.rogue.deathmark.desc=Разбойнік ставіць пазнаку на абранага ворага, прымушаючы яго атрымліваць 25% дадатковага ўрону. Пазнака ставіцца імгненна і дзейнічае 5 хадоў.\n\nПазначаныя ворагі атрымліваюць дадатковы ўрон, але не могуць памерці, пакуль не скончыцца тэрмін дзеяння пазнакі. Калі ў ворага застанецца 0 HP, калі дзеянне пазнакі скончыцца, ён адразу ж памрэ.
actors.hero.abilities.rogue.deathmark$deathmarktracker.name=прыгавораны да смерці
actors.hero.abilities.rogue.deathmark$deathmarktracker.desc=Гэты вораг быў пазначаны, у выніку чаго ён атрымлівае 25%% бонуснага ўрону, але ён не можа памерці да таго часу, пакуль пазнака не знікне.\n\nХадоў засталося: %s.
actors.hero.abilities.rogue.shadowclone.name=ценявы клон
actors.hero.abilities.rogue.shadowclone.short_desc=Разбойнік заклікае _ценявога клона_, які можа быць накіраваны, каб дапамагчы яму ў баі.
actors.hero.abilities.rogue.shadowclone.desc=Разбойнік заклікае ценявую копію самога сябе, якая можа быць накіравана, каб дапамагчы яму ў баі. Кірунак ценявога клона не патрабуе ніякіх выдаткаў.\n\nКлон мае 80 ачкоў здароўя, не носіць даспех і наносіць 10-20 страт. Усё гэта можна палепшыць з дапамогай талентаў, такім чынам клон будзе атрымліваць выгаду ад зброі і броні, якія ёсць у героя.
actors.hero.abilities.rogue.shadowclone$shadowally.name=ценявы разбойнік
actors.hero.abilities.rogue.shadowclone$shadowally.direct_defend=Ваш клон ідзе на выбраную пазіцыю.
actors.hero.abilities.rogue.shadowclone$shadowally.direct_follow=Ваш клан ідзе за вамі.
actors.hero.abilities.rogue.shadowclone$shadowally.direct_attack=Ваш клон ідзе ў атаку!
actors.hero.abilities.rogue.shadowclone$shadowally.desc=Копія разбойніка, створаная з цемры. Яна стаіць нерухома, з пустымі вачніцамі і малюсенькімі аблачынкамі цемры, выходнымі ад яе, нібы пар.\n\nГэта не ідэальная копія разбойніка, аднак яна па-ранейшаму з'яўляецца годным байцом, які можа здабываць выгаду з экіпіроўкі разбойніка пры прапампоўцы патрэбных талентаў.
actors.hero.abilities.rogue.shadowclone$shadowally.discover_hint=Вы можаце знайсці гэтага персанажа з дапамогай пэўнай здольнасці гераічнай брані.

actors.hero.abilities.huntress.spectralblades.name=спектральныя клінкі
actors.hero.abilities.huntress.spectralblades.short_desc=Паляўнічая шпурляе _Спектральныя Клінкі_ ў цэль, наносячы страты ў залежнасці ад яе экіпіяванай зброі блізкага бою.
actors.hero.abilities.huntress.spectralblades.desc=Паляўнічая кідае ў ворага спектральны клінок, які раўнасільны ўдару зброяй блізкага бою. Працуюць усе звычайныя эфекты зброі блізкага бою, уключаючы зачараванні.
actors.hero.abilities.huntress.naturespower.name=сіла прыроды
actors.hero.abilities.huntress.naturespower.short_desc=Паляўнічая заклікае _Сілу Прыроды_, на кароткі час павялічваючы хуткасць руху і хуткастрэльнасць свайго лука.
actors.hero.abilities.huntress.naturespower.desc=Паляўнічая на час надзяляе сябе і свой лук сілай прыроды! Гэты эфект доўжыцца 8 хадоў.\n\nНа працягу гэтага часу Паляўнічая рухаецца з падвоенай хуткасцю і атакуе з лука на 33% хутчэй. Эфект узмоцненай атакі з лука не спрацоўвае, калі Снайпэр выкарыстоўвае свае спецыяльныя атакі.
actors.hero.abilities.huntress.naturespower$naturespowertracker.name=сіла прыроды
actors.hero.abilities.huntress.naturespower$naturespowertracker.desc=Паляўнічая ўзмацняецца на кароткі час, павялічваючы хуткасць свайго перамяшчэння і атакі з дапамогай лука.\n\nХадоў засталося: %s.
actors.hero.abilities.huntress.spirithawk.name=дух ястраба
actors.hero.abilities.huntress.spirithawk.no_space=Побач з вамі няма вольнага месца.
actors.hero.abilities.huntress.spirithawk.short_desc=Паляўнічая выклікае _Духа Ястраба_, які можа дапамагчы ёй выведаць месцы і адцягнуць ворагаў.
actors.hero.abilities.huntress.spirithawk.desc=Паляўнічая заклікае духа ястраба, якім можна кіраваць, паўторна выкарыстоўваючы здольнасць, пакуль ён прызваны. Ястраб жыве 100 хадоў, кіраванне ястрабам не патрабуе зарада або часу.\n\nУ ястраба вельмі нізкае здароўе і сіла атакі, але ён хуткі, спрытны і дакладны. Ён падзяляе з паляўнічай сваё поле зроку. Ён неўспрымальны да ўсіх звязаных з вобласцю эфектаў, такіх як агонь і атрутны газ. Ён не будзе атакаваць без загаду.
actors.hero.abilities.huntress.spirithawk$hawkally.name=дух ястраба
actors.hero.abilities.huntress.spirithawk$hawkally.direct_defend=Ваш ястраб рухаецца на выбраную пазіцыю.
actors.hero.abilities.huntress.spirithawk$hawkally.direct_follow=Ваш ястраб рухаецца за вамі.
actors.hero.abilities.huntress.spirithawk$hawkally.direct_attack=Ваш ястраб рухаецца атакаваць!
actors.hero.abilities.huntress.spirithawk$hawkally.desc=Чароўны ястраб, закліканы Паляўнічай. Ён свеціцца яркім сінім эфірным колерам і ўвесь час круціць галавой, аглядаючы мясцовасць.\n\nХоць ён і не лепшы баец, яго хуткасць і зрок робяць яго цудоўным у выведцы і адцягненні ворагаў.
actors.hero.abilities.huntress.spirithawk$hawkally.desc_remaining=Хадоў засталося: %d.
actors.hero.abilities.huntress.spirithawk$hawkally.desc_dodges=Засталося гарантаваных уваротаў: %d.
actors.hero.abilities.huntress.spirithawk$hawkally.discover_hint=Вы можаце знайсці гэтага персанажа з дапамогай пэўнай здольнасці гераічнай брані.

actors.hero.abilities.duelist.challenge.name=выклік
actors.hero.abilities.duelist.challenge.prompt=Выберыце ворага для выкліка
actors.hero.abilities.duelist.challenge.already_dueling=У вас адначасова можа быць толькі адна дуэль.
actors.hero.abilities.duelist.challenge.ally_target=Вы можаце кінуць выклік только ворагам.
actors.hero.abilities.duelist.challenge.unreachable_target=Вы можаце кінуць выклік толькі ворагам.
actors.hero.abilities.duelist.challenge.distant_target=Гэты вораг занадта далёка, каб кінуць выклік.
actors.hero.abilities.duelist.challenge.short_desc=Фехтавальшчыца _выклікае_ суперніка на дуэль і часова замарожвае ўсіх астатніх ворагаў.
actors.hero.abilities.duelist.challenge.desc=Фехтавальшчыца можа выклікаць бліжэйшага ворага на дуэль. Гэты вораг будзе змагацца з ёй, пакуль усе іншыя ворагі будуць часова замарожаны ў часе. \n\nЦэль павінна знаходзіцца ў 5 клетках ад Фехтавальшчыцы. Дуэль завершыцца, калі пройдзе 10 хадоў, вораг загіне або Фехтавальшчыца адыдзе ад ворага на 5 клетак.\n\nЗамарожаныя ворагі будуць непаражальнымі. Саюзнікі Фехтавальшчыцы не паддаюцца замарозцы, але калі здольнасць выкарыстана на боса, яго памагатыя таксама не будуць замарожаны.
actors.hero.abilities.duelist.challenge$duelparticipant.name=удзельнік дуэлі
actors.hero.abilities.duelist.challenge$duelparticipant.desc=Гэты персанаж ўдзельнічае ў дуэлі. Ён і ўсе яго саюзнікі або памагатыя могуць свабодна рухацца, пакуль іншыя замарожаныя.\n\nДуэль будзе доўжыцца пэўную колькасць часу або завершыцца, калі адзін з удзельнікаў загіне або адыдзе ад іншага на больш, чым 5 клетак.\n\nЗасталося хадоў: %d.
actors.hero.abilities.duelist.elementalstrike.name=стыхійны ўдар
actors.hero.abilities.duelist.elementalstrike.short_desc=Фехтавальшчыца наносіць _стыхійны удар_, размяркоўваючы эфект, залежны ад зёачарованна на яе зброі, па вобласці дзеяння ў форме конусу.
actors.hero.abilities.duelist.elementalstrike.desc=Фехтавальшчыца не прамахваецца i наносіць удар па ворагу або клетцы, размяркоўваючы магічны эфект у галіне конусу 65 градусаў на адлегласці да 4 клетак. Гэты эфект залежыць ад зачараванні на яе зброі.
actors.hero.abilities.duelist.elementalstrike.generic_desc=Стыхійны ўдар без зачаравання на зброі створыць невялікі ўсплёск магіі, які наносіць 6-12 страт усім ворагам у зоне паразы.
actors.hero.abilities.duelist.feint.name=ілжывы выпад
actors.hero.abilities.duelist.feint.prompt=Выберыце клетку для рыўка
actors.hero.abilities.duelist.feint.too_far=Гэта месца далёка ад вас.
actors.hero.abilities.duelist.feint.bad_location=Вы не можаце патрапіць сюды.
actors.hero.abilities.duelist.feint.short_desc=Фехтавальшчыца здзяйсняе _ілжывы выпад_, імітуючы атаку, і робіць рывок на суседнюю клетку. Ворагі будуць атакаваць паслявобраз Фехтавальшчыцы. Наступная атака супраць такіх ворагаў будзе раптоўнай.
actors.hero.abilities.duelist.feint.desc=Фехтавальшчыца імітуе атаку і здзяйсняе рывок на суседнюю клетку, пакідаючы паслявобраз. Ворагі будуць атакаваць паслявобраз Фехтавальшчыцы.\n\nВорагі, якія атакуюць паслявобраз, прыходзяць у замяшанне, што адмяняе іх наступнае дзеянне. Наступная атака супраць такіх ворагаў будзе раптоўнай.

actors.hero.abilities.cleric.ascendedform.name=узнесеная форма
actors.hero.abilities.cleric.ascendedform.short_desc=Святар уваходзіць ва _Ўзвышаную Форму_, атрымліваючы новыя загаворы, далёкасць атакі і шчыт.
actors.hero.abilities.cleric.ascendedform.desc=Клірык узнімаецца ў _Вышэйшую форму_, атрымліваючы магутныя бонусы да ўсіх сваіх здольнасцяў на абмежаваны час. У Вышэйшай форме, заклінанні Клірыка значна ўзмоцнены і каштуюць менш зарадаў.
actors.hero.abilities.cleric.ascendedform$ascendbuff.name=узнесеная форма
actors.hero.abilities.cleric.ascendedform$ascendbuff.desc=Сіяючая энергія выпраменьваецца з цела Клірыка. У гэтай форме Клірык атрымлівае +2 да дальнасці атакі (ад святой энергіі, якая выходзіць з яго), і 10 шчыта кожны раз, калі ён марнуе зарад святога тома. Ён таксама можа выконваць заклінанні, якія адкрываюцца праз таленты ўзнеслай формы.\n\nШчыт, атрыманы ад узнеслай формы і яе заклінанняў, не будзе знікаць нармальна, але імгненна знікне, калі ўзнеслая форма скончыцца.\n\nБягучы шчыт: %1$d.\nЗасталося хадоў: %2$d.
actors.hero.abilities.cleric.trinity.name=Троіца
actors.hero.abilities.cleric.trinity.no_imbue=Ні для адной з формаў Тройцы не ўстаноўлены эфект — спачатку выкарыстайце адзін з яе загавораў!
actors.hero.abilities.cleric.trinity.no_duplicate=Тройца не можа дубляваць эфект, які ў вас ужо ёсць!
actors.hero.abilities.cleric.trinity.ench_glyph_use=Тройца прыменіць гэты эфект на _%1$d хадоў_ за кошт _%2$s зарадаў._
actors.hero.abilities.cleric.trinity.rare_ench_glyph_use=Тройца актывуе гэты _магутны_ эфект на _%1$d хадоў_ за кошт _%2$s зараду._
actors.hero.abilities.cleric.trinity.wand_use=Тройца стрэльне гэтай палачкай на ўзроўні _+%1$d_ за кошт _%2$s зараду._
actors.hero.abilities.cleric.trinity.wand_multi_use=Тройца стрэльне _некалькімі зарадамі_ гэтай палачкі на ўзроўні _+%1$d_ за кошт _%2$s зараду._
actors.hero.abilities.cleric.trinity.thrown_use=Тройца кіне гэтую зброю на ўзроўні _+%1$d_ за кошт _%2$s зараду._
actors.hero.abilities.cleric.trinity.ring_use=Тройца актывуе эфект гэтага пярсцёнка на ўзроўні _+%1$d_ на 20 хадоў, за кошт _%2$s зараду._
actors.hero.abilities.cleric.trinity.alchemiststoolkit_use=Трыяда прыменіць эфект выпадковага зелля гэтага цацурніка, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.chaliceofblood_use=Трыяда прыменіць эфект аднаўлення гэтага цацурніка на _%1$d_, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.driedrose_use=Трыяда выкарыстае эфект гэтага цацурніка, каб прызваць псаванага саюзнага прывіда з HP, як у прывіда _+%1$d_, за кошт _%2$s зараду._
actors.hero.abilities.cleric.trinity.etherealchains_use=Трыяда прыменіць эфект ланцуговага кідання гэтага цацурніка з дальнасцю _+%1$d_, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.hornofplenty_use=Трыяда прыменіць эфект перакусу гэтага цацурніка, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.masterthievesarmband_use=Трыяда прыменіць эфект абкрадання ворагаў гэтага цацурніка на _+%1$d_, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.sandalsofnature_use=Трыяда прыменіць эфект укаранення гэтага цацурніка з выпадковым шкодным насеннем, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.skeletonkey_use=Трыяда прыменіць эфект устаўкі гэтага цацурніка, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.talismanofforesight_use=Трыяда прыменіць эфект прадбачання гэтага цацурніка на _+%1$d_, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.timekeepershourglass_use=Трыяда прыменіць эфект замарожвання часу гэтага цацурніка з працягласцю _%1$d_ хадоў, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.unstablespellbook_use=Трыяда прыменіць эфект выпадковага сувоя гэтага цацурніка з шанцам _%1$d/10_ прапанаваць экзатычную версію без дадатковага кошту, з коштам _%2$s зарада._
actors.hero.abilities.cleric.trinity.cost=Кошт: %d зарад
actors.hero.abilities.cleric.trinity.short_desc=Святар атрымлівае _Тройцу_ здольнасцяў, якія імітуюць убачаны ім рыштунак і могуць быць зададзены з дапамогай новых загавораў.
actors.hero.abilities.cleric.trinity.desc=Клірык атрымлівае _Трыяду_ здольнасцяў бароні, якія можна прызначыць розным эфектам прадметаў з дапамогай трох новых заклінанняў. Кожнае з гэтых заклінанняў сканцэнтравана на адтварэнні эфектаў розных відаў экіпіроўкі, якую Клірык апазнаў падчас гэтай вылазкі: форма цела (зброя і бароня), форма розуму (жазлы і кідальная зброя), і форма духу (пярсцёнкі і цацурнікі).\n\nКожная форма Трыяды можа быць упітана адным эфектам адначасова, і Клірык выбірае, які актываваць пры выкарыстанні Трыяды. Трыяда не будзе дубляваць эфект таго, што вы ўжо маеце экіпіраваным.
actors.hero.abilities.cleric.trinity$wndusetrinity.text=Выберыце, якую форму Тройцы выкарыстоўваць. Эфекты розных формаў могуць быць актыўныя адначасова.
actors.hero.abilities.cleric.trinity$wndusetrinity.body=_Форма цела: %s._
actors.hero.abilities.cleric.trinity$wndusetrinity.mind=_Форма розуму: %s._
actors.hero.abilities.cleric.trinity$wndusetrinity.spirit=_Форма духу: %s._
actors.hero.abilities.cleric.trinity$wnditemtypeselect.text=Выберыце эфект для ўпітвання ў Трыяду. Дадатковая інфармацыя будзе паказана перад пацвярджэннем.
actors.hero.abilities.cleric.trinity$wnditemconfirm.body=Прысвоіць да формы цела
actors.hero.abilities.cleric.trinity$wnditemconfirm.mind=Прысвоіць да формы розуму
actors.hero.abilities.cleric.trinity$wnditemconfirm.spirit=Прысвоіць да формы духу
actors.hero.abilities.cleric.powerofmany.name=сіла многіх
actors.hero.abilities.cleric.powerofmany.prompt_default=Выберыце мэту для Сілы Многіх.
actors.hero.abilities.cleric.powerofmany.prompt_ally=Выберыце саюзніка для ўзмацнення.
actors.hero.abilities.cleric.powerofmany.ally_exists=У вас ужо ёсць узмоцнены саюзнік!
actors.hero.abilities.cleric.powerofmany.no_vision=Вам патрэбна бачыць мэту!
actors.hero.abilities.cleric.powerofmany.only_allies=Вы можаце мэціць толькі саюзнікаў або пустыя месцы!
actors.hero.abilities.cleric.powerofmany.short_desc=Клірык накіроўвае _Сілу Многіх_, узмацняючы існуючага саюзніка або ствараючы новага.
actors.hero.abilities.cleric.powerofmany.desc=Клірык накіроўвае _Сілу Многіх_, якая або ўзмацняе існуючага саюзніка, або стварае новага ўзмоцненага на 100 хадоў. Мэтанне на пустое месца стварае новага саюзніка.\n\nПакуль узмоцнены Сілай Многіх, любы саюзнік наносіць +25% шкоды, атрымлівае -25% шкоды, і дзеліцца сваім бачаннем з Клірыкам. Яны таксама атрымліваюць 25 шчыта пры выкарыстанні здольнасці.\n\nКлірык таксама атрымлівае тры новыя заклінанні, якія можна выкарыстоўваць толькі з узмоцненым саюзнікам. Сіла Многіх не скончыцца, пакуль адно з гэтых заклінанняў актыўна.
actors.hero.abilities.cleric.powerofmany$powerbuff.name=сіла многіх
actors.hero.abilities.cleric.powerofmany$powerbuff.desc=Гэты саюзнік узмоцнены Сілай Многіх, атрымліваючы +25%% шкоды і -25%% атрыманай шкоды. Ён таксама будзе дзяліцца сваёй дальнасцю бачання з Клірыкам, і можа атрымліваць карысць ад заклінанняў сілы многіх.\n\nСіла Многіх захоўваецца, калі саюзнікі, такія як прызматычныя вобразы, хаваюцца, але яе працягласць усё роўна адлічваецца.\n\nЗасталося хадоў: %s.
actors.hero.abilities.cleric.powerofmany$lightally.name=светлавы саюзнік
actors.hero.abilities.cleric.powerofmany$lightally.direct_defend=Абараняць
actors.hero.abilities.cleric.powerofmany$lightally.direct_follow=Ісці за
actors.hero.abilities.cleric.powerofmany$lightally.direct_attack=Атакаваць
actors.hero.abilities.cleric.powerofmany$lightally.desc=Копія аднаго з прыгоднікаў-спадарожнікаў Клірыка, зробленая з цвёрдага святла. Хоць яна мае форму іншага героя, яна не мае ніякіх іх унікальных здольнасцяў. Гэты саюзнік будзе існаваць, пакуль на яго накладзена Сіла Многіх.\n\nГэтым саюзнікам можна кіраваць без кошту, паўторна выкарыстоўваючы здольнасць бароні Сіла Многіх.
actors.hero.abilities.cleric.powerofmany$lightally.discover_hint=Вы можаце знайсці гэтага персанажа з дапамогай пэўнай здольнасці гераічнай брані.


actors.hero.abilities.ratmogrify.name=пацукамарфоз
actors.hero.abilities.ratmogrify.cant_transform=Вы не можаце пацукамарфозіць гэта!
actors.hero.abilities.ratmogrify.too_strong=Гэты вораг занадта моцны для таго, каб быть пацукамарфіраваным!
actors.hero.abilities.ratmogrify.short_desc=Герой пацукамарфіруе ворага! Гэта часова робіць яго пацуком без здольнасцей.
actors.hero.abilities.ratmogrify.desc=Герой ператварае ворага ў пацука на 6 хадоў! Босы, саюзнікі і пацукі не могуць быць ператворанымі ў пацукоў.\n\nПацукамарфіраваныя ворагі захоўваюць сваю першапачатковую статыстыку, але не маюць ніякіх здольнасцяў.
actors.hero.abilities.ratmogrify$transmograt.name=Пацукамарфіраваны %s
actors.hero.abilities.ratmogrify$transmograt.desc=Гэты вораг быў ператвораны ў пацука. Вялікае паляпшэнне, на мой погляд! - Кароль Пацукоў
actors.hero.abilities.ratmogrify$transmograt.rankings_desc=Загінуў ад пацукамарфіраванага ворага

##Cleric Spells
actors.hero.spells.auraofprotection.name=аўра абароны
actors.hero.spells.auraofprotection.short_desc=Стварае абарончую аўру, якая зніжае шкоду.
actors.hero.spells.auraofprotection.desc=Клірык стварае _Аўру абароны_ вакол сябе, якая зніжае ўсю атрыманую шкоду для героя і бліжэйшых саюзнікаў на %1$d на працягу %2$d хадоў.
actors.hero.spells.auraofprotection$aurabuff.name=аўра абароны
actors.hero.spells.auraofprotection$aurabuff.desc=Паладзін выпраменьвае абарончую энергію вакол сябе.\n\nЛюбы бліжэйшы саюзнік (уключаючы самога Паладзіна) атрымлівае меншую шкоду і атрымлівае карысць ад глыфа бароні Паладзіна з павялічанай сілай.\n\nЗасталося хадоў: %s.

actors.hero.spells.beamingray.name=ззяючы прамень
actors.hero.spells.beamingray.no_space=Няма месца для тэлепартацыі саюзніка!
actors.hero.spells.beamingray.out_of_range=Гэта месца па-за дасяжнасцю.
actors.hero.spells.beamingray.short_desc=Тэлепартуе ўзмоцненага саюзніка ў абранае месца.
actors.hero.spells.beamingray.desc=Клірык накіроўвае сілу свайго саюзніка ў прамень святла, які пераносіць яго ў пэўнае месца. Калі прамень сутыкнецца з ворагам, ён размесціць саюзніка побач і накіруе яго на ворага.\n\nПрамень мае максімальную дальнасць %1$d клетак, і павялічыць бонусную шкоду Сілы Многіх да +%2$d%% на 10 хадоў супраць бліжэйшага ворага ў межах 4 клетак. Прамень пераносу можа нават тэлепартаваць звычайна нерухомых саюзнікаў, але яго дальнасць памяншаецца ўдвая ў такіх выпадках.
actors.hero.spells.beamingray$beamingrayboost.name=ззяючы прамень
actors.hero.spells.beamingray$beamingrayboost.desc=Гэты саюзнік быў нядаўна тэлепартаваны Прамянём пераносу, атрымліваючы бонусную шкоду супраць бліжэйшага ворага пасля тэлепартацыі. Сіла Многіх таксама не скончыцца, пакуль гэты бонус актыўны.\n\nЗасталося хадоў: %s.

actors.hero.spells.blessspell.name=bless
actors.hero.spells.blessspell.short_desc=Благаслаўляе героя і саюзнікаў, павялічваючы дакладнасць і ўварот.
actors.hero.spells.blessspell.desc=Клірык накладвае святое благаслаўленне на сябе ці іншага персанажа, якога можа бачыць.\n\nПры накладанні на сябе эфект слабейшы, даючы %1$d хадоў благаслаўлення і %2$d бар'еру.\n\nПры накладанні на іншых персанажаў заклінанне мацнейшае, даючы %3$d хадоў благаслаўлення і %4$d лячэння. Лішак лячэння ператвараецца ў бар'ер.

actors.hero.spells.bodyform.name=цялесная форма
actors.hero.spells.bodyform.short_desc=Упітвае Трыяду эфектам чар ці глыфа.
actors.hero.spells.bodyform.desc=Клірык выбірае чары ці глыф, якія ён апазнаў у гэтай вылазцы, і ўпітвае Трыяду іх эфектам.\n\nКалі Трыяда выкарыстоўваецца, Клірык атрымлівае эфект абраных чар ці глыфа на %d хадоў. Гэтыя часовыя чары ці глыф будуць працаваць з любым эфектам, які звычайныя чары ці глыф актывавалі б.\n\nГэтае заклінанне замяняе любы іншы эфект цела, якім Трыяда зараз упітана.
actors.hero.spells.bodyform$bodyformbuff.name=цялесная форма
actors.hero.spells.bodyform$bodyformbuff.desc=Форма цела Трыяды зараз дае вам сілу чар ці глыфа, як быццам ён быў экіпіраваны на вашу бягучую зброю ці бароню.\n\nЗаўважце, што форма цела не можа даць яшчэ адну копію эфекту, ад якога вы ўжо атрымліваеце карысць.\n\nБягучы эфект: %1$s.\n\nЗасталося хадоў: %2$s.

actors.hero.spells.cleanse.name=ачышчэнне
actors.hero.spells.cleanse.short_desc=Здымае шкодныя эфекты з героя і бачных саюзнікаў.
actors.hero.spells.cleanse.desc=Клірык здымае ўсе шкодныя эфекты стану з сябе і бачных саюзнікаў. Пасля заканчэння заклінання ўсе закранутыя персанажы таксама атрымліваюць %1$d хадоў імунітэту да дэбафаў, і %2$d бар'ер.

actors.hero.spells.clericspell.prompt=Выберыце цэль
actors.hero.spells.clericspell.no_target=Там няма цэлі.
actors.hero.spells.clericspell.invalid_target=Недапушчальная мэта!
actors.hero.spells.clericspell.invalid_enemy=Вы не можаце мэціць ворага!
actors.hero.spells.clericspell.charge_cost=Кошт зараду: %d

actors.hero.spells.divinesense.name=боскае адчуванне
actors.hero.spells.divinesense.short_desc=Дае разумовае бачанне бліжэйшых істот.
actors.hero.spells.divinesense.desc=Клірык канцэнтруе свае пачуцці на навакольным асяроддзі, атрымліваючы разумовае бачанне з дальнасцю %d клетак на 50 хадоў. Гэтае заклінанне не патрабуе часу для выканання.
actors.hero.spells.divinesense$divinesensetracker.name=боскае адч��ванне
actors.hero.spells.divinesense$divinesensetracker.desc=Гэты персанаж часова можа бачыць іншых блізкіх істот сваім розумам!\n\nЗасталося хадоў: %s.

actors.hero.spells.divineintervention.name=боскае ўмяшальніцтва
actors.hero.spells.divineintervention.short_desc=Імгненна лечыць і дае часовы імунітэт да шкоды.
actors.hero.spells.divineintervention.desc=Клірык прызывае боскае ўмяшальніцтва, імгненна аднаўляючы %1$d%% максімальнага здароўя і здымаючы ўсе негатыўныя эфекты. Таксама дае %2$d хадоў імунітэту да шкоды.

actors.hero.spells.flash.name=flash
actors.hero.spells.flash.prompt=Абярыце месца
actors.hero.spells.flash.short_desc=Выпускае ўспышку святла, якая асляпляе ворагаў.
actors.hero.spells.flash.desc=Клірык накіроўвае сваю ўзнеслую форму ў бліжэйшае месца і тэлепартуецца туды. Успышка можа тэлепартаваць Клірыка ў любое адкрытае месца, якое знаходзіцца ў зоне дасягальнасці і незанятае. Гэта заклінанне каштуе больш зарадаў тома кожны раз, калі яно выкарыстоўваецца ў адной узнеслай форме.

actors.hero.spells.guidinglight.name=напрамкоўнае святло
actors.hero.spells.guidinglight.short_desc=Падсвечвае ворага, робячы яго ўразлівым.
actors.hero.spells.guidinglight.desc=Клірык выпускае імпульс магічнай энергіі, які трапляе ў мэту, наносячы 2-8 шкоды і падсвечваючы яе. Наступная фізічная атака без перагрузкі па падсвечанаму ворагу гарантавана трапіць.
actors.hero.spells.guidinglight.desc_priest=_Гэтае заклінанне мацнейшае, калі яго выкарыстоўвае Святар._ Першае выкарыстанне заклінання кожныя 50 хадоў не каштуе зарадаў тома, і падсвечванне будзе спажыта сіяннем, жазламі, іншымі персанажамі і цацурнікамі, якія непасрэдна ўздзейнічаюць на ворагаў. Калі падсвечванне спажыта такім чынам, яно наносіць бонусную магічную шкоду, роўную ўзроўню Святара + 5.
actors.hero.spells.guidinglight$guidinglightpriestcooldown.name=Напрамкоўнае святло
actors.hero.spells.guidinglight$guidinglightpriestcooldown.desc=Святар зможа зноў бясплатна выкарыстаць Накіравальнае святло пасля 50 хадоў.\n\nЗасталося хадоў: %s.
actors.hero.spells.guidinglight$illuminated.name=Асветлены
actors.hero.spells.guidinglight$illuminated.desc=Гэты персанаж ззяе ў выніку трапленн Накіравальным святлом. Хоць гэтае ззянне недастаткова моцнае, каб асвятліць навакольную тэрыторыю, магічны эфект значна палягчае Клірыку наносіць па ім удары.
actors.hero.spells.guidinglight$illuminated.desc_priest=Святар таксама можа спажыць падсвечванне праз сіянне, выстрал жазла, удар саюзніка ці эфекты некаторых цацурнікаў. Спажыванне падсвечвання такім чынам наносіць бонусную магічную шкоду, роўную ўзроўню Святара + 5.
actors.hero.spells.guidinglight$illuminated.desc_generic=Іншыя героі ўсё яшчэ могуць выкарыстоўваць падсвечванне для атрымання карысці ад таленту палящага святла, але не атрымаюць бонус да дакладнасці.

actors.hero.spells.hallowedground.name=святая зямля
actors.hero.spells.hallowedground.prompt=Абярыце месца
actors.hero.spells.hallowedground.short_desc=Стварае кола асвечанай зямлі, якая лечыць і абараняе.
actors.hero.spells.hallowedground.desc=Святар канцэнтруе боскую магію ў зямлю побач, ствараючы вобласць %1$dx%1$d асвечанай мясцовасці на 20 хадоў.\n\nПры выкананні гэта заклінанне лечыць усіх саюзнікаў на 15 HP (здаровыя саюзнікі і Святар атрымліваюць шчыт), кароткачасова ўкараняе ворагаў і распаўсюджвае кароткую траву.\n\nАсвечаная мясцовасць лечыць саюзнікаў на 1 HP за ход (здаровыя саюзнікі і Святар атрымліваюць шчыт), калечыць ворагаў і выпадкова выклікае рост высокай травы.\n\nАсвечаная мясцовасць знішчаецца агнём і будзе ствараць узараную траву, калі пасіўная рэгенерацыя адключана або Святар даўно не атрымліваў вопыт.
actors.hero.spells.hallowedground$hallowedterrain.desc=Зямля тут асвечана. Асвечаная зямля запавольвае ворагаў, лечыць саюзнікаў і выклікае рост травы.

actors.hero.spells.holyintuition.name=святая інтуіцыя
actors.hero.spells.holyintuition.prompt=абярыце прадмет
actors.hero.spells.holyintuition.cursed=Гэты прадмет _пракляты!_
actors.hero.spells.holyintuition.uncursed=Гэты прадмет _не праклятны._
actors.hero.spells.holyintuition.short_desc=Вызначае, ці з'яўляецца прадмет пракляым ці благаславёным.
actors.hero.spells.holyintuition.desc=Клірык выкарыстоўвае святую інтуіцыю, каб адчуць, ці з'яўляецца прадмет пракляым ці благаславёным. Гэтае заклінанне не патрабуе часу для выканання і не каштуе зарадаў тома.

actors.hero.spells.holylance.name=святое кап'ё
actors.hero.spells.holylance.short_desc=Кідае святое дзіда, якое наносіць магічную шкоду.
actors.hero.spells.holylance.desc=Святар канцэнтруе вялікую колькасць энергіі ў разбуральнае святлянае дзіда. Гэтае дзіда наносіць %1$d-%2$d шкоды і заўсёды наносіць максімальную шкоду нежыці і дэманічным мэтам.\n\nГэтае заклінанне вельмі дарагое і мае перазарадку 30 хадоў.
actors.hero.spells.holylance$lancecooldown.name=перазарадка святога дзіда
actors.hero.spells.holylance$lancecooldown.desc=Святое дзіда было нядаўна выкарыстана. Яно будзе зноў даступна праз некалькі хадоў.\n\nЗасталося хадоў: %s.

actors.hero.spells.holyward.name=святы аберэг
actors.hero.spells.holyward.glyph_name=%s святла
actors.hero.spells.holyward.glyph_desc=Гэты глыф крыху павялічвае колькасць шкоды, якую бароня можа заблакіраваць.
actors.hero.spells.holyward.short_desc=Узмацняе бароню святым святлом.
actors.hero.spells.holyward.desc=Клірык упітвае сваю надзетую бароню глыфамі святога святла, павялічваючы блакаванне шкоды бароняй на 1. Гэтае заклінанне не патрабуе часу для выканання.\n\nГэты глыф доўжыцца 50 хадоў і заменіць любы карысны глыф бароні на гэты час. Клірык атрымае карысць ад гэтага эфекту, нават калі ў яго няма бароні.
actors.hero.spells.holyward.desc_paladin=_Гэтае заклінанне мацнейшае, калі яго выкарыстоўвае Паладзін._ Узмацненне бароні значна больш магутнае і даўжэй працягнецца.
actors.hero.spells.holyward$holyarmbuff.name=святы аберэг
actors.hero.spells.holyward$holyarmbuff.desc=Вашая бароня ўзмоцнена святым святлом! Бягучы глыф бароні ўзмоцнены і дае дадатковыя эфекты.\n\nЗасталося хадоў: %s.
actors.hero.spells.holyward$holyarmbuff.desc_paladin=Вашая бароня ўзмоцнена святым святлом Паладзіна! Глыф бароні значна ўзмоцнены і дае магутныя дадатковыя эфекты.\n\nЗасталося хадоў: %s.

actors.hero.spells.holyweapon.name=святая зброя
actors.hero.spells.holyweapon.ench_name=%s святасці
actors.hero.spells.holyweapon.ench_desc=Ворагі, якіх ударылі святой зброяй, атрымаюць дадатковую магічную шкоду.
actors.hero.spells.holyweapon.short_desc=Узмацняе зброю святым святлом.
actors.hero.spells.holyweapon.desc=Клірык зачароўвае сваю надзетую зброю святой энергіяй, прымушаючы зброю наносіць дадатковыя 2 магічнай шкоды кожны раз, калі ён ударае ёю ворага. Гэтае заклінанне не патрабуе часу для выканання.\n\nГэтыя чары доўжацца 50 хадоў і замяняюць любыя карысныя чары зброі на гэты час. Удары без зброі таксама могуць атрымаць карысць ад гэтага эфекту.
actors.hero.spells.holyweapon.desc_paladin=_Гэтае заклінанне мацнейшае, калі яго выкарыстоўвае Паладзін._ Узмацненне зброі значна больш магутнае і даўжэй працягнецца.
actors.hero.spells.holyweapon$holywepbuff.name=свята�� зброя
actors.hero.spells.holyweapon$holywepbuff.desc=Вашая зброя ўзмоцнена святым святлом! Бягучыя чары зброі ўзмоцнены і даюць дадатковыя эфекты.\n\nЗасталося хадоў: %s.
actors.hero.spells.holyweapon$holywepbuff.desc_paladin=Вашая зброя ўзмоцнена святым святлом Паладзіна! Чары зброі значна ўзмоцнены і даюць магутныя дадатковыя эфекты.\n\nЗасталося хадоў: %s.

actors.hero.spells.judgement.name=прысуд
actors.hero.spells.judgement.short_desc=Наносіць магічную шкоду, падвоеную супраць ворагаў з малым здароўем.
actors.hero.spells.judgement.desc=Клірык б'е кулаком па зямлі, выклікаючы ўспышку святла, якая наносіць шкоду ўсім ворагам, якіх ён можа бачыць. Базавая шкода складае %1$d-%2$d, але таксама наносіцца дадатковыя 33%% шкоды за кожнае заклінанне, якое Клірык выканаў з моманту ўваходу ва ўзнеслую форму (або з апошняга выканання Прысуду).\n\nЗараз Прысуд нанясе %3$d-%4$d шкоды.

actors.hero.spells.layonhands.name=ўскладанне рук
actors.hero.spells.layonhands.short_desc=Імгненна лечыць мэту і здымае дэбаф.
actors.hero.spells.layonhands.desc=Паладзін накіроўвае святую энергію праз свае рукі, лечачы ці абараняючы ўсё, да чаго дакранаецца.\n\nПаладзін можа выканаць гэтае заклінанне на любога суседняга персанажа, каб даць яму %1$d лячэння, ці на сябе, каб атрымаць %1$d шчыта. Лішак лячэння ад гэтага заклінання ператвараецца ў шчыт.\n\nГэтае заклінанне выконваецца імгненна і можа выконвацца паўторна, але не можа даць больш за тры выкананні шчыта адначасова.

actors.hero.spells.lifelinkspell.name=жыццёвая сувязь
actors.hero.spells.lifelinkspell.short_desc=Размяркоўвае шкоду з саюзнікам і зніжае яго атрыманую шкоду.
actors.hero.spells.lifelinkspell.desc=Клірык узмацняе сувязь паміж сабой і сваім узмоцненым саюзнікам. З гэтай узмоцненай сувяззю, любая атрыманая шкода будзе размяркоўвацца паміж героем і яго саюзнікам на %1$d хадоў, і абарончы бонус Сілы Многіх будзе павялічаны да -%2$d%% атрыманай шкоды. Заўважце, что шкода размяркоўваецца пасля бароні, але да зніжэння шкоды ад Сілы Многіх.\n\nПакуль гэты эфект актыўны, карысныя заклінанні Клірыка 3-га рангу ці ніжэй будуць прымяняцца і да Клірыка, і да яго саюзніка, калі яны прымяняліся б толькі да аднаго з іх.
actors.hero.spells.lifelinkspell$lifelinkspellbuff.name=абарона дзёсмас жыцця
actors.hero.spells.lifelinkspell$lifelinkspellbuff.desc=Клірык нядаўна наклаў Дэсмос жыцця на гэтага саюзніка.\n\nАкрамя звычайных пераваг Дэсмоса жыцця, гэты персанаж таксама атрымлівае зніжаную шкоду, станоўчыя заклінанні Клірыка прымяняюцца і да Клірыка, і да гэтага саюзніка замест аднаго з іх, і Сіла Многіх не скончыцца, пакуль гэты бонус актыўны.\n\nЗасталося хадоў: %s.

actors.hero.spells.mindform.name=ментальная форма
actors.hero.spells.mindform.short_desc=Упітвае Трыяду эфектам жазла ці кідальнай зброі.
actors.hero.spells.mindform.desc=Клірык выбірае жазло ці кідальную зброю, якую ён апазнаў у гэтай вылазцы, і ўпітвае Трыяду яе эфектам.\n\nКалі Трыяда выкарыстоўваецца, Клірык можа зрабіць адзін напад, як быццам ён выкарыстоўваў абраны прадмет на +%d. Гэта актывуе ўсе эфекты, якія выкарыстанне гэтага тыпу прадмета звычайна актывавала б.\n\nГэтае заклінанне замяняе любы іншы эфект розуму, якім Трыяда зараз упітана.

actors.hero.spells.mnemonicprayer.name=мнеманічная малітва
actors.hero.spells.mnemonicprayer.short_desc=Аднаўляе зарады Святога Тома.
actors.hero.spells.mnemonicprayer.desc=Святар вымаўляе малітву, якая падаўжае працягласць усіх бафаў ці дэбафаў на канкрэтнай мэты на %1$d хадоў. Гэтае заклінанне не патрабуе часу для выканання. Станоўчыя эфекты будуць доўжыцца даўжэй на саюзніках (уключаючы самога Святара), а шкодныя эфекты будуць доўжыцца даўжэй на ворагах.\n\nМнеманічная малітва можа падоўжыць канкрэтны экзэмпляр бафа ці дэбафа толькі адзін раз і не можа падоўжыць бафы, атрыманыя ад здольнасцей бароні.

actors.hero.spells.radiance.name=ззянне
actors.hero.spells.radiance.short_desc=Наносіць магічную шкоду ўсім бачным ворагам.
actors.hero.spells.radiance.desc=Святар выбухае святым святлом, аглушаючы ўсіх бачных ворагаў на 3 хады. Калі вораг ужо падсвечаны, Сіянне спрацуе бонусную шкоду падсвечвання, а затым накладзе дэбаф падсвечвання. Сіянне таксама прымусіць Святара ззяць на 100 хадоў, калі бягучы паверх цёмны.

actors.hero.spells.recallinscription.name=успамін надпісу
actors.hero.spells.recallinscription.short_desc=Дае шанц вярнуць выкарыстаныя сувоі і руннае каменне.
actors.hero.spells.recallinscription.desc=Клірык выкарыстоўвае святую магію, каб паўтарыць эфект магічнай руны з руннага каменя ці сувоя, якія ён выкарыстаў за апошнія %s хадоў.\n\nУспамін надпісу нельга выкарыстаць для капіявання сувояў паляпшэння. Кошт зарадаў гэтага заклінання залежыць ад таго, які прадмет быў нядаўна выкарыстаны: 2 за руннае каменне, 3 за сувой, 4 за экзатычны сувой. Кошт зарадаў таксама падвойваецца пры капіяванні сувоя трансмутацыі ці алхімічных прадметаў, якія павінны быць створаны з выкарыстаннем трансмутацыі ці паляпшэння.
actors.hero.spells.recallinscription$useditemtracker.name=нядаўна выкарыстаная руна
actors.hero.spells.recallinscription$useditemtracker.desc=Клірык нядаўна выкарыстаў прадмет, які працуе з заклінаннем Успаміну надпісу. Клірык можа выканаць заклінанне, каб паўтарыць эфект прадмета.\n\nВыкарыстаны прадмет: %1$s.\n\nЗасталося хадоў: %2$s.

actors.hero.spells.shieldoflight.name=шчыт святла
actors.hero.spells.shieldoflight.short_desc=Стварае шчыт, які зніжае фізічную шкоду.
actors.hero.spells.shieldoflight.desc=Клірык стварае шчыт святла вакол мэты, які зніжае атрыманую фізічную шкоду на %1$d на працягу %2$d хадоў.
actors.hero.spells.shieldoflight$shieldoflighttracker.name=шчыт святла
actors.hero.spells.shieldoflight$shieldoflighttracker.desc=Шчыт святла абараняе гэтага персанажа! Атрыманая фізічная шкода зніжана.\n\nЗасталося хадоў: %s.

actors.hero.spells.spiritform.name=духоўная форма
actors.hero.spells.spiritform.short_desc=Упітвае Трыяду эфектам пярсцёнка ці цацурніка.
actors.hero.spells.spiritform.desc=Клірык выбірае пярсцёнак ці цацурнік, які ён апазнаў у гэтай вылазцы (акрамя святога тома) і ўпітвае Трыяду яго эфектам.\n\nКалі абраны пярсцёнак, Трыяда дае эфект гэтага пярсцёнка на +%1$d на 20 хадоў.\n\nКалі абраны цацурнік, Трыяда ўзнаўляе эфект гэтага Цацурніка на +%2$d. Кожны цацурнік мае розныя канкрэтныя паводзіны і кошты зарадаў бароні пры выкарыстанні з Трыядай.\n\nГэтае заклінанне замяняе любы іншы эфект духу, якім Трыяда зараз упітана.
actors.hero.spells.spiritform$spiritformbuff.name=ду��оўная форма
actors.hero.spells.spiritform$spiritformbuff.desc=Форма духу Трыяды зараз дае вам сілу прадмета, як быццам ён быў экіпіраваны.\n\nЗаўважце, што форма духу не можа даць яшчэ адну копію эфекту, ад якога вы ўжо атрымліваеце карысць.\n\nБягучы эфект: %1$s.\n\nЗасталося хадоў: %2$s.

actors.hero.spells.smite.name=smite
actors.hero.spells.smite.short_desc=Наносіць святую шкоду, якая ігнаруе бароню.
actors.hero.spells.smite.desc=Клірык наносіць магутны святы ўдар ворагу, які наносіць %1$d-%2$d магічнай шкоды. Гэтая шкода ігнаруе бароню.

actors.hero.spells.stasis.name=стазіс
actors.hero.spells.stasis.short_desc=Захоўвае саюзніка ў стазісе ўнутры Клірыка.
actors.hero.spells.stasis.desc=Клірык фокусуе сваю сувязь з саюзнікам на сябе, выклікаючы часовае ўтрыманне саюзніка ў энергетычным стазісе ўнутры Клірыка. Саюзнік будзе захаваны на працягу %d хадоў, з усімі станоўчымі эфектамі, не закранутымі часам у стазісе.\n\nСаюзнік з'явіцца побач з Клірыкам, калі стазіс скончыцца натуральна, або ён можа імгненна паўторна выкарыстаць заклінанне бясплатна, каб скончыць эфект датэрмінова. Стазіс можа нават перамяшчаць нерухомых саюзнікаў, але не можа пераносіць іх паміж паверхамі.
actors.hero.spells.stasis$stasisbuff.name=саюзнік у стазісе
actors.hero.spells.stasis$stasisbuff.left_behind=Ваш саюзнік у стазісе быў пакінуты на папярэднім паверсе!
actors.hero.spells.stasis$stasisbuff.desc=Клірык зараз мае саюзніка ў стазісе. Усе станоўчыя эфекты гэтага саюзніка захоўваюцца, уключаючы Сілу Многіх, і ён зноў з'явіцца побач з Клірыкам, калі эфект скончыцца. Эфект таксама можна скончыць датэрмінова, паўторна выкарыстаўшы Стазіс.\n\nСаюзнік у стазісе: %1$s.\nЗасталося хадоў: %2$s.

actors.hero.spells.sunray.name=сонечны прамень
actors.hero.spells.sunray.short_desc=Выпускае прамень святла, які наносіць шкоду і асляпляе.
actors.hero.spells.sunray.desc=Клірык выпускае канцэнтраваны прамень святла, які наносіць %1$d-%2$d магічнай шкоды і асляпляе на %3$d хадоў. Прамень пранікае праз ворагаў у лінію.

actors.hero.spells.walloflight.name=сцяна святла
actors.hero.spells.walloflight.short_desc=Стварае сцяну святла, якая блакуе рух.
actors.hero.spells.walloflight.desc=Паладзін стварае сцяну з панэляў цвёрдага святла непасрэдна перад сабой, якая мае таўшчыню 1 клетку, шырыню %1$d клетак і доўжыцца 20 хадоў.\n\nГэтая сцяна дзейнічае як звычайная, за выключэннем таго, што праз яе можна бачыць. Ворагі, якія апынуліся ў сцяне пры яе стварэнні, будуць часова аглушаны і адштурхнуты назад, калі гэта магчыма. Усё, што застрала ў сцяне, зможа выйсці з яе.\n\nСцяну можна стварыць у любым з чатырох кардынальных ці чатырох дыяганальных кірункаў. Калі сцяна ўжо актыўная, заклінанне можна паўторна выкарыстаць бясплатна, каб імгненна знішчыць сцяну.
actors.hero.spells.walloflight.early_end=Сцяна святла знікла датэрмінова!
actors.hero.spells.walloflight$lightwall.desc=Мігатлівыя панэлі святла блакуюць праход тут.

##main hero
actors.hero.hero.name=вы
actors.hero.hero.leave=Яшчэ рана сыходзіць, што падзямелле чакае наперадзе!
actors.hero.hero.level_up=Узровень павышаны!
actors.hero.hero.new_level=Узровень павышаны! +Трапнасць, +Ухіленне, +5АЗ!
actors.hero.hero.new_talent=+1 ачко талентаў
actors.hero.hero.unspent=У вас засталіся неразмеркаваныя ачкі талентаў!
actors.hero.hero.level_cap=Вы не можаце стаць мацней, але ваш вопыт дадае вам сіл!
actors.hero.hero.you_now_have=вы падабралі: %s.
actors.hero.hero.you_cant_have=вы не можаце несці: %s.
actors.hero.hero.locked_chest=Куфар зачынены, а ў вас няма падыходнага ключа.
actors.hero.hero.locked_door=У вас няма падыходнага ключа.
actors.hero.hero.noticed_smth=Вы зауважылі нешта.
actors.hero.hero.wait=...
actors.hero.hero.no_rest_regen=Вы не можаце адпачываць, пакуль аднаўленне абмежавана.
actors.hero.hero.no_rest_starving=Вы не можаце адпачываць, пакуль галадаеце.
actors.hero.hero.search=пошук
actors.hero.hero.search_distracted=Вам складана засяродзіцца, таму пошук заняў больш часу.
actors.hero.hero.key_distracted=Вам не ўдаецца адкрыць замок, давядзецца працягваць спробы.
actors.hero.hero.pain_resist=Боль дапамагае пераадолець цягу да сну.
actors.hero.hero.revive=Анх выбухае энергіей, якая даруе жыццё!

##classes
actors.hero.heroclass.warrior=ваяр
actors.hero.heroclass.warrior_desc_short=Ваяр - устойлівы баец з моцнай вытрымкай, дзякуючы шчыту ад _зламанай пячаткі_. Пячатку можна перамяшчаць з аднаго даспеха на іншы. Таксама яна можа _пераносіць адно паляпшэнне_ з сабою.
actors.hero.heroclass.warrior_desc=Воін пачынае з разбітай пячаткай, якая прымацавана да бароні і дае шчыт. Ён пачынае з каранёвай зброі і ідэнтыфікаваным зеллем лячэння. Ён набывае бонуснае здароўе пры набыцці сілы.
actors.hero.heroclass.warrior_unlock=Ваяр разблакаваны аўтаматычна.

actors.hero.heroclass.mage=Маг
actors.hero.heroclass.mage_desc_short=Маг - спецыяліст па чароўным справам і носіць з сабой _унікальны магічны посах,_ мацнейшы за звычайныя палачкі. Посах можа быць надзелены сілай любой палачкі, якую можна знайсці ў падзямелле.
actors.hero.heroclass.mage_desc=Маг пачынае з _унікальным посахам_, які зараджаецца значна хутчэй, чым палачкі, і мае на 1 зарад больш. Посах можа быць надзелены сілай любой палачкі, якую вы знойдзеце ў падзямеллі.\n\nМаг пачынае з _посахам магічнай стралы_, тканым даспехам, бурдзюком і аксамітным мяшочкам.\n\nМаг аўтаматычна апазнае:\n_ - _Скрутак Апазнання\n_ - _Зелле Вадкага агню\n_ - _Скрутак Паляпшэння
actors.hero.heroclass.mage_unlock=Каб разблакаваць Мага, _палепшыце прадмет з дапамогай Скрутка Паляпшэння._

actors.hero.heroclass.rogue=разбойнік
actors.hero.heroclass.rogue_desc_short=Разбойнік - майстар схаванага бою, здольны ўхіляцца ад нападаў ворагаў і біць цішком, выкарыстоўваючы свой _унікальны плашч ценяў._ Ён таксама _заўважвае сакрэты і пасткі_ на большай адлегласці.
actors.hero.heroclass.rogue_desc=Разбойнік пачынае з унікальным _плашчом Ценяў_, які ён можа выкарыстоўваць, каб стаць нябачным па сваім жаданні.\n\nРазбойнік _заўважвае сакрэты і пасткі_ на большай адлегласці.\n\nРазбойнік таксама пачынае з _кінжалам_, _трыма кідальнымі нажамі_, тканым даспехам, бурдзюком і аксамітным мяшочкам.\n\nРазбойнік аўтаматычна апазнае:\n_ - _Скрутак Апазнання\n_ - _Зелле Нябачнасці\n_ - _Скрутак Магічнай карты
actors.hero.heroclass.rogue_unlock=Каб разблакаваць Разбойніка, _здзейсніце 10 нечаканых нападаў у адным забегу._

actors.hero.heroclass.huntress=Паляўнічая
actors.hero.heroclass.huntress_desc_short=Паляўнічая - эксперт далёкага бою са сваім _унікальным магічным лукам_ з бясконцымі стрэламі. Яна таксама можа хадзіць па высокай траве і _не вытоптваць яе._
actors.hero.heroclass.huntress_desc=Паляўнічая пачынае з унікальным _Лукам Духаў_, які можа страляць бясконцай колькасцю вядзьмарскіх стрэл.\n\nПаляўнічая можа хадзіць у высокай траве і _не вытоптваць яе_.\n\nПаляўнічая таксама пачынае з парай _шыпаваных пальчатак_, тканым даспехам, бурдзюком і аксамітным мяшочкам.\n\nПаляўнічая аўтаматычна апазнае:\n_ - _Скрутак Апазнання\n_ - _Зелле Ментальнага зроку\n_ - _Скрутак Калыханкі
actors.hero.heroclass.huntress_unlock=Каб разблакаваць Паляўнічую, _пападзіце 10 разоў па праціўнікам з дапамогай кідальнай зброі._

actors.hero.heroclass.duelist=фехтавальшчыца
actors.hero.heroclass.duelist_desc_short=Фехтавальшчыца - майстар зброі. Яна можа выкарыстоўваць _здольнасць_ сваёй зброі, якая мае _унікальны эфект для кожнага кшталту_.
actors.hero.heroclass.duelist_desc=Фехтавальшчыца пачынае з _унікальнай рапірай_, у якой ёсць спецыяльная здольнасць з перазарадкай праз час.\n\nФехтавальшчыца можа выкарыстоўваць _асабістую здольнасць_ кожнай зброі ў гульні.\n\nФехтавальшчыца таксама пачынае з _дзвюма кідальнымі шыпамі_, тканым даспехам, бурдзюком і аксамітным мяшочкам.\n\nДуэлянт аўтаматычна апазнае:\n_ - _Скрутак Апазнання\n_ - _Зелле Сілы\n_ - _Скрутак Люстраных Копій
actors.hero.heroclass.duelist_unlock=Каб разблакаваць Фехтавальшчыцу, _абсталяваўшы зброю ўзроўню 2 або вышэй без штрафу за недахоп сілы._

actors.hero.heroclass.cleric=клірык
actors.hero.heroclass.cleric_desc_short=Клірык чэрпае боскую сілу з Святога Тома.
actors.hero.heroclass.cleric_desc=Клірык — гэта святы воін, які чэрпае сілу з боскай магіі. Яго Святы Том дазваляе выкарыстоўваць розныя заклінанні, якія лечаць, абараняюць і ўзмацняюць саюзнікаў, а таксама наносяць шкоду ворагам. Клірык можа адаптаваць свой стыль гульні праз розныя заклінанні і падкласы.
actors.hero.heroclass.cleric_unlock=Разблакуйце Клірыка, дасягнуўшы 10-га паверха.

actors.hero.herosubclass.berserker=берсерк
actors.hero.herosubclass.berserker_short_desc=_Берсерк_ назапашвае лютасць, калі атрымлівае страты. Лютасць павялічвае нанасімыя ім страты і пры 100% можа быць актывавана асабістая здольнасць для атрымання дадатковага шчыта.
actors.hero.herosubclass.berserker_desc=Берсерк набірае _лютасць_ пры атрыманні фізічнай шкоды. Пры максімальнай лютасці ён можа _ўвайсці ў шаленства_, атрымліваючы магутны шчыт і бонусную шкоду.
actors.hero.herosubclass.gladiator=гладыятар
actors.hero.herosubclass.gladiator_short_desc=Паспяховыя атакі ў блізкім бою дазваляюць _гладіяатару_ пачаць комба, якое адкрые доступ да асаблівых завяршальных удараў.
actors.hero.herosubclass.gladiator_desc=Гладыятар ланцугуе свае ўдары ў _комбінацыі_. Пасля набору дастатковага комба ён можа выканаць спецыяльныя комба-прыёмы, якія наносяць дадатковую шкоду або даюць іншыя бонусы.
actors.hero.herosubclass.battlemage=Чараўнік
actors.hero.herosubclass.battlemage_short_desc=_Чараўнік_ атрымлівае бонусныя эфекты, калі змагаецца ў блізкім баю са сваім посахам. Гэтыя эфекты залежаць ад палачкі, якой надзелены яго посах.
actors.hero.herosubclass.battlemage_desc=Чараўнік атрымлівае бонусны эфект кожны раз, калі ён наносіць удар у блізкім бою сваім посахам, быццам накладвае дадатковае зачаравання. Гэтыя эфекты залежаць ад палачкі, якой надзелены яго посах. Кожная палачка мае ўласны эфект. У дадатак да эфектаў палачкі, посах Чараўніка таксама атрымае 0,5 зарада кожны раз, калі маг страляе ім паблізу.
actors.hero.herosubclass.warlock=Вядзьмак
actors.hero.herosubclass.warlock_short_desc=У _Вядзьмака_ ёсць шанец пазначыць ворагаў пазнакай душы з дапамогай сваіх палачак. Ён вылечваецца кожны раз, калі наносіць фізічны ўрон пазначаным ворагам.
actors.hero.herosubclass.warlock_desc=У Вядзьмака ёсць шанец пазначыць пазнакай душы персанажаў, на якіх ён выкарыстоўвае свае палачкі. Шанец прымяніць пазнаку душы і яе працягласць павялічваюцца з узроўнем палачкі.\n\nКалі вораг пазначаны пазнакай душы, Вядзьмак вылечвае 2 АЗ за кожныя 5 адзінак страт, якія ён наносіць, але толькі пры нападах са зброі блізкага бою або кідальнай зброі, а не з палачак!
actors.hero.herosubclass.assassin=забойца
actors.hero.herosubclass.assassin_short_desc=_Забойца_ можа падрыхтаваць смяротны ўдар, пакуль ён нябачны. Чым даўжэй ён чакае, тым больш магутнай будзе атака.
actors.hero.herosubclass.assassin_desc=Забойца рыхтуе свой наступны ўдар, калі становіцца нябачным. Чым даўжэй ён рыхтуецца, тым больш магутны будзе яго наступная атака. Падрыхтоўка доўжыцца да 9 хадоў.\n\nПасля падрыхтоўкі Забойца наносіць дадатковыя страты пры наступнай атацы, можа падскочыць да сваёй цэлі і нават імгненна забіваць ворагаў, якія досыць слабыя.
actors.hero.herosubclass.freerunner=валацуга
actors.hero.herosubclass.freerunner_short_desc=_Валацуга_ назапашвае імпульс падчас перамяшчэння. Яго можна выкарыстоўваць для бегу. Гэта дае яму бонусныя хуткасць і ўхіленне на кароткі час.
actors.hero.herosubclass.freerunner_desc=Падча руха Валацуганазапашвае імпульс. Ён можа набраць да 10 ачкоў імпульсу, прайшоўшы 10 хадоў, але хутка губляе іх, калі перастае рухацца. Валацуга можа выкарыстоўваць свой імпульс, каб пабегчы, па 2 хады на ачко імпульсу.\n\nПры безе Валацуга рухаецца з падвоенай хуткасцю і атрымлівае бонус да ўхілення прапарцыйна свайму ўзроўню. Як толькі бег сканчаецца, пачынаецца перазарадка, якая не дазваляе збіраць імпульс.
actors.hero.herosubclass.sniper=Снайпэр
actors.hero.herosubclass.sniper_short_desc=_Снайпэр_ можа прабіць браню сваімі дальнабойнымі нападамі. Пасля ўдару кідальнай зброяй яна можа ўжыць спецыяльную атаку з дапамогай свайго лука.
actors.hero.herosubclass.sniper_desc=Снайпер - гэта майстар далёкага бою, чые далёкія атакі прабіваюць варожую браню. Калі яна трапляе ў ворага кідальнай зброяй, яна ставіць на іх пазнаку снайпера, якая дазваляе ёй актываваць спецыяльную атаку з дапамогай свайго лука. Гэтая адмысловая атака вар'іруецца ў залежнасці ад таго, як збалансаваны яе лук.\n\nНезбалансаванай лук стрэліць адной стралой, якая наносіць паніжаныя страты, але выстрэльвае імгненна. Лук, збалансаваны на хуткасць, выпусціць залп з трох стрэл, якія наносяць меншы ўрон, але могуць актываваць зачараванні і марнуюць 1 ход для стрэлу. Лук, збалансаваны на шкоду, стрэліць снайперскім стрэлам, які гарантавана трапляе, наносіць бонусны ўрон у залежнасці ад адлегласці і патрабуе 2 ходу для стрэлу.
actors.hero.herosubclass.warden=захавальніца
actors.hero.herosubclass.warden_short_desc=_Захавальніца_ можа бачыць скрозь высокую траву і атрымлівае бонусныя эфекты, калі яна саджае насенне і топча расліны.
actors.hero.herosubclass.warden_desc=Захавальніца мае моцную сувязь з прыродай, якая дае ёй мноства бонусных эфектаў, звязаных з травой і раслінамі. Яна здольная бачыць скрозь высокую і прымятую траву, як калі б гэта была пустая прастора.\n\nЗахавальніца прымушае траву прарастаць вакол любога насення, якое яна кідае або саджае, і атрымлівае спецыяльныя эфекты, калі вытоптвае расліны. Гэтыя спецыяльныя эфекты замяняюць звычайныя эфекты раслін, а гэта азначае, што ні адна расліна не прычыніць ёй шкоды, калі яна наступіць на яго.
actors.hero.herosubclass.champion=Майстар клінкоў
actors.hero.herosubclass.champion_short_desc=_Майстар клінкоў_ можа выкарыстоўваць адразу две зброі і атрымлівае больш зарадаў для іх здольнасцей. Для звычайных удараў будзе выкарыстана асноўная зброя, але Майстар клінкоў можа выкарыстоўваць здольнасць кожнага або змяніць зброю ў любы момант.
actors.hero.herosubclass.champion_desc=Майстар клінкоў - майстар рукапашнай зброі. Яна можа экіпіраваць другую зброю ў дадатак да асноўнай. Для звычайных удараў будзе выкарыстана асноўная зброя, але яна можа імгненна змяніць яго на дадатковае.\n\nЯе максімальная колькаць зарадаў зброі павялічана на 2, а хуткасць перазарадкі больш на 50%.
actors.hero.herosubclass.monk=асвечаная
actors.hero.herosubclass.monk_short_desc=_Асвечаная_ збірае энергію падчас бою. Гэтая энергія можа быць выдаткаванай на мноства унікальных здольнасцяў.
actors.hero.herosubclass.monk_desc=Манашка здабывае _энергію_ ад ударных атак. Яна можа выдаткаваць энергію на магутныя здольнасці, такія як кідкі праз ворагаў, стварэнне вадзяных люстраў або імгненныя ўдары.
actors.hero.herosubclass.priest=жрэц
actors.hero.herosubclass.priest_short_desc=Святар удасканальвае Накіравальнае святло для нанясення шкоды.
actors.hero.herosubclass.priest_desc=Святар удасканальвае заклінанне _Накіравальнага святла_, атрымліваючы бонусную шкоду пры выкарыстанні яго для падсвечвання ворагаў. Ён таксама атрымлівае бясплатнае першае выкарыстанне кожныя 50 хадоў.
actors.hero.herosubclass.paladin=paladin
actors.hero.herosubclass.paladin_short_desc=Паладзін ўзмацняе сваю зброю і бароню святым святлом.
actors.hero.herosubclass.paladin_desc=Паладзін атрымлівае _Святую зброю_ і _Святую бароню_, якія ўзмацняюць яго бягучую зброю і бароню святым святлом. Святыя чары і глыфы наносяць дадатковую шкоду нежыці і дэманам.

##talents
actors.hero.talent$provokedangertracker.name=справакаваны гнеў
actors.hero.talent$provokedangertracker.desc=Ваяр нядаўна страціў дадатковую браню, яго наступная фізічная атака нанясе дадатковыя страты.\n\nХадоў засталося: %s.
actors.hero.talent$lingeringmagictracker.name=вадкая магія
actors.hero.talent$lingeringmagictracker.desc=Маг нядаўна выкарыстаў посах або чароўную палачку, яго наступная фізічная атака нанясе дадатковы страты.\n\nХадоў засталося: %s.
actors.hero.talent$followupstriketracker.name=удар міласэрнасці
actors.hero.talent$followupstriketracker.desc=Паляўнічая толькі што атакавала ворага кідальнай зброяй, таму страты наступнай фізічнай атакі супраць той жа цэлі павышаны.\n\nХадоў засталося: %s.
actors.hero.talent$patientstriketracker.name=трыванне дуэлянта
actors.hero.talent$patientstriketracker.desc=Фехтавальшчыца вычакала адзін ход, таму наступная фізічная атака нанясе больш страт.
actors.hero.talent$improvisedprojectilecooldown.name=перазарадка імправізаваных снарадаў
actors.hero.talent$improvisedprojectilecooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.
actors.hero.talent$rejuvenatingstepscooldown.name=перазарадка аднаўлялых крокаў
actors.hero.talent$rejuvenatingstepscooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.
actors.hero.talent$seershotcooldown.name=перазарадка усёвідушчага стрэлу
actors.hero.talent$seershotcooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.
actors.hero.talent$aggressivebarriercooldown.name=перазарадка адчайнага бар'ера
actors.hero.talent$aggressivebarriercooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.
actors.hero.talent$liquidagilacctracker.name=вадкі спрыт
actors.hero.talent$liquidagilacctracker.desc=Наступная звычайная атака Фехтавальшчыца атрымае бонус да дакладнасці.\n\nХадоў засталося: %s.
actors.hero.talent$lethalhastecooldown.name=перазарадка смяротнай спешкі
actors.hero.talent$lethalhastecooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.
actors.hero.talent$swiftequipcooldown.name=перазарадка хуткай экіпіроўкі
actors.hero.talent$swiftequipcooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.
actors.hero.talent$preciseassaulttracker.name=разліковы напад
actors.hero.talent$preciseassaulttracker.desc=Наступная звычайная атака Фехтавальшчыца атрымае бонус да дакладнасці.\n\nХадоў засталося: %s.
actors.hero.talent$deadlyfollowuptracker.name=смяротнае дабіванне
actors.hero.talent$deadlyfollowuptracker.desc=Фехтавальшчыца толькі што атакавала кідальнай зброяй, таму страты ад фізічных нападаў па той жа цэлі павышэны.\n\nХадоў засталося: %s.
actors.hero.talent$combinedlethalityabilitytracker.executed=пакараны
actors.hero.talent$satiatedspellstracker.name=Ахоўнае заклінанне
actors.hero.talent$satiatedspellstracker.desc=Талент Насычаных заклінанняў зараз зарадзіўся. Наступнае ўжыванне ежы актывуе яго эфект.
actors.hero.talent$searinglightcooldown.name=Палючае святло
actors.hero.talent$searinglightcooldown.desc=Вы нядаўна выкарыстоўвалі гэты талент і павінны пачакаць, перш чым выкарыстоўваць яго зноў.\n\nХадоў засталося: %s.

#warrior
actors.hero.talent.hearty_meal.title=Еж на здароўе
actors.hero.talent.hearty_meal.desc=_+1:_ Калі герой ужывае ежу, ён атрымлівае _шчыт, роўны 3_ на 15 хадоў.\n\n_+2:_ Калі герой ужывае ежу, ён атрымлівае _шчыт, роўны 5_ на 15 хадоў.
actors.hero.talent.veterans_intuition.title=інтуіцыя ветэрана
actors.hero.talent.veterans_intuition.desc=_+ 1:_ Ваяр апазнае зброю ў _1.75 разы_ хутчэй, а даспехі - ў _2.5 разы_ хутчэй.\n\n_+2:_ Ваяр апазнае зброю ў _2.5 разы_ хутчэй, а даспехі - _калi апранае іх_.
actors.hero.talent.provoked_anger.title=справакаваны гнеў
actors.hero.talent.provoked_anger.desc=_+1:_ Калі Берсерк атрымлівае шкоду, ён набірае _+15% лютасці._\n\n_+2:_ Калі Берсерк атрымлівае шкоду, ён набірае _+30% лютасці._\n\n_+3:_ Калі Берсерк атрымлівае шкоду, ён набірае _+45% лютасці._
actors.hero.talent.iron_will.title=Сталёвая воля
actors.hero.talent.iron_will.desc=_+1:_ Разбітая пячатка Воіна дае _+1 шчыта._\n\n_+2:_ Разбітая пячатка Воіна дае _+2 шчыта._\n\n_+3:_ Разбітая пячатка Воіна дае _+3 шчыта._
actors.hero.talent.iron_will.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дасць +1/+2/+3 абароны ад бароні.

actors.hero.talent.iron_stomach.title=жалезны страўнік
actors.hero.talent.iron_stomach.desc=_+1:_ Перакус займае ў Ваяра 1 ход і дае яму _75% супраціву стратам_, пакуль ён есць.\n\n_+2:_ Перакус займае ў Ваяра 1 ход і дае яму _100% супраціву стратам_, пакуль ён есць.
actors.hero.talent.liquid_willpower.title=вадкая сіла волі
actors.hero.talent.liquid_willpower.desc=_+1:_ Калі герой п'е зелле, ён атрымлівае _1 ход_ імунітэту да негатыўных эфектаў.\n\n_+2:_ Калі герой п'е зелле, ён атрымлівае _2 хады_ імунітэту да негатыўных эфектаў.
actors.hero.talent.runic_transference.title=перанос рун
actors.hero.talent.runic_transference.desc=_+1:_ Зламаная пячатка Ваяра можа пераносіць _звычайныя гліфы_ гэтак жа, як і паляпшэнні.\n\n_+2:_ Зламаная пячатка Ваяра можа пераносіць _звычайныя, магутныя і праклятыя гліфы_ гэтак жа, як і паляпшэнні.\n\nПячатка можа пераносіць тыя гліфы, якія былі нанесены на даспех, калі пячатка была на ёй.
actors.hero.talent.runic_transference.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, ён павялічыць супраціў рун да сцірання Скруткамі Паляпшэння. Пры паляпшэнні руны могуць быць сцёртыя з 6 ўзроўню (замест 4) пры +1 або з 7 ўзроўню (замест 4) пры +2. Пачынаючы з 8 ўзроўню руна гарантавана сатрэцца пры паляпшэнні прадмета.
actors.hero.talent.lethal_momentum.title=смяротны імпульс
actors.hero.talent.lethal_momentum.desc=_+1:_ Калі Ваяр забівае ворага зброяй блізкага бою, яго атака мае _67% шанец_ быць імгненнай.\n_+2:_ Калі Ваяр забівае ворага зброяй блізкага бою, яго атака мае _100% шанец_ быць імгненнай.
actors.hero.talent.improvised_projectiles.title=імправізаваныя снарады
actors.hero.talent.improvised_projectiles.desc=_+1:_ Ваяр можа асляпіць ворага на _2 хады_, кінуўшы ў яго любы прадмет, які не з'яўляецца кідальнай зброяй. Гэтая здольнасць перазараджваецца 50 хадоў.\n\n_+2:_ Воін можа асляпіць ворага на _3 хады_, кінуўшы ў яго любы прадмет, які не з'яўляецца кідальнай зброяй. Гэтая здольнасць перазараджваецца 50 хадоў.

actors.hero.talent.hold_fast.title=ахоўная стойка
actors.hero.talent.hold_fast.desc=_+1:_ Пакуль Воін стаіць на месцы, ён атрымлівае _+1 абароны._\n\n_+2:_ Пакуль Воін стаіць на месцы, ён атрымлівае _+2 абароны._\n\n_+3:_ Пакуль Воін стаіць на месцы, ён атрымлівае _+3 абароны._
actors.hero.talent.strongman.title=Асілак
actors.hero.talent.strongman.desc=_+1:_ Сіла Ваяра _павялічваецца на 8%_, і акругляецца ў меншы бок.\n\n_+2:_ Сіла Ваяра_ павялічваецца на 13%_, і акругляецца ў меншы бок.\n\n_+3:_ Сіла Ваяра_ павялічваецца на 18%_, і акругляецца ў меншы бок.

actors.hero.talent.endless_rage.title=бясконцае буянства
actors.hero.talent.endless_rage.desc=_+1:_ Лютасць берсерка не апусціцца ніжэй _10%%_.\n\n_+2:_ Лютасць берсерка не апусціцца ніжэй _20%%_.\n\n_+3:_ Лютасць берсерка не апусціцца ніжэй _30%%_.\n\nГэты мінімальны парог лютасці палягчае падтрыманне лютасці паміж боямі. Калі шаленства сканчаецца, лютасць скідваецца да 0 незалежна ад гэтага таленту.
actors.hero.talent.deathless_fury.title=смяротная лютасць
actors.hero.talent.deathless_fury.desc=Шаленства аўтаматычна спрацоўвае, калі берсерк вось-вось памрэ і лютасць на ўзроўні _100%%_.\n\n_+1:_ Час перазарадкі складае _300 хадоў_.\n\n_+2:_ Час перазарадкі складае _200 хадоў_.\n\n_+3:_ Час перазарадкі складае _100 хадоў_.\n\nЗвярніце ўвагу, што берсерк усё роўна памрэ, калі ў яго 0 HP калі шаленства скончыцца.
actors.hero.talent.enraged_catalyst.title=каталізатар апантанасці
actors.hero.talent.enraged_catalyst.desc=_+1:_ Зачараванні і праклёны на зброі Берсерка актывуюцца тым часцей, чым больш яго лютасць, аж да _15%_ пры 100% лютасці.\n\n_+2:_ Зачараванні і праклёны на зброі Берсерка актывуюцца тым часцей, чым больш яго лютасць, аж да _30%_ пры 100% лютасці.\n\n_+3:_ Зачараванні і праклёны на зброі Берсерка актывуюцца тым часцей, чым больш яго лютасць, аж да _45%_ пры 100% лютасці.

actors.hero.talent.cleave.title=расколванне чэрапоў
actors.hero.talent.cleave.desc=_+1:_ Калі Воін пераможа ворага, яго наступная атака будзе _імгненнай._\n\n_+2:_ Калі Воін пераможа ворага, яго наступная атака будзе _імгненнай і нанясе +15% шкоды._\n\n_+3:_ Калі Воін пераможа ворага, яго наступная атака будзе _імгненнай і нанясе +30% шкоды._
actors.hero.talent.lethal_defense.title=смяротная абарона
actors.hero.talent.lethal_defense.desc=_+1:_ Калі Гладыятар забівае ворага комба-прыёмам, перазарадка яго шчыта разбітай пячаткі _зніжаецца на 50 хадоў_.\n\n_+2:_ Калі Гладыятар забівае ворага комба-прыёмам, перазарадка яго шчыта разбітай пячаткі _зніжаецца на 100 хадоў_.\n\n_+3:_ Калі Гладыятар забівае ворага комба-прыёмам, перазарадка яго шчыта разбітай пячаткі _зніжаецца на 150 хадоў_.\n\nПеразарадка шчыта можа быць зніжана да -150 хадоў гэтым талентам, што азначае, что ён адразу будзе даступны зноў пасля актывацыі.
actors.hero.talent.enhanced_combo.title=палепшанае комба
actors.hero.talent.enhanced_combo.desc=_+1:_ Калі комба Гладыятара 7 або вышэй, павялічваецца адлегласць адштурхвання Тарана на 3, а таксама Таран накладвае галавакружэнне і можа сапхнуць ворага ў яму.\n\n_+2:_ У дадатак да бонусаў ад +1, калі комба Гладыятара 9 і вышэй, Парыраванне працуе на некалькіх нападах.\n\n_+3:_ У дадатак да бонусаў ад +1 і +2, Гладыятар можа скакаць на адлегласць аж да комба/3, калі выкарыстоўвае Націск, Абвальванне або Апантанасць.

actors.hero.talent.body_slam.title=удар целам
actors.hero.talent.body_slam.desc=_+1:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі атрымліваюць страты, роўныя _1-4 плюс 25%_ ахоўнай сілы брані.\n\n_+2:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі атрымліваюць страты, роўныя _2-8 плюс 50%_ ахоўнай сілы брані.\n\n_+3:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі атрымліваюць страты, роўныя _3-12 плюс 75%_ ахоўнай сілы брані.\n\n_+4:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі атрымліваюць страты, роўныя _4-16 плюс 100%_ ахоўнай сілы брані.
actors.hero.talent.impact_wave.title=ўдарная хваля
actors.hero.talent.impact_wave.desc=_+1:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі адкідаюцца на _2 клеткі_ назад і маюць _25% шанец_ атрымаць ўразлівасць на 5 хадоў.\n\n_+2:_ Калі воін прызямляецца пасля скачка, усе суседнія ворагі адкідаюцца на _3 клетки_ назад і маюць _50% шанец_ атрымаць ўразлівасць на 5 хадоў.\n\n_+3:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі адкідаюцца на _4 клеткі_ назад і маюць _75% шанец_ атрымаць ўразлівасць на 5 хадоў.\n\n_+4:_ Калі Ваяр прызямляецца пасля скачка, усе суседнія ворагі адкідаюцца на _5 клеток_ назад і маюць _100% шанец_ атрымаць ўразлівасць на 5 хадоў.
actors.hero.talent.double_jump.title=двайны скачок
actors.hero.talent.double_jump.desc=_+1:_ Калі Ваяп выконвае другі скачок на працягу 3 хадоў пасля першага, кошт гэтага скачка _зніжаецца на 16%_.\n\n_+2:_ Калі Ваяр выконвае другі скачок на працягу 3 хадоў пасля першага, кошт гэтага скачка _зніжаецца на 30%_.\n\n_+3:_ Калі Ваяр выконвае другі скачок на працягу 3 хадоў пасля першага, кошт гэтага скачка _зніжаецца на 40%_.\n\n_+4:_ Калі Ваяр выконвае другі скачок на працягу 3 хадоў пасля першага, кошт гэтага скачка _зніжаецца на 50%_.

actors.hero.talent.expanding_wave.title=пашырэнне
actors.hero.talent.expanding_wave.desc=_+1:_ Дыяпазон ударнай хвалі павялічаны да _6 клеток_ з 5, а яе шырыня павялічана да _75 градусаў_ з 60.\n\n_+2:_ Дыяпазон ударнай хвалі павялічаны да _6 клеток_ з 5, а яе шырыня павялічана да _90 градусаў_ з 60.\n\n_+3:_ Дыяпазон ударнай хвалі павялічаны да _6 клеток_ з 5, а яе шырыня павялічана да _105 градусаў_ з 60.\n\n_+4:_ Дыяпазон ударнай хвалі павялічаны да _6 клеток_ з 5, а яе шырыня павялічана да _120 градусаў_ з 60.
actors.hero.talent.striking_wave.title=ударная хваля
actors.hero.talent.striking_wave.desc=_+1:_ Ударная хваля таксама мае _шанец 30%_ ужыць эфекты атакі, такія як чары і комба.\n\n_+2:_ Ударная хваля таксама мае _шанец 60% _ ужыць эфекты, такія як чары і комба.\n\n_+3:_ Ударная хваля таксама мае _шанец 90% _ ужыць эфекты, такія як чары і комба.\n\n_+4:_ Ударная хваля таксама мае _шанец 100%_ ужыць эфекты, такія як чары і комба, а таксама ўзмацняе чары на _20%_.
actors.hero.talent.shock_force.title=ударная моц
actors.hero.talent.shock_force.desc=_+1:_ Ударная хваля наносіць _на 20% больш_ страт і мае _шанец 25%_ аглушыць, а не накласці кульгавасць.\n\n_+ 2:_ Ударная хваля наносіць _на 40% больш_ страт і мае _шанец 50% _ аглушыць, а не накласці кульгавасць.\n\n_+ 3:_ Ударная хваля наносіць _на 60% больш_ страт і мае _шанец 75% _ аглушыць, а не накласці кульгавасць.\n\n_+4:_ Ударная хваля наносіць _на 80% больш_ страт і мае _шанец 100%_ аглушыць, а не накласці кульгавасць.

actors.hero.talent.sustained_retribution.title=Устойлівая адплата
actors.hero.talent.sustained_retribution.desc=_+1:_ Ваяр наносіць _115% бонусных страт_, якія будуць размеркаваны паміж _2 ударамі_, замест 100% за 1 ўдар.\n\n_+2:_ Ваяр наносіць _130% бонусных страт_, бонусных страт_, якія будуць размеркаваны паміж _3 ударамі_, замест 100% за 1 ўдар.\n\n_+3:_ Ваяр наносіць _145% бонусных страт_, якія будуць размеркаваны паміж _4 ударамі_, замест 100% за 1 ўдар.\n\n_+4:_ Ваяр наносіць _160% бонусных страт_, якія будуць размеркаваны паміж _5 ударамі_, замест 100% за 1 ўдар.
actors.hero.talent.shrug_it_off.title=не звяртай увагі
actors.hero.talent.shrug_it_off.desc=_+1:_ Супраціў стратам Ваяра падчас чакання _павялічваецца да 60%_, замест 50%.\n\n_+2:_ Супраціў стратам Ваяра падчас чакання _павялічваецца да 68%_, замест 50%.\n\n_+3:_ Супраціў стратам Ваяра падчас чакання _павялічваецца да 74%_, замест 50%.\n\n_+4:_ Супраціў стратам Ваяра падчас чакання _павялічваецца да 80%_, замест 50%.
actors.hero.talent.even_the_odds.title=параўнанне шанцаў
actors.hero.talent.even_the_odds.desc=_+1:_ Ваяр наносіць дадатковыя _5% бонусных страт_ за кожнага ворага, які знаходзіцца ў межах 2 клетак пасля заканчэння чакання.\n\n_+2:_ Ваяр наносіць дадатковыя _10% бонусных страт_ за кожнага ворага, які знаходзіцца ў межах 2 клетак пасля заканчэння чакання.\n\n_+3:_ Ваяр наносіць дадатковыя _15% бонусных страт_ за кожнага ворага, які знаходзіцца ў межах 2 клетак пасля заканчэння чакання.\n\n_+4:_ Ваяр наносіць дадатковыя _20% бонусных страт_ за кожнага ворага, які знаходзіцца ў межах 2 клетак пасля заканчэння чакання.

#mage
actors.hero.talent.empowering_meal.title=танізавальны абед
actors.hero.talent.empowering_meal.desc=_+1:_ Калі герой ужывае ежу, ён атрымлівае _3 хады_ фізічнага ўзмацнення, якое дадае _+2 шкоды_ да наступнай атакі.\n\n_+2:_ Калі герой ужывае ежу, ён атрымлівае _3 хады_ фізічнага ўзмацнення, якое дадае _+3 шкоды_ да наступнай атакі.
actors.hero.talent.scholars_intuition.title=інтуіцыя знаўцы
actors.hero.talent.scholars_intuition.desc=_+1:_ Маг апазнае палачкі ў _3 разы хутчэй_.\n\n_+2:_ Маг апазнае палачкі _пры першым выкарыстанні_.
actors.hero.talent.lingering_magic.title=вадкая магія
actors.hero.talent.lingering_magic.desc=_+1:_ Калі Маг выстрельвае палачкай або посахам яго наступная фізічная атака наносіць _1-2 дадатковыя страты_.\n\n_+2:_ Калі Маг выстрельвае палачкай або посахам яго наступная фізічная атака наносіць _2 дадатковыя страты_.
actors.hero.talent.backup_barrier.title=рэзервовы бар'ер
actors.hero.talent.backup_barrier.desc=_+1:_ Маг атрымлівае _3 зарада шчыта_, калі марнуе апошні зарад свайго посаха.\n\n_+2:_ Маг атрымлівае _5 зарадаў шчыта_, калі марнуе апошні зарад свайго посаха.
actors.hero.talent.backup_barrier.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, замест гэтага ён спрацуе ад палачкі самага высокага ўзроўня героя.

actors.hero.talent.energizing_meal.title=шчыльны абед
actors.hero.talent.energizing_meal.desc=_+1:_ Перакус займае ў Мага 1 ход і дае яму _5 хадоў перазарадкі палочак_.\n\n_+2:_ Перакус займае ў Мага 1 ход і дае яму _8 хадоў перазарадкі палочак_.
actors.hero.talent.inscribed_power.title=напісаная сіла
actors.hero.talent.inscribed_power.desc=_+1:_ Калі Маг выкарыстоўвае жазло, ён атрымлівае _+1 бонусны ўзровень жазла_ на наступнае выкарыстанне.\n\n_+2:_ Калі Маг выкарыстоўвае жазло, ён атрымлівае _+2 бонусныя ўзроўні жазла_ на наступнае выкарыстанне.
actors.hero.talent.wand_preservation.title=захаванне палачкі
actors.hero.talent.wand_preservation.desc=_+1:_ Калі жазло мае _1 зарад_, ёсць _33% шанц_, што яно не спажыве зарад пры выкарыстанні.\n\n_+2:_ Калі жазло мае _1 зарад_, ёсць _67% шанц_, што яно не спажыве зарад пры выкарыстанні.
actors.hero.talent.wand_preservation.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, замест гэтага ён павялічыць колькасць магічнай смалы, якую можна атрымліваць з кожнай палачкі ў алхімічным катле, на 1 пры ўзроўні таленту +1 або на 2 пры +2.
actors.hero.talent.arcane_vision.title=магічны зрок
actors.hero.talent.arcane_vision.desc=_+1:_ Кожны раз, калі Маг трапляе па ворагу з палачкі, ён атрымлівае ментальны зрок на _10 хадоў_.\n\n_+2:_ Кожны раз, калі Маг трапляе па ворагу з палачкі, ён атрымлівае ментальны зрок на _15 хадоў_.
actors.hero.talent.shield_battery.title=батарэя аховы
actors.hero.talent.shield_battery.desc=_+1:_ Маг можа нацэліцца на сябе палачкай, каб пераўтварыць яе зарады ў шчыт з велічынёй _4% ад максімальнага АЗ за зарад_.\n\n_+ 2:_ Маг можа нацэліцца на сябе палачкай, каб пераўтварыць яе зарады ў шчыт з велічынёй _6% ад максімальнага АЗ за заряд_.

actors.hero.talent.desperate_power.title=адчайная сіла
actors.hero.talent.desperate_power.desc=_+1:_ Палачкі і посах Мага часова атрымліваюць _+1 узровень_, калі ў ніх застался апошні зарад.\n\n_+2:_ Палачкі і посах Мага часова атрымліваюць _+2 узроўні_, калі ў ніх застался апошні зарад.\n\n_+3:_ Палачкі і посах Мага часова атрымліваюць _+3 узроўні_, калі ў ніх застался апошні зарад.
actors.hero.talent.ally_warp.title=дамапога саюзніка
actors.hero.talent.ally_warp.desc=_+1:_ Маг можа выбраць саюзніка, каб маментальна памяняцца з нім месцамі на адлегласці да _2-х клетак_.\n\n_+2:_ Маг можа выбраць саюзніка, каб маментальна памяняцца з нім месцамі на адлегласці да _4-х клетак_.\n\n_+3:_ Маг можа выбраць саюзніка, каб маментальна памяняцца з нім месцамі на адлегласці да _6-ці клетак_.

actors.hero.talent.empowered_strike.title=палепшаны стрэл
actors.hero.talent.empowered_strike.desc=_+1:_ Блізкая атака посахам пасля стрэлу ім нанясе _+16% страт_ і прыменіць бонусны эфект на _+50% сілы_ посаха.\n\n_+2:_ Блізкая атака посахам пасля стрэлу ім нанясе _+33% страт_ і прыменіць бонусны эфект на _+100% сілы_ посаха.\n\n_+3:_ Блізкая атака посахам пасля стрэлу ім нанясе _+50% страт_ і прыменіць бонусны эфект на _+150% сілы_ посаха.
actors.hero.talent.mystical_charge.title=містычны зарад
actors.hero.talent.mystical_charge.desc=_+1:_ Удар посахам дае Чараўніку _0.5 хадоў_ перазарадкі артэфакта.\n\n_+2:_ Удар посахам дае Чараўніку _1 ход_ перазарадкі артэфакта.\n\n_+3:_ Удар посахам дае Чараўніку _1.5 хады_ перазарадкі артэфакта.
actors.hero.talent.excess_charge.title=залішні зарад
actors.hero.talent.excess_charge.desc=_+1:_ Калі посах Чараўніка цалкам зараджаны, яго наступнае выкарыстанне дае ўладальніку _0.67 шчыта_ за ўзровень посаха.\n\n_+2:_ Калі посах Чараўніка цалкам зараджаны, яго наступнае выкарыстанне дае ўладальніку _1.33 шчыта_ за ўзровень посаха.\n\n_+3:_ Калі посах Чараўніка цалкам зараджаны, яго наступнае выкарыстанне дае ўладальніку _2 шчыта_ за ўзровень посаха.

actors.hero.talent.soul_siphon.title=псута
actors.hero.talent.soul_siphon.desc=_+1:_ Фізічныя страты могуць актываваць Пазнаку душы _с верагоднасцю 13%_.\n\n_ + 2:_ Фізічныя страты могуць актываваць Пазнаку душы _с верагоднасцю 27%_.\n\n_ + 3:_ Фізічныя страты могуць актываваць Пазнаку душы _с верагоднасцю 40%_.
actors.hero.talent.soul_eater.title=пажыральнік душ
actors.hero.talent.soul_eater.desc=_+1:_ Пазнака душы дае _0.33 хады_ насычэння за кожную нанесеную страту. Ворагі, якія адзначаны Пазнакай душы, маюць _шанец 10% _ выклікаць эфект насычэння, калі яны паміраюць.\n\n_+2:_ Пазнака душы дае _0.67 хады_ насычэння за кожную нанесеную страту. Ворагі, якія адзначаны Пазнакай душы, маюць _шанец 20% _ выклікаць эфект насычэння, калі яны паміраюць.\n\n_+3:_ Пазнака душы дае _1 ход_ насычэння за кожную нанесеную страту. Ворагі, якія адзначаны Пазнакай душы, маюць _шанец 30% _ выклікаць эфект насычэння, калі яны паміраюць.
actors.hero.talent.necromancers_minions.title=мін'ёны некраманта
actors.hero.talent.necromancers_minions.desc=_+1:_ Калі вораг з Пазнакай душы памірае, чарнакніжнік мае _шанец 13%_ уваскрэсіць ворага ў выглядзе прывіда з псаваннем.\n\n_ + 2:_ Калі вораг з Пазнакай душы памірае, чарнакніжнік мае _шанец 27%_ уваскрэсіць ворага ў выглядзе прывіда з псаваннем.\n\n_ + 3:_ Калі вораг з Пазнакай душы памірае, чарнакніжнік мае _шанец 40%_ уваскрэсіць ворага ў выглядзе прывіда з псаваннем.

actors.hero.talent.blast_radius.title=радыус выбуха
actors.hero.talent.blast_radius.desc=_+1:_ Радыус стыхійнага выбуху павялічаны з 4 да _5 клетак_.\n\n_+2:_ Радыус стыхійнага выбуху павялічаны з 4 да _6 клетак_.\n\n_+3:_ Радыус стыхійнага выбуху павялічаны з 4 да _7 клетак_.\n\n_+4:_ Радыус стыхійнага выбуху павялічаны з 4 да _8 клетак_.
actors.hero.talent.elemental_power.title=моц стыхіі
actors.hero.talent.elemental_power.desc=_+1:_ Сіла стыхійнага выбуху павялічваецца на _25%_.\n\n_+2:_ Сіла стыхійнага выбуху павялічваецца на _50%_.\n\n_+3:_ Сіла стыхійнага выбуху павялічваецца на _75%_.\n\n_+4:_ Сіла стыхійнага выбуху павялічваецца на _100%_.
actors.hero.talent.reactive_barrier.title=рэактыўны бар'ер
actors.hero.talent.reactive_barrier.desc=_+ 1:_ Маг атрымлівае _2.5 абароны_ за кожнага персанажа, які атрымаў страты ад стыхійнага выбуху, максімум да 5 персанажаў.\n\n_+2:_ Маг атрымлівае _5 абароны_ за кожнага персанажа, які атрымаў страты ад стыхійнага выбуху, максімум да 6 персанажаў.\n\n_+3:_ Маг атрымлівае _7.5 абароны_ за кожнага персанажа, які атрымаў страты ад стыхійнага выбуху, максімум да 7 персанажаў.\n\n_+4:_ Маг атрымлівае _10 абароны_ за кожнага персанажа, які атрымаў страты ад стыхійнага выбуху, максімум да 8 персанажаў.

actors.hero.talent.wild_power.title=дзікая сіла
actors.hero.talent.wild_power.desc=_+1:_ Пры выкарыстанні дзікай магіі палачкі будуць палепшаны на _2 або 3, да +4_.\n\n_+2:_ Пры выкарыстанні дзікай магіі палачкі будуць палепшаны на _3 да +5_.\n\n_+3:_ Пры выкарыстанні дзікай магіі палачкі будуць палепшаны на _3 або 4 да +6_.\n\n_+4:_ Пры выкарыстанні дзікай магіі палачкі будуць палепшаны на _4 да +7_.
actors.hero.talent.fire_everything.title=агонь з усяго
actors.hero.talent.fire_everything.desc=_+1:_ Дзікая магія зараз спрацоўвае _5 разоў_ замест 4, і ў кожнай палачкі ёсць _шанец 25%_ выкарыстаць яе 3 разы.\n\n_+2:_ Дзікая магія зараз спрацоўвае _6 разоў_ замест 4, і ў кожнай палачкі ёсць _шанец 50%_ выкарыстаць яе 3 разы.\n\n_+3:_ Дзікая магія зараз спрацоўвае _7 разоў_ замест 4, і ў кожнай палачкі ёсць _шанец 75%_ выкарыстаць яе 3 разы.\n\n_+4:_ Дзікая магія зараз спрацоўвае _8 разоў_ замест 4, і ў кожнай палачкі ёсць _шанец 100%_ выкарыстаць яе 3 разы.
actors.hero.talent.conserved_magic.title=захваная магія
actors.hero.talent.conserved_magic.desc=_+1:_ Кожны стрэл дзікай магіі зараз выкарыстоўвае _0.33 зарадаў_ замест 0.5 і мае _25% шанец_ не выдаткаваць ход.\n\n_+2:_ Кожны стрэл дзікай магіі зараз выкарыстоўвае _0.225 зарадаў_ замест 0.5 і мае _50% шанец_ не выдаткаваць ход.\n\n_+3:_ Кожны стрэл дзікай магіі зараз выкарыстоўвае _0.15 зарадаў_ замест 0.5 і мае _75% шанец_ не выдаткаваць ход.\n\n_+4:_ Кожны стрэл дзікай магіі зараз выкарыстоўвае _0.1 зарадаў_ замест 0.5 і мае _100% шанец_ не выдаткаваць ход.

actors.hero.talent.telefrag.title=Тэлепорт
actors.hero.talent.telefrag.desc=_+1:_ Калі Маг тэлепартыруецца ў іншага персанажа, ён наносіць _10-15 страт_, але таксама атрымлівае _5 страт_. \n\n_+2:_Калі Маг тэлепартыруецца ў іншага персанажа, ён наносіць _20-30 страт_, але таксама атрымлівае _10 страт_. \n\n_ +3:_ Калі Маг тэлепартыруецца ў іншага персанажа, ён наносіць _30-45 страт_, але таксама атрымлівае _15 страт_.  \n\n_ +4:_ Калі Маг тэлепартыруецца ў іншага персанажа, ён наносіць _40-60 страт_, але таксама атрымлівае _20 страт_. \n\nГерой не можа быць забіты гэтым талентам, страты могуць быць паменшаны эфектамі супраціву магіі.
actors.hero.talent.remote_beacon.title=Дыстанцыйны Маяк
actors.hero.talent.remote_beacon.desc=_+1:_ Маг можа размясціць маяк у любым месцы ў межах _4 клеток_.\n\n_+2:_ Маг можа размясціць маяк у любым месцы ў межах _8 клеток_.\n\n_+3:_ Маг можа размясціць маяк у любым месцы ў межах _12 клеток_.\n\n_+4:_ Маг можа размясціць маяк у любым месцы ў межах _16 клеток_.\n\nМаг не можа размяшчаць маякі ў недаступных месцах.
actors.hero.talent.longrange_warp.title=Перанос далёкага дзеяння
actors.hero.talent.longrange_warp.desc=_+1:_ Маг можа перамяшчацца паміж паверхамі за плату ў памеры 150% зарада.\n\n_+2:_ Маг можа перамяшчацца паміж паверхамі за плату ў памеры 117% зарада.\n\n_+3:_ Маг можа перамяшчацца паміж паверхамі за плату ў памеры 83% зарада.\n\n_+4:_ Маг можа перамяшчацца паміж паверхамі за плату ў памеры 50% зарада.\n\nМаг не можа выкарыстоўваць Перанос далёкага дзеяння, каб пакінуць зачынены паверх.

#rogue
actors.hero.talent.cached_rations.title=Патаемны паёк
actors.hero.talent.cached_rations.desc=_+1:_ Разбойнік можа знайсці _4 малых рацыёна_ ў скрынях, пакуль ён даследуе раннія этапы падзямелля.\n\n_+2:_ Разбойнік можа знайсці _6 малых рацыёна_ ў скрынях, пакуль ён даследуе раннія этапы падзямелля.\n\nМалыя рацыёны з'ядаюцца імгненная, трохі здавальняюць голад, аднаўляюць 5 АЗ і 1 зарад Плашча Ценяў.
actors.hero.talent.thiefs_intuition.title=здагадлівасць вора
actors.hero.talent.thiefs_intuition.desc=_+1:_ Разбойнік апазнае пярсцёнкі ў _2 разы хутчэй_, і апазнае тып пярсцёнка, _калі апранае яго_.\n\n_+2:_ Разбойнік апазнае пярсцёнкі, _калі ён іх экіпіруе_, і апазнае тып пярсцёнка, _калі падбірае яго_.
actors.hero.talent.sucker_punch.title=удар цішком
actors.hero.talent.sucker_punch.desc=_+1:_ Разбойнік наносіць _1-2 бонусныя страты_ пры першай нечаканай атацы ворага.\n\n_+2:_ Разбойнік наносіць _2 бонусныя страты_ пры першай нечаканай атацы ворага.
actors.hero.talent.protective_shadows.title=ахоўныя цені
actors.hero.talent.protective_shadows.desc=_+1:_ Разбойнік атрымлівае адзін зарад шчыта _кожны другі ход_, пакуль ён нябачны, _аж да 3_.\n\n_+2:_ Разбойнік атрымлівае адзін зарад шчыта _кожны другі ход_, пакуль ён нябачны, _аж да 5_.

actors.hero.talent.mystical_meal.title=містычны абед
actors.hero.talent.mystical_meal.desc=_+1:_ Перакус займае ў Разбойніка 1 ход (малы рацыён будзе з'едзены імгненна), і дае яму _перезарадку артэфактаў на 3 хады_.\n\n_+2:_ Перакус займае ў Разбойніка 1 ход (малы рацыён будзе з'едзены імгненна) і дае яму _перезарадку артэфактаў на 5 хады_.\n\nГэты талент не дазваляе Рогу багацця перазараджваць самаго сябе.
actors.hero.talent.inscribed_stealth.title=напісаная нябачнасць
actors.hero.talent.inscribed_stealth.desc=_+1:_ Пасля выкарыстання світкоў ці рунных камянёў, Разбойнік атрымлівае _2 хады_ нябачнасці.\n\n_+2:_ Пасля выкарыстання світкоў ці рунных камянёў, Разбойнік атрымлівае _3 хады_ нябачнасці.
actors.hero.talent.wide_search.title=шырокі пошук
actors.hero.talent.wide_search.desc=_+1:_ Радыус пошуку Разбойніка зменены з квадрата 5x5 на _круг 7x7_. \n\n_+2:_ Радыус пошуку Разбойніка зменены з квадрата 5x5 на _квадрат 7x7_.
actors.hero.talent.wide_search.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, замест гэтага ён павялічвае яго радыус пошуку з квадрата 3x3 да круга 5x5 пры +1 або квадрата 5x5 пры +2.
actors.hero.talent.silent_steps.title=Ціхія крокі
actors.hero.talent.silent_steps.desc=_+1: _ Разбойнік не абудзіць спячых ворагаў, пакуль ён на адлегласці _3 або больш клетак ад ніх_.\n\n_+2:_ Разбойнік не абудзіць спячых ворагаў, пакуль _не падыдзе да іх ўшчыльную_.
actors.hero.talent.rogues_foresight.title=Разбойніцкая чуйка
actors.hero.talent.rogues_foresight.desc=_+1:_ Кожныя 60 хадоў Разбойнік адчувае _колькасць ворагаў_ на бягучым паверсе.\n\n_+2:_ Кожныя 30 хадоў Разбойнік адчувае _колькасць ворагаў_ на бягучым паверсе.

actors.hero.talent.light_cloak.title=лёгкі плашч
actors.hero.talent.light_cloak.desc=_+1:_ Плашч Разбойніка зараджаецца _на 25% хутчэй._\n\n_+2:_ Плашч Разбойніка зараджаецца _на 50% хутчэй._\n\n_+3:_ Плашч Разбойніка зараджаецца _на 75% хутчэй._
actors.hero.talent.light_cloak.meta_desc=_Калі гэты талент атрыманы іншым героем_, замест гэтага ён павялічыць хуткасць зарадкі ўсіх артэфактаў на 7/13/20% пры +1/+2/+3.
actors.hero.talent.enhanced_rings.title=палепшаныя напёрсткі
actors.hero.talent.enhanced_rings.desc=_+1:_ Калі Разбойнік выкарыстоўвае артэфакты, яго пярсцёнкі атрымліваюць паляпшэнне + 1 на _3 хады_. \n\n_+2:_ Калі Разбойнік выкарыстоўвае артэфакты, яго пярсцёнкі атрымліваюць паляпшэнне + 1 на _6 хадоў_. \n\n_+3:_ Калі Разбойнік выкарыстоўвае артэфакты, яго пярсцёнкі атрымліваюць паляпшэнне + 1 на _9 хадоў_.

actors.hero.talent.enhanced_lethality.title=узмоцненая лятальнасць
actors.hero.talent.enhanced_lethality.desc=_+1_ Забойца можа забіць ворага з паказчыкам здароўя ніжэй за_4/13/27/67% _ за ўзровень гатоўнасці, замест 3/10/20/50%.\n\n_+2:_ забойца можа забіць ворага з паказчыкам здароўя ніжэй за _5/17/33/83% _ за ўзровень гатоўнасці, замест 3/10/20/50%.\n\n_+3:_ Забойца можа забіць ворага з паказчыкам здароўя ніжэй за _6/20/40/100% _ за ўзровень гатоўнасці, замест 3/10/20/50%.
actors.hero.talent.assassins_reach.title=забойны размах
actors.hero.talent.assassins_reach.desc=_+1:_ Дыяпазон ўдару Забойцы за ўзровень падрыхтоўкі павялічаны да _1/3/4/6 клетак, _ замест 1/2/3/4.\n\n_+2:_ Дыяпазон ўдару Забойцы за ўзровень падрыхтоўкі павялічаны да _2/4/6/8 клеток_, замест 1/2/3/4.\n\n_+3:_ Дыяпазон ўдару Забойцы за ўзровень падрыхтоўкі павялічаны да _2/5/7/10 клеток_, замест 1/2/3/4.\n\nСкачок праходзіць скрозь ворагаў і небяспекі, але не праз сцены.
actors.hero.talent.bounty_hunter.title=паляўнічы за галавамі
actors.hero.talent.bounty_hunter.desc=_+1:_ Калі Забойца забівае ворага падрыхтаваным ударам, шанец выпадзення з яго прадмета павялічваецца на _2/4/8/16%_, у залежнасці ад узроўню падрыхтоўкі.\n\n_+2:_ Калі Забойца забівае ворага падрыхтаваным ударам, шанец выпадзення з яго прадмета павялічваецца на _4/8/16/32%_, у залежнасці ад узроўню падрыхтоўкі.\n\n_+3:_ Калі Забойца забівае ворага падрыхтаваным ударам, шанец выпадзення з яго прадмета павялічваецца на _6/12/24/48%_, у залежнасці ад узроўню падрыхтоўкі.

actors.hero.talent.evasive_armor.title=лёгкі даспех
actors.hero.talent.evasive_armor.desc=_+1:_ Падчас бегу Валацуга атрымлівае _+ 1 ухіленне_ за кожнае лішняе ачко сілы на вашым даспеху.\n\n_+2:_ Падчас бегу Валацуга атрымлівае _+2 ухілення_ за кожнае лішняе ачко сілы на вашым даспеху.\n\n_+3:_ Падчас бегу Валацуга атрымлівае _+3 ухілення_ за кожнае лішняе ачко сілы на вашым даспеху.
actors.hero.talent.projectile_momentum.title=імпульс снарада
actors.hero.talent.projectile_momentum.desc=_+1:_ Пакуль Вольны Бягун бяжыць, ён атрымлівае _+50% дакладнасці і +15% шкоды_ з кідальнай зброяй.\n\n_+2:_ Пакуль Вольны Бягун бяжыць, ён атрымлівае _+100% дакладнасці і +30% шкоды_ з кідальнай зброяй.\n\n_+3:_ Пакуль Вольны Бягун бяжыць, ён атрымлівае _+150% дакладнасці і +45% шкоды_ з кідальнай зброяй.
actors.hero.talent.speedy_stealth.title=паскараючая нябачнасць
actors.hero.talent.speedy_stealth.desc=_+1:_ Валацуга атрымлівае 2 ачка імпульсу за ход, пакуль ён нябачны.\n\n_+2:_ У дадатак да пераваг +1, час у бягу больш не лічыцца, пакуль Валацуга нябачны.\n\n_+3: _ У дадатак да пераваг +1 і +2, Валацуга рухаецца з падвоенай хуткасцю, пакуль ён нябачны, незалежна ад таго, бяжыць ён ці не.

actors.hero.talent.hasty_retreat.title=хуткае адступленне
actors.hero.talent.hasty_retreat.desc=_+1:_ Пасля скачка Разбойнік атрымлівае _1 ход_ паскарэння і нябачнасці.\n\n_+2:_ Пасля скачка Разбойнік атрымлівае _2 хады_ паскарэння і нябачнасці.\n\n_+3:_ Пасля скачка Разбойнік атрымлівае _3 хады_ паскарэння і нябачнасці.\n\n_+4_ Пасля скачка Разбойнік атрымлівае _4 хады_ паскарэння і нябачнасці.
actors.hero.talent.body_replacement.title=падмена цела
actors.hero.talent.body_replacement.desc=_+1:_ Пасля скачка Разбойнік пакідае за сабой драўляную прынаду, якая мае _20 здароўя і 1-3 брані_.\n\n_+2:_ Пасля скачка Разбойнік пакідае за сабой драўляную прынаду, якая мае _40 здароўя і 2-6 брані_.\n\n_+3:_ Пасля скачка Разбойнік пакідае за сабой драўляную прынаду, якая мае _60 здароўя і 3-9 брані_.\n\n_+4_ Пасля скачка Разбойнік пакідае за сабой драўляную прынаду, якая мае _80 здароўя і 4-12 брані_.\n\nАдначасова можа быць актыўная толькі адна прынада.
actors.hero.talent.shadow_step.title=крок у цені
actors.hero.talent.shadow_step.desc=_+1:_ Калі разбойнік выкарыстоўвае дымавую бомбу, быўшы нябачным, гэта адбываецца імгненна і расходуе на _16% менш_ зарада, але пры гэтым ён не асляпляе ворагаў і не актывуе іншыя таленты.\n\n_+2:_ Калі разбойнік выкарыстоўвае дымавую бомбу, быўшы нябачным, гэта адбываецца імгненна і расходуе на _30% менш_ зарада, але пры гэтым ён не асляпляе ворагаў і не актывуе іншыя таленты.\n\n_+3:_ Калі разбойнік выкарыстоўвае дымавую бомбу, быўшы нябачным, гэта адбываецца імгненна і расходуе на _41% менш_ зарада, але пры гэтым ён не асляпляе ворагаў і не актывуе іншыя таленты.\n\n_+4:_ Калі разбойнік выкарыстоўвае дымавую бомбу, быўшы нябачным, гэта адбываецца імгненна і расходуе на _50% менш_ зарада, але пры гэтым ён не асляпляе ворагаў і не актывуе іншыя таленты.

actors.hero.talent.fear_the_reaper.title=страх смерці
actors.hero.talent.fear_the_reaper.desc=_+1:_ Калі здароўе ворага, адзначанага Пазнакай смерці, дасягае 0 АЗ, ён атрымлівае _кульгавасць_.\n\n_ +2: _ Калі здароўе ворага, адзначанага Пазнакай смерці, дасягае 0 АЗ, ён атрымлівае _спалох і кульгавасць_.\n\n_+3:_ Калі здароўе ворага, адзначанага Пазнакай, смерці дасягае 0 АЗ, ён атрымлівае _спалох і кульгавасць_, і ворагі ў межах 3 клетак таксама атрымліваюць _кульгавасць_.\n\n_+4:_ Калі здароўе ворага, адзначанага Пазнакай смерці дасягае 0 АЗ, ён атрымлівае _спалох і кульгавасць_, ворагі ў межах 3 клетак таксама атрымліваюць _спалох і кульгавасць_.
actors.hero.talent.deathly_durability.title=смяротная ўстойлівасць
actors.hero.talent.deathly_durability.desc=_+1:_ Берсерк атрымлівае _+10% да максімальнага здароўя._\n\n_+2:_ Берсерк атрымлівае _+15% да максімальнага здароўя._\n\n_+3:_ Берсерк атрымлівае _+20% да максімальнага здароўя._
actors.hero.talent.double_mark.title=двайная пазнака
actors.hero.talent.double_mark.desc=_+1:_ Маркіроўка  адначасова двух цэляў прыводзіць да зніжэння кошту зарада на _30%_.\n\n_+2:_ Маркіроўка адначасова двух цэляў прыводзіць да зніжэння кошту зарада на _50%_.\n\n_+3:_ Маркіроўка адначасова двух цэляў прыводзіць да зніжэння кошту зарада на _65%_.\n\n_+4:_ Маркіроўка адначасова двух цэляў прыводзіць да зніжэння кошту зарада на _75%_.

actors.hero.talent.shadow_blade.title=клінок ценяў
actors.hero.talent.shadow_blade.desc=_+1:_ Ценявы клон атрымлівае _8% _ страт героя за ход і мае _25% шанец_ выкарыстаць зачараванне, накладзенае на зброю героя.\n\n_+2:_ Ценявы клон атрымлівае _16% _ страт героя за ход і мае _50% шанец_ выкарыстаць зачараванне, накладзенае на зброю героя.\n\n_+3:_ Ценявы клон атрымлівае _24% _ страт героя за ход і мае _75% шанец_ выкарыстаць зачараванне, накладзенае на зброю героя.\n\n_+4:_ Ценявы клон атрымлівае _32% _ страт героя за ход і мае _100% шанец_ выкарыстаць зачараванне, накладзенае на зброю героя.
actors.hero.talent.cloned_armor.title=скапіяваны даспех
actors.hero.talent.cloned_armor.desc=_+1:_ Ценявы клон атрымлівае _12% _ ад значэння броні героя і мае _25% шанец_ выкарыстоўваць руну на даспеху героя.\n\n_+2:_ Ценявы клон атрымлівае _24% _ ад значэння броні героя і мае _50% шанец_ выкарыстоўваць руну на даспеху героя.\n\n_+3:_ Ценявы клон атрымлівае _36% _ ад значэння броні героя і мае _75% шанец_ выкарыстоўваць руну на даспеху героя.\n\n_+4:_ Ценявы клон атрымлівае _48% _ ад значэння броні героя і мае _100% шанец_ выкарыстоўваць руну на даспеху героя.
actors.hero.talent.perfect_copy.title=ідэальная копія
actors.hero.talent.perfect_copy.desc=_+1:_ Ценявы клон атрымлівае _10% _ ад максімальнага АЗ героя і можа пастаянна мяняцца з героем месцамі на адлегласці да _1 клеткі_.\n\n_+2:_ Ценявы клон атрымлівае _20% _ ад максімальнага АЗ героя і можа пастаянна мяняцца з героем месцамі на адлегласці да _2 клетак_.\n\n_+3:_ Ценявы клон атрымлівае _30% _ ад максімальнага АЗ героя і можа пастаянна мяняцца з героем месцамі на адлегласці да _3 клетак_.\n\n_+4:_ Ценявы клон атрымлівае _40% _ ад максімальнага АЗ героя і можа пастаянна мяняцца з героем месцамі на адлегласці да _4 клетак_.

#huntress
actors.hero.talent.natures_bounty.title=шчодрасць прыроды
actors.hero.talent.natures_bounty.desc=_+1:_ Паляўнічая можа здабыць _1 ягаду_ кожныя 30 хадоў.\n\n_+2:_ Паляўнічая можа здабыць _2 ягады_ кожныя 30 хадоў.
actors.hero.talent.survivalists_intuition.title=інтуіцыя выжывальшчыка
actors.hero.talent.survivalists_intuition.desc=_+1:_ Паляўнічая аўтаматычна _ідэнтыфікуе_ зеллі і насенне, калі яна _ступае на траву._\n\n_+2:_ Паляўнічая аўтаматычна _ідэнтыфікуе_ зеллі і насенне, калі яна _ступае на траву ці бачыць расліну._
actors.hero.talent.followup_strike.title=удар міласэрнасці
actors.hero.talent.followup_strike.desc=_+1:_ Калі Паляўнічая трапляе ў ворага са свайго лука або кідальнай зброяй, яе наступная рукапашная атака супраць гэтага ворага нанясе _2 бонусных страты_. \n\n_+2:_ Калі Паляўнічая трапляе ў ворага са свайго лука або кідальнай зброяй, яе наступная рукапашная атака супраць гэтага ворага нанясе _3 бонусных страты_.
actors.hero.talent.natures_aid.title=дапамога прыроды
actors.hero.talent.natures_aid.desc=_+1:_ Паляўнічая атрымлівае 0-2 абароны Дубовай скуры на _3 хады_, калі расліна вытаптана ў яе полі зроку.\n\n_+2:_ Паляўнічая атрымлівае 0-2 абароны Дубовай скуры на _5 хадоў_, калі расліна вытаптана ў яе полі зроку.

actors.hero.talent.invigorating_meal.title=танізавальны абед
actors.hero.talent.invigorating_meal.desc=_+1:_ Перакус займае ў Паляўнічай 1 ход (ягады з'ядаюцца імгненна) і _паскарае на 1 ход_.\n\n_+2:_ Перакус займае ў Паляўнічай 1 ход (ягады з'ядаюцца імгненна) і _паскарае на 2 ходы_.
actors.hero.talent.liquid_nature.title=вадкая прырода
actors.hero.talent.liquid_nature.desc=_+1:_ Калі Паляўнічая выпівае або кідае зелле, у ваколіцах прарастае _да 4 травяных клетак_, а суседнія ворагі ўкараняюцца на _1 ход_.\n\n_+2:_ Калі Паляўнічая выпівае або кідае зелле, у ваколіцах прарастае _да 6 травяных клетак_, а суседнія ворагі ўкараняюцца на _2 ходы_.\n\nКолькасць з'явіўшыхся клетак з травой і працягласць укаранення падвойваецца, калі Паляўнічая выпівае ці кідае зелля сілы, досведу, майстэрства, альбо натхнення.\n\nДля алхімічных прадметаў, у якіх некалькі выкарыстанняў (як водны напой), гэты талент можа спрацаваць з адпаведным шанцам, які залежыць от колькаці зробленных такіх прадметаў.
actors.hero.talent.rejuvenating_steps.title=крокі аднаўлення
actors.hero.talent.rejuvenating_steps.desc=_+1:_ Калі Паляўнічая надыходзіць на траву або на вуглі, на клетцы вырастае высокая трава, якую Паляўнічая адразу прымінае. Талент _аднаўляецца 10 хадоў_. \n\n_ + 2: _ Калі паляўнічая надыходзіць на траву або цьмеюць вуглі, яны вырастаюць у высокую траву, якую паляўнічая адразу прымінаюць. Талент _аднаўляецца 5 хадоў_. \n\nГэты талент будзе вырабляць прымятую траву, калі эфекты пасіўнай рэгенерацыі адключаныя або герой доўгі час не набіраў вопыту.
actors.hero.talent.heightened_senses.title=ўзмоцненае ўспрыманне
actors.hero.talent.heightened_senses.desc=_+1:_ Калі Разбойнік знаходзіцца побач з _пасткай ці схаваным ворагам_, ён адчувае іх прысутнасць у радыусе _2 клетак._\n\n_+2:_ Калі Разбойнік знаходзіцца побач з _пасткай ці схаваным ворагам_, ён адчувае іх прысутнасць у радыусе _3 клетак._
actors.hero.talent.durable_projectiles.title=трывалыя снарады
actors.hero.talent.durable_projectiles.desc=_+1:_ Кідальная зброя, якая выкарыстоўваецца Паляўнічай, мае _+50% да трываласці_. \n\n_+2:_ Кідальная зброя, якая выкарыстоўваеццаПаляўнічай, мае _ +75% да трываласці_.

actors.hero.talent.point_blank.title=стральба ва ўпор
actors.hero.talent.point_blank.desc=_+1:_ Калі Паляўнічая выкарыстоўвае лук ці кідальную зброю ў бліжнім баі, яна мае _-25% дакладнасці,_ замест -50%.\n\n_+2:_ Калі Паляўнічая выкарыстоўвае лук ці кідальную зброю ў бліжнім баі, яна мае _нармальную дакладнасць,_ замест -50%.\n\n_+3:_ Калі Паляўнічая выкарыстоўвае лук ці кідальную зброю ў бліжнім баі, яна мае _+25% дакладнасці,_ замест -50%.\n\nЗаўважце, што кідальная зброя ці лук духу заўсёды маюць +50% дакладнасці пры выкарыстанні на адлегласці.
actors.hero.talent.seer_shot.title=усёвідушчы стрэл
actors.hero.talent.seer_shot.desc=_+1:_ Калі Паляўнічая выпускае стралу ў зямлю, яна падсвечвае мясцовасць у галіне 3х3 вакол яе на _5 хадоў_. Талент перазараджваецца 20 хадоў.\n\n_+1:_ Калі Паляўнічая выпускае стралу ў зямлю, яна падсвечвае мясцовасць у галіне 3х3 вакол яе на _10 хадоў_. Талент перазараджваецца 20 хадоў.\n\n_+3:_ Калі Паляўнічая выпускае стралу ў зямлю, яна падсвечвае мясцовасць у галіне 3х3 вакол яе на _15 хадоў_. Талент перазараджваецца 20 хадоў.
actors.hero.talent.seer_shot.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, ён спрацуе ад любой кідальнай зброі.

actors.hero.talent.farsight.title=арлінае вока
actors.hero.talent.farsight.desc=_+1:_ Далёкасць агляду Снайпэра павялічваецца _на 25%_.\n\n_+2:_ Далёкасць агляду Снайпэра павялічваецца _на 50%_.\n\n_+3:_ Далёкасць агляду Снайпэра павялічваецца _на 75%_.
actors.hero.talent.shared_enchantment.title=агульнае зачараванне
actors.hero.talent.shared_enchantment.desc=_+1:_ Калі Паляўнічая выкарыстоўвае лук з чарамі, кідальная зброя атрымлівае тыя ж чары на _1 ход._\n\n_+2:_ Калі Паляўнічая выкарыстоўвае лук з чарамі, кідальная зброя атрымлівае тыя ж чары на _2 хады._\n\n_+3:_ Калі Паляўнічая выкарыстоўвае лук з чарамі, кідальная зброя атрымлівае тыя ж чары на _3 хады._
actors.hero.talent.shared_upgrades.title=агульныя паляпшэнні
actors.hero.talent.shared_upgrades.desc=_+1:_ Кожнае _3-е_ паляпшэнне, ужытае да кідальнай зброі, таксама паляпшае лук духу Паляўнічай.\n\n_+2:_ Кожнае _2-е_ паляпшэнне, ужытае да кідальнай зброі, таксама паляпшае лук духу Паляўнічай.\n\n_+3:_ _Кожнае_ паляпшэнне, ужытае да кідальнай зброі, таксама паляпшае лук духу Паляўнічай.

actors.hero.talent.durable_tips.title=трывалыя наканечнікі
actors.hero.talent.durable_tips.desc=_+1:_ Дроцікі становяцца ў _2 разы_ трывалей.\n\n_+2:_ Дроцікі становяцца ў _3 разы_ трывалей. \n\n_+3:_ Дроцікі становяцца ў _4 разы_ трывалей.
actors.hero.talent.barkskin.title=дубовая скура
actors.hero.talent.barkskin.desc=_+1:_ Калі Захавальніца наступае на траву, яна атрымлівае дубовую скуру, якая роўна _0-50% ад яе узроўню_ і знікае кожны ход.\n\n_+2:_ Калі Захавальніца наступае на траву, яна атрымлівае дубовую скуру, якая роўна _0-100% ад яе узроўню_ і знікае кожны ход.\n\n_+3:_ Калі Захавальніца наступае на траву, яна атрымлівае дубовую скуру, якая роўна _0-150% ад яе узроўню_ і знікае кожны ход.
actors.hero.talent.shielding_dew.title=ахоўная раса
actors.hero.talent.shielding_dew.desc=_+1:_ Калі здароўе Захавальніцы поўнае, кроплі расы могуць даць ёй абарону на _20% ад яе максімальнага здароўя_.\n\n_+2:_ Калі здароўе Захавальніцы поўнае, кроплі расы могуць даць ёй абарону на _20% ад яе максімальнага здароўя_.\n\n_+3:_ Калі здароўе Захавальніцы поўнае, кроплі расы могуць даць ёй абарону на _20% ад яе максімальнага здароўя_.

actors.hero.talent.fan_of_blades.title=веер клінкоў
actors.hero.talent.fan_of_blades.desc=_+1:_ Спектральныя клінкі могуць ўразіць _да 1 дадатковай цэлі_ на 50% страт. Цэль павінна быць бачная і знаходзіцца ў мяжы конусу з вуглом _30 градусаў_.\n\n_+2:_ Спектральныя клінкі могуць ўразіць _да 2 дадатковых цэляў_ на 50% страт. Цэль павінна быць бачная і знаходзіцца ў мяжы конусу з вуглом _60 градусаў_.\n\n_+3:_ Спектральныя клінкі могуць ўразіць _да 3 дадатковых цэляўі_ на 50% страт. Цэль павінна быць бачная і знаходзіцца ў мяжы конусу з вуглом _90 градусаў_.\n\n_+4:_ Спектральныя клінкі могуць ўразіць _да 4 дадатковых цэляў_ на 50% страт. Цэль павінна быць бачная і знаходзіцца ў мяжы конусу з вуглом _120 градусаў_.
actors.hero.talent.projecting_blades.title=клінкі праэкцыі
actors.hero.talent.projecting_blades.desc=_+1:_ Спектральныя клінкі маюць _+25% дакладнасці_ і праходзяць скрозь _2 суцэльныя клеткі_.\n\n_+2:_ Спектральныя клінкі маюць _+50% дакладнасці_ і праходзяць скрозь _2 суцэльныя клеткі_.\n\n_+3:_ Спектральныя клінкі маюць _+75% дакладнасці_ і праходзяць скрозь _2 суцэльныя клеткі_.\n\n_+4:_ Спектральныя клінкі маюць _+100% дакладнасці_ і праходзяць скрозь _2 суцэльныя клеткі_.
actors.hero.talent.spirit_blades.title=клінкі духаў
actors.hero.talent.spirit_blades.desc=_+1:_ Спектральныя клінкі маюць _шанец 30% _ таксама выкарыстоўваць зачараванні на луку духаў.\n\n_+2:_ Спектральныя клінкі маюць _шанец 60% _ таксама выкарыстоўваць зачараванні на луку духаў.\n\n_+3:_ Спектральныя клінкі маюць _шанец 90% _ таксама выкарыстоўваць зачараванні на луку духаў.\n\n_+4:_ Спектральныя клінкі маюць _шанец 100% _ таксама выкарыстоўваць зачараванні на луку духаў., а таксама ўзмацняюць кожнае зачараванне _на 10%_.

actors.hero.talent.growing_power.title=павялічаная моц
actors.hero.talent.growing_power.desc=_+1:_ Атака і хуткасць перамяшчэння ад Сілы прыроды павялічваецца да _38% і 125%_, з 33% і 100%.\n\n_+2:_ Атака і хуткасць перамяшчэння ад Сілы прыроды павялічваецца да _42% і 150%_, з 33% і 100%.\n\n_+3:_ Атака і хуткасць перамяшчэння ад Сілы прыроды павялічваецца да _46% і 150%_, з 33% і 100%.\n\n_+4:_ Атака і хуткасць перамяшчэння ад Сілы прыроды павялічваецца да _50% і 200%_, з 33% і 100%.
actors.hero.talent.natures_wrath.title=гнеў прыроды
actors.hero.talent.natures_wrath.desc=_+1:_ Калі Сіла прыроды актывна, стрэлы з лука духаў маюць _шанец 8%_ выклікаць шкодны эфект расліны.\n\n_+2:_ Калі Сіла прыроды актывна, стрэлы з лука духаў маюць _шанец 17%_ выклікаць шкодны эфект расліны.\n\n_+3:_ Калі Сіла прыроды актывна, стрэлы з лука духаў маюць _шанец 25%_ выклікаць шкодны эфект расліны.\n\n_+4:_ Калі Сіла прыроды актывна, стрэлы з лука духаў маюць _шанец 33%_ выклікаць шкодны эфект расліны.\n\nРасліны, эфект якіх можа выкліканы: сляпняк, вогненая лілія, зюзін бэз, сумнамох, грымотны дзюмухавец.
actors.hero.talent.wild_momentum.title=дзікі імпульс
actors.hero.talent.wild_momentum.desc=_+1:_ Забойства ворага лукам духаў падаўжае тэрмін дзеяння Сілы прыроды на _1 ход_. Працягласць можа быць павялічана максімум на _2 хады_.\n\n_+2:_ Забойства ворага лукам духаў падаўжае тэрмін дзеяння Сілы прыроды на _2 хады_. Працягласць можа быць павялічана максімум на _4 хадоў_.\n\n_+3:_ Забойства ворага лукам духаў падаўжае тэрмін дзеяння Сілы прыроды на _3 хады_. Працягласць можа быць павялічана максімум на _6 хадоў_.\n\n_+4:_ Забойства ворага лукам духаў падаўжае тэрмін дзеяння Сілы прыроды на _4 хады_. Працягласць можа быць павялічана максімум на _8 хадоў_.

actors.hero.talent.eagle_eye.title=вока арла
actors.hero.talent.eagle_eye.desc=_+1:_ Далёкасць агляду Прывіднага ястраба павялічана з 6 да _7 клетак_.\n\n_+2_ Далёкасць агляду Прывіднага ястраба павялічана з 6 да _7 клетак_.\n\n_+3:_ Далёкасць агляду Прывіднага ястраба павялічана з 6 да _7 клетак_, і ён атрымлівае ментальны зрок у радыусе _2 клетак_.\n\n_+4:_ Далёкасць агляду Прывіднага ястраба павялічана з 6 да _7 клетак_., і ён атрымлівае ментальны зрок у радыусе _3 клетак_.
actors.hero.talent.go_for_the_eyes.title=цэлься ў вочы
actors.hero.talent.go_for_the_eyes.desc=_+1:_ Атакі Прывіднага ястраба асляпляюць ворагаў на _2 хады_.\n\n_+2:_ Атакі Прывіднага ястраба асляпляюць ворагаў на _5 хадоў_.\n\n_+3:_ Атакі Прывіднага ястраба асляпляюць ворагаў на _5 хадоў_ і нявечаць іх на _2 хады_.\n\n_+4:_ Атакі Прывіднага ястраба асляпляюць ворагаў на _5 хадоў_ і нявечаць іх на _5 хадоў_.
actors.hero.talent.swift_spirit.title=імклівы дух
actors.hero.talent.swift_spirit.desc=_+1:_ Хуткасць перамяшчэння Прывіднага ястраба павялічана з 2 да _2.5 клетак_, і ён гарантавана ўхіліцца ад першых _2 атак_, якія накіраваны супраць яго. \n\n_+2:_ Хуткасць перамяшчэння Прывіднага ястраба павялічана з 2 да _3 клетак_, і ён гарантавана ўхіліцца ад першых _4 атак_, якія накіраваны супраць яго. \n\n_+3:_ Хуткасць перамяшчэння Прывіднага ястраба павялічана з 2 да _3.5 клетак_, і ён гарантавана ўхіліцца ад першых _6 атак_, якія накіраваны супраць яго. \n\n_+4:_ Хуткасць перамяшчэння Прывіднага ястраба павялічана з 2 да _4 клетак_, і ён гарантавана ўхіліцца ад першых _8 атак_, якія накіраваны супраць яго.

#duelist
actors.hero.talent.strengthening_meal.title=шчыльны сняданак
actors.hero.talent.strengthening_meal.desc=_+1:_ Калі герой ужывае ежу, ён атрымлівае _+1 шкоды_ на 3 хады.\n\n_+2:_ Калі герой ужывае ежу, ён атрымлівае _+2 шкоды_ на 3 хады.\n\n_+3:_ Калі герой ужывае ежу, ён атрымлівае _+3 шкоды_ на 3 хады.
actors.hero.talent.adventurers_intuition.title=згадлівасць шукальніка прыгод
actors.hero.talent.adventurers_intuition.desc=_+1:_ Фехтавальшчыца апазнае зброю ў _2.5 разы_ хутчэй і даспехі ў _1.75 разы_ хутчэй.\n\n_+2:_ Фехтавальшчыца апазнае зброю, калі _бярэ яе ў рукі_ і даспехі ў _1.75 разы_ хутчэй.
actors.hero.talent.patient_strike.title=трыванне дуэлянта
actors.hero.talent.patient_strike.desc=_+1:_ Калі Фехтавальшчыца чакае перад здзяйсненнем блізкай атакі, яна нанясе _1-2 бонусных страт_.\n\n_+2:_ Калі Фехтавальшчыца чакае перад здзяйсненнем блізкай атакі, яна нанясе _2 бонусныя страты_.
actors.hero.talent.aggressive_barrier.title=адчайны бар'ер
actors.hero.talent.aggressive_barrier.desc=_+1:_ Фехтавальшчыца атрымлівае _3 адзінкі дадатковай брані_, калі яна выкарыстоўвае здольнасці зброі і яе здароўе менш за _50%_.\n\n_+2:_ Фехтавальшчыца атрымлівае _5 адзінак дадатковай брані_, калі яна выкарыстоўвае здольнасці зброі і яе здароўе менш за _50%_.
actors.hero.talent.aggressive_barrier.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, то ён будзе атрымліваць шчыт пры здзяйсненні блізкай атакі пры нізкім узроўні здароўя з перазарадкай у 50 хадоў.

actors.hero.talent.focused_meal.title=медытацыйны абед
actors.hero.talent.focused_meal.desc=_+1:_ Перакус займае ў Фехтавальшчыцы 1 ход і дае ёй _0.67 зарада_ асноўнай зброі.\n\n_+2:_ Перакус займае ў Фехтавальшчыцы 1 ход і дае ёй _1 зарад_ асноўнай зброі.
actors.hero.talent.focused_meal.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага павялічыць хуткасць перазарадкі ўсіх жазлоў на 7/13/20% пры +1/+2/+3.
actors.hero.talent.liquid_agility.title=вадкі спрыт
actors.hero.talent.liquid_agility.desc=_+1:_ Калі герой п'е зелле, ён атрымлівае _+3 ўвароту_ на 3 хады.\n\n_+2:_ Калі герой п'е зелле, ён атрымлівае _+5 ўвароту_ на 3 хады.
actors.hero.talent.weapon_recharging.title=перазарадка зброі
actors.hero.talent.weapon_recharging.desc=_+1:_ Фехтавальшчыца атрымлівае адзін зарад галоўнай зброі кожныя _15 хадоў_, пакуль знаходзіцца пад дзеяннем эфекту перазарадкі.\n\n_+2_ Фехтавальшчыца атрымлівае адзін зарад галоўнай зброі кожныя _10 хадоў_, пакуль знаходзіцца пад дзеяннем эфекту перазарадкі.
actors.hero.talent.weapon_recharging.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, то пад дзеяннем перазарадкі герой будзе наносіць на 5% больш страт у блізкім баю на 1-ым узроўні таленту, або на 7.5% больш на 2-ым узроўні.
actors.hero.talent.lethal_haste.title=смяротная хуткасць
actors.hero.talent.lethal_haste.desc=_+1:_ Калі Разбойнік забівае ворага, ён атрымлівае _+33% хуткасці руху_ на 1 ход.\n\n_+2:_ Калі Разбойнік забівае ворага, ён атрымлівае _+33% хуткасці руху_ на 2 хады.\n\n_+3:_ Калі Разбойнік забівае ворага, ён атрымлівае _+33% хуткасці руху_ на 3 хады.
actors.hero.talent.lethal_haste.meta_desc=_Калі гэты талент быў атрыманы іншым героем_, то ён будзе спрацоўваць са звычайнымі нападамі, з перазарадкай у 100 хадоў.
actors.hero.talent.swift_equip.title=хуткая экіпіроўка
actors.hero.talent.swift_equip.desc=_+1:_ Калі герой падбірае прадмет, ён можа _імгненна экіпіраваць яго,_ калі адпаведны слот пусты.\n\n_+2:_ Калі герой падбірае прадмет, ён можа _імгненна экіпіраваць яго,_ нават калі слот заняты (стары прадмет ідзе ў інвентар).

actors.hero.talent.precise_assault.title=разліковы напад
actors.hero.talent.precise_assault.desc=_+1:_ Пасля выкарыстання жазла ці заклінання, Маг атрымлівае _+15% дакладнасці_ на наступную ўдарную атаку.\n\n_+2:_ Пасля выкарыстання жазла ці заклінання, Маг атрымлівае _+30% дакладнасці_ на наступную ўдарную атаку.
actors.hero.talent.precise_assault.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дасць бонус да дакладнасці пасля выкарыстання жазла ці цацурніка, 15% шанц пры +1 або 25% шанц пры +2.
actors.hero.talent.deadly_followup.title=смяротнае дабіванне
actors.hero.talent.deadly_followup.desc=_+1:_ Калі Разбойнік трапляе ў ворага, здзіўленага яго ўменнем, ён атрымлівае _+15% шкоды_ на наступную атаку.\n\n_+2:_ Калі Разбойнік трапляе ў ворага, здзіўленага яго ўменнем, ён атрымлівае _+30% шкоды_ на наступную атаку.

actors.hero.talent.varied_charge.title=дождж клінкоў
actors.hero.talent.varied_charge.desc=_+1:_ Фехтавальшчыца імгненна аднаўляе _0,17 зарадаў_, калі выкарыстоўвае дзве розныя здольнасці зброі без абмежавання па часе.\n\n_+2:_ Фехтавальшчыца імгненна аднаўляе _0,33 зарадаў_, калі выкарыстоўвае дзве розныя здольнасці зброі без абмежавання па часе.\n\n_+3:_ Фехтавальшчыца імгненна аднаўляе _0,5 зарадаў_, калі выкарыстоўвае дзве розныя здольнасці зброі без абмежавання па часе.
actors.hero.talent.twin_upgrades.title=паляпшэння-блізнюкі
actors.hero.talent.twin_upgrades.desc=_+1:_ Калі экіпіяваная зброя Майстра клінкоў адрозніваецца на _2 або больш узроўней_, то больш слабая зброя будзе палепшана да ўзроўню больш моцнага.\n\n_+2:_ Калі экіпіяваная зброя Майстра клінкоў адрозніваецца на _1 або больш узроўней_, то больш слабая зброя будзе палепшана да ўзроўню больш моцнага.\n\n_+3:_ Калі экіпіяваная зброя Майстра клінкоў _такога ж узроўню або больш_, то больш слабая зброя будзе палепшана да ўзроўню больш моцнага.
actors.hero.talent.combined_lethality.title=двайная лятальнасць
actors.hero.talent.combined_lethality.desc=_+1:_ Калі Паляўнічая выкарыстоўвае кідальную зброю, яе наступная атака зброяй блізкага бою нанясе _+25% шкоды._\n\n_+2:_ Калі Паляўнічая выкарыстоўвае кідальную зброю, яе наступная атака зброяй блізкага бою нанясе _+50% шкоды._

actors.hero.talent.unencumbered_spirit.title=вольны дух
actors.hero.talent.unencumbered_spirit.desc=_+1:_ Манашка атрымлівае _50% больш энергіі_ за кожны прадмет экіпіроўкі _3-га рангу ці ніжэй_, які яна выкарыстоўвае.\n\n_+2:_ Манашка атрымлівае _75% больш энергіі_ за кожны прадмет экіпіроўкі _2-га рангу ці ніжэй_, які яна выкарыстоўвае. Бонус 3-га рангу не змяняецца.\n\n_+3:_ Манашка атрымлівае _100% больш энергіі_ за кожны прадмет экіпіроўкі _1-га рангу ці ніжэй_, які яна выкарыстоўвае. Бонусы 2-га і 3-га рангу не змяняюцца. Яна таксама атрымлівае бясплатную палатняную бароню і шыпаваныя рукавіцы.\n\nЗаўважце, што гэты талент не дае ніякай карысці ад таго, каб быць бяззбройным ці атакаваць з Пярсцёнкам сілы.
actors.hero.talent.monastic_vigor.title=мастацтва пустэльніка
actors.hero.talent.monastic_vigor.desc=_+1:_ Калі Манашка выкарыстоўвае здольнасць, яна аднаўляе _+1 HP._\n\n_+2:_ Калі Манашка выкарыстоўвае здольнасць, яна аднаўляе _+2 HP._\n\n_+3:_ Калі Манашка выкарыстоўвае здольнасць, яна аднаўляе _+3 HP._
actors.hero.talent.combined_energy.title=гарманічныя патокі
actors.hero.talent.combined_energy.desc=_+1:_ Калі Манашка выкарыстоўвае здольнасць, яна атрымлівае _1 ход_ паскарэння за кожны _3 адзінкі_ выдаткаванай энергіі.\n\n_+2:_ Калі Манашка выкарыстоўвае здольнасць, яна атрымлівае _1 ход_ паскарэння за кожныя _2 адзінкі_ выдаткаванай энергіі.

actors.hero.talent.close_the_gap.title=тактычнае збліжэнне
actors.hero.talent.close_the_gap.desc=_+1:_ Фехтавальшчыца здзяйсняе скачок да _2 клетак_ да яе цэлі, калі пачынае дуэль.\n\n_+2:_ Фехтавальшчыца здзяйсняе скачок да _3 клетак_ да яе цэлі, калі пачынае дуэль.\n\n_+3:_ Фехтавальшчыца здзяйсняе скачок да _4 клетак_ да яе цэлі, калі пачынае дуэль.\n\n_+4:_ Фехтавальшчыца здзяйсняе скачок да _5 клетак_ да яе цэлі, калі пачынае дуэль.\n\nГэты скачок можа праходзіць праз ворагаў і небяспекі, але не праз сцены. Скачок таксама ўлічваецца пры разліку радыусу для пачатку дуэлі.
actors.hero.talent.invigorating_victory.title=смак перамогі
actors.hero.talent.invigorating_victory.desc=_+1:_ Калі Фехтавальшчыца перамагае ворага да канца дуэлі, яна вылечваецца на _5 ОЗ плюс 30% ад страт_, якія яна атрымала ў дуэлі.\n\n_+2:_ Калі Фехтавальшчыца перамагае ворага да канца дуэлі, яна вылечваецца на _10 ОЗ плюс 50% ад страт_, якія яна атрымала ў дуэлі.\n\n_+3:_ Калі Фехтавальшчыца перамагае ворага да канца дуэлі, яна вылечваецца на _15 ОЗ плюс 65% ад страт_, якія яна атрымала ў дуэлі.\n\n_+3:_ Калі Фехтавальшчыца перамагае ворага да канца дуэлі, яна вылечваецца на _20 ОЗ плюс 75% ад страт_, якія яна атрымала ў дуэлі.
actors.hero.talent.elimination_match.title=дуэль на выбыванне
actors.hero.talent.elimination_match.desc=_+1:_ Калі Фехтавальшчыца кідае выклік на працягу 3-ох хадоў пасля канца дуэлі, гэты выклік расходвае на _16% меньш_ зарада.\n\n_+2:_ Калі Фехтавальшчыца кідае выклік на працягу 3-ох хадоў пасля канца дуэлі, гэты выклік расходвае на _30% меньш_ зарада.\n\n_+3:_ Калі Фехтавальшчыца кідае выклік на працягу 3-ох хадоў пасля канца дуэлі, гэты выклік расходвае на _40% меньш_ зарада.\n\n_+4:_ Калі Фехтавальшчыца кідае выклік на працягу 3-ох хадоў пасля канца дуэлі, гэты выклік расходвае на _50% меньш_ зарада.

actors.hero.talent.elemental_reach.title=далёкасць стыхіі
actors.hero.talent.elemental_reach.desc=_+1:_ Далёкасць стыхійнага ўдару павялічана з 4 да _5 клетак_, а яго шырыня з 65 да _75 градусаў_.\n\n_+2:_ Далёкасць стыхійнага ўдару павялічана з 4 да _6 клетак_, а яго шырыня з 65 да _85 градусаў_.\n\n_+3:_ Далёкасць стыхійнага ўдару павялічана з 4 да _7 клетак_, а яго шырыня з 65 да _95 градусаў_.\n\n_+4:_ Далёкасць стыхійнага ўдару павялічана з 4 да _8 клетак_, а яго шырыня з 65 да _105 градусаў_.
actors.hero.talent.striking_force.title=моц хвалі
actors.hero.talent.striking_force.desc=_+1:_ Сіла стыхійнага ўдару павялічана на _30%_.\n\n_+2:_ Сіла стыхійнага ўдару павялічана на _60%_.\n\n_+3:_ Сіла стыхійнага ўдару павялічана на _90%_.\n\n_+4:_ Сіла стыхійнага ўдару павялічана на _120%_.
actors.hero.talent.directed_power.title=выхад моцы
actors.hero.talent.directed_power.desc=_+1:_ Прамая атака стыхійнага ўдару павялічвае сілу зачарованняў на _30% _ за кожнага ворага ў яе радыусе.\n\n_+2:_ Прамая атака стыхійнага ўдару павялічвае сілу зачарованняў на _60% _ за кожнага ворага ў яе радыусе.\n\n_+3:_ Прамая атака стыхійнага ўдару павялічвае сілу зачарованняў на _90% _ за кожнага ворага ў яе радыусе.\n\n_+4:_ Прамая атака стыхійнага ўдару павялічвае сілу зачарованняў на _120% _ за кожнага ворага ў яе радыусе.

actors.hero.talent.feigned_retreat.title=прытворнае адступленне
actors.hero.talent.feigned_retreat.desc=_+1:_ Калі вораг атакуе паслявобраз Фехтавальшчыцы, яна атрымлівае _2 хада паскарэння_.\n\n_+2:_ Калі вораг атакуе паслявобраз Фехтавальшчыцы, яна атрымлівае _4 хадоў паскарэння_.\n\n_+3:_ Калі вораг атакуе паслявобраз Фехтавальшчыцы, яна атрымлівае _6 хадоў паскарэння_.\n\n_+4:_ Калі вораг атакуе паслявобраз Фехтавальшчыцы, яна атрымлівае _8 хадоў паскарэння_.
actors.hero.talent.expose_weakness.title=слабае месца
actors.hero.talent.expose_weakness.desc=_+1:_ Калі Гладыятар выкарыстоўвае комба-прыём, ён _зніжае бароню_ мэты на _2 хады._\n\n_+2:_ Калі Гладыятар выкарыстоўвае комба-прыём, ён _зніжае бароню_ мэты на _4 хады._\n\n_+3:_ Калі Гладыятар выкарыстоўвае комба-прыём, ён _зніжае бароню_ мэты на _6 хадоў._
actors.hero.talent.counter_ability.title=блакаванне ўменняў
actors.hero.talent.counter_ability.desc=_+1:_ Калі Фехтавальшчыца выкарыстоўвае здольнасць зброі на працягу 3 хадоў пасля таго, як яе паслявобраз быў атакаваны, яна выдаткуе на _0,38 зарадаў меньш_.\n\n_+2:_ Калі Фехтавальшчыца выкарыстоўвае здольнасць зброі на працягу 3 хадоў пасля таго, як яе паслявобраз быў атакаваны, яна выдаткуе на _0,77 зарад меньш_.\n\n_+3:_ Калі Фехтавальшчыца выкарыстоўвае здольнасць зброі на працягу 3 хадоў пасля таго, як яе паслявобраз быў атакаваны, яна выдаткуе на _1,13 зарадаў меньш_.\n\n_+4:_ Калі Фехтавальшчыца выкарыстоўвае здольнасць зброі на працягу 3 хадоў пасля таго, як яе паслявобраз быў атакаваны, яна выдаткуе на _1.5 зарада меньш_.

#cleric
actors.hero.talent.satiated_spells.title=Заклінанні сытасці
actors.hero.talent.satiated_spells.desc=Клірык можа выкарыстаць _Насычаныя заклінанні_. Калі герой ужывае ежу, яго наступнае заклінанне не каштуе зарадаў.\n\n_+1:_ Эфект актывуецца кожныя _40 хадоў._\n\n_+2:_ Эфект актывуецца кожныя _30 хадоў._
actors.hero.talent.satiated_spells.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дасць шчыт адразу, які пачне нармальна знікаць пасля 10 хадоў.
actors.hero.talent.holy_intuition.title=Святая інтуіцыя
actors.hero.talent.holy_intuition.desc=Клірык можа выкарыстаць _Святую інтуіцыю_ бясплатна. Гэта дазваляе вызначыць, ці з'яўляецца прадмет пракляым ці благаславёным.\n\n_+1:_ Святая інтуіцыя працуе з _50% шанцам._\n\n_+2:_ Святая інтуіцыя працуе з _100% шанцам._
actors.hero.talent.holy_intuition.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дазволіць герою апазнаць стан праклёну пракляага прадмета непасрэдна перад яго экіпіроўкай, 15% шанц пры +1 або 25% шанц пры +2.
actors.hero.talent.searing_light.title=Палючае святл��
actors.hero.talent.searing_light.desc=Клірык можа выкарыстаць _Палаючае святло_. Калі Клірык выкарыстоўвае заклінанне на ворагу, ён наносіць бонусную шкоду.\n\n_+1:_ Бонусная шкода роўная _ўзроўню героя._\n\n_+2:_ Бонусная шкода роўная _ўзроўню героя + 3._
actors.hero.talent.searing_light.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дасць бонусную шкоду пасля выкарыстання жазла ці цацурніка на ворага, з 20 хадамі перазарадкі.
actors.hero.talent.shield_of_light.title=Шчыт святла
actors.hero.talent.shield_of_light.desc=Клірык можа выкарыстаць _Шчыт святла_. Пасля выкарыстання заклінання, Клірык атрымлівае зніжэнне фізічнай шкоды.\n\n_+1:_ Зніжае фізічную шкоду на _1_ на _5 хадоў._\n\n_+2:_ Зніжае фізічную шкоду на _2_ на _5 хадоў._
actors.hero.talent.shield_of_light.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага зніжае фізічную шкоду, атрыманую ад вашага мэтанага ворага, на 1, 33% шанц пры +1 або 50% шанц пры +2.

actors.hero.talent.enlightening_meal.title=Асветніцкая ежа
actors.hero.talent.enlightening_meal.desc=Клірык можа выкарыстаць _Асветніцкую ежу_. Калі Клірык ужывае ежу, яго Святы Том атрымлівае бонусныя зарады.\n\n_+1:_ Ежа дае _1 дадатковы зарад._\n\n_+2:_ Ежа дае _2 дадатковыя зарады._
actors.hero.talent.enlightening_meal.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дасць 2 хады перазарадкі жазлоў і цацурнікаў пры +1, або 3 хады пры +2. Гэта нельга выкарыстаць, каб Рог дастатку зарадзіўся сам.
actors.hero.talent.recall_inscription.title=Успамін надпісу
actors.hero.talent.recall_inscription.refunded=Вашае руннае каменне было вернута Успамінам надпісу!
actors.hero.talent.recall_inscription.desc=Клірык можа выкарыстаць _Успамін надпісу_. Калі выкарыстоўваецца сувой ці руннае каменне, ёсць шанц вярнуць яго.\n\n_+1:_ _10%_ шанц вяртання.\n\n_+2:_ _15%_ шанц вяртання.\n\n_+3:_ _20%_ шанц вяртання.
actors.hero.talent.recall_inscription.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага будзе вяртаць любы сувой ці руннае каменне 10% шанцам пры +1 або 15% шанцам пры +2. Сувоі паляпшэння выключаны з гэтага эфекту.
actors.hero.talent.sunray.title=Сонечны прамень
actors.hero.talent.sunray.desc=Клірык можа выкарыстаць _Сонечны прамень_ за кошт 1 зараду. Гэта выпускае канцэнтраваны прамень святла, які наносіць шкоду і асляпляе.\n\n_+1:_ Прамень наносіць _4-8 шкоды_ і асляпляе на _3 хады._\n\n_+2:_ Прамень наносіць _6-12 шкоды_ і асляпляе на _4 хады._\n\n_+3:_ Прамень наносіць _8-16 шкоды_ і асляпляе на _5 хадоў._\n\n_+4:_ Прамень наносіць _10-20 шкоды_ і асляпляе на _6 хадоў._
actors.hero.talent.sunray.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага будзе выклікаць асляпленне ворагаў жазламі і цацурнікамі на 4 хады, 15% шанц пры +1 або 25% шанц пры +2.
actors.hero.talent.divine_sense.title=Боскае адчуванне
actors.hero.talent.divine_sense.desc=Клірык можа выкарыстаць _Боскі зрок_ за кошт 1 зараду. Гэта дае разумовае бачанне на абмежаваную дальнасць.\n\n_+1:_ Боскі зрок мае дальнасць _4 клеткі_ і дзейнічае _50 хадоў._\n\n_+2:_ Боскі зрок мае дальнасць _6 клетак_ і дзейнічае _50 хадоў._\n\n_+3:_ Боскі зрок мае дальнасць _8 клетак_ і дзейнічае _50 хадоў._\n\n_+4:_ Боскі зрок мае дальнасць _10 клетак_ і дзейнічае _50 хадоў._
actors.hero.talent.divine_sense.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага дасць разумовае бачанне на кароткі момант пасля выкарыстання жазла ці цацурніка з дальнасцю 3 клеткі пры +1 або 5 клетак пры +2.
actors.hero.talent.bless.title=Bless
actors.hero.talent.bless.desc=Клірык можа выкарыстаць _Благаслаўленне_ за кошт 1 зараду. Гэта дае бонус да дакладнасці і ўвароту Клірыку і ўсім бачным саюзнікам.\n\n_+1:_ Благаслаўленне дае _+10%_ дакладнасці і ўвароту на _10 хадоў._\n\n_+2:_ Благаслаўленне дае _+15%_ дакладнасці і ўвароту на _13 хадоў._\n\n_+3:_ Благаслаўленне дае _+20%_ дакладнасці і ўвароту на _17 хадоў._\n\n_+4:_ Благаслаўленне дае _+25%_ дакладнасці і ўвароту на _20 хадоў._
actors.hero.talent.bless.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага павялічыць дакладнасць і ўварот героя і ўсіх саюзнікаў на 3% пры +1 або 5% пры +2.

actors.hero.talent.cleanse.title=Ачышчэнне
actors.hero.talent.cleanse.desc=Клірык можа выкарыстаць _Ачышчэнне_ за кошт 2 зарадаў. Гэта здымае ўсе шкодныя эфекты стану з Клірыка і бачных саюзнікаў.\n\n_+1:_ Пасля ачышчэння дае _3 хады_ імунітэту да дэбафаў і _3 бар'ер._\n\n_+2:_ Пасля ачышчэння дае _5 хадоў_ імунітэту да дэбафаў і _5 бар'ер._\n\n_+3:_ Пасля ачышчэння дае _7 хадоў_ імунітэту да дэбафаў і _7 бар'ер._\n\n_+4:_ Пасля ачышчэння дае _9 хадоў_ імунітэту да дэбафаў і _9 бар'ер._
actors.hero.talent.cleanse.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага будзе здымаць негатыўныя эфекты стану з героя пасля выкарыстання жазла ці цацурніка, 10/20/30% шанц пры +1/+2/+3.
actors.hero.talent.light_reading.title=Лёгкае чытанне
actors.hero.talent.light_reading.desc=Клірык можа выкарыстаць _Лёгкае чытанне_. Кошт зарадаў для заклінанняў Клірыка зніжаецца.\n\n_+1:_ Заклінанні каштуюць на _10%_ менш зарадаў.\n\n_+2:_ Заклінанні каштуюць на _20%_ менш зарадаў.\n\n_+3:_ Заклінанні каштуюць на _30%_ менш зарадаў.
actors.hero.talent.light_reading.meta_desc=_Калі гэты талент атрымае іншы герой_ ён замест гэтага павялічыць хуткасць перазарадкі ўсіх жазлоў на 7/13/20% пры +1/+2/+3.

actors.hero.talent.holy_lance.title=Святое кап'ё
actors.hero.talent.holy_lance.desc=Клірык можа выкарыстаць _Святое дзіда_ за кошт 1 зараду. Гэта кідальная магічная зброя, якая наносіць святую шкоду.\n\n_+1:_ Дзіда наносіць _4-8 шкоды_ з перазарадкай _40 хадоў._\n\n_+2:_ Дзіда наносіць _6-12 шкоды_ з перазарадкай _35 хадоў._\n\n_+3:_ Дзіда наносіць _8-16 шкоды_ з перазарадкай _30 хадоў._\n\n_+4:_ Дзіда наносіць _10-20 шкоды_ з перазарадкай _25 хадоў._
actors.hero.talent.hallowed_ground.title=Святая зямля
actors.hero.talent.hallowed_ground.desc=Клірык можа выкарыстаць _Асвечаную зямлю_ за кошт 1 зараду. Гэта стварае кола асвечанай зямлі, якая лечыць і абараняе.\n\n_+1:_ Радыус _1 клетка_, дзейнічае _10 хадоў._\n\n_+2:_ Радыус _2 клеткі_, дзейнічае _13 хадоў._\n\n_+3:_ Радыус _3 клеткі_, дзейнічае _17 хадоў._\n\n_+4:_ Радыус _4 клеткі_, дзейнічае _20 хадоў._
actors.hero.talent.mnemonic_prayer.title=Мнеманічная малітва
actors.hero.talent.mnemonic_prayer.desc=Клірык можа выкарыстаць _Мнеманічную малітву_ за кошт 0 зарадаў. Гэта аднаўляе зарады Святога Тома.\n\n_+1:_ Аднаўляе _2 зарады_ з перазарадкай _100 хадоў._\n\n_+2:_ Аднаўляе _3 зарады_ з перазарадкай _80 хадоў._\n\n_+3:_ Аднаўляе _4 зарады_ з перазарадкай _60 хадоў._\n\n_+4:_ Аднаўляе _5 зарадаў_ з перазарадкай _40 хадоў._

actors.hero.talent.lay_on_hands.title=Ускладанне рук
actors.hero.talent.lay_on_hands.desc=Клірык можа выкарыстаць _Ускладанне рук_ за кошт 1 зараду. Гэта імгненна лечыць мэту і здымае адзін негатыўны эфект.\n\n_+1:_ Ускладанне рук лечыць _8 HP._\n\n_+2:_ Ускладанне рук лечыць _12 HP._\n\n_+3:_ Ускладанне рук лечыць _16 HP._\n\n_+4:_ Ускладанне рук лечыць _20 HP._
actors.hero.talent.aura_of_protection.title=Аўра абароны
actors.hero.talent.aura_of_protection.desc=Клірык можа выкарыстаць _Аўру абароны_ за кошт 1 зараду. Гэта стварае абарончую аўру, якая зніжае ўсю атрыманую шкоду для Клірыка і бліжэйшых саюзнікаў.\n\n_+1:_ Аўра зніжае шкоду на _2_ і дзейнічае _10 хадоў._\n\n_+2:_ Аўра зніжае шкоду на _3_ і дзейнічае _13 хадоў._\n\n_+3:_ Аўра зніжае шкоду на _4_ і дзейнічае _17 хадоў._\n\n_+4:_ Аўра зніжае шкоду на _5_ і дзейнічае _20 хадоў._
actors.hero.talent.wall_of_light.title=Сцяна святла
actors.hero.talent.wall_of_light.desc=Клірык можа выкарыстаць _Сцяну святла_ за кошт 2 зарадаў. Гэта стварае сцяну, якая блакуе рух і наносіць шкоду ворагам.\n\n_+1:_ Сцяна даўжынёй _3 клеткі_ дзейнічае _10 хадоў._\n\n_+2:_ Сцяна даўжынёй _5 клетак_ дзейнічае _13 хадоў._\n\n_+3:_ Сцяна даўжынёй _7 клетак_ дзейнічае _17 хадоў._\n\n_+4:_ Сцяна даўжынёй _9 клетак_ дзейнічае _20 хадоў._

actors.hero.talent.divine_intervention.title=Боскае ўмяшальніцтва
actors.hero.talent.divine_intervention.desc=Клірык можа выкарыстаць _Боскае ўмяшальніцтва_ за кошт 3 зарадаў. Гэта магутнае заклінанне, якое імгненна аднаўляе здароўе і здымае ўсе негатыўныя эфекты.\n\n_+1:_ Аднаўляе _25%_ максімальнага здароўя і дае _5 хадоў_ імунітэту да шкоды.\n\n_+2:_ Аднаўляе _35%_ максімальнага здароўя і дае _7 хадоў_ імунітэту да шкоды.\n\n_+3:_ Аднаўляе _45%_ максімальнага здароўя і дае _9 хадоў_ імунітэту да шкоды.\n\n_+4:_ Аднаўляе _55%_ максімальнага здароўя і дае _11 хадоў_ імунітэту да шкоды.
actors.hero.talent.judgement.title=прысуд
actors.hero.talent.judgement.desc=Клірык можа выкарыстаць _Суд_ за кошт 1 зараду. Гэта наносіць магічную шкоду ворагу, падвоеную супраць ворагаў з малым здароўем.\n\n_+1:_ Суд наносіць _3-6 шкоды._\n\n_+2:_ Суд наносіць _5-10 шкоды._\n\n_+3:_ Суд наносіць _7-14 шкоды._\n\n_+4:_ Суд наносіць _9-18 шкоды._
actors.hero.talent.flash.title=flash
actors.hero.talent.flash.desc=Клірык можа выкарыстаць _Успышку_ за кошт 1 зараду. Гэта асляпляе ўсіх ворагаў у полі зроку.\n\n_+1:_ Успышка асляпляе на _3 хады._\n\n_+2:_ Успышка асляпляе на _5 хадоў._\n\n_+3:_ Успышка асляпляе на _7 хадоў._\n\n_+4:_ Успышка асляпляе на _9 хадоў._

actors.hero.talent.body_form.title=цялесная форма
actors.hero.talent.body_form.desc=Клірык можа выкарыстаць _Форму цела_ за кошт 1 зараду. Гэта заклінанне дазваляе абраць чары ці глыф, апазнаныя ў гэтай вылазцы, і ўпітаць Трыяду іх эфектам.\n\n_+1:_ Форма цела дзейнічае _15 хадоў._\n\n_+2:_ Форма цела дзейнічае _20 хадоў._\n\n_+3:_ Форма цела дзейнічае _25 хадоў._\n\n_+4:_ Форма цела дзейнічае _30 хадоў._
actors.hero.talent.mind_form.title=ментальная форма
actors.hero.talent.mind_form.desc=Клірык можа выкарыстаць _Форму розуму_ за кошт 1 зараду. Гэта заклінанне дазваляе абраць жазло ці кідальную зброю і ўпітаць Трыяду яе эфектам.\n\n_+1:_ Трыяда выкарыстоўвае абраны прадмет на _+3._\n\n_+2:_ Трыяда выкарыстоўвае абраны прадмет на _+5._\n\n_+3:_ Трыяда выкарыстоўвае абраны прадмет на _+7._\n\n_+4:_ Трыяда выкарыстоўвае абраны прадмет на _+9._
actors.hero.talent.spirit_form.title=Дух��ўная форма
actors.hero.talent.spirit_form.desc=Клірык можа выкарыстаць _Форму духу_ за кошт 1 зараду. Гэта заклінанне дазваляе абраць пярсцёнак ці цацурнік і ўпітаць Трыяду яго эфектам.\n\n_+1:_ Пярсцёнак даецца на +_3_, цацурнік на +_2._ Пярсцёнак дзейнічае _20 хадоў._\n\n_+2:_ Пярсцёнак даецца на +_5_, цацурнік на +_4._ Пярсцёнак дзейнічае _20 хадоў._\n\n_+3:_ Пярсцёнак даецца на +_7_, цацурнік на +_6._ Пярсцёнак дзейнічае _20 хадоў._\n\n_+4:_ Пярсцёнак даецца на +_9_, цацурнік на +_8._ Пярсцёнак дзейнічае _20 хадоў._

actors.hero.talent.beaming_ray.title=Ззяючы прамень
actors.hero.talent.beaming_ray.desc=Клірык можа выкарыстаць _Прамень пераносу_ ад узмоцненага саюзніка за кошт 1 зараду. Гэты прамень можа праходзіць праз сцены і тэлепартуе саюзніка ў абранае месца. Калі вораг знаходзіцца ў гэтым месцы, саюзнік з'яўляецца побач з ворагам і будзе мэціць яго. Прамень пераносу можа нават тэлепартаваць звычайна нерухомых саюзнікаў, але мае палову дальнасці ў такім выпадку.\n\n_+1:_ Прамень пераносу мае максімальную дальнасць _4 клеткі,_ і павялічвае бонус Сілы Многіх да _+35% шкоды_ супраць бліжэйшага ворага на 10 хадоў.\n\n_+2:_ Прамень пераносу мае максімальную дальнасць _8 клетак,_ і павялічвае бонус Сілы Многіх да _+40% шкоды_ супраць бліжэйшага ворага на 10 хадоў.\n\n_+3:_ Прамень пераносу мае максімальную дальнасць _12 клетак,_ і павялічвае бонус Сілы Многіх да _+45% шкоды_ супраць бліжэйшага ворага на 10 хадоў.\n\n_+4:_ Прамень пераносу мае максімальную дальнасць _16 клетак,_ і павялічвае бонус Сілы Многіх да _+50% шкоды_ супраць бліжэйшага ворага на 10 хадоў.
actors.hero.talent.life_link.title=жыццёвая сувязь
actors.hero.talent.life_link.desc=Клірык можа выкарыстаць _Дэсмос жыцця_ паміж сабой і ўзмоцненым саюзнікам за кошт 2 зарадаў. Гэтае заклінанне выклікае размеркаванне шкоды паміж Клірыкам і яго саюзнікам, і карысныя заклінанні клірыка 3-га рангу ці ніжэй прымяняюцца да абодвух, калі б яны закранулі толькі аднаго.\n\n_+1:_ Дэсмос жыцця дзейнічае _10 хадоў_ і павялічвае бонус Сілы Многіх да _-35% атрыманай шкоды._\n\n_+2:_ Дэсмос жыцця дзейнічае _13 хадоў_ і павялічвае бонус Сілы Многіх да _-40% атрыманай шкоды._\n\n_+3:_ Дэсмос жыцця дзейнічае _17 хадоў_ і павялічвае бонус Сілы Многіх да _-45% атрыманай шкоды._\n\n_+4:_ Дэсмос жыцця дзейнічае _20 хадоў_ і павялічвае бонус Сілы Многіх да _-50% атрыманай шкоды._
actors.hero.talent.stasis.title=Стазіс
actors.hero.talent.stasis.desc=Клірык можа выкарыстаць _Стазіс_ на ўзмоцненым саюзніку за кошт 2 зарадаў. Стазіс часова выдаляе саюзніка з падзямелля і захоўвае час, які застаўся на ўсіх бонусах, уключаючы Сілу Многіх. Саюзнік зноў з'явіцца побач з вамі, калі эфект скончыцца. Стазіс можна паўторна выкарыстаць імгненна і бясплатна, каб скончыць эфект датэрмінова. Стазіс працуе на нерухомых саюзніках, але не можа перамяшчаць іх паміж паверхамі.\n\n_+1:_ Стазіс дзейнічае максімум _60 хадоў._\n\n_+2:_ Стазіс дзейнічае максімум _90 хадоў._\n\n_+3:_ Стазіс дзейнічае максімум _120 хадоў._\n\n_+4:_ Стазіс дзейнічае максімум _150 хадоў._\n\nКлірык таксама можа выкарыстаць Прамень пераносу, калі саюзнік у стазісе, каб выклікаць яго, або выкарыстаць Дэсмос жыцця, каб загадзя прымяніць яго эфект. Аднак саюзнікі не атрымліваюць карысць ад Дэсмоса жыцця, пакуль яны ў стазісе.


#universal
actors.hero.talent.heroic_energy.title=гераічная энэргія
actors.hero.talent.heroic_energy.rat_title=пацукаічная энэргія
actors.hero.talent.heroic_energy.desc=_+1:_ Здольнасць брані героя мае паніжаны кошт зарада _на 12%_.\n\n_+2:_ Здольнасць брані героя мае паніжаны кошт зарада _на 23%_.\n\n_+3:_ Здольнасць брані героя мае паніжаны кошт зарада _на 32%_.\n\n_+4:_ Здольнасць брані героя мае паніжаны кошт зарада _на 40%_.

actors.hero.talent.ratsistance.title=пацукапраціў
actors.hero.talent.ratsistance.desc=_+1:_ Варожыя пацукамарфіраваныя ворагі наносяць на _-10% менш страт_.\n\n_+2:_ Варожыя пацукамарфіраваныя ворагі наносяць на _-19% менш страт_.\n\n_+3:_ Варожыя пацукамарфіраваныя ворагі наносяць на _-27% менш страт_.\n\n_+4:_ Варожыя пацукамарфіраваныя ворагі наносяць на _-35% менш страт_.
actors.hero.talent.ratlomacy.title=пацукаматыя
actors.hero.talent.ratlomacy.desc=_+1:_ Выкарыстоўваючы пацукамарфоз на ўжо пацукамарфіраваным вораге робіць яго прыязным і робіць трансфармацыю сталай.\n\n_+2:_ Выкарыстоўваючы пацукамарфоз на ўжо пацукамарфіраваным вораге робіць яго прыязным, робіць трансфармацыю сталай і дае _2 хады_ адрэналіну.\n\n_+3:_ Выкарыстоўваючы пацукамарфоз на ўжо пацукамарфіраваным вораге робіць яго прыязным, робіць трансфармацыю сталай і дае _4 хады_ адрэналіну.\n\n_+4:_ Выкарыстоўваючы пацукамарфоз на ўжо пацукамарфіраваным вораге робіць яго прыязным, робіць трансфармацыю сталай і дае _6 хады_ адрэналіну.
actors.hero.talent.ratforcements.title=пацукмаванне
actors.hero.talent.ratforcements.desc=_+1:_ Пры выкарыстанні пацукамароза на сабе _з'яўляецца 1_ саюзны сумчаты пацук побач з вамі.\n\n_+2:_ Пры выкарыстанні пацукамароза на сабе _з'яўляецца 2_ саюзных сумчатых пацука побач з вамі.\n\n_+3:_ Пры выкарыстанні пацукамароза на сабе _з'яўляецца 3_ саюзных сумчатых пацука побач з вамі.\n\n_+4:_ Пры выкарыстанні пацукамароза на сабе _з'яўляецца 4_ саюзных сумчатых пацука побач з вамі.



###npcs
actors.mobs.npcs.blacksmith.name=троль-каваль
actors.mobs.npcs.blacksmith.intro_quest_warrior=Хэй, Чалавек! Выглядаеш дастаткова дужа.
actors.mobs.npcs.blacksmith.intro_quest_mage=Хэй, Чалавек! Выглядаеш дастаткова разумна.
actors.mobs.npcs.blacksmith.intro_quest_rogue=Хэй, Чалавек! Выглядаеш дастаткова вераломна.
actors.mobs.npcs.blacksmith.intro_quest_huntress=Хэй, Чалавек! Выглядаеш дастаткова спрытна.
actors.mobs.npcs.blacksmith.intro_quest_duelist=Хэй, Чалавек! Выглядаеш дастаткова храбра.
actors.mobs.npcs.blacksmith.intro_quest_cleric=Хэй, Чалавек! Выглядаеш дастаткова асабіста.
actors.mobs.npcs.blacksmith.intro_quest_start=Зробіш нешта карыснае, а? Ёсць праца. Я пабудаваў гэтую краму на старой пячоры, якая ўнізу гэтых сходаў. Бяры кірку і накапай мне _20 штук цёмнага золата_. Каменне там, унізе, мяккае, таму ты з лёгкасцю сможаш пракапацца праз сцены пячоры.\n\nШто значыць, як я расплачуся? Ты прагны...\n\nДобра, добра, я магу зрабіць нешта наўзамен. Лічы, што табе пашансавала, - я адзіны каваль навокал.
actors.mobs.npcs.blacksmith.intro_quest_crystal=Будзь асцярожны. Пячора небяспечная для такога маленькага чалавечка, як ты. Нейкі час яна была закінутая, з-за чаго ўнутры з'явілася куча крышталяў. Яны бліскучыя, але занадта далікатныя, каб чагосьці каштаваць. О, яшчэ ў крышталяў ёсць нейкія чароўныя штучкі, якія абараняюць іх. Абарона атрымалася даволі моцнай, так што _будзь асцярожны там, дзе здабываеш золата_, інакш прыцягнеш іх увагу.\n\nДзесьці таксама ёсць _гіганцкі крышталь_. Гэта будзе нашмат складаней, чым са звычайнымі. Будзь гатовы да бойкі, калі пачнеш яго ламаць. Трымаю заклад, што яго разбурэнне замарудзіць працу ўсіх астатніх крышталяў, таму я заплачу дадаткова за яго разбурэнне.
actors.mobs.npcs.blacksmith.intro_quest_gnoll=Я бачыў, як гнолы перанеслі шахцёрскія інструменты ў іхні табар. Мне патрэбны гэтыя інструменты! Калі ты знойдзеш іх, я дапамагу табе з зброяй.
actors.mobs.npcs.blacksmith.intro_quest_fungi=Будзь асцярожны. Пячора небяспечная для такога маленькага чалавечка, як ты. Унізе расце нейкі грыбны монстр са сваімі грыбнымі вартавым, якія могуць апынуцца сапраўды смяротнымі, калі ўбачаць вас. Прынамсі, яны не могуць ўстаць і пагнацца кімсьці. _Хавайся з вачэй далоў_, калі хочаш застацца ў жывых.\n\nЯ заплачу дадаткова, калі атрымаецца сарваць самы вялікі грыб, але гэта запатрабуе пэўных намаганняў. Ён злучаны з мноствам вузлоў міцэліем, якія схаваны ў сценах. Прыйдзецца зламаць большасць з іх, перш атрымаецца па-сапраўднаму пашкодзіць яго.
actors.mobs.npcs.blacksmith.reminder=Ты скончыў марнаваць мой час? Уваход прама перад табой.
actors.mobs.npcs.blacksmith.reminder_crystal=Збяры столькi золата, сколькi зможаш, i паспрабуй разбурыць вялiкi крыштал.
actors.mobs.npcs.blacksmith.reminder_gnoll=Збяры столькi золата, сколькi зможаш, i паспрабуй забiць гнола-геаманта.
actors.mobs.npcs.blacksmith.reminder_fungi=Збяры столькi золата, сколькi зможаш, i паспрабуй забiць вялiзарны грыб.
actors.mobs.npcs.blacksmith.lost_pick=Ты здзекуешся? Дзе кірка мая?!
actors.mobs.npcs.blacksmith.quest_start_prompt=Ты гатовы спусціцца ўніз? Пераўварыся, што у заплечніку дастаткова месца для золата\n\n_Я даю толькі адну спробу!_
actors.mobs.npcs.blacksmith.enter_yes=Я гатовы
actors.mobs.npcs.blacksmith.enter_no=Яшчэ не
actors.mobs.npcs.blacksmith.exit_warn_none=Ты ужо скончыў? Ты амаль нічога не прынес! Патрэбна прынесці _20 кавалкаў._\n\n_Я не буду двойчы апускаць табе сюды._
actors.mobs.npcs.blacksmith.exit_warn_low=Ты ужо скончыў? У цябе яшчэ недастаткова золата. Патрэбна прынесці _20 кавалкаў._\n\n_Я не буду двойчы апускаць табе сюды._
actors.mobs.npcs.blacksmith.exit_warn_med=Ты скончыў? У тваім заплечніку ёсць трошкі золата, але у пячоры, відавочна, можна знайсці яшчэ. Патрэбна прынесці _20 кавалкаў._\n\n_Я не буду двойчы апускаць табе сюды._
actors.mobs.npcs.blacksmith.exit_warn_high=Ты скончыў? У цябе многа золата, але можаш накапаць яшчэ трошкі. Мне патрэбна _20 кавалкаў._\n\n_Я не буду двойчы апускаць табе сюды._
actors.mobs.npcs.blacksmith.exit_warn_full=Ты скончыў? У цябе многа золата, але пераўтварыся, што не аставіў нічога са сваіх рэчаў.\n\n_Я не буду двойчы апускаць табе сюды._
actors.mobs.npcs.blacksmith.exit_warn_crystal=Гэты гіганскі крышталь таксама яшчэ унізе. Я дадаткова заплачу, калі атрымаецца разбурыць яго.
actors.mobs.npcs.blacksmith.exit_warn_gnoll=Гэты гнол-копач таксама яшчэ унізе. Я дадаткова заплачу, калі атрымаецца забіць яго.
actors.mobs.npcs.blacksmith.exit_warn_fungi=Гэты грыбны монстр таксама яшчэ унізе. Я дадаткова заплачу, калі атрымаецца забіць яго.
actors.mobs.npcs.blacksmith.exit_yes=Я гатовы
actors.mobs.npcs.blacksmith.exit_no=Яшчэ не
actors.mobs.npcs.blacksmith.get_lost=Я заняты. Знікні!
actors.mobs.npcs.blacksmith.entrance_blocked=Шлях уніз заблакаваны.
actors.mobs.npcs.blacksmith.cant_enter_old=У гэта месяца нельга трапіць у гэтым забеге. Сыграй новы забег, каб паспрабаваць новы квэст!ё
actors.mobs.npcs.blacksmith.def_verb=заблакаваў
actors.mobs.npcs.blacksmith.desc=Троль-каваль выглядае як і ўсе тролі: высокі і худы, а скура падобная на камень і колерам, і фактурай. Ён працуе непрапарцыйна маленькімі інструментамі.

actors.mobs.npcs.ghost.name=сумны здань
actors.mobs.npcs.ghost.rat_1=Дзень добры, %s... Калісьці і я быў такім, як ты - моцным і упэўненым у сабе... Але я загінуў ад жудаснага звера... Я не магу пакінуць гэтае месца... Не раней, чым адбудзецца помста... Забі _смярдзючага пацука_, што забрала маё жыццё...\n\nЯна блукае па гэтым узроўні... І распаўсюджвае смурод паўсюль... _Сцеражыся аблока смуроду і ўкусу, якія раз'ядае скуру... Кіслата змываецца вадой..._
actors.mobs.npcs.ghost.rat_2=Прашу... Дапамажы мне... Забі пачвару...\n\n_Бейся ў вадзе... Пазбягай смуроду..._
actors.mobs.npcs.ghost.gnoll_1=Дзень добры, %s... Калісьці і я быў такім, як ты - моцным і упэўненым у сабе... Але я загінуў ад д'ябальскага адроддзя... Я не магу пакінуць гэтае месца... Не раней, чым адбудзецца помста... Забі _гнола-штукара_, што забраў маё жыццё...\n\nЁн не падобны на астатніх гнолаў... Ён хаваецца і выкарыстоўвае кідальную зброю... _Сцеражыся яго атрутных і вогненных дроцікаў, ня змагайся на адлегласці..._
actors.mobs.npcs.ghost.gnoll_2=Прашу... Дапамажы мне... Забі штукара...\n\n_Не дай яму ўдарыць табе... Бей зблізу..._
actors.mobs.npcs.ghost.crab_1=Дзень добры, %s... Калісьці і я быў такім, як ты - моцным і упэўненым у сабе... Але я загінуў ад д'ябальскага адроддзя... Я не магу пакінуць гэтае месца... Не раней, чым адбудзецца помста... Забі _старажытнага краба_, што забраў маё жыццё...\n\nЁн неверагодна стары... З велізарнай клюшанню і тоўстым панцырам... _Сцеражыся яго клюшні, табе прыйдзецца атакаваць нечакана, ці ён заблакуе атаку..._
actors.mobs.npcs.ghost.crab_2=Прашу... Дапамажы мне... Забі старажытнага краба...\n\n_Ён можа заблакаваць любую атаку... Калі бачыць, што ты атакуеш..._
actors.mobs.npcs.ghost.find_me=Дзякуй табе... Знайдзі мяне...
actors.mobs.npcs.ghost.desc=Прывід ледзь бачны. Ён падобны на бясформенную крыніцу слабога святла з сумным тварам.

actors.mobs.npcs.imp.name=амбіцыйны нячысцік
actors.mobs.npcs.imp.intro=Ты шукальнік прыгод? Я абажаю шукальнікаў прыгод! На іх заўсёды можна спадзявацца, калі трэба каго-небудзь забіць, ці не так? За ўзнагароду, вядома ;)
actors.mobs.npcs.imp.seniors_1=У маім выпадку трэба забіць _старэйшых манахаў_. Бачыш, я збіраюся адкрыць тут маленькі бізнес, але гэтыя вар'яты самі нічога не купляюць і будуць палохаць іншых кліентаў. Я завабіў _5 з іх_ на гэты паверх. Прынясі мне іх жэтоны, і я дам табе пярсцёнак. _Чым больш жэтонаў прынясеш, тым лепшы пярсцёнак!_
actors.mobs.npcs.imp.seniors_2=О, ты яшчэ жывы! Я ведаў, што тваё кунг-фу мацнейшае ;) Не забудзь сабраць _жэтоны_ з тых старэйшых манахаў. _Прынясі хоць бы 1, але больш — лепш!_
actors.mobs.npcs.imp.seniors_spawned=5 старэйшых манахаў былі завабленыя кудысьці на гэтым паверсе!
actors.mobs.npcs.imp.cya=Да сустрэчы, %s!
actors.mobs.npcs.imp.hey=Псс, %s!
actors.mobs.npcs.imp.vault_intro=Я ведаю пра дварфаўскае сховішча паблізу. Яно поўнае каштоўных Дварфаўскіх Жэтонаў! Пракрадзіся, хапай колькі зможаш, і прынясі іх мне. Чым больш жэтонаў прынясеш, тым лепшыя пярсцёнкі я табе дам! Але будзь уважлівы: ты можаш увайсці ў сховішча толькі _адзін раз_! Уваход прама тут!
actors.mobs.npcs.imp.vault_reminder=Уваход у сховішча прама тут. Заходзь і хапай тыя жэтоны!
actors.mobs.npcs.imp.vault_no_tokens=Вярнуўся з пустымі рукамі? Шкада, сховішча цяпер запячатана.
actors.mobs.npcs.imp.vault_done=Мы ўжо скончылі нашы справы. Удачы там!
actors.mobs.npcs.imp.reward_prompt=У цябе %d Дварфаўскіх Жэтонаў. Чаго б ты хацеў?
actors.mobs.npcs.imp.reward_gold=Абмяняць %d жэтонаў на %d золата
actors.mobs.npcs.imp.reward_ring1=Абмяняць 5 жэтонаў на пярсцёнак +1
actors.mobs.npcs.imp.reward_ring2=Абмяняць 10 жэтонаў на пярсцёнак +2
actors.mobs.npcs.imp.reward_gold_done=Ты атрымаў %d золата!
actors.mobs.npcs.imp.desc=Нячысцікі - малодшыя дэманы. Характэрныя яны не сілай або магічным майстэрствам, а розумам і сацыялізіраванасцю. Многія нячысцікі аддаюць перавагу жыццю сярод ня дэманаў.

actors.mobs.npcs.impshopkeeper.name=Абміцыёзны нячысцік
actors.mobs.npcs.impshopkeeper.greetings=Вітаю, %s!
actors.mobs.npcs.impshopkeeper.greetings_ascent=Што ты зрабіў, %s? Хутчэй купляй, мне трэба выбірацца адсюль!
actors.mobs.npcs.impshopkeeper.thief=Я думаў, што магу давяраць табе!
actors.mobs.npcs.impshopkeeper.buyback=Бес з радасцю вяртае ваш тавар.
actors.mobs.npcs.impshopkeeper.desc=Бес зладзіў маленькі магазінчык на мяжы ўнутраных залаў. Прыемна бачыць прыязны твар, але яго цэны вызначана не здаюцца такімі ж прыязнымі.

actors.mobs.npcs.mirrorimage.name=люстраная копія
actors.mobs.npcs.mirrorimage.desc=Гэтая ілюзія з'яўляецца вашай дакладнай копіяй, і нават ўзброена тымі ж зброяй і даспехамі, што і вы.\n\nЛюстраныя копіі бясплатныя, і прымаюць матэрыяльную форму толькі пры атацы. Іх зброя паводзіць сябе так жа, як і ваша, але наносіць менш страт. \n\nІлюзіі здольныя атакаваць і ўхіляцца, але знікнуць адразу ж пры атрыманні любых страт.
actors.mobs.npcs.mirrorimage.discover_hint=Люстраныя вобразы — гэта ілюзорныя копіі героя, якія адцягваюць ворагаў. Яны знікаюць пасля атрымання любой шкоды.

actors.mobs.npcs.npc.discover_hint=Гэта дружалюбны персанаж. Пагаварыце з ім!

actors.mobs.npcs.prismaticimage.name=вясёлкавая копія
actors.mobs.npcs.prismaticimage.desc=Гэтая мігатлівая ілюзія мае з вамі блізкае падабенства, аж да вашай зброі і брані.\n\nВясёлкавыя копіі паспрабуюць адцягнуць на сябе ўвагу ворагаў. Хоць яны і не так добрыя ў атацы, як люстраныя копіі, затое яны маюць павышаную трываласць і атрымліваюць перавагі вашай брані.\n\nКалі здароўе копіі ўпадзе да нуля, яна знікне на некалькіх хадоў. У гэты час яе ўсё яшчэ можна вылечыць. Калі паблізу не застаецца ворагаў, вясёлкавыя копіі знікаюць і ўз'ядноўваюцца са сваім гаспадаром.
actors.mobs.npcs.prismaticimage.discover_hint=Прызматычныя вобразы — гэта ілюзорныя копіі, якія абараняюць героя. Яны прымаюць на сябе шкоду замест вас.

actors.mobs.npcs.ratking.name=кароль пацукоў
actors.mobs.npcs.ratking.not_sleeping=Я не сплю!
actors.mobs.npcs.ratking.what_is_it=Што такое? У мяне няма часу на гэтыя глупствы. Каралеўства само сабой не будзе кіраваць!
actors.mobs.npcs.ratking.confused=Шт... Дзе я? Маё каралеўства мае патрэбу ва мне!
actors.mobs.npcs.ratking.crown_clothes=Апраніся! Не належыць простага чалавека ў такім выглядзе размаўляць з членамі каралеўскай сям'і!
actors.mobs.npcs.ratking.crown_desc=Оооо, гэтая карона для мяне?! Яна выглядае значна больш бліскучай, чым мая, таму я міласціва яе прымаю!\n\nЯ думаю, што магу прапанаваць табе нешта ў якасці ўзнагароды за гэтую карону. Велізарная сіла, належная такому герою, як ты! Табе б гэта спадабалася?
actors.mobs.npcs.ratking.crown_yes=Ну канешне!
actors.mobs.npcs.ratking.crown_info=Спачатку раскажы, пра што гэта.
actors.mobs.npcs.ratking.crown_no=Не, не трэба...
actors.mobs.npcs.ratking.crown_thankyou=Хе-хе-хе, дзякуй! А цяпер ідзі і зрабі так, каб твой кароль ганарыўся табой!
actors.mobs.npcs.ratking.crown_fine=Добра! Не то што бы я гэтага хацеў...
actors.mobs.npcs.ratking.crown_after=Атрымліваеш асалоду ад сваёй новай брані? Ніякіх зваротаў!
actors.mobs.npcs.ratking.desc_crown=Гэты пацук трохі больш, чым звычайны сумчаты пацук. Ён носіць карону Караля Дварфаў.
actors.mobs.npcs.ratking.desc_birthday=Гэты пацук трохі больш, чым звычайны сумчаты пацук. Ён носіць невялікую зялёную карону замест звычайнай. С Днем нарадження, Кароль Пацукоў!
actors.mobs.npcs.ratking.desc_winter=Гэты пацук трохі больш, чым звычайны сумчаты пацук. Яна носіць невялікі святочны каўпак, замест звычайнай кароны. Шчаслівых святаў!
actors.mobs.npcs.ratking.desc=Гэты пацук трохі больш, чым звычайны сумчаты пацук. Ён носіць невялікую карону.
actors.mobs.npcs.ratking.discover_hint=Гэта Крысіны Кароль — загадкавы крысіны манарх, які ховаецца ў нейкім сакрэтным месцы.

actors.mobs.npcs.sheep.name=авечка
actors.mobs.npcs.sheep.baa!=Бээ!
actors.mobs.npcs.sheep.baa?=Бээ?
actors.mobs.npcs.sheep.baa.=Бээ.
actors.mobs.npcs.sheep.baa...=Бээ...
actors.mobs.npcs.sheep.def_verb=заблакаваў
actors.mobs.npcs.sheep.desc=Гэта чароўная авечка. Што ў ёй чароўнага? Яе нельга забіць. Яна будзе тут стаяць, пакуль чароўным чынам не знікне, жуючы жуйку з пустым позіркам.
actors.mobs.npcs.sheep.discover_hint=Гэта магічная авечка. Яна не зробіць вам нічога дрэннага, але і дапамагчы не можа.

actors.mobs.npcs.shopkeeper.name=гандляр
actors.mobs.npcs.shopkeeper.thief=Злодзей, Злодзей!
actors.mobs.npcs.shopkeeper.warn=Ну глядзі мне! Я не буду паўтараць двойчы.
actors.mobs.npcs.shopkeeper.flee=Вы пашкадуеце аб гэтым!
actors.mobs.npcs.shopkeeper.sell=Прадаць прадмет
actors.mobs.npcs.shopkeeper.talk=Пагутарыць
actors.mobs.npcs.shopkeeper.buyback=Прадавец неахвотна вяртае ваш тавар.
actors.mobs.npcs.shopkeeper.talk_prison_intro=У мяне ёсць усё неабходнае для прыгод!
actors.mobs.npcs.shopkeeper.talk_prison_warrior=У цябе цікавая пячатка. Звычайна іх носяць цэлымі. Ты выгнаны герой ці нешта падобнае? Што ж, што б ты не нарабіў, гэта відавочна не мая справа. Грошы не пахнуць.
actors.mobs.npcs.shopkeeper.talk_prison_mage=Хі-хі, здаецца, у горадзе я бачыў аб'яву аб вышуку з тваім імем. Ты што, у бегах? А, ты невінаваты? Вядома, вядома... Не турбуйся, у мяне ёсць справы больш важныя, чым клікаць варту. Але, можа быць, купіш нешта, каб я не перадумаў?
actors.mobs.npcs.shopkeeper.talk_prison_rogue=Ты прыйшоў з Гільдыі злодзеяў, каб прагнаць монстраў? Не, проста закупіцца? Тады забі хоць бы пару пачвараў, раз ужо ты тут. На зніжку таксама не разлічвай. Я плачу вам добрыя грошы за абарону, а вы ледзь забяспечваеце маю бяспеку тут.
actors.mobs.npcs.shopkeeper.talk_prison_huntress=Вы, здаецца, не ў сваёй талерцы, пані. Вузкія калідоры падзямелляў не такія прасторныя, як вялікія каралеўскія залы або леса навокал горада, ці не так? Хе-хе, не звяртайце ўвагі на маю балбатню, чаму б вам што-небудзь не купіць?
actors.mobs.npcs.shopkeeper.talk_prison_duelist=Ах, гэта ж вандроўны герой! Спрабуеш выратаваць чарговы горад? Што ж, поспехаў. Небяспекі падзямелля значна жудасней, чым сутычкі з бандытамі. Я ўпэўнены, ты справішся лепш астатніх небаракаў, але пастарайся не памерці прама каля маёй крамы. Гэта палохае наведвальнікаў.
actors.mobs.npcs.shopkeeper.talk_prison_cleric=Прывітанне, Клірык! У мяне ёсць святыя прадметы, якія могуць быць вам карысныя. Загляньце ў мой асартымент!
actors.mobs.npcs.shopkeeper.talk_caves=Марнуй грошы - жыві далей.\n\nА, і перадай ад мяне прывітанне тролю-кавалю, калі ўбачыш яго. Нагадай яму, што хтосьці усё яшчэ павінен мне грошы за той малаток, які я прадаў на мінулым тыдні!
actors.mobs.npcs.shopkeeper.talk_city=Мае тавары не раз выратуюць цябе.\n\n...І не марудзь, калі ласка. Спатрэбілася цэлая вечнасць, каб мясцовыя пакінулі мяне ў спакоі. Я не хачу, каб ты прыцягнуў якія-небудзь непрыемнасці!
actors.mobs.npcs.shopkeeper.talk_halls=Хэй, ты, у  мяне ёсць асаблівыя зніжкі для паляўнічых за галовамі дэманаў!\n\nБудзь асцярожны там! Дэманам пляваць, наколькі ты самаўпэўнены. Калі памрэш - не зможаш вярнуцца і выдаткаваць свае грошы! ;)\n\nЦі падабаюся я дэманам? Хе-хе, ну, не зусім. Я проста малы хлопец. Не тое, што б баец, але мне ўдалося захаваць розум ясным. Дэманы знізу нашмат мацней, але ўсіх іх заняволіў... ну, увогуле... проста будзь акуратны.
actors.mobs.npcs.shopkeeper.talk_ascent=Я без паняцця, што ты збіраешся рабіць з гэтым кудменем, і нават ведаць не хачу. Купі чаго-небудзь і спяшайся, нам абодвум трэба сыходзіць адсюль!
actors.mobs.npcs.shopkeeper.desc=Гэты поўны хлопец лепш глядзеўся б у гандлёвым раёне буйнога горада, чым у падзямелле. Яго кошты тлумачаць, чаму ён вырашыў асталявацца тут.

actors.mobs.npcs.wandmaker.name=стары чарадзей
actors.mobs.npcs.wandmaker.intro_warrior=А, вітаю цябе! Як прыемна сустрэць ваяра з поўначы ў гэтым гнятлівым месцы! Ты, напэўна, доўгі шлях прарабіў, каб дабрацца сюды. Калі ты не супраць дапамагчы пажылому чалавеку, у мяне ёсць заданне.
actors.mobs.npcs.wandmaker.intro_rogue=Божа, ты мяне напалохаў! У гэтых месцах я не сустракаў бандыта, які захаваў свой розум, так што ты, відаць, з паверхні! Калі ты не супраць дапамагчы незнаёмцу, у мяне ёсць для цябе заданне.
actors.mobs.npcs.wandmaker.intro_mage=Дзень добры, %s! Я чуў, ты навёў шуму ў Інстытуце чарадзеяў? Я ніколі не любіў гэтых напышлівых снобаў. Калі хочаш, у мяне ёсць для цябе заданне.
actors.mobs.npcs.wandmaker.intro_huntress=Прывітанне, пані! Прыязны твар у гэтым месцы - сапраўдны сюрпрыз, ці не так? Калі шчыра, гатовы паспрачацца, што ўжо бачыў твой твар дзесьці, але ніяк не магу ўспомніць... А, усё роўна, калі ты шукаеш прыгод, у мяне ёсць заданне.
actors.mobs.npcs.wandmaker.intro_duelist=Прывітанне, пані! Які неверагодна прыемны сюрпрыз сустрэць выдатную гераіню з непамутненным розумам у гэтым змрочным і панурым месцы! Калі вы згодныя дапамагчы старому, то ў мяне ёсць для вас просьба.
actors.mobs.npcs.wandmaker.intro_cleric=А, Клірык! Я чуў аб вашых здольнасцях. Дапамажыце мне, і я ўзнагароджу вас адным з маіх жазлоў.
actors.mobs.npcs.wandmaker.intro_1=\n\nЯ прыйшоў сюды, каб знайсці рэдкі інгрэдыент для палачкі, але заблукаў, а мой магічны шчыт паступова слабее. Неўзабаве мне давядзецца пакінуць гэтае месца, але я вельмі не хачу вяртацца з пустымі рукамі.
actors.mobs.npcs.wandmaker.intro_dust=Я шукаю _прах мерцвяка_. Гэта асаблівы від здробненых праклятых костак, звычайна сустракаецца ў падобных месцах. Дзесьці тут павінна знаходзіцца заваленая пакоя, у якой ёсць пыл. Аднак будзь напагатове: праклён, які ляжыць на пылу, досыць магутны. Вярніся да мяне як мага хутчэй - і я здыму яго.
actors.mobs.npcs.wandmaker.intro_ember=Я шукаю _попел элементаля_, які атрымліваюць з маладых вогненных элементаляў. Яны звычайна з'яўляюцца, калі рытуал прызыву не кантралюецца. Знайдзі свечкі і кропку прызыву, і, я ўпэўнены, што у цябе атрымаецца аднаго сустрэць. Ты, магчыма, не захочаш тушыць сябе, таму раю мець пры _што-небудзь для замарозкі_. Элементали вельмі моцныя, але лёд хутка астудзіць іх запал.
actors.mobs.npcs.wandmaker.intro_berry=Былая захавальніца гэтай турмы вырошчвала _гнілаягаду, _ і я шукаю яе насенне. Расліна, хутчэй за ўсё, зусім здзічэла, так што дастаць насенне можа быць складаней, чым звычайна. Сад павінен быць дзесьці тут. Пастарайся _трымацца далей ад яго плетачнікаў,_ калі не хочаш страціць галаву. Магчыма, табе захочацца падпаліць сад, але, прашу, не рабі гэтага - так ты знішчыш насенне.
actors.mobs.npcs.wandmaker.intro_2=\n\nКалі ты справішся, я буду рады аддзячыць цябе адной са сваіх выдатных палачак! У мяне дзве ёсць з сабой, абярэш, якая табе па душы.
actors.mobs.npcs.wandmaker.reminder_dust=Як поспехі з прахам, %s? Шукай забарыкадаваныя праходы, ён павінен быць дзесьці там.
actors.mobs.npcs.wandmaker.reminder_ember=Як поспехі з попелам, %s? Табе трэба знайсці свечкі і кропку прызыву.
actors.mobs.npcs.wandmaker.reminder_berry=Як поспехі з насеннем гнілаягады, %s? Пашукай пакой, поўны расліннасці.
actors.mobs.npcs.wandmaker.def_verb=заблакаваў
actors.mobs.npcs.wandmaker.desc=Гэты пажылы мужчына ў росквіце сіл злёгку занепакоены. Яго абараняе магічны шчыт.



###mobs
actors.mobs.acidic.name=кіслотны скарпід
actors.mobs.acidic.desc=Гэтыя велізарныя, павукападобныя дэманічныя істоты пазбягаюць блізкі бой, і замест гэтага аддаюць перавагу страляць здалёк вышчэрбленымі шыпамі. З гэтага прама капае з'едлівая кіслата.

actors.mobs.albino.name=пацук-альбінос
actors.mobs.albino.desc=Гэта рэдкая разнавіднасць сумчатых пацукоў з абсалютна белым мехам і вышчэрбленымі зубамі.
actors.mobs.albino.discover_hint=Альбінос — гэта рэдкі варыянт крысы, у якога больш здароўя і які можа выклікаць крывацёк.

actors.mobs.armoredstatue.name=браняваная статуя
actors.mobs.armoredstatue.desc=На першы погляд гэта ўсяго толькі адна з нерухомых статуй гэтага падзямелля, але яе выдаюць чырвоныя вочы, якія свецяцца.\n\nПадобна на тое, што яна ў выдатнай форме і, верагодна, будзе надзвычай цяжка яе забіць.
actors.mobs.armoredstatue.desc_arm_wep=Гэтая статуя на дзіва рэалістычна зроблена. Яна трымае %1$s і апранута ў %2$s.

actors.mobs.bandit.name=вар'ятны бандыт
actors.mobs.bandit.desc=Гэты худы гуманоід з чырвонымі вачыма хаваецца ў цені. Бандыт — гэта рэдкі варыянт злодзея, які выкарыстоўвае пракляыя прадметы.

actors.mobs.bat.name=лятучая мыш-вампір
actors.mobs.bat.desc=Гэтыя шустрыя і вынослівыя насельнікі пячор куды больш небяспечныя, чым здаецца. Яны аднаўляюць сваё здароўе з кожнай паспяховай атакай, што дазваляе ім пераадольваць значна больш буйных праціўнікаў.

actors.mobs.bee.name=залатая пчала
actors.mobs.bee.desc_honey=Нягледзячы на свой малы памер, залатыя пчолы звычайна вельмі люта абараняюць сваё жыллё. Але гэтая пчала задобрена і, падобна, хоча ісці за вамі.
actors.mobs.bee.desc=Нягледзячы на свой малы памер, залатыя пчолы звычайна вельмі люта абараняюць сваё жыллё.  Гэта зусім з глузду з'ехала, лепш трымацца ад яе як мага далей.
actors.mobs.bee.discover_hint=Пчолы — гэта дружалюбныя істоты, якія атакуюць вашых ворагаў. Яны ствараюцца пры разбіванні гаршка з мёдам.

actors.mobs.brute.name=гнол-граміла
actors.mobs.brute.enraged=у лютасьці
actors.mobs.brute.def_verb=заблакаваў
actors.mobs.brute.desc=Грамілы - самыя буйныя, моцныя і дужыя з гнолаў. Атрымаўшы смяротнае раненне, яны ўпадаюць у шаленства, атрымліваюць часовы шчыт і наносяць больш страт сваім ворагам.
actors.mobs.brute$bruterage.name=лютасць грамілы
actors.mobs.brute$bruterage.desc=Гэты гнолл-граміла памірае, але хоча забраць вас з сабой!\n\nГэты гнолл памрэ, калі скончыцца дзеянне яго шчыта: альбо па заканчэнні часу, альбо ад нанесеных страт. Да гэтага ён наносіць значна больш моцны ўрон, так што будзьце пільныя!\n\nХадоў засталося: %d.

actors.mobs.causticslime.name=цёмны смоўж
actors.mobs.causticslime.desc=Гэты смоўж, павінна быць, быў заражаны цёмнай магіяй, якая выпраменьваецца з глыбінь. Ён страціў свой звычайны зялёны колер і з яго капае з'едлівая слізь.
actors.mobs.causticslime.discover_hint=Едкі сліз — гэта рэдкі варыянт слізу, які наносіць ед пры атацы і пакідае ядавітую пляму пасля смерці.

actors.mobs.crab.name=сцёкавы краб
actors.mobs.crab.desc=Гэтыя буйныя крабы знаходзяцца на вяршыні харчовага ланцугу ў каналізацыі. Яны вельмі хуткія, а іх тоўсты панцыр дазваляе ім перажыць магутныя ўдары.

actors.mobs.crystalguardian.name=крыштальны вартавы
actors.mobs.crystalguardian.def_verb=заблакаваў
actors.mobs.crystalguardian.desc=Гэтыя вялікія крышталічныя вартавыя выглядалі б амаль як статуі, калі б не іх яркія вочы, якія свецяцца ў цемры. Зацвярдзелы крышталь, з якога яны зроблены, надае ім млявасць і трываласць, таму лепш пакінуць іх спаць у іх крыштальным гняздзе як мага даўжэй._\n\nЗ-за сваіх памераў крыштальныя вартавыя будуць перасоўвацца значна павольней у замкнёных прасторах. Акрамя таго, яны настолькі даўгавечныя, што іх немагчыма забіць адразу. Іх можна збіць з ног і часова вывесці з ладу, але праз некаторы час яны проста адновяцца.
actors.mobs.crystalguardian.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.crystalmimic.name=крыштальны мімік
actors.mobs.crystalmimic.ate=Мімік з'еў ваш %s!
actors.mobs.crystalmimic.escaped=Крыштальны мімік збяжаў!
actors.mobs.crystalmimic.desc=Мімікі - чароўныя істоты, здольныя прымаць любое аблічча. У сутарэннях яны амаль заўсёды прымаюць аблічча куфра, каб прывабіць нічога не падазравалых падарожнікаў.\n\nКрыштальныя мімікі складаней сваіх звычайных субратаў. Яны імкнуцца пазбягаць канфліктаў, але крадуць скарбы. Калі іх выяўляюць, яны спрабуюць схавацца, і, акрамя таго, яны здольныя зрушваць ворагаў з месца, калі яны атакуюць.

actors.mobs.crystalspire.name=крыштальны шпіль
actors.mobs.crystalspire.warning=Крышталь вібруе, калі вы ціснеце на яго. Працягваючы ў тым жа духу, вы абавязкова прыцягнеце да сябе ўвагу...
actors.mobs.crystalspire.alert=Вібрацыя нарастае і грукоча па ўсёй пячоры!
actors.mobs.crystalspire.desc=Гэты гіганцкі шпіль з звышцвёрдых крышталяў, верагодна, з'яўляецца крыніцай усіх дзіўных істот у гэтай пячоры. Звычайная зброя неэфектыўна супраць яго, таму вам трэба будзе выкарыстоўваць кірку, каб знішчыць яго.\n\n_Пераканайцеся, што вы гатовыя, перш чым пачаць парушаць яго._ Здабыванне такога вялікага крышталя, верагодна, зойме некаторы час, і вы не зможаце зрабіць гэта без перашкод. У самога шпіля нават ёсць нейкія сродкі самаабароны. _Магчыма, уласныя атакі шпіля будуць наносиць страты нават яго паслугачам._
actors.mobs.crystalspire.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.crystalwisp.name=крыштальны агеньчык
actors.mobs.crystalwisp.beam_kill=Прамень святла забіў цябе...
actors.mobs.crystalwisp.desc=Маленькі і сярдзіты кавалачак зацвярдзелага крышталя, які выпускае яркае свячэнне, плавае ў паветры. Хоць яны і не асабліва моцныя, крыштальныя згусткі стрэляць у вас разбуральным прамянём святла, калі ў іх будзе чыстая прастора агляду на цэль.\n\nСтруменьчыкі досыць малыя, каб лёгка перамяшчацца па розных крышталічным выступах, але яны не здольныя прабівацца скрозь іх.
actors.mobs.crystalwisp.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.demonspawner.name=рассаднік дэманаў
actors.mobs.demonspawner.on_death=Са смерцю рассадніка дэманічная энергія гэтага месца слабее.
actors.mobs.demonspawner.desc=Гэты віхор сплаваў з плоці дварфаў вырабляе дэманаў-патрашыцеляў з частак дварфаўсіх тэл. Відавочна, дэманы не грэбуюць выкарыстаннем любога падручнага матэрыялу супраць сваіх ворагаў.\n\nМаючы жахлівы выгляд, гэтыя вытворцы дэманаў, з іншага боку, не маюць сродкаў для перамяшчэння або для прамой абароны. Усё ж, іх вялікая маса перашкаджае іх хуткаму знішчэнню, а пры небяспецы яны будуць хутчэй вырабляць дэманаў-патрашыцеляў.\n\n_Рассаднікі дэманаў, падобна, звязаны з нейкай цэнтральнай крыніцай дэманічнай сілы. Іх знішчэнне можа прывесці да яго аслаблення._

actors.mobs.dm100.name=DM-100
actors.mobs.dm100.zap_kill=Вы былі забіты маланкай...
actors.mobs.dm100.desc=DM-100 - ранейшая мадэль дварфаўскага 'абароннага абсталявання', якая была створана для абароны шахцёраў-дварфаў ў пячорах пад гэтай вязніцай. Ўдары электрычным токам гэтых прылад, аднак, апынуліся занадта слабымі, так што іх падарылі чалавечаму гораду вышэй. Але ў горадзе ім не знайшлі прымяненне і праз некалькі гадоў іх адправілі ў вязніцу, дзе вартавыя першапачаткова лічылі, што ўжываць іх - занадта жорстка. Але зняволеныя станавіліся ўсё менш кіраванымі, так што яны сталі неабходныя.

actors.mobs.dm200.name=DM-200
actors.mobs.dm200.vent=DM-200 здзяйсняе выкід таксічных выхлапных газаў!
actors.mobs.dm200.desc=DM-200 - другое пакаленне 'абароннага абсталявання' дварфаў, якое было створана для абароны дварфаўскіх шахцёраў у пячорах і горадзе, які знаходзіцца пад німі. Яно значна больш грувасткае чым папярэднікі, і атакуе зруйнавальнымі гідраўлічнымі кулакамі.\n\nБольш буйны памер DM-200 - іх галоўная ўразлівасць. Яны не змяшчаюцца ў вузкіх тунэлях і дзвярных праёмах падзямелляў. Але дварфы змаглі кампенсаваць непаваротлівасць DM-200 тым, што гэтыя машыны могуць накіроўваць свае таксічныя выхлапы на аддаленых ворагаў або ворагаў, якіх ім не дастаць.

actors.mobs.dm201.name=DM-201
actors.mobs.dm201.vent=DM-201 кідае кіслотную гранату!
actors.mobs.dm201.desc=Дворфы нейкі час эксперыментавалі і далей развівалі мадэлі з нізкай мабільнасцю, як у DM-200, і стварылі некалькі мадэляў DM, якія былі цалкам стацыянарныя. DM-201 - укамплектаваны DM-200, які служыў вартавой вежай без магчымасці перамяшчэння. Кампенсуючы немагчымасць перасоўвацца, у DM-201 значна павышана цягавітасць і магутнасць атакі.\n\nТак як у DM-201 няма рухавіка, з якога выходзілі б выхлапныя газы, дворфы замест гэтага забяспечылі гэтую мадэль гранатамі з газам, які раз'ядае скуру. DM-201, аднак, вельмі асцярожна карыстаецца гэтымі гранатамі і страляе імі толькі ў тым выпадку, калі яго атакуюць здалёк.

actors.mobs.dm300.name=DM-300
actors.mobs.dm300.notice=ЗНОЙДЗЕНЫ НЕАЎТАРЫЗАВАНЫ ПЕРСАНАЛ!
actors.mobs.dm300.shield=DM-300 падключаецца да току ад адкрытых правадоў і стварае сабе шчыт!
actors.mobs.dm300.charging=АТРЫМЛІВАЮЦЬ ПАШКОДЖАННІ! АКТЫВУЮ ВЫСАКАВОЛЬТНУЮ АПОРУ!
actors.mobs.dm300.charging_hint=DM-300 непаражальны, пакуль ён падсілкоўваецца ад высакавольтнай апоры!
actors.mobs.dm300.supercharged=ЗНІШЧЫЦЬ! ЗНІШЧЫЦЬ! ЗНІШЧЫЦЬ!
actors.mobs.dm300.charge_lost=АПОРА ЗНІШЧАНА! ПЕРАХОДЖУ НА ЛАКАЛЬНАЕ ХАРЧАВАННЕ!
actors.mobs.dm300.pylons_destroyed=ТРЫВОГА! ВЫЯЎЛЕНАЯ НЕСТАБІЛЬНАСЦЬ ЭЛЕКТРАСЕТКІ!
actors.mobs.dm300.rankings_desc=Раздушаны DM-300
actors.mobs.dm300.def_verb=заблакаваў
actors.mobs.dm300.defeated=КРЫТЫЧНЫЯ ПАШКОДЖАННІ! СПРОБА АДКЛЮЧЭ-
actors.mobs.dm300.desc=DM-300 - самае буйнае і моцнае 'абароннае абсталяванне', якое была калі-небудзь створана дварфамі. Такую цудоўную машыну надзвычай цяжка стварыць, так што дварфы зрабілі іх усяго некалькі штук для варты уваходаў у іх падземную сталіцу.\n\nМашына абсталявана выхлапной трубой для выкіду таксічных газаў і звышмагутнай дрылём, якой яна можа і атакаваць, і разрываць грунт. DM-300 таксама здольна падлучацца да сеткі харчавання, што яшчэ больш павышае яго сілу.
actors.mobs.dm300.desc_supercharged=У дадзены момант, DM-300 цалкам зараджаны электраэнергіяй. У такім стане DM-300 немагчыма нанесці шкоду, і ён перасоўваецца з двайной хуткасцю! Акрамя таго, яго дрыль цяпер круціцца досыць хутка, каб _прабіць тунэлі скрозь скальны масіў,_ хоць рухацца пры гэтым будзе нашмат павольней.\n\nПакуль DM-300 звышзараджаны, няма сэнсу атакаваць яго наўпрост, _але нешта ў гэтым месцы, відавочна, забяспечвае яго энергіяй._ Калі знайсці гэта і разбурыць, магчыма, гэта яго аслабіць.

actors.mobs.dwarfking.name=Кароль Дварфаў
actors.mobs.dwarfking.notice=Як ты смееш! Ты не маеш ніякага ўяўлення, з чым звязаўся!
actors.mobs.dwarfking.lifelink_1=Мне патрэбна твая жыццёвая сіла, раб!
actors.mobs.dwarfking.lifelink_2=Кроў за караля, раб!
actors.mobs.dwarfking.teleport_1=Займіся ім, раб!
actors.mobs.dwarfking.teleport_2=Не пакідай іх без справы, раб!
actors.mobs.dwarfking.wave_1=Даволі! Паўстаньце, мае рабы!
actors.mobs.dwarfking.wave_2=Яшчэ! Пралейце кроў за караля!
actors.mobs.dwarfking.wave_3=Дарэмна! ЗАБІЦЕ ЯГО!
actors.mobs.dwarfking.enraged=Ты не можаш забіць мяне, %s. Я. БЕЗСМЯРОТНЫ!
actors.mobs.dwarfking.losing=Не! Ты не можаш гэтага зрабіць... ты і паняцця не маеш, што там, у глыбіні...
actors.mobs.dwarfking.defeated=Ты... вырак нас усіх...
actors.mobs.dwarfking.rankings_desc=Схіхілся перад Каралём Дворфаў
actors.mobs.dwarfking.desc=Шмат гадоў таму, адзін з самых высокіх прыдворных чарадзеяў дварфаў адкрыў таямніцы, якія надзялілі яго надзвычайнай уладай над жыццём і смерцю. У хуткім часе ён выкарыстаў гэтую ўладу, падпарадкаваў сваіх таварышчаў, свайго караля, і, у выніку, усіх грамадзян-дварфаў. Цяпер ён кароль, уладар легіёна падначаленай яму нежыці.\n\nКароль Дварфаў - вельмі агрэсіўны праціўнік, які паспрабуе разбіць сваіх ворагаў ардой падпарадкаванай яму нежыці.
actors.mobs.dwarfking$dkghoul.rankings_desc=Схіхілся перад Каралём Дворфаў
actors.mobs.dwarfking$dkmonk.rankings_desc=Схіхілся перад Каралём Дворфаў
actors.mobs.dwarfking$dkwarlock.rankings_desc=Схіхілся перад Каралём Дворфаў
actors.mobs.dwarfking$dkgolem.rankings_desc=Схіхілся перад Каралём Дворфаў

actors.mobs.ebonymimic.name=эбанітавы мімік
actors.mobs.ebonymimic.reveal=Гэта быў мімік!
actors.mobs.ebonymimic.hidden_name=падазроная лінія
actors.mobs.ebonymimic.hidden_desc=Здаецца, тут нешта ёсць, але гэта амаль цалкам празрыста.
actors.mobs.ebonymimic.desc=Эбенавы мімік — гэта магутны мімік, які моцна абараняецца і наносіць вялікую шкоду. Ён маскіруецца пад каштоўную скрыню.
actors.mobs.ebonymimic.discover_hint=Эбенавыя мімікі — гэта рэдкія, моцна абароненыя мімікі. Яны маскіруюцца пад скрыні і наносяць вялікую шкоду.

actors.mobs.elemental$fireelemental.name=вогненны элементаль
actors.mobs.elemental$fireelemental.desc=Элементалі - хаатычныя істоты, якіх часта вырабляюць на свет тады, калі моцная акультная магія не дастаткова кантралюецца. У элементаляў маецца мінімальны розум, і звычайна іх звязваюць з пэўным відам магіі.\n\nВогненныя элементалі - часта сустракаемы від, які прычыняе страты вогненнай магіяй. Яны прыводзяць да ўзгарання сваёй цэлі, якую яны атакуюць ў блізкім баі, і часам яны таксама могуць стрэліць вогненным зарадам.
actors.mobs.elemental$newbornfireelemental.name=нованароджаны вогненны элементаль
actors.mobs.elemental$newbornfireelemental.charging=Элементаль зараджаецца!
actors.mobs.elemental$newbornfireelemental.desc=Элементалі - хаатычныя істоты, якіх часта вырабляюць на свет пры дрэнна кантраляваных рытуалах. У элементаляў маецца мінімальны розум, і звычайна іх звязваюць з пэўным відам магіі.\n\nГэты элементаль полымі быў прызваны нядаўна, але ён ўсё роўна небяспечны.
actors.mobs.elemental$newbornfireelemental.desc_boss=З-за хаатычнай прыроды гэтага прызыву, гэты элементаль можа стрэліць огненнымі ўспышкамі пасля зарадкі, якая доўжыцца адзін ход.
actors.mobs.elemental$newbornfireelemental.desc_ally=З-за прызыву элементаля праз заклінанне, у яго лепей атрымліваецца кантраліраваць полымя. Ён не здольны стрэліць агнём, але можа падпальваць ворагаў пры кантакце.
actors.mobs.elemental$newbornfireelemental.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.
actors.mobs.elemental$frostelemental.name=ледзяны элементаль
actors.mobs.elemental$frostelemental.desc=Элементалі - хаатычныя істоты, якіх часта вырабляюць на свет пры дрэнна кантраляваных рытуалах. У элементаляў маецца мінімальны розум, і звычайна іх звязваюць з пэўным відам магіі.\n\nЛедзяныя элементалі - часта сустракаемы від, які аслабляе сваіх праціўнікаў магіяй холаду. Яны замарожваюць сваю цэль ў блізкім баі, і, часам, нападамі здалёку. Іх магія нашмат больш эфектыўна ў вадзе.
actors.mobs.elemental$shockelemental.name=электрычны элементаль
actors.mobs.elemental$shockelemental.desc=Элементалі - хаатычныя істоты, якіх часта вырабляюць на свет пры дрэнна кантраляваных рытуалах. У элементаляў маецца мінімальны розум, і звычайна іх звязваюць з пэўным відам магіі.\n\nЭлектрычны элементаль - рэдка сустракаемы від, які разрывае сваіх праціўнікаў электрычнымі ўдарамі і выбліскамі святла. У блізкім баі ад іх зыходзяць электрычныя ўдары па змешчаных блізка ворагам, і дадатковыя страты прычыняюцца іх галоўнай цэлі, калі тая знаходзіцца ў вадзе. Яны таксама здольныя час ад часу здалёку накіроўваць выбліск святла на сваю цэль, якая тады на час слепне.
actors.mobs.elemental$chaoselemental.name=элементаль хаоса
actors.mobs.elemental$chaoselemental.desc=Элементалі - хаатычныя істоты, якіх часта вырабляюць на свет пры дрэнна кантраляваных рытуалах. У элементаляў маецца мінімальны розум, і звычайна іх звязваюць з пэўным відам магіі.\n\nЭлементалі хаосу - рэдкі і небяспечны від, які не стабілізаваўся на пэўным элеменце. Пры атацы яны разражаются дзікай і непрадказальнай магіяй.

actors.mobs.eye.name=злое вока
actors.mobs.eye.deathgaze_kill=Вы памерлі ад смяротнага погляду...
actors.mobs.eye.desc=Злыя вочы - падобныя на лятучыя у паветры шары, якія перапоўнены дэманічнай энергіяй. Яны не занадта небяспечныя ў блізкім баі іх сапраўдная сіла заключаецца ў іх магічных здольнасцях.\n\nНазапасіўшы дастаткова энергіі, злое вока здольна выпусціць прамень разбуральнай сілы, званы _смяротным позіркам_. Гэты прамень нанясе велізарны ўрон усяму, што не паспее схавацца ад яго.

actors.mobs.fetidrat.name=смярдзючы пацук
actors.mobs.fetidrat.desc=Нешта дакладна не так з гэтым пацуком. Яго зашмальцаваны чорны мех і гнілая скура зусім не падобныя на здаровых пацукоў, якіх вы бачылі раней. А цьмяныя зялёныя вочы надаюць ёй зусім ужо пужалы выгляд.\n\nЗа пацуком варта жудаснае воблака смуроду, неверагодна моцнае паблізу.\n\nЦёмная слізь капае з рота пацука і раз'ядае падлогу, але раствараецца ў вадзе.
actors.mobs.fetidrat.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.fungalcore.name=грыбны стрыжань
actors.mobs.fungalcore.desc=Гэты гіганцкі грыб, відавочна, з’яўляецца крыніцай усёй грыбковай дзейнасці ў гэтай пячоры.

actors.mobs.fungalsentry.name=грыбны вартавы
actors.mobs.fungalsentry.desc=Гэты асабліва высокі грыб дзейнічае як пункт абароны для вялікай грыбковай сеткі, якая жыве ў гэтай пячоры.\n\nЁн нерухомы, але страляе дакладнымі выбухамі атруты ва ўсё, што трапляе ў поле бачнасці. Нягледзячы на тое, што ўздзеянне гэтых выбухаў даволі слабае, _яны могуць вельмі хутка назапашваць смяротную колькасць атруты._ Яго можна забіць, але, напэўна, лепш пазбягаць гэты грыб.

actors.mobs.fungalspinner.name=грыбная круцёлка
actors.mobs.fungalspinner.desc=Гэты гіганцкі павук мутаваў ад уздзеяння грыбковых спор. Ён плятзе грыбковую павуціну і наносіць ядавітую шкоду.

actors.mobs.ghoul.name=дварфаўскі ваўкалак
actors.mobs.ghoul.desc=Калі дварфаўскае грамадства пачало паступова распадацца, а цяперашні кароль дварфаў захапіў абсалютную ўладу, з тымі, хто былі слабыя ці супраціўляліся яму, звярталіся не асоба ласкава. Калі кароль атрымаў поспех у мастацтве цёмнай магіі, ён падпарадкаваў гэтых дварфаў сваёй волі. Зараз яны пяхотнікі яго войска.\n\nВаўкалакі, самі па сабе, не асабліва моцныя, але яны заўсёды блукаюць групамі. _Когда ваўкалак пераможаны, праз некалькі хадоў ён падымецца зноў, калі паблізу ёсць яшчэ хоць бы адзін ваўкалак._

actors.mobs.gnoll.name=гнол-выведнік
actors.mobs.gnoll.desc=Гнолы - гіенападобныя гуманоіды, якія насяляюць каналізацыі і сутарэнні і перыядычна збіраюцца для рэйдаў на паверхню. Гноллы-выведнікі - звычайныя члены зграі. Яны не такія моцныя, як грамілы, і не такія разумныя, як шаманы.

actors.mobs.gnollexile.name=гнол-выгнанец
actors.mobs.gnollexile.desc=Гэты гнол з шэрай поўсцю мае вялікую пазнаку на плячы, што вызначае яго як выгнанца. Гнолаў звычайна выганяюць з іх грамадства за ігнараванне загадаў або парушэнне законаў. Выгнанцы павінны быць моцнымі і разумнымі, каб выжыць, і гэты, па выглядзе, добра ведае, як выкарыстоўваць дзіду, якую ён трымае.
actors.mobs.gnollexile.desc_passive=_Гнол-выгнанец не рухаецца ў атаку._ Ён не выглядае такім жа агрэсіўным, як іншыя гнолы, і, напэўна, не лічыць, што варта вас атакаваць. Вы б маглі проста даць яму прайсці, але ў яго заплечніку могуць быць карысныя рэчы...
actors.mobs.gnollexile.desc_aggro=_Гнол-выгнанец злобна аглядваецца па баках._ Відаць, штосьці ўсё ж прымусіла яго пайсці ў атаку. Сцеражыцеся яго дзіды!
actors.mobs.gnollexile.seen_passive=Гнол з дзідай падазрона глядзіць на вас, але не рухаецца ў атаку.
actors.mobs.gnollexile.seen_aggro=Гнол з дзідай рухаецца ў атаку!

actors.mobs.gnollgeomancer.name=гнол-геамант
actors.mobs.gnollgeomancer.warning=Геамант пачынае варушыцца. Пераканайцеся, што вы гатовыя, перш чым працягваць!
actors.mobs.gnollgeomancer.alert=Геамант прачынаецца! Здаецца, што ўся пячора зрушваецца, калі яна адскоквае, шалёна смеючыся!
actors.mobs.gnollgeomancer.rock_kill=Цябе забіў валун...
actors.mobs.gnollgeomancer.rockfall_kill=Падаючыя камяні забілі цябе...
actors.mobs.gnollgeomancer.desc=Гэты ўражліва высокі старшы гнол павінен быць крыніцай рознай магіі зямлі і арганізатарам усёй дзейнасці гнолаў. У адрозненне ад гнолаў-сапёраў у гэтым раёне, геамант даволі дасведчаны ў сваёй магіі і не можа быць пашкоджаны кінутымі або падаючымі камянямі. Аднак у яго няма магчымасці змагацца ў блізкім бою.
actors.mobs.gnollgeomancer.desc_armor=Зараз гнол-геамант знаходзіцца ў слоі каменнага даспеха. _Вам трэба будзе падысці бліжэй і адламаць яго кіркай, перш чым вы зможаце пашкодзіць геаманта._
actors.mobs.gnollgeomancer.desc_armor_sapper=_Гнол-сапёр паблізу трымае ў руках прыладу, якая ўзмацняе каменны даспех гнола-геаманта. Вы не зможаце яго пашкодзіць зараз!_
actors.mobs.gnollgeomancer.desc_sleeping=Гэты ўражліва высокі шаман-гнол, які акружаны пластом скалы, выглядае амаль як статуя. Прыгледзеўшыся, можна ўбачыць, як камень чароўным чынам рухаецца ў такт дыханню старэйшага гнола. Яму нельга пашкодзіць, пакуль ён знаходзіцца ў такой скале, і, здаецца, ён атрымлівае асалоду ад літаральнай дрымоты ў брудзе.\n\nВерагодна, вы можаце прабівацца скрозь пласты скалы сваёй кіркай, але _будзьце ўпэўненыя, што вы гатовыя да бітвы, калі зробіце гэта._ Геамант, напэўна, з'яўляецца крыніцай рознай магіі зямлі тут і арганізатарам усёй дзейнасці гнолаў. _Перамагчы гнолаў, раскіданых тут, перш чым змагацца з геамантам, можа быць добрай ідэяй._
actors.mobs.gnollgeomancer.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.gnollguard.name=гнол-вартавы
actors.mobs.gnollguard.def_verb=заблакаваў
actors.mobs.gnollguard.spear_warn=Гнол наносіць моцны ўдар наканечнікам дзіды!
actors.mobs.gnollguard.desc=Гэта вялікі і моцны на выгляд гнол з дзідай і шчытом, але без шлема. Верагодна, гэтыя ахоўнікі - сапраўдныя ваяры, якія дапамагаюць абараняць шахту ад замахаў на дзікую прыроду.\n\nГнол-ахоўнік дастаткова моцны, каб валодаць дзідай у адной руцэ, але ён не можа ім карыстацца вельмі добра. _Яму спатрэбіцца дастаткова адкрытая прастора для атакі на адлегласці, і ён нанясе вам значна менш шкоды, калі вы падыдзеце блізка._
actors.mobs.gnollguard.desc_armor=_Гнол-сапёр, які знаходзіцца побач, трымае ў руках прыладу, якая надзяляе гэтага ахоўніка земляным даспехам, што значна зніжае магчымасць нанесці ім страты._
actors.mobs.gnollguard.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.gnollsapper.name=гнол-сапёр
actors.mobs.gnollsapper.desc=Гэта маленькі і слабы, але разумны гнол са светлай поўсцю і сумкай, поўнай розных прыстасаванняў. Верагодна, яны тут бегаюць, каб дапамагчы з разведкай і здабычай цёмнага золата. Яны здольныя ваяваць, але іх атакі вельмі слабыя, не мацнейшыя за гнолаў-разведчыкаў. Таму, верагодна, гнолы-сапёры маюць побач ахоўніка. \n\nЗамест таго, каб ваяваць наўпрост, сапёры аддаюць перавагу выкарыстоўванню розных гаджэтаў, якія ў іх ёсць, каб вымусіць камяністае асяроддзе за атакаваць іх ворагаў. Аднак самі яны не ведаюць магіі зямлі, і таму, хутчэй за ўсё, будуць выкарыстоўваць свае прылады неабдумана. _Павінна быць шмат спосабаў перавесці іх атакі супраць іх ці іх аховы._
actors.mobs.gnollsapper.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.gnolltrickster.name=гнол-штукар
actors.mobs.gnolltrickster.desc=Нават у параўнанні са звычайнымі гноламі, гэты здаецца трохі дзіўным. Ледзь схіліўшыся наперад з дзікай ухмылкай, ён ледзь не калыхае перакінутую праз плячо сумку. Яго вочы поўныя дзіўнай сумесі страху і асалоды.\n\nУ яго сумцы вялікая калекцыя самаробных дроцікаў, відавочна пакрытых нейкай гадасцю.
actors.mobs.gnolltrickster.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.goldenmimic.name=залаты мімік
actors.mobs.goldenmimic.desc=Мімікі - чароўныя істоты, здольныя прымаць любое аблічча. У сутарэннях яны амаль заўсёды прымаюць аблічча куфра, каб прывабіць нічога не падазравалых падарожнікаў.\n\nЗалатыя мімікі - больш моцныя мімікі, якія імкнуцца прыцягнуць самых моцных падарожнікаў. У іх бываюць скарбы лепей, але яны нашмат мацней звычайных мімікаў.

actors.mobs.golem.name=галем
actors.mobs.golem.def_verb=заблакаваў
actors.mobs.golem.desc=Галемы - спроба выправіць заганы дварфаўскага абсталявання шляхам новаадкрытага выкарыстання магіі. Яны значна больш кампактныя і эфектыўныя ў параўнанні з DM-300, і ўсё яшчэ вельмі смяротныя.\n\nГолемы, усё ж, занадта вялікія, каб змясціцца ў пераходы, але дварфы кампенсавалі гэта новымі магічнымі здольнасцямі. Галемы могуць тэлепартавацца з аднаго памяшкання ў іншае, а таксама могуць тэлепартаваць ворагаў да сябе, калі тыя знаходзяцца па-за зонай дасяжнасці.

actors.mobs.goo.name=Смоўж
actors.mobs.goo.notice=БУЛЬ-БУЛЬ!
actors.mobs.goo.defeated=буль... буль...
actors.mobs.goo.!!!=!!!
actors.mobs.goo.pumpup=Смоўж накачваецца жыжкай!
actors.mobs.goo.enraged=у лютасці
actors.mobs.goo.gluuurp=БУУУУУЛЬК!
actors.mobs.goo.rankings_desc=Паглынены Смоўжам
actors.mobs.goo.desc=Мала што вядома пра Смоўжа. Магчыма, гэта нават не істота, а зборышча брыдкіх субстанцый з каналізацыі, якія нейкім чынам развілі прымітыўны інтэлект. У любым выпадку, цёмная магія - вось прычына існавання Смоўжа.\n\nЯго желейная субстанцыя дазваляе яму паглынаць так шмат цёмнай энергіі, што вы адчуваеце дрыжыкі, калі знаходзіцеся проста побач. Калі Смоўж атакуе вас гэтай энергіяй, доўга вам не пражыць.

actors.mobs.greatcrab.name=старажытны краб
actors.mobs.greatcrab.noticed=Краб абараняецца сваёй велізарнай клюшанню.
actors.mobs.greatcrab.def_verb=заблакаваў
actors.mobs.greatcrab.desc=Гэты краб велізарны нават у параўнанні з іншымі сцёкавымі крабамі. Яго сіні панцыр пакрыты расколінамі і прыліпаламі, выдаючы яго старажытны ўзрост. Ён павольна хістаецца, ледзь утрымліваючы раўнавагу са сваёй гіганцкай клюшанню.\n\nХоць у краба ўсяго адна клюшня, яе памер гэта з лішкам кампенсуе. Краб трымае клюшню перад любой пагрозай, абараняючы сябе ад нападаў непрабіўным шчытом. Аднак, краб не можа блакаваць атакі, якія ён не бачыць або атакі адразу ад некалькіх ворагаў.
actors.mobs.greatcrab.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.guard.name=вартаўнік вязніцы
actors.mobs.guard.scorpion=Ідзі сюды!
actors.mobs.guard.def_verb=заблакаваў
actors.mobs.guard.desc=Калісьці наглядчыкі вязніцы, гэтыя вартавыя даўно сталі такімі ж, як зняволеныя. Як зомбі, яны бессэнсоўна блукаюць па калідорах у пошуках таго, чаго тут не павінна быць - напрыклад, Вас!\n\nЯны носяць ланцуг на поясе, магчыма, каб прыцягваць да сябе ворагаў.

actors.mobs.hermitcrab.name=краб-пустэльнік
actors.mobs.hermitcrab.def_verb=заблакаваў
actors.mobs.hermitcrab.desc=Па нейкай прычыне гэты сцёкавы краб вырашыў апрануць верхнюю палову зламанай бочкі на галаву! Дадатковая вага запаволіла яго да звычайнай хуткасці, але значна ўзмацніла яго абарону. Аднак вы дакладна чуеце, як унутры бочкі штосьці грукоча...

actors.mobs.mimic.name=мімік
actors.mobs.mimic.reveal=Гэты куфар апынуўся мімікам!
actors.mobs.mimic.hidden_hint=Нешта з гэтым куфрам не так... Здаецца, падысці і паспрабаваць адкрыць яго - не лепшая з ідэй.
actors.mobs.mimic.desc=Мімікі - чароўныя істоты, здольныя прымаць любыя аблічча. У сутарэннях яны амаль заўсёды прымаюць аблічча куфра, каб прывабіць нічога не падазравалых падарожнікаў.\n\nМімікі вельмі балюча кусаюцца, але затое ў іх, звычайна, больш скарбаў чым у нармальных куфарах.
actors.mobs.mimic.discover_hint=Вы можаце знайсці гэтага ворага ў любым месцы падзямелля.

actors.mobs.necromancer.name=варажбіт
actors.mobs.necromancer.desc=Гэтыя пачаткоўцы ў цёмнай магіі - варажбіты - сцякаліся ў вязніцу, так як гэта лепшае месца для практыкавання іх цёмнага рамёства.\n\nВаражбіты будуць заклікаць і паляпшаць шкілетаў, якія б'юцца на яго баку. Гэтыя шкілеты будуць існаваць толькі пакуль жывы іх гаспадар.
actors.mobs.necromancer$necroskeleton.name=шкілет варажбіта
actors.mobs.necromancer$necroskeleton.desc=Гэты шкілет быў прызваны варажбітам. Ён паводзіць сябе як звычайны шкілет і памрэ, калі яго гаспадар будзе забіты.

actors.mobs.mob.died=Вы пачулі, як удалечыні хтосьці памёр.
actors.mobs.mob.rage=#$%^
actors.mobs.mob.rankings_desc=Забойца: %s
actors.mobs.mob.discover_hint=Вы можаце знайсці гэтага ворага ў пэўнай частцы падзямелля.

actors.mobs.monk.name=дварф-манах
actors.mobs.monk.def_verb=заблакаваў
actors.mobs.monk.parried=парыраваў
actors.mobs.monk.desc=Гэтыя ваяры-манахі служаць абаронцамі гарадскіх будынкаў. Яны б'юць хутка і дакладна, часам абяззбройваючы сваіх ворагаў.
actors.mobs.monk$focus.name=сфакусаваны
actors.mobs.monk$focus.desc=Гэты манах выдатна вывучыў сваю цэль і, здаецца, прадугледжвае рухі ворага перш, чым ён іх зробіць.\n\nПакуль ён сфакусаваны, наступная фізічная атака, супраць гэтага персанажа гарантавана прамахнецца, незалежна ад абставін. Парыраванне гэтай атакі выдаткуе фокус манаха, і яму трэба будзе зноў набраць яго, каб парыраваць яшчэ адну атаку. Манахі хутчэй засяроджваюцца падчас руху.

actors.mobs.phantompiranha.name=пірання-прывід
actors.mobs.phantompiranha.teleport_away=Пірання-прывід знікла...
actors.mobs.phantompiranha.desc=Пірання-прывід - рэдкая парода піранняў з магічнымі здольнасцямі і жудаснымі напаўпразрыстымі целамі. У выпадку небяспекі яны здольныя тэлепартавацца, каб уцячы ці хутка зблізіцца са сваім ворагам!\n\nХоць біцца з імі непрыемна, мяса піранняў-прывідаў цэніцца за чароўныя ўласцівасці.

actors.mobs.piranha.name=гіганцкая пірання
actors.mobs.piranha.desc=Гэтыя кроважэрныя рыбы насяляюць падземныя воды. Яны вельмі хуткія ў вадзе, але не могуць перамяшчацца па сушы.
actors.mobs.piranha.discover_hint=Вы можаце знайсці гэтага ворага ў любым месцы падзямелля.

actors.mobs.pylon.name=высакавольтная апора
actors.mobs.pylon.desc_inactive=Высакавольтная апора для кіравання электрычнасцю, якія забяспечваюць мясцовае абсталяванне.\n\nУ дадзены момант апора неактыўная і неўспрымальная да страт.
actors.mobs.pylon.desc_active=Высакавольтная апора для кіравання электрычнасцю, якія забяспечваюць мясцовае абсталяванне. Апора патрэсквае ад напружання - напэўна менавіта ад яе зараджаецца DM-300!\n\nУ такім стане апора ўразлівая, але выпускае разрады электрычнасці па суседніх квадратах па гадзіннікавай стрэлцы. Валодаючы цяжкай металічнай канструкцыяй, апоры выносяць вялікую колькасць страт.

actors.mobs.rat.name=сумчаты пацук
actors.mobs.rat.desc=Сумчатыя пацукі - агрэсіўныя, але слабыя насельнікі каналізацыі. У іх адваротны ўкус, але небяспечныя яны толькі ў вялікіх колькасцях.

actors.mobs.ripperdemon.name=дэман-патрашыцель
actors.mobs.ripperdemon.leap=Дэман-патрашыцель гатуецца да скачка!
actors.mobs.ripperdemon.desc=Гэтыя страшныя істоты - рэзультат ужывання дэманічнай сілай мноства трупаў дварфаў ў гэтым рэгіёне. Патрашыцелі - чэзлыя істоты-ваўкалакі, падобныя на дварфаў, але з паламанымі целамі і доўгімі, вострымі клюшнямі, зробленымі з касцей.\n\nДэманы-патрашыцелі не асоба цягавітыя, але яны хуткія і небяспечныя. Яны здольныя скакаць на доўгую адлегласць, каб хутка дабрацца да сваёй цэлі перад тым, як разарваць яе сваімі клюшнямі.

actors.mobs.rotheart.name=сэрца гнілаягады
actors.mobs.rotheart.desc=Плод гнілыягады ўнікальны. Замест раскладання і cтварэння пажыўных рэчываў, плод расце, цвярдзее і захоўвае ў сабе насенне. Ён забяспечвае абарону органаў, якія растуць ўнутры фрукта. Гэтая гіганцкая сфера звычайна і называецца сэрцам гнілаягады.
actors.mobs.rotheart.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.rotlasher.name=гнілапляточнік
actors.mobs.rotlasher.desc=Гнілапляточнікі - частка каранёвай сістэмы прарослай гнілаягады, а таксама яе асноўны сродак абароны. Яны нічога не бачаць і не могуць перамяшчацца, але атакуюць любога, хто апынецца побач. У астатні час яны не рухаюцца, імкнучыся зліцца з навакольнай расліннасцю.
actors.mobs.rotlasher.discover_hint=Вы можаце знайсці гэтага ворага пры выкананні пэўнага квэста.

actors.mobs.scorpio.name=скарпід
actors.mobs.scorpio.desc=Гэтыя велізарныя, павукападобныя дэманічныя істоты пазбягаюць блізкага бою, аддаючы перавагу стрэлам здалёку вышчэрбленымі шыпамі.

actors.mobs.senior.name=манах-настаўнік
actors.mobs.senior.desc=Гэты старэйшы манах — вопытны ваяр з горада гномаў. Ён б'е яшчэ хутчэй і дакладней за звычайных манахаў.

actors.mobs.shaman.name=гнол-шаман
actors.mobs.shaman.bolt_kill=Вас забіла магічная страла...
actors.mobs.shaman.desc=Гнолы-шаманы - разумныя гноллы, якія выкарыстоўваюць баявую магію, кампенсуючы такім чынам недахоп фізічнай сілы. У грамадстве гнолаў іх шануюць нягледзячы на іх выяўленую слабасць.
actors.mobs.shaman$redshaman.spell_desc=Гэты шаман надзеў чырвоную маску і выкарыстоўвае магію, якая часова _аслабіць вашу сілу атакі._
actors.mobs.shaman$blueshaman.spell_desc=Гэты шаман надзеў сінюю маску і выкарыстоўвае магію, якая часова _павялічыць памер стратаў, якія вам наносяцца._
actors.mobs.shaman$purpleshaman.spell_desc=Гэты шаман надзеў барвовую маску і выкарыстоўвае магію, якая часова _знізіць вашу трапнасць і здольнасць ўхілення._

actors.mobs.armoredbrute.name=бранірованы граміла
actors.mobs.armoredbrute.desc=Самыя ўплывовыя гноллы-грамілы часта носяць магутную браню, каб дэманстраваць свой статус. Дзякуючы ёй, яны значна больш цягавітыя ў адносінах да фізічных страт, а іх больш высокі ўзровень дысцыпліны азначае, што яны могуць знаходзіцца ў лютасьці значна даўжэй, перш чым сканаць ад сваіх ран.

actors.mobs.skeleton.name=шкелет
actors.mobs.skeleton.explo_kill=Вы загінулі ад выбуху касцяных аскепак...
actors.mobs.skeleton.def_verb=заблакаваў
actors.mobs.skeleton.desc=Шкілеты складаюцца з костак няўдачлівых падарожнікаў і жыхароў падзямелляў, ажыўленыя уплывам цёмнай магіі з глыбінь. Атрымаўшы дастатковую колькасць страт, яны выбухаюць касцянымі аскепкамі. Аскепкі ад гэтага выбуху шкодныя для ўсяго, што знаходзіцца побач, але даспехi вельмі эфектыўна іх змякчаюць.

actors.mobs.slime.name=смоўж
actors.mobs.slime.def_verb=заблакаваў
actors.mobs.slime.desc=Смоўжы - дзіўныя, збольшага магічныя істоты. Яны эластычныя звонку і вадкія ўнутры. Каналізацыя горада забяспечвае іх вадой і пажыўнымі рэчывамі.\n\nДзякуючы іх расцяжнай анатоміі, вельмі складана нанесці смоўжу больш, чым _6 адзінак страт_ за адзін удар.

actors.mobs.snake.name=сцёкавая змяя
actors.mobs.snake.hint=Паспрабуй выкарыстоўваць кнопку пошуку на змяі, каб даведацца, як з імі змагацца.
actors.mobs.snake.desc=Гэтыя велізарныя змеі здольныя лёгка выслізгваць ад удараў, з-за чаго па іх складана патрапіць. Аднак, магічныя або раптоўныя атакі заспеюць іх знянацку.\n\nВы можаце здзейсніць раптоўную атаку, пакуль змяя вас яшчэ не заўважыла. Паспрабуйце замяніць яе за сабой у дзверы і затым _атакаваць ў момант, калі змяя апынецца ў дзвярным праёме_.

actors.mobs.spectralnecromancer.name=заклінальнік зданяў
actors.mobs.spectralnecromancer.desc=Хоць шкілеты - аснова некрамантыі, некаторыя аддаюць перавагу выкарыстоўваць іншых, менш цялесных паслугачоў. Заклінальнікі зданяў выбралі зданяў у якасці сваіх фаварытаў!\n\nАсобныя прывіды не такія моцныя, як шкілеты, але гэтыя некраманты не баяцца выклікаць іх цэлую кучу!

actors.mobs.spinner.name=пячорны спінер
actors.mobs.spinner.desc=Гэтыя зялёныя і касматыя пячорныя павукі пазбягаюць прамой сутычкі, застаючыся на адлегласці, пакуль іх ахвяра, якая заблыталася ў павуціне, павольна памірае ад атрутнага ўкусу. Яны здольныя выстрэльваць павуцінне на вялікую адлегласць і будуць спрабаваць блакаваць шлях, па якім рухаецца іх ахвяра.

actors.mobs.statue.name=жывая статуя
actors.mobs.statue.def_verb=заблакаваў
actors.mobs.statue.desc=Вы маглі б падумаць, што гэта проста яшчэ адна з неажыўлёных статуй гэтага падзямелля, але яе чырвоныя зіхатлівыя вочы выдаюць яе.
actors.mobs.statue.desc_weapon=Хоць сама статуя зроблена з камню, яе _%s_ выглядае па-сапраўднаму.
actors.mobs.statue.discover_hint=Вы можаце знайсці гэтага ворага ў любым месцы падзямелля.

actors.mobs.succubus.name=сукуб
actors.mobs.succubus.desc=Сукубы - дэманы-пярэваратні, якія маніпулююць свядомасцю сваёй ахвяры. Гэты прыняў вобраз бледнага гатычнага гуманоіда, магчыма, каб прыцягнуць дварфаў-чарнакніжнікаў?\n\nСукубы могуць часова зачараваць суперніка пры атацы, пазбаўляючы яго здольнасці нанесці прамую атаку ў адказ. Калі сукубы атакуюць зачараванага ворага, яны крадуць трохі яго жыццёвай сілы.

actors.mobs.swarm.name=рой мух
actors.mobs.swarm.desc=Смяротны рой мух, які нясносна гудыць. Любая не магічная атака падзеліць яго на два не менш небяспечных роя паменш.

actors.mobs.tengu.name=Тэнгу
actors.mobs.tengu.notice_gotcha=Папаўся, %s!
actors.mobs.tengu.interesting=Давай зробім наша змаганне цікавей...
actors.mobs.tengu.notice_have=Зараз не уцячэш, %s!
actors.mobs.tengu.defeated=Нарэшце вольны...
actors.mobs.tengu.rankings_desc=Быў забіты Тэнгу
actors.mobs.tengu.desc=Знакаміты і загадкавы забойца, названы па імі той маскі, што хавае яго твар.\n\nТэнгу скаваны вялікімі кайданамі на запясцях і нагах, хоць, мабыць, ад саміх ланцугоў ён ужо даўно вызваліўся.\n\nЁн паспрабуе выкарыстоўваць пасткі, ілюзіі і смяротныя атакі, каб прыбраць адзіную перашкоду на шляху да свабоды - Вас.

actors.mobs.tengu$bombability$bombblob.desc=Тут клубіцца воблака дыму. Асцярожней, яно хутка выбухне!
actors.mobs.tengu$bombability$bombitem.name=Дымавая Бомба
actors.mobs.tengu$bombability$bombitem.cant_pickup=Яно як быццам прыбіта да зямлі, вы не можаце зрушыць гэта!
actors.mobs.tengu$bombability$bombitem.desc=Тэнгу кінуў сюды шашку, якая дзіўна выглядае. Яна выпускае густы гарачы дым і гучна цікае, як быццам адлічваючы час для выбуху!\n\nШашка, падобна, прыляпілася да падлогі, таму вы не зможаце падабраць яе.

actors.mobs.tengu$fireability$fireblob.desc=Тэнгу распыліў тут нейкі парашок, які збіраецца загарэцца!

actors.mobs.tengu$shockerability$shockerblob.desc=Паветра тут іскрыцца ад электрычных разрадаў. Падобна на тое, што на наступны ход тут ударыць маланка!
actors.mobs.tengu$shockerability$shockeritem.name=шокар
actors.mobs.tengu$shockerability$shockeritem.cant_pickup=Занадта небяспечна падымаць з падлогі шокар, які працуе!
actors.mobs.tengu$shockerability$shockeritem.desc=Тэнгу кінуў сюды цікавую прыладу, якую ён, відавочна, сабраў з частак робатаў DM-100. Прылада пастаянна іскрыцца ад электрычнага зарада, але перасоўваецца толькі па зададзеным шляху.\n\nУлічваючы, што гэта прылада гэтак наэлектрызавана, вы ніяк не можаце яе падабраць.

actors.mobs.thief.name=вар'ятны злодзей
actors.mobs.thief.stole=Злодзей скраў у Вас %s!
actors.mobs.thief.carries=\n\nЗлодзей нясе %s. Відовочна, гэта рэч скрадзеная.
actors.mobs.thief.escapes=Злодзей збяжаў разам з %s!
actors.mobs.thief.desc=Хоць зняволеныя свабодна ходзяць па-за камер, гэта месца - усё роўна іх вязніца. З часам, акрамя свабоды, яна забрала і іх розум. Гэтыя злодзеі і бандыты ўжо даўно забыліся, хто яны і што яны тут робяць.\n\nГэтыя вар'яты аддаюць перавагу нешта скрасці і ўцячы, чым змагацца да смерці. Не выпускайце іх з-пад увагі, інакш вы можаце ніколі больш не ўбачыць скрадзенае.

actors.mobs.tormentedspirit.name=змучаны прывід
actors.mobs.tormentedspirit.desc=Пакутлівы дух — гэта неспакойная душа, заключаная ў падзямеллі. Ён хоча быць вызвалены, але будзе абараняцца, калі яго атакаваць.
actors.mobs.tormentedspirit.thank_you=Дзякуй...

actors.mobs.warlock.name=дварф-чарнакніжнік
actors.mobs.warlock.bolt_kill=Вас забіла страла цемры...
actors.mobs.warlock.desc=Калі цікавасць дварфаў перайшла ад інжынерыі да чарадзейства, чарнакніжнікі здабылі ўладу ў горадзе. Яны пачыналі са стыхійнай магіі, але неўзабаве перайшлі да дэманалогіі і некрамантыі. Самы моцны з гэтых чарнакніжнікаў захапіў трон у горадзе дварфаў, і яго памагатым дазволілі працягваць заняткі цёмнай магіяй, пакуль яны пакараюць яму сваю волю.\n\nГэтыя чарнакніжнікі валодаюць моцнай разбуральнай магіяй. Яны здольныя часова блакаваць магію паляпшэння, ужытую ў дачыненні да вашых прадметаў. Чым больш прадмет палепшаны, тым мацней на ім адаб'ецца гэты ўплыў.

actors.mobs.wraith.name=Зданя
actors.mobs.wraith.desc=Зданя - гэта помсны дух грэшніка, чыя магіла была патрывожаная. Будучы нематэрыяльнай сутнасцю, зданя лёгка пазбягае атакі простай зброяй.
actors.mobs.wraith.discover_hint=Вы можаце знайсці гэтага ворага ў любым месцы падзямелля.

actors.mobs.yogdzewa.name=Ёг-Джава
actors.mobs.yogdzewa.notice=Я. ТАБЕ. БАЧУ.
actors.mobs.yogdzewa.darkness=Цемра надыходзіць бліжэй...
actors.mobs.yogdzewa.hope=ТВАЯ. НАДЗЕЯ. ГЭТА. ІЛЮЗІЯ.
actors.mobs.yogdzewa.defeated=...
actors.mobs.yogdzewa.rankings_desc=Сожран Ёгам-Джава
actors.mobs.yogdzewa.desc=Ёг-Джава - старажытны Бог; вялікая пачвара, якая дасягае да светаў смяротных і пажырае іх для падтрымання свайго бясконцага росту. Дварфы, мабыць, прыцягнулі ўвагу гэтага касмічнага жаху, калі гуляліся з цёмнай магіяй, і з тых часоў стараліся неяк абмежаваць яго ўплыў.\n\nЁг-Джава жыве ў вымярэнні бясформенага магічнага хаосу і не здольны ўвасобіць свае сапраўднае аблічча ў сучасным свеце. Замест гэтага, бажаство стварыла сваіх аватараў і дэманічных слуг, якія падпарадкоўваюцца яго загадам.\n\nГэта вялізарнае вока з'яўляецца кропкай фокусу сілы Ёг-Джава ў нашым свеце. Само вока нерухома, але яно здольнае выпраменьваць наймагутныя прамяні дэманічнай магіі і заклікаць розныя віды слуг на дапамогу.
actors.mobs.yogdzewa.desc_spawners=Вы адчуваеце хвалі дэманічнай энергіі, якія выпраменьваюцца ў бок вока з паверхаў вышэй. Відавочна, што нешта, што вы пакінулі жывым там, накіроўвае энергію назад у Ёг-Джаву. _Ёг-Джава выкарыстоўвае гэтую энергію для прызыву больш магутных паслугачоў!_
actors.mobs.yogdzewa$larva.name=лічынка бога
actors.mobs.yogdzewa$larva.rankings_desc=Сожран Ёгам-Джава
actors.mobs.yogdzewa$larva.desc=Гэтыя маленькія адроддзя Ёг-Джава - простыя памагатыя, якіх лёгка вырабляць. У адзіночку яны слабыя, але яны хутка прызываюцца і могуць стаць непераадольнымі ў вялікай колькасці.
actors.mobs.yogdzewa$yogripper.rankings_desc=Сожран Ёгам-Джава
actors.mobs.yogdzewa$yogeye.rankings_desc=Сожран Ёгам-Джава
actors.mobs.yogdzewa$yogscorpio.rankings_desc=Сожран Ёгам-Джава

actors.mobs.yogfist.invuln_warn=Далонь абаронена ад любых страт, калі знаходзяцца каля вока.
actors.mobs.yogfist.rankings_desc=Сожран Ёгам-Джава
actors.mobs.yogfist.desc=Гэтая далонь з'яўляецца аспектам моцы Ёг-Джавы. Далоні падвязаныя да сілы Ёг-Джавы, і будуць абаронены ад любых страт, калі знаходзяцца каля вока.
actors.mobs.yogfist$burningfist.name=палаючая далонь
actors.mobs.yogfist$burningfist.desc=Гэтая далонь сфарміравана з хаатычнай вогненнай магіі. Пакуль яна перасоўваецца, яна ўвесь час запальвае сваё асяроддзе. Яна таксама здольная страляць зарадамі вогненнай моцы, якія распаўсюджваюць полымя на тых месцах, куды яны трапляюць.\n\nЗдольнасць далоні запальваць асяроддзе падаўленая паблізу вады, але жар, выходны ад яе, прымусіць ваду выпарацца за кароткі час!
actors.mobs.yogfist$soiledfist.name=земляная далонь
actors.mobs.yogfist$soiledfist.desc=Гэтая далонь сфарміравана з хаатычнай магіі зямлі. Калі яна рухаецца, вакол яе растуць расліны. Яна таксама здольная страляць канцэнтраванымі зямельнымі зарадамі, якія звязваюць цэль хуткарослымі клункамі і каранямі!\n\nГэтая далонь атрымлівае сваю сілу  ад флоры і вытрымае страты ў адпаведнасці з тым, колькі высокай ці вытаптанай травы знаходзіцца блізка ад яе!
actors.mobs.yogfist$rottingfist.name=гніласная далонь
actors.mobs.yogfist$rottingfist.desc=Гэтая далонь сфарміравана з жывой псуты. Гэта велізарная маса плоці, якая раскладаецца, здольная раскідваць атрутную слізь ў блізкім, і атрутны газ у далёкім баі. Што яшчэ горш, замест таго, каб атрымліваць страты наўпрост, яна атрымлівае толькі эфект крывацёку.\n\nЗ дапамогай вады можна змыць слізь, аднак далонь здольная паглынаць ваду і, такім чынам, вылечваць сябе! Акрамя таго, калі яна атрымлівае страты падчас крывацёку, стары эфект абнаўляецца, але новы прытым не накладваецца!
actors.mobs.yogfist$rustedfist.name=іржавая далонь
actors.mobs.yogfist$rustedfist.desc=Гэтая далонь сфарміравана з жывога металу. Гэта масы металу здольна магутна атакаваць ў блізкім бою і калечыць свае цэлі ў далёкім. З-за велізарнай масы гэтая далонь здольная размеркаваць нанесеныя ёй страты па часе.\n\nГэтая далонь, аднак, нягнуткая і не змяшчаецца ў вузкія праходы. Акрамя таго, што яна, вядома, нясе страты не адразу, адкладзеныя страты павялічваюцца, калі далонь трывае трапленне некалькі разоў.
actors.mobs.yogfist$brightfist.name=яркая далонь
actors.mobs.yogfist$brightfist.teleport=Далонь тэлепартыруецца далей ад Вас, ствараючы светлавы выбліск, які моцна асляпляе вас!
actors.mobs.yogfist$brightfist.desc=Гэтая далонь сфарміравана з чыстай светлавой энергіі. Яна здольная кожны ход выпраменьваць магутныя прамяні сляпучага святла! Гэтыя прамяні часова асляпляюць і, акрамя таго, наносяць цяжкія страты. Далонь таксама здольная на кароткі час заліваць арэну сляпучым святлом, каб схавацца.\n\nУ гэтай далоні, аднак, няма асаблівых здольнасцяў, якія яна магла б прымяніць у блізкім баі.
actors.mobs.yogfist$darkfist.name=цёмная далонь
actors.mobs.yogfist$darkfist.teleport=Далонь тэлепартыруецца далей ад Вас, ствараючы цёмны выбліск, які тушыць крыніцы святла!
actors.mobs.yogfist$darkfist.desc=Гэтая далонь сфарміравана з чыстай цёмнай энергіі. Яна здольная кожны ход выпраменьваць магутныя прамяні цёмнай магіі! Гэтыя прамяні аслабляюць вашу крыніца святла і прычыняюць цяжкія страты. Далонь таксама здольная на кароткі час заліваць арэну цемрай, каб схавацца.\n\nУ гэтай далоні, аднак, няма асаблівых здольнасцяў, якія яна магла б прымяніць у блізкім баі.


actors.char.kill=%s забівае вас...
actors.char.defeat=%s загінуў.
actors.char.def_verb=ухіляецца
actors.char.invulnerable=непаражальны
actors.char.immune=устойлівы
actors.mobs.npcs.vaultlaser.desc=Гэтая вартавая вежа страляе лазерамі праз роўныя прамежкі часу. _Паколькі гэта тэставая зона, лазеры не нанясуць вам сапраўднай шкоды._
actors.mobs.npcs.vaultlaser.name=лазерная вартавая вежа сховішча
actors.mobs.npcs.vaultlaser.hit=Лазер апякае вашу плоць!
actors.mobs.npcs.vaultsentry.desc=Гэтая вартавая вежа сканіруе тэрыторыю па пэўным шаблоне. _Паколькі гэта тэставая зона, вартавая вежа нічога не зробіць, калі вас выявіць._
actors.mobs.npcs.vaultsentry.name=сканіруючая вартавая вежа сховішча
actors.mobs.vaultrat.desc=Гэты пацук мае змены ў паводзінах для тэставання новага ШІ ворагаў сховішча:\n_-_ Яго рух можна «пачуць» праз сцены\n_-_ Ён будзе блукаць па загадзя зададзеным маршруце\n_-_ Падчас блукання яго дальнасць выяўлення значна зніжана ззаду адносна кірунку руху.\n_-_ Падчас сну яго дальнасць выяўлення таксама зніжана\n_-_ Калі ён вас выявіць, ён будзе «расследаваць» перад пераходам да палявання. Ворагі, якія расследуюць, рухаюцца да вас, але не атакуюць, і іх лягчэй згубіць за дзвярыма і вугламі.
actors.mobs.vaultguardian.name=\u0432\u0430\u0440\u0442\u0430\u045e\u043d\u0456\u043a \u0441\u0445\u043e\u0432\u0456\u0448\u0447\u0430
actors.mobs.vaultguardian.desc=\u0410\u045e\u0442\u0430\u043c\u0430\u0442\u044b\u0447\u043d\u044b \u0432\u0430\u0440\u0442\u0430\u045e\u043d\u0456\u043a \u0441\u0445\u043e\u0432\u0456\u0448\u0447\u0430, \u043f\u0430\u0431\u0443\u0434\u0430\u0432\u0430\u043d\u044b \u0433\u043d\u043e\u043c\u0430\u043c\u0456. \u042f\u0433\u043e \u043c\u0435\u0442\u0430\u043b\u0456\u0447\u043d\u044b \u043a\u043e\u0440\u043f\u0443\u0441 \u0433\u0443\u0434\u0437\u0456\u0446\u044c \u0430\u0434 \u043b\u0435\u0434\u0437\u044c \u0441\u0442\u0440\u044b\u043c\u043b\u0456\u0432\u0430\u043d\u0430\u0439 \u044d\u043d\u0435\u0440\u0433\u0456\u0456. \u0412\u043e\u043d \u043a\u0443\u0434\u044b \u043c\u0430\u0446\u043d\u0435\u0439\u0448\u044b \u0437\u0430 \u0437\u0432\u044b\u0447\u0430\u0439\u043d\u0430\u0433\u0430 DM-200, \u0456 \u0441\u0442\u0430\u043d\u043e\u0432\u0456\u0446\u0446\u0430 \u0445\u0443\u0442\u0447\u044d\u0439\u0448\u044b\u043c \u0437 \u043d\u0430\u0440\u0430\u0441\u0442\u0430\u043d\u043d\u0435\u043c \u0442\u0440\u044b\u0432\u043e\u0433\u0456 \u045e \u0441\u0445\u043e\u0432\u0456\u0448\u0447\u044b.
