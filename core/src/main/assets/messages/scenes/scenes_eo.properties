scenes.welcomescene.update_intro=Sacred Pixel Dungeon estas ĝisdatigita!
scenes.welcomescene.update_msg=La versio 3.3 liveras testejon por la venonta refaro de la misio en la metropolo, novajn aĵojn kaj pliajn etajn plibonigojn kaj erar-riparojn.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon estas flikita!
scenes.welcomescene.patch_bugfixes=Tiu ĉi ĝisdatigo riparas erarojn.
scenes.welcomescene.patch_translations=Tiu ĉi ĝisdatigo liveras plibonigojn por tradukoj.
scenes.welcomescene.patch_balance=Tiu ĉi ĝisdatigo liveras plibonigojn por ludada ekvilibro.
scenes.welcomescene.patch_msg=Tiu ĉi ĝisdatigo ankaŭ liveras kelkajn etajn plibonigojn por rendimento.
scenes.welcomescene.what_msg=Ŝajnas, ke viaj estantaj konservitaj ludoj estas de venonta versio de Sacred Pixel Dungeon!\n\nEstu singarda! Viaj konservitaj ludoj povas enhavi aĵojn, kiuj ne ekzistas en ĉi tiu versio, tio povas kaŭzi iujn strangajn erarojn.
scenes.welcomescene.lang_warning_title=Nekompleta traduko
scenes.welcomescene.lang_warning_msg=Iom da enhavo de tiu ĉi ĝisdatigo ankoraŭ ne estas tradukita.\n\nKelkaj frazoj povas esti en la angla.\n\nLa traduk-skipoj laboras pri tio ĉi, kaj la plena traduko povas esti disponebla baldaŭ.\n\nNi petas pri via pacienco.
scenes.welcomescene.continue=Pluigi
scenes.welcomescene.changelist=Ŝanĝoj
scenes.welcomescene.save_warning=Sacred Pixel Dungeon interrompiĝis dum konservi vian lud-staton. La ludo havas protekton kontraŭ tiajn okazojn, do viaj datumoj probable ne difektiĝis. \n\nTiu ĉi eraro kutime okazas kiam la aparato subite perdas energion aŭ kiam la operaciumo ĉesigas la procezon de Sacred malebliganta al ĝi ĝuste fermiĝi. Ĉe porteblaj aparatoj la eraro povas okazi pro bateri-ŝpariloj. Se tiu ĉi eraro ofte okazas, provu restartigi vian aparaton.
scenes.welcomescene.controller_title=Stiri per ludstirilo
scenes.welcomescene.controller_body=Ĉu vi ludas per ludstirilo? Uzu la dekstran stangeton por regi kursoron.\n\nPremu RT/R2 aŭ dekstran stangeton por elekti ion per kursoro.
