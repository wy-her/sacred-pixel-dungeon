scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon estas ofte ĝisdatigata kaj tiuj ĝisdatigoj aŭ liveras signifajn ŝanĝojn al la ludo aŭ eĉ liveras tute novan enhavon!\n\nLudada ekvilibro estas ofte plibonigata, do specifaj aĵoj/herooj/monstroj ne estas tro fortaj aŭ malfortaj.\n\nĜisdatigoj ankaŭ liveras erar-riparojn kaj aliajn plibonigojn al stabileco.
