scenes.titlescene$changesbutton.versioned_title=Elérhető frissítés: %s
scenes.titlescene$changesbutton.desc=A Sacred Pixel Dungeon rendszeresen frissül nagyjavításokkal a meglévő tartalmakhoz, vagy teljesen új tartalmakkal!\n\nA játék egyensúlya is gyakran tökéletesedik a játék frissítéseivel, hogy az egyes tárgyak/hősök/ellenségek se nem túl erősek, se nem túl gyengék ne legyenek.\n\nA frissítések tartalmazhatnak hibajavításokat, és egyéb különféle stabilitásnöveléseket.
scenes.titlescene$changesbutton.update=Tovább a frissítésekhez
scenes.titlescene$changesbutton.changes=Jelenlegi változtatások

scenes.welcomescene.update_intro=Frissült a Sacred Pixel Dungeon!
scenes.welcomescene.update_msg=A v3.3 tartalmaz egy új tesztelhető területet a városi küldetés közelgő átalakításához, új tárgyakat, valamint egy sor kisebb módosítást és fejlesztést.
scenes.welcomescene.patch_intro=A Sacred Pixel Dungeon javítást kapott!
scenes.welcomescene.patch_bugfixes=Ez a javítás hibákat orvosol.
scenes.welcomescene.patch_translations=Ez a javítás fordításokat frissít.
scenes.welcomescene.patch_balance=Ez a javítás kiegyensúlyozottabbá teszi a játékmenetet.
scenes.welcomescene.patch_msg=Ebben a javításban van néhány kisebb finomhangolás és teljesítményjavítás.
scenes.welcomescene.what_msg=Úgy tűnik, a jelenleg mentett fájlod a Sacred Pixel Dungeon egy újabb verziójával készült!\n\nÓvatosan! A mentésedben lehetnek olyan dolgok, amelyek ebben a verzióban még nincsenek meg, és ez nagyon kellemetlen hibákat okozhat.
scenes.welcomescene.lang_warning_title=Félkész fordítás
scenes.welcomescene.lang_warning_msg=Több, a frissítésben megjelent új tartalom nincs még lefordítva.\n\nNéhány mondat lehet, hogy angolul van.\n\nA fordítócsapat már dolgozik rajta, hamarosan elkészül a teljes fordítás.\n\nKöszönet a türelmedért.
scenes.welcomescene.continue=Folytatás
scenes.welcomescene.changelist=Változások
scenes.welcomescene.save_warning=A Sacred Pixel Dungeon nemrég bezáródott a játékadatok mentése közben. A Sacred beépített védelemmel rendelkezik ez ellen, így a játékadatoknak nem lesz semmi baja.\n\nEz általában akkor fordul elő, ha a készüléked hirtelen elveszíti az áramellátást, vagy ha a Sacred úgy fejezi be a játékot, hogy nem záródott be rendesen. Az akkumulátorkímélő funkciók gyakran okozhatnak ilyet a mobileszközökön. A készülék újraindítása is segíthet, ha gyakran látod ezt a hibát.
scenes.welcomescene.controller_title=Vezérlős irányítás
scenes.welcomescene.controller_body=Vezérlővel játszol? Használd a jobb botkormányt a képernyőn megjelenő kurzor irányításához.\n\nNyomd meg az RT/R2 vagy a jobb botkormányt a kurzorral történő kiválasztáshoz.
