scenes.welcomescene.update_intro=Sacred Pixel Dungeon обновлён!
scenes.welcomescene.update_msg=v3.3 включает в себя тестовую область для предстоящего обновления квеста глубины города, новые предметы, а так же пару небольших исправлений и улучшений.
