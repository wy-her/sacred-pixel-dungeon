scenes.welcomescene.update_intro=Sacred Pixel Dungeon foi atualizado!
scenes.welcomescene.update_msg=v3.3 inclui uma área de testes para a próxima reformulação da missão na cidade, novos itens e uma série de pequenos ajustes e melhorias.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon foi atualizado!
scenes.welcomescene.patch_bugfixes=Esta atualização inclui correções de erros.
scenes.welcomescene.patch_translations=Esta correção contém atualizações de tradução.
scenes.welcomescene.patch_balance=Esta atualização possui melhoria ao balanço do jogo.
scenes.welcomescene.patch_msg=Esta atualização inclui também alguns ajustes de balanceamento e performance.
scenes.welcomescene.what_msg=Parece que estes arquivos são de uma versão futura de Sacred Pixel Dungeon!\n\nTenha cuidado! Seus arquivos podem conter coisas que não existem nesta versão; isto pode fazer com que erros estranhos aconteçam.
scenes.welcomescene.lang_warning_title=Tradução incompleta
scenes.welcomescene.lang_warning_msg=Parte do novo conteúdo desta atualização ainda não foi traduzido.\n\nAlgumas frases podem estar escritas em inglês.\n\nAs equipes de tradução estão trabalhando para resolver isto e uma tradução completa deve ser enviada em breve.\n\nObrigado por sua paciência.
scenes.welcomescene.continue=Continuar
scenes.welcomescene.changelist=Lista de Mudanças
scenes.welcomescene.save_warning=Sacred Pixel Dungeon foi interrompido ao tentar salvar seus dados de jogo recentemente. Sacred tem proteções internas contra isso, então seus dados de jogo devem estar bem.\n\nIsso geralmente acontece quando o dispositivo perde energia repentinamente ou se encerra o Sacred sem deixá-lo fechar corretamente. Os recursos de economia de bateria geralmente podem causar isso em dispositivos móveis. Reiniciar o dispositivo também pode ajudar se você estiver vendo este erro com frequência.
scenes.welcomescene.controller_title=Entrada do controle
scenes.welcomescene.controller_body=Jogando no controle? Use o analógico direito para controlar um cursor na tela.\n\nPressione RT/R2 ou o analógico direito para selecionar com o cursor.
scenes.welcomescene.controller_okay=Ok

