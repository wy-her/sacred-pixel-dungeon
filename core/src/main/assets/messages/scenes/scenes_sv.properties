scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon uppdateras regelbundet med bearbetning av befintligt spelinnehåll, eller helt nytt innehåll!\n\nSpelbalansen förbättras också ofta i speluppdateringar, så att specifika föremål/hjältar/fiender inte är för starka eller för svaga.\n\nUppdateringar inkluderar även fixar för buggar och diverse stabilitetsförbättringar.
