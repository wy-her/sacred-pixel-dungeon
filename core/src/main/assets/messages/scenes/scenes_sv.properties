scenes.welcomescene.update_intro=Sacred Pixel Dungeon har uppdaterats!
scenes.welcomescene.update_msg=v3.3 innehåller ett testområde för den kommande översynen av stadsuppdraget, nya föremål och en rad mindre justeringar och förbättringar.
