scenes.titlescene$changesbutton.desc=Το Sacred Pixel Dungeon ενημερώνεται τακτικά με τροποποιήσεις στο υπαρκτό περιεχόμενο, καθώς και προσθήκες ολοκαίνουργιων στοιχείων!\n\nΗ ισορροπία του παιχνιδιού βελτιώνεται ώστε κάποια αντικείμενα, ήρωες κι εχθροί να μην είναι υπερβολικά ισχυροί ή ανίσχυροι.\n\nΟι ενημερώσεις περιλαμβάνουν επιδιορθώσεις σφαλμάτων και διάφορες άλλες βελτιώσεις σταθερότητας.
