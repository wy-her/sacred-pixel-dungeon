scenes.welcomescene.update_intro=Το Sacred Pixel Dungeon έχει ενημερωθεί!
scenes.welcomescene.update_msg=Η v3.3 περιλαμβάνει μια δοκιμαστική περιοχή για την επερχόμενη ανανέωση της αποστολής πόλης, νέα αντικείμενα, και πολλές μικρότερες βελτιώσεις και διορθώσεις.
scenes.welcomescene.patch_intro=Το Sacred Pixel Dungeon έχει ενημερωθεί!
scenes.welcomescene.patch_bugfixes=Αυτή η ενημέρωση περιέχει διορθώσεις σφαλμάτων.
scenes.welcomescene.patch_translations=Αυτή η ενημέρωση περιέχει ενημερώσεις μεταφράσεων.
scenes.welcomescene.patch_balance=Αυτή η ενημέρωση περιέχει τροποποιήσεις στην ισορροπία του παιχνιδιού.
scenes.welcomescene.patch_msg=Αυτή η ενημέρωση περιέχει και κάποιες μικρές τροποποιήσεις και βελτιώσεις επίδοσης.
scenes.welcomescene.what_msg=Φαίνεται ότι αυτές σου οι αποθηκεύσεις είναι από μια μελλοντική έκδοση του Sacred Pixel Dungeon!\n\nΠροχώρα προσεκτικά! Οι αποθηκεύσεις σου ίσως περιέχουν πράγματα που δεν υπάρχουν σε αυτή την έκδοση. Αυτό θα μπορούσε να προκαλέσει κάποια πολύ περίεργα σφάλματα.
scenes.welcomescene.lang_warning_title=Ατελής μετάφραση
scenes.welcomescene.lang_warning_msg=Κάποιο από το νέο περιεχόμενο αυτής της ενημέρωσης δεν έχει μεταφραστεί ακόμη.\n\nΚάποιες φράσεις ίσως είναι γραμμένες στα Αγγλικά.\n\nΟι ομάδες μετάφρασης δουλεύουν να το επιλύσουν, και μια πλήρης μετάφραση θα προστεθεί σύντομα.\n\nΕυχαριστώ για την υπομονή σας.
scenes.welcomescene.continue=Συνέχεια
scenes.welcomescene.changelist=Λίστα αλλαγών
scenes.welcomescene.save_warning=Το Sacred Pixel Dungeon διακόπηκε κατά την προσπάθεια αποθήκευσης των δεδομένων παιχνιδιού. Το Sacred διαθέτει εγγενείς μηχανισμούς προστασίας από αυτό, οπότε οι αποθηκεύσεις σου πρέπει να είναι εντάξει.\n\nΑυτό μπορεί να συμβεί αν η συσκευή χάσει απότομα ρεύμα ή τερματίσει απότομα το Sacred και δεν το αφήσει να κλείσει σωστά. Αυτό μπορεί να το προκαλέσει η λειτουργία εξοικονόμησης μπαταρίας στις κινητές συσκευές. Η επανεκκίνηση της συσκευής ίσως βοηθήσει αν βλέπεις συχνά αυτό το σφάλμα.
scenes.welcomescene.controller_title=Έλεγχος χειριστηρίου
scenes.welcomescene.controller_body=Παίζεις με χειριστήριο; Χρησιμοποίησε τον δεξιό μοχλό για να κατευθύνεις έναν κέρσορα εντός της οθόνης.\n\nΠάτα RT/R2 ή τον δεξιό μοχλό για να επιλέξεις με τον κέρσορα.
scenes.welcomescene.controller_okay=Εντάξει
