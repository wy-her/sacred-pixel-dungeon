scenes.titlescene$changesbutton.title=Je k dispozici aktualizace!
scenes.titlescene$changesbutton.versioned_title=Dostupná aktualizace: %s
scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon je pravidelně aktualizován o změny ve stávajícím obsahu nebo rozšiřován o obsah zcela nový!\n\nAktualizacemi je často vylepšována vyváženost hry, tak aby konkrétní předměty / hrdinové / nepřátelé nebyli příliš silní nebo příliš slabí.\n\nVětšinou také zahrnují opravy chyb a různě zlepšují stabilitu hry.
scenes.titlescene$changesbutton.update=Přejít na aktualizaci
scenes.titlescene$changesbutton.changes=Seznam aktuálních změn

scenes.welcomescene.update_intro=Sacred Pixel Dungeon byl aktualizován!
scenes.welcomescene.update_msg=v3.3 představuje testovací prostory pro nový úkol ve městě, nové předměty a několik menších úprav a zlepšení.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon byl opatchován!
scenes.welcomescene.patch_bugfixes=Tento patch obsahuje opravy drobných chyb.
scenes.welcomescene.patch_translations=Tento patch obsahuje aktualizace jazykových překladů.
scenes.welcomescene.patch_balance=Tento patch obsahuje změny zlepšující vyváženost hry.
scenes.welcomescene.patch_msg=Patch také obsahuje pár malých změn a zlepšuje výkon hry.
scenes.welcomescene.what_msg=Zdá se, že tvé současné uložené pozice jsou z budoucí verze Sacred Pixel Dungeon!\n\nPokračuj opatrně! Tvé uložené pozice mohou obsahovat věci, které v této verzi neexistují, což může způsobit výskyt velmi zvláštních chyb.
scenes.welcomescene.lang_warning_title=Nekompletní překlad
scenes.welcomescene.lang_warning_msg=Některý nový obsah z této aktualizace ještě nemusel být přeložen.\n\nNěkteré fráze mohou být napsány v angličtině.\n\nPřekladatelský tým se snaží tento problém vyřešit a brzy bude skrze patch poskytnut úplný překlad.\n\nDíky za tvou trpělivost.
scenes.welcomescene.continue=Pokračovat
scenes.welcomescene.changelist=Seznam změn
scenes.welcomescene.save_warning=Sacred Pixel Dungeon byl nedávno přerušen při pokusu o uložení herních dat.\n\nSacred má proti tomu zabudovanou ochranu, takže vaše herní data jsou pravděpodobně v pořádku. Pro jistotu si to ale můžete zkontrolovat.\n\nObvykle se to stává, když vaše zařízení náhle ztratí napájení nebo když ukončí hru Sacred, aniž by ji nechalo řádně zavřít. V mobilních zařízeních to často způsobují funkce pro úsporu baterie. Pokud tuto chybu vidíte často, mohl by pomoct restart zařízení.
scenes.welcomescene.controller_title=Ovládání ovladačem
scenes.welcomescene.controller_body=Hraješ pomocí ovladače? Použij pravou páčku jako kurzor na obrazovce.\n\nStiskni RT/R2 nebo pravou páčku pro vybrání kurzorem.
