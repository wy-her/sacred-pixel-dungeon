scenes.heroselectscene.challenges_nowin=挑战是一类为游戏增添难度的设置选项，可自行选择开启与否。其中的一些会使地牢变得更加危险，另一些则会削弱角色本身或其他物品的力量。\n\n_你必须先正常通关至少一次，才能开启挑战进行游玩。_
