scenes.welcomescene.update_intro=Sacred Pixel Dungeon güncellendi!
scenes.welcomescene.update_msg=v3.3, şehir görevlerinde yapılacak büyük çaplı yenileme için bir test alanı, yeni öğeler ve bir dizi küçük değişiklik ve iyileştirme içeriyor.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon yama aldı!
scenes.welcomescene.patch_bugfixes=Bu yama hata düzeltmeleri içerir.
scenes.welcomescene.patch_translations=Bu yama çeviri güncellemeleri içerir.
scenes.welcomescene.patch_balance=Bu yama oyun dengesi için düzeltmeler içerir.
scenes.welcomescene.patch_msg=Bu yama aynı zamanda küçük düzeltmeler ve performans iyileştirmeleri içerir.
scenes.welcomescene.what_msg=Görünüşe göre şu anki kayıtlı oyunların Sacred Pixel Dungeon'un gelecek bir sürümünden!\n\nDikkatli olun! Kayıtlı oyunlarınız bu sürümde var olmayan şeyler içerebilir, bu durum gerçekten garip hataların meydana gelmesine neden olur.
scenes.welcomescene.lang_warning_title=Bitmemiş Çeviri
scenes.welcomescene.lang_warning_msg=Bu güncellemedeki bazı yeni içerikler henüz güncellenmedi.\n\nBazı cümleler İngilizce yazılmış olabilir.\n\nÇeviri takımları bunu düzeltmek için çalışıyor ve tam bir güncelleme yakında yama ile eklenebilir.\n\nSabrınız için teşekkürler.
scenes.welcomescene.continue=Devam Et
scenes.welcomescene.changelist=Değişim listesi
scenes.welcomescene.save_warning=Sacred Pixel Dungeon, yakın zamanda oyun verilerinizi kaydetmeye çalışırken kesintiye uğradı. Sacred buna karşı yerleşik korumalara sahiptir, bu nedenle oyun verileriniz iyi durumda olmalıdır.\n\nBu genellikle cihazınız aniden güç kaybettiğinde veya düzgün kapanmasına izin vermeden Sacred'ı sonlandırdığında olur. Pil tasarrufu özellikleri genellikle mobil cihazlarda buna neden olabilir. Bu hatayı sık sık görüyorsanız, cihazınızı yeniden başlatmak da yardımcı olabilir.
scenes.welcomescene.controller_title=Denetleyici Girişi
scenes.welcomescene.controller_body=Bir kontrol cihazında mı oynuyorsunuz? Ekrandaki bir imleci kontrol etmek için sağ çubuğu kullanın.\n\nİmleçle seçmek için RT/R2 veya sağ çubuğa basın.
