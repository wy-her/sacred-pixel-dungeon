scenes.gamescene.tutorial_move_desktop=Выкарыстоўвайце мыш, стрэлкi або WASD, каб рухацца і ўзаемадзейнічаць з прадметамi.
scenes.gamescene.tutorial_move_controller=Выберыце месца або выкарыстоўвайце левы стік, каб рухацца ці ўзаемадзейнічаць.
