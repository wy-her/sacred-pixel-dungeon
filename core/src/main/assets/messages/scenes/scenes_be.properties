scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon рэгулярна абнаўляецца, што уносіць змены ў існуючы кантэнт або дадае зусім новыя рэчы!\n\nБаланс гульні паляпшаецца ў абнаўленнях, так што пэўныя прадметы / героі / ворагі не становяцца занадта моцнымі або занадта слабымі.\n\nАбнаўлення таксама ўключаюць выпраўлення памылак і паляпшэння стабільнасці працы.
