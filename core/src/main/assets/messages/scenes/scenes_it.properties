scenes.titlescene$changesbutton.title=È Disponibile un Aggiornamento!
scenes.titlescene$changesbutton.versioned_title=Aggiornamento Disponibile: %s
scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon viene regolarmente aggiornato introducendo revisioni ai contenuti esistenti oppure contenuti completamente nuovi!\n\nIl bilanciamento del gioco è frequentemente perfezionato nei vari aggiornamenti, in modo che specifici oggetti/eroi/nemici non siano troppo forti né troppo deboli.\n\nGli aggiornamenti includono anche correzioni di bug e altri vari miglioramenti alla stabilità.
scenes.titlescene$changesbutton.update=Pagina dell'Aggiornamento
scenes.titlescene$changesbutton.changes=Cambiamenti Recenti

scenes.welcomescene.update_intro=Sacred Pixel Dungeon è stato aggiornato!
scenes.welcomescene.update_msg=La versione 3.3 include un'area di prova per l'imminente revisione della missione della città, nuovi oggetti e qualche altro minore cambiamento e miglioramento.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon è stato modificato!
scenes.welcomescene.patch_bugfixes=Questa modifica contiene la correzione di bug.
scenes.welcomescene.patch_translations=Questa modifica contiene aggiornamenti alle traduzioni.
scenes.welcomescene.patch_balance=Questa modifica contiene modifiche al bilanciamento del gioco.
scenes.welcomescene.patch_msg=Questa modifica contiene inoltre altre piccole modifiche e miglioramenti delle prestazioni.
scenes.welcomescene.what_msg=Sembra che i tuoi salvataggi provengano da versione successiva di Sacred Pixel Dungeon!\n\nManeggiare con cura! I tuoi salvataggi potrebbero contenere cose che in questa versione non esistono, e ciò potrebbe causare errori molto strani.
scenes.welcomescene.lang_warning_title=Traduzione Incompleta
scenes.welcomescene.lang_warning_msg=Alcuni contenuti nuovi di questo aggiornamento non sono ancora stati tradotti.\n\nQualche frase potrebbe essere visualizzata in inglese.\n\nI team di traduzione sono al lavoro e una traduzione completa dovrebbe essere disponibile a breve.\n\nGrazie per la pazienza.
scenes.welcomescene.continue=Continua
scenes.welcomescene.changelist=Lista delle Modifiche
scenes.welcomescene.save_warning=Sacred Pixel Dungeon è stato interrotto mentre cercava di salvare i tuoi dati di gioco recenti. Sacred ha una protezione contro questo, quindi i tuoi dati dovrebbero essere a posto. \n\nQuesto succede di solito quando il tuo dispositivo si spegne improvvisamente, o termina Sacred senza lasciarlo chiudere propriamente. Spesso è causato da funzioni di risparmio energetico su dispositivi mobili. Riavviare il tuo dispositivo potrebbe aiutare se vedi spesso questo errore.
scenes.welcomescene.controller_title=Input per Controller
scenes.welcomescene.controller_body=Stai giocando con un controller? Usa la levetta destra per controllare un puntatore sullo schermo.\n\nPremi RT/R2 o la levetta destra per selezionare con il puntatore.
scenes.welcomescene.controller_okay=Va bene
