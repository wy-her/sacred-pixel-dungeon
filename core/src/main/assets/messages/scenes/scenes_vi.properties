scenes.heroselectscene.daily=Màn chơi hằng ngày
scenes.heroselectscene.daily_desc=Mỗi ngày sẽ có một màn chơi giống nhau giữa tất cả mọi người! "Màn chơi hằng ngày" này sẽ tạo ra một hầm ngục giống nhau cho tất cả những người chơi nó (miễn là họ chơi cùng phiên bản).\n\nBạn có thể dành bao lâu tùy thích để hoàn thành một màn chơi hàng ngày, nhưng chỉ có thể có một màn một lúc. _Màn chơi hàng ngày không được nhận huy chương và có trang xếp hạng của riêng chúng._\n\nBạn có muốn bắt đầu màn chơi hàng ngày hôm nay với người hùng và thử thách đang được chọn?
scenes.heroselectscene.daily_yes=Có
scenes.heroselectscene.daily_no=Không
scenes.heroselectscene.daily_repeat=Bạn đã hoàn thành màn chơi hôm nay. Bạn vẫn có thể chơi lại nếu thích, nhưng chỉ là một màn chơi luyện tập không được xếp hạng.\n\nSau khi hoàn thành màn chơi lại, bạn sẽ có thể xem nó trên bảng xếp hạng màn chơi hằng ngày trong thời gian ngắn trước khi nó bị xóa.\n\nBạn có muốn chơi lại màn chơi hằng ngày của hôm nay với người hùng và thử thách đang được chọn?
scenes.heroselectscene.daily_unavailable_long=Có vẻ bạn đã bắt đầu một màn chơi hàng ngày ở trong tương lai! Việc này có thể xảy ra nếu bạn mới thay đổi múi giờ, hoặc bạn đã thay đổi thời gian của hệ thống. _Màn chơi hằng ngày kế tiếp của bạn của bạn sẽ có sau %d ngày._
scenes.heroselectscene.daily_existing=Bạn đã bắt đầu một màn chơi hàng ngày. Bạn phải kết thúc màn chơi đó trước khi bắt đầu một màn chơi hàng ngày khác.
scenes.heroselectscene.daily_nowin=Mỗi ngày sẽ có một màn chơi mới giống nhau với tất cả mọi người! "màn chơi hàng ngày" này tạo ra cùng một hầm ngục cho tất cả những ai chơi nó (miễn là họ cũng đang chơi cùng một phiên bản trò chơi).\n\n_Bạn phải thắng ít nhất một màn chơi trước khi bạn có thể chơi các màn chơi hàng ngày._
scenes.heroselectscene.custom_seed_title=Nhập một seed tự chọn
scenes.heroselectscene.custom_seed_desc=Trò chơi sử dụng một mã seed để tạo ra hầm ngục, cùng một seed và phiên bản trò chơi sẽ luôn tạo ra cùng một hầm ngục! _Các màn chơ bằng seed tự chọn không thể kiếm được huy chương hoặc tính vào các màn chơi đã chơi,  và xuất hiện ở dưới cùng của trang xếp hạng._
scenes.heroselectscene.custom_seed_duplicate=Bạn đã có một màn chơi thường với seed đó đang diễn ra. Bạn phải kết thúc màn chơi đó trước khi sử dụng seed tự chọn đó.
scenes.heroselectscene.custom_seed_nowin=Trò chơi sử dụng một mã seed để tạo ra hầm ngục, cùng một seed và phiên bản trò chơi sẽ luôn tạo ra cùng một hầm ngục!\n\n_Bạn phải thắng ít nhất một màn chơi trước khi bạn có thể nhập seed tự chọn._
scenes.heroselectscene.custom_seed_set=Đặt
scenes.heroselectscene.custom_seed_clear=Xóa
scenes.heroselectscene.challenges_nowin=Thử thách là những thay đổi không bắt buộc, khiến trò chơi trở nên khó hơn. Một số thử thách khiến hầm ngục trở nên nguy hiểm hơn, số khác làm giảm sức mạnh của các kĩ năng năng hoặc vật phẩm của bạn.\n\n_Bạn phải thắng ít nhất một màn chơi trước khi bạn có thể bật các thử thách._
