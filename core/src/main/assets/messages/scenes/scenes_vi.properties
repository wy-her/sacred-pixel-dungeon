scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon thường xuyên được cập nhật với việc sửa đổi nội dung trò chơi hiện có, hoặc nội dung hoàn toàn mới!\n\nSự cân bằng của trò chơi cũng thường xuyên được cải thiện trong các bản cập nhật trò chơi, do đó các vật phẩm/người hùng/kẻ thù cụ thể không quá mạnh hoặc quá yếu.\n\nCác bản cập nhật cũng bao gồm các bản sửa lỗi cho các lỗi và các cải thiện về độ ổn định khác nhau.
