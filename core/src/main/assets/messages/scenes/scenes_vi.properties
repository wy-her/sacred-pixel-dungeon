scenes.welcomescene.update_intro=Sacred Pixel Dungeon đã được cập nhật!
scenes.welcomescene.update_msg=Phiên bản 3.3 bao gồm một khu vực thử nghiệm cho bản làm lại sắp tới của nhiệm vụ trong thành phố, các vật phẩm mới, và một tá các sự điều chỉnh và cải thiện nhỏ.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon đã được cập nhật!
scenes.welcomescene.patch_bugfixes=Bản cập nhật này bao gồm nhiều lỗi được sửa.
scenes.welcomescene.patch_translations=Bản cập nhật này chứa cập nhật bản dịch.
scenes.welcomescene.patch_balance=Bản cập nhật này chứa các điều chỉnh với sự cân bằng của trò chơi.
scenes.welcomescene.patch_msg=Bản cập nhật này còn chứa các điều chỉnh nhỏ và cải tiến về hiệu năng.
scenes.welcomescene.what_msg=Có vẻ như tệp lưu hiện tại của bạn là từ một phiên bản tương lai của Sacred Pixel Dungeon!\n\nCẩn thận! Tệp lưu của bạn có thể chứa những thứ không tồn tại trong phiên bản này, điều đó có thể sẽ làm các lỗi rất lạ xảy ra.
scenes.welcomescene.lang_warning_title=Bản dịch chưa hoàn thành
scenes.welcomescene.lang_warning_msg=Một vài nội dung mới của bản cập nhật này chưa được dịch\n\nMột vài cụm từ có thể được viết bằng Tiếng Anh.\n\nCác nhóm dịch đang cố gắng để giải quyết và một bản dịch đầy đủ sẽ sớm được thêm vào.\n\nCám ơn vì sự kiên nhẫn của bạn.
scenes.welcomescene.continue=Tiếp tục
scenes.welcomescene.changelist=Danh sách thay đổi
scenes.welcomescene.save_warning=SacredPD đã bị chặn khi đang cố lưu lại dữ liệu trò chơi của bạn. Trò chơi đã có biện pháp khác để ngăn chặn điều này, nên dữ liệu của bạn vẫn ổn.\n\nĐiều này thường xảy ra khi thiết bị của bạn đột ngột hết pin, hoặc nó tắt trò chơi mà không để trò chơi tắt đúng cách. Tính năng tiết kiệm pin cũng thường gây ra điều này ở thiết bị di động. Khởi động lại thiết bị của bạn có thể giúp nếu bạn thấy lỗi này thường xuyên xảy ra.
scenes.welcomescene.controller_title=Đầu vào tay cầm
scenes.welcomescene.controller_body=Chơi bằng tay cầm ư? Hãy sử dụng cần điều khiển bên phải để điều khiển con trỏ trên màn hình.\n\nNhấn nút RT/R2 hoặc cần điều khiển để lựa chọn với con trỏ.
