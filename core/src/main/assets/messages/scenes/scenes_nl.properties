scenes.titlescene$changesbutton.versioned_title=Update Beschikbaar: %s
scenes.titlescene$changesbutton.desc=Sacred Pixel Dungeon word regelmatig geüpdated met revisies van de bestaande game-inhoud, of compleet nieuwe inhoud!  \n\nSpelbalans wordt ook herhaaldelijk verbeterd in spel-updates, zodat specifieke voorwerpen/helden/vijanden niet te sterk of te zwak zijn.\n\nUpdates bevatten ook reparaties voor bugs en andere verschillende stabiliteitsverbeteringen.
scenes.titlescene$changesbutton.update=Ga naar de Update Pagina
scenes.titlescene$changesbutton.changes=Huidige Veranderingen Scherm

scenes.welcomescene.update_intro=Sacred Pixel Dungeon is bijgewerkt.
scenes.welcomescene.update_msg=v3.3 bevat een testergedeelte voor de aankomende revisie van de stadsmissie, nieuwe items en een aantal kleinere aanpassingen en verbeteringen.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon is gepatcht.
scenes.welcomescene.patch_bugfixes=Deze patch bevat bugfixes.
scenes.welcomescene.patch_translations=Deze patch bevat vertaling updates.
scenes.welcomescene.patch_balance=Deze patch bevat aanpassingen aan de spelbalans.
scenes.welcomescene.patch_msg=Deze patch bevat ook een paar kleine veranderingen en prestatieverbeteringen.
scenes.welcomescene.what_msg=Het lijkt erop alsof je opgeslagen bestanden afkomstig zijn uit een toekomstige versie van Sacred Pixel Dungeon!\n\nPas op met verder gaan! Je opgeslagen spellen kunnen dingen bevatten die niet bestaan in deze versie, dit kan heel vreemde fouten veroorzaken.
scenes.welcomescene.lang_warning_title=Onvolledige Vertaling
scenes.welcomescene.lang_warning_msg=Een deel van de nieuwe inhoud van deze update is nog niet vertaald.\n\nSommige zinnen zijn mogelijk in Engels geschreven.\n\nDe vertaalteams werken eraan om dit op te lossen en er wordt binnenkort een volledige vertaling gepatcht.\n\nBedankt u voor uw geduld.
scenes.welcomescene.continue=Doorgaan
scenes.welcomescene.changelist=Veranderingenlijst
scenes.welcomescene.save_warning=Sacred Pixel Dungeon is onlangs onderbroken tijdens het opslaan van je spelgegevens.\n\nSacred heeft ingebouwde beveiligingen hiertegen, dus je spelgegevens zijn waarschijnlijk in orde.\n\nDit gebeurt meestal wanneer je apparaat plotseling geen stroom meer krijgt of als Sacred wordt beëindigd zonder het goed te laten sluiten. Batterijbesparingsfuncties kunnen dit vaak veroorzaken op mobiele apparaten. Je apparaat opnieuw opstarten kan ook helpen als je deze fout vaak ziet.
scenes.welcomescene.controller_title=Controller Invoer
scenes.welcomescene.controller_body=Spelen op een controller? Gebruik de rechter joystick om een cursor op het scherm te besturen.\n\nDruk op RT/R2 of druk op de rechter joystick om met de cursor te kiezen.
