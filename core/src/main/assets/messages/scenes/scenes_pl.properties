scenes.titlescene$changesbutton.changes=Ekran aktualnych zmian

scenes.welcomescene.update_intro=Sacred Pixel Dungeon został uaktualniony!
scenes.welcomescene.update_msg=W wersji 3.3 dodano obszar testowy związany z nadchodzącą przebudową zadania w mieście, nowe przedmioty i wiele mniejszych zmian i ulepszeń.
scenes.welcomescene.patch_intro=Sacred Pixel Dungeon został załatany!
scenes.welcomescene.patch_bugfixes=Ta łatka zawiera poprawy błędów.
scenes.welcomescene.patch_translations=Ta łatka zawiera aktualizacje tłumaczeń.
scenes.welcomescene.patch_balance=Ta łatka zawiera poprawki do równowagi gry.
scenes.welcomescene.patch_msg=Ta łatka zawiera również kilka małych poprawek i ulepszeń wydajności.
scenes.welcomescene.what_msg=Wygląda na to, że twój obecny zapis jest z przyszłej wersji Sacred Pixel Dungeon!\n\nDziałaj ostrożnie! Twoje zapisy mogą zawierać rzeczy, której nie istnieją w tej wersji, to może spowodować wiele dziwnych błędów.
scenes.welcomescene.lang_warning_title=Tłumaczenie niepełne
scenes.welcomescene.lang_warning_msg=Część nowej zawartości z tej aktualizacji może nie być jeszcze przetłumaczona.\n\nCzęść zdań może być napisana po angielsku.\n\nGrupy tłumaczące pracują nad tym i pełne tłumaczenie powinno być dostępne niedługo.\n\nDziękujemy za cierpliwość.
scenes.welcomescene.continue=Kontynuuj
scenes.welcomescene.changelist=Lista zmian
scenes.welcomescene.save_warning=Działanie Sacred Pixel Dungeon zostało przerwane podczas próby zapisywania stanu gry. Gra ma zabezpieczenia przeciw utracie danych, więc prawdopodobnie wszystko jest w porządku.\n\nTakie sytuacje zdarzają się, gdy urządzenie jest odłączone od prądu lub gdy aplikacja nie wyłączyła się poprawnie. Funkcje oszczędzania energii są tego częstą przyczyną na telefonach. Zrestartowanie urządzenia może pomóc, jeśli ten błąd pojawia się często.
scenes.welcomescene.controller_title=Wykryto Kontroler
scenes.welcomescene.controller_body=Grasz na kontrolerze? Użyj prawego drążka, aby sterować kursorem.\n\nWciśnij prawy spust/R2 lub prawy drążek, aby wybrać coś kursorem.
